// ORB TRAIL PARTICLES
// ══════════════════════════════════════════════
var orbParticles = null;
var MAX_ORB_PARTICLES = 500;
var orbPData = [];

function createOrbParticles() {
  var positions = new Float32Array(MAX_ORB_PARTICLES*3);
  var alphas = new Float32Array(MAX_ORB_PARTICLES);
  var sizes = new Float32Array(MAX_ORB_PARTICLES);
  for(var i=0;i<MAX_ORB_PARTICLES;i++){
    positions[i*3]=0;positions[i*3+1]=-999;positions[i*3+2]=0;
    alphas[i]=0; sizes[i]=1.0;
    orbPData.push({alive:false, vx:0, vy:0, vz:0, life:0, maxLife:1, size:1.0});
  }
  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  var mat = new THREE.ShaderMaterial({
    uniforms: { pixelRatio: {value: Math.min(window.devicePixelRatio, 1.5)} },
    vertexShader: [
      'attribute float alpha;','attribute float size;','uniform float pixelRatio;',
      'varying float vA;','varying float vSize;',
      'void main(){','  vA = alpha;','  vSize = size;',
      '  vec4 mvPos = modelViewMatrix * vec4(position, 1.0);',
      '  gl_PointSize = size * pixelRatio * (300.0 / -mvPos.z);',
      '  gl_PointSize = clamp(gl_PointSize, 1.0, 32.0);',
      '  gl_Position = projectionMatrix * mvPos;','}'
    ].join('\n'),
    fragmentShader: [
      'varying float vA;','varying float vSize;',
      'void main(){','  float d = length(gl_PointCoord - 0.5) * 2.0;',
      '  if(d > 1.0) discard;','  float glow = 1.0 - d;','  glow = pow(glow, 1.5);',
      '  vec3 hotCore = vec3(1.0, 0.85, 0.6);','  vec3 outerGlow = vec3(0.5, 0.65, 1.0);',
      '  vec3 col = mix(outerGlow, hotCore, glow);',
      '  gl_FragColor = vec4(col, glow * vA);','}'
    ].join('\n'),
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  orbParticles = new THREE.Points(geo, mat);
  scene.add(orbParticles);
}

function updateOrbParticles(dt, rpm, orbPositions, orbVelocities) {
  if(!orbParticles) return;
  var pos = orbParticles.geometry.attributes.position.array;
  var alphas = orbParticles.geometry.attributes.alpha.array;
  var sizes = orbParticles.geometry.attributes.size.array;
  var rpmThreshold = 4;
  if(rpm > rpmThreshold && orbPositions.length > 0) {
    var excess = rpm - rpmThreshold;
    var spawnRate = excess * 1.5;
    var spawnsThisFrame = Math.min(Math.floor(spawnRate * dt * 60 + Math.random()), 12);
    for(var s=0;s<spawnsThisFrame;s++){
      for(var fi3=0;fi3<MAX_ORB_PARTICLES;fi3++){
        if(!orbPData[fi3].alive){
          var orbIdx = Math.floor(Math.random()*orbPositions.length);
          var op = orbPositions[orbIdx];
          var ov = orbVelocities[orbIdx];
          var speed = Math.sqrt(ov.x*ov.x + ov.y*ov.y + ov.z*ov.z);
          if(speed < 0.5) break;
          orbPData[fi3].alive = true;
          orbPData[fi3].life = 0;
          orbPData[fi3].maxLife = 0.4 + Math.random()*1.2;
          var offR = 0.35;
          var rndAng = Math.random()*Math.PI*2;
          pos[fi3*3] = op.x + Math.cos(rndAng)*offR*(Math.random()*0.3);
          pos[fi3*3+1] = op.y + (Math.random()-0.5)*offR*0.5;
          pos[fi3*3+2] = op.z + Math.sin(rndAng)*offR*(Math.random()*0.3);
          var flingMult = 1.5 + Math.random()*2.0;
          var rpmBoost = Math.min(rpm/30, 3.0);
          orbPData[fi3].vx = ov.x * flingMult * rpmBoost + (Math.random()-0.5)*2.0;
          orbPData[fi3].vy = ov.y * flingMult * rpmBoost + (Math.random()-0.3)*1.5;
          orbPData[fi3].vz = ov.z * flingMult * rpmBoost + (Math.random()-0.5)*2.0;
          var sz = Math.random() < 0.7 ? 1.0+Math.random()*2.0 : 3.0+Math.random()*3.0;
          orbPData[fi3].size = sz; sizes[fi3] = sz;
          break;
        }
      }
    }
  }
  for(var i=0;i<MAX_ORB_PARTICLES;i++){
    if(!orbPData[i].alive){ alphas[i] = 0; continue; }
    orbPData[i].life += dt;
    if(orbPData[i].life >= orbPData[i].maxLife){
      orbPData[i].alive = false; alphas[i] = 0; pos[i*3+1] = -999; continue;
    }
    pos[i*3] += orbPData[i].vx * dt;
    pos[i*3+1] += orbPData[i].vy * dt;
    pos[i*3+2] += orbPData[i].vz * dt;
    orbPData[i].vy -= 0.8 * dt;
    orbPData[i].vx *= 0.995; orbPData[i].vy *= 0.998; orbPData[i].vz *= 0.995;
    var lifeT = orbPData[i].life / orbPData[i].maxLife;
    var fadeIn = Math.min(lifeT * 20.0, 1.0);
    var fadeOut = 1.0 - lifeT * lifeT;
    alphas[i] = fadeIn * fadeOut;
    sizes[i] = orbPData[i].size * (1.0 - lifeT * 0.5);
  }
  orbParticles.geometry.attributes.position.needsUpdate = true;
  orbParticles.geometry.attributes.alpha.needsUpdate = true;
  orbParticles.geometry.attributes.size.needsUpdate = true;
}

// ══════════════════════════════════════════════
// WELDING SPARKS
// ══════════════════════════════════════════════
var MAX_SPARKS = 80;
var SPARK_TRAIL_LEN = 8;
var sparkData = [];
var sparkLines = null;

function createWeldingSparks(){
  for(var i=0;i<MAX_SPARKS;i++){
    var trail = [];
    for(var j=0;j<SPARK_TRAIL_LEN;j++) trail.push({x:0,y:-999,z:0});
    sparkData.push({alive:false, trail:trail, vx:0,vy:0,vz:0, life:0, maxLife:1, head:0});
  }
  var totalVerts = MAX_SPARKS * (SPARK_TRAIL_LEN - 1) * 2;
  var positions = new Float32Array(totalVerts * 3);
  var alphas = new Float32Array(totalVerts);
  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));
  var mat = new THREE.ShaderMaterial({
    vertexShader:'attribute float alpha;varying float vA;void main(){vA=alpha;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
    fragmentShader:'varying float vA;void main(){gl_FragColor=vec4(1.0, 0.97, 0.92, vA);}',
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending
  });
  sparkLines = new THREE.LineSegments(geo, mat);
  sparkLines.frustumCulled = false;
  scene.add(sparkLines);
}

function updateWeldingSparks(dt, rpm, orbPositions, orbVelocities){
  if(!sparkLines) return;
  var pos = sparkLines.geometry.attributes.position.array;
  var alp = sparkLines.geometry.attributes.alpha.array;
  var rpmNormSpark = Math.min(rpm/200, 1.0);
  var sparkPhase = Math.max((rpmNormSpark - 0.45) / 0.55, 0.0);
  if(sparkPhase > 0.01 && orbPositions.length > 0){
    var spawnRate2 = sparkPhase * sparkPhase * 8.0;
    var spawns2 = Math.min(Math.floor(spawnRate2 * dt * 60 + Math.random()), 6);
    for(var s=0;s<spawns2;s++){
      for(var fi4=0;fi4<MAX_SPARKS;fi4++){
        if(!sparkData[fi4].alive){
          var orbIdx2 = Math.floor(Math.random()*orbPositions.length);
          var op2 = orbPositions[orbIdx2];
          var ov2 = orbVelocities[orbIdx2];
          var speed2 = Math.sqrt(ov2.x*ov2.x+ov2.y*ov2.y+ov2.z*ov2.z);
          if(speed2 < 1.0) break;
          sparkData[fi4].alive = true;
          sparkData[fi4].life = 0;
          sparkData[fi4].maxLife = 0.3 + Math.random()*0.6;
          var fling2 = 2.0 + Math.random()*3.0;
          var spread2 = 0.8;
          sparkData[fi4].vx = ov2.x*fling2 + (Math.random()-0.5)*speed2*spread2;
          sparkData[fi4].vy = ov2.y*fling2 + (Math.random()-0.3)*speed2*spread2;
          sparkData[fi4].vz = ov2.z*fling2 + (Math.random()-0.5)*speed2*spread2;
          for(var ti2=0;ti2<SPARK_TRAIL_LEN;ti2++){
            sparkData[fi4].trail[ti2].x = op2.x + (Math.random()-0.5)*0.1;
            sparkData[fi4].trail[ti2].y = op2.y + (Math.random()-0.5)*0.1;
            sparkData[fi4].trail[ti2].z = op2.z + (Math.random()-0.5)*0.1;
          }
          sparkData[fi4].head = 0;
          break;
        }
      }
    }
  }
  for(var i=0;i<MAX_SPARKS;i++){
    var sp2 = sparkData[i];
    var segBase = i * (SPARK_TRAIL_LEN-1) * 2;
    if(!sp2.alive){
      for(var z=0;z<(SPARK_TRAIL_LEN-1)*2;z++){ pos[(segBase+z)*3+1] = -999; alp[segBase+z] = 0; }
      continue;
    }
    sp2.life += dt;
    if(sp2.life >= sp2.maxLife){ sp2.alive = false; continue; }
    var h2 = sp2.head;
    var prevH2 = (h2 - 1 + SPARK_TRAIL_LEN) % SPARK_TRAIL_LEN;
    sp2.trail[h2].x = sp2.trail[prevH2].x + sp2.vx * dt;
    sp2.trail[h2].y = sp2.trail[prevH2].y + sp2.vy * dt;
    sp2.trail[h2].z = sp2.trail[prevH2].z + sp2.vz * dt;
    sp2.head = (h2 + 1) % SPARK_TRAIL_LEN;
    sp2.vy -= 3.0 * dt;
    sp2.vx *= 0.98; sp2.vz *= 0.98;
    var lifeT2 = sp2.life / sp2.maxLife;
    var masterAlpha = (1.0 - lifeT2) * Math.min(lifeT2 * 15.0, 1.0);
    var curHead = sp2.head;
    for(var si=0;si<SPARK_TRAIL_LEN-1;si++){
      var idx0 = (curHead - 1 - si + SPARK_TRAIL_LEN*2) % SPARK_TRAIL_LEN;
      var idx1 = (curHead - 2 - si + SPARK_TRAIL_LEN*2) % SPARK_TRAIL_LEN;
      var vOff = (segBase + si*2);
      pos[vOff*3]   = sp2.trail[idx0].x; pos[vOff*3+1] = sp2.trail[idx0].y; pos[vOff*3+2] = sp2.trail[idx0].z;
      pos[(vOff+1)*3] = sp2.trail[idx1].x; pos[(vOff+1)*3+1] = sp2.trail[idx1].y; pos[(vOff+1)*3+2] = sp2.trail[idx1].z;
      var segFade = 1.0 - (si / (SPARK_TRAIL_LEN-1)); segFade = segFade * segFade;
      alp[vOff] = masterAlpha * segFade; alp[vOff+1] = masterAlpha * segFade * 0.7;
    }
  }
  sparkLines.geometry.attributes.position.needsUpdate = true;
  sparkLines.geometry.attributes.alpha.needsUpdate = true;
}

var godrayFBO, godrayBlurFBO, godrayOccScene, godrayBlurScene, godrayBlurCamera, godrayBlurQuad;
var godrayIntensity = 0;
var occlusionMat;
var smoothedRpmForPlanets = 0;

function createGodRays(){
  var pr = Math.min(window.devicePixelRatio, 1.5);
  var w = Math.floor(window.innerWidth * pr * 0.5);
  var h = Math.floor(window.innerHeight * pr * 0.5);
  godrayFBO = new THREE.WebGLRenderTarget(w, h, {minFilter:THREE.LinearFilter, magFilter:THREE.LinearFilter, format:THREE.RGBFormat});
  godrayBlurFBO = new THREE.WebGLRenderTarget(w, h, {minFilter:THREE.LinearFilter, magFilter:THREE.LinearFilter, format:THREE.RGBFormat});
  occlusionMat = new THREE.MeshBasicMaterial({color:0x000000});
  godrayBlurScene = new THREE.Scene();
  godrayBlurCamera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  var blurMat = new THREE.ShaderMaterial({
    uniforms:{
      tOcclusion:{value:null},
      lightPos:{value:new THREE.Vector2(0.5,0.5)},
      density:{value:1.0}, weight:{value:0.015}, decay:{value:0.97}, numSamples:{value:60}
    },
    vertexShader:'varying vec2 vUV;void main(){vUV=uv;gl_Position=vec4(position,1.0);}',
    fragmentShader:[
      'uniform sampler2D tOcclusion;','uniform vec2 lightPos;',
      'uniform float density,weight,decay;','uniform float numSamples;','varying vec2 vUV;',
      'void main(){','  vec2 tc=vUV;','  vec2 deltaUV=(tc-lightPos)*density/numSamples;',
      '  float illum=1.0;','  vec3 col=vec3(0.0);',
      '  for(float i=0.0;i<60.0;i++){','    tc-=deltaUV;',
      '    vec3 s=texture2D(tOcclusion,tc).rgb;','    s*=illum*weight;','    col+=s;','    illum*=decay;','  }',
      '  gl_FragColor=vec4(col,1.0);','}'
    ].join('\n'),
    depthWrite:false, depthTest:false
  });
  godrayBlurQuad = new THREE.Mesh(new THREE.PlaneGeometry(2,2), blurMat);
  godrayBlurScene.add(godrayBlurQuad);
}

function resizeGodRays(){
  if(godrayFBO){
    var pr=Math.min(window.devicePixelRatio,2.0);
    var w=Math.floor(window.innerWidth*pr*0.5), h=Math.floor(window.innerHeight*pr*0.5);
    godrayFBO.setSize(w,h); godrayBlurFBO.setSize(w,h);
  }
}

function renderGodRays(){
  if(!godrayFBO || godrayIntensity < 0.01 || !floors.length) return;
  // Find orb floor
  var orbFloor = null;
  for(var ofi=0;ofi<floors.length;ofi++){ if(floors[ofi].isOrbFloor){ orbFloor=floors[ofi]; break; } }
  if(!orbFloor) return;
  var centerStarGroup = orbFloor.group.userData.centerStar;
  if(!centerStarGroup) return;

  var lightWorld = new THREE.Vector3(0, orbFloor.group.position.y, 0);
  var lightScreen = lightWorld.clone().project(camera);
  var lightUV = new THREE.Vector2(lightScreen.x * 0.5 + 0.5, lightScreen.y * 0.5 + 0.5);

  var savedMats = [];
  var savedBg = scene.background.clone();
  var savedFog = scene.fog.color.clone();
  scene.background.setRGB(0,0,0);
  scene.fog.color.setRGB(0,0,0);

  scene.traverse(function(obj){
    if(obj.isMesh && obj.material && obj.visible){
      var isCenterStar = false;
      var p = obj;
      while(p){ if(p === centerStarGroup){ isCenterStar=true; break; } p = p.parent; }
      if(isCenterStar){
        savedMats.push({obj:obj, mat:obj.material});
        obj.material = new THREE.MeshBasicMaterial({color:0xffffff});
      } else if(obj.material.type === 'SpriteMaterial'){
        // skip sprites
      } else {
        savedMats.push({obj:obj, mat:obj.material, oldVis:obj.visible});
        if(obj.material.opacity < 0.05 && obj.material.transparent){ obj.visible = false; }
        else { obj.material = occlusionMat; }
      }
    }
  });

  var hiddenObjs = [];
  scene.traverse(function(obj){
    if(obj.isSprite || obj.isPoints || obj.isLine){
      if(obj.visible){ hiddenObjs.push(obj); obj.visible=false; }
    }
  });
  for(var ri2=0;ri2<lightRays.length;ri2++){
    if(lightRays[ri2].visible){ hiddenObjs.push(lightRays[ri2]); lightRays[ri2].visible=false; }
  }

  // Hide cart UI during occlusion pass
  var cartIconVis2=cart.iconGroup?cart.iconGroup.visible:false;
  var cartPanelVis2=cart.panelGroup?cart.panelGroup.visible:false;
  if(cart.iconGroup) cart.iconGroup.visible=false;
  if(cart.panelGroup) cart.panelGroup.visible=false;

  renderer.setRenderTarget(godrayFBO);
  renderer.clear();
  renderer.render(scene, camera);

  for(var i=0;i<savedMats.length;i++){
    savedMats[i].obj.material = savedMats[i].mat;
    if(savedMats[i].oldVis !== undefined) savedMats[i].obj.visible = true;
  }
  for(var j=0;j<hiddenObjs.length;j++) hiddenObjs[j].visible=true;
  scene.background.copy(savedBg);
  scene.fog.color.copy(savedFog);
  if(cart.iconGroup) cart.iconGroup.visible=cartIconVis2;
  if(cart.panelGroup) cart.panelGroup.visible=cartPanelVis2;

  godrayBlurQuad.material.uniforms.tOcclusion.value = godrayFBO.texture;
  godrayBlurQuad.material.uniforms.lightPos.value.copy(lightUV);
  godrayBlurQuad.material.uniforms.weight.value = 0.01 + godrayIntensity * 0.02;
  renderer.setRenderTarget(godrayBlurFBO);
  renderer.clear();
  renderer.render(godrayBlurScene, godrayBlurCamera);
  renderer.setRenderTarget(null);
}

// ── Spin crescendo tuning ──────────────────────────────────────────────────────────────
// The dramatic build that plays as you spin the wheel up: brightness → the screen goes BLACK
// and HOLDS → the crystal's light floods/whites-out the screen → the game commits. This runs
// on its OWN, EXTENDED rpm range (separate from the beam/spin physics, which stay on /200), so
// the darkness can hold much longer and the whiteout demands a far higher, harder spin.
// All thresholds are fractions of SEQ_MAXRPM, i.e. raw rpm = fraction * SEQ_MAXRPM.
var SEQ_MAXRPM   = 480;   // rpm at which the crescendo is fully maxed
var SEQ_BRIGHT   = 0.12;  // brightness ramp completes here              (~rpm 58)
var SEQ_DARK_LO  = 0.03;  // darkness begins almost as soon as you spin  (~rpm 14)
var SEQ_DARK_HI  = 0.18;  // screen fully black here, very quickly        (~rpm 86)
var SEQ_WHITE_LO = 0.82;  // (legacy seqNorm whiteout window — superseded by BEAM_TOP_RPM below)
var SEQ_WHITE_HI = 1.00;
// The beam climbs at HALF the old rate: its tip reaches the top crystal at BEAM_TOP_RPM (double
// the old ~480). The whiteout + game-entry are now tied to this same climb, so the screen
// brightens as the beam nears the top and the game starts the instant it reaches the top crystal.
var BEAM_TOP_RPM = 960;   // rpm at which the beam tip reaches the top crystal → game start
// (entry still uses gameMode.chargeRpmThreshold, now measured against seqNorm — see below)

// ── Stage 1: CRYSTAL CHAIN ──────────────────────────────────────────────────────────────
// As the gallery beam climbs (its tip = seqNorm × beamHeight), it passes the crystals stacked
// on the floors above, one by one nearest-first. Each is a node with the beam-local height at
// which the tip reaches it. Stage 1 just detects the hit and lights the crystal (placeholder);
// Stages 2-4 will hang the "mining" spark, spin-up, screen-brighten and sun-ray off `reached`.
var crystalChain = null;
// Stage 2 (revised): the main (gallery) crystal's light RATCHETS UP in steps as the beam mines
// each crystal. It sits dim early, and every time the beam reaches a new crystal it PULSES —
// overshoots then settles to a new, higher baseline (a sudden boost of power that sticks).
// e.g. ~5% before crystal 1 → spikes to ~25% on contact → settles to ~15%, repeated per crystal.
var mainPower = 0;             // current main-crystal light level
var mainFlash = 0;             // power above the baseline (surges the beam so the pulse is visible)
var mainHoldT = 0;             // counts down the "held at max" window after each contact
var MAIN_BASE = 0.05;          // baseline before any crystal is mined
var MAIN_STEP = 0.10;          // baseline gained per crystal mined
var MAIN_MAX = 1.15;           // FULL-power light the crystal jumps to & HOLDS on contact
var MAIN_HOLD = 1.0;           // seconds it stays at full power before settling
// Stage 3: 0→1 how lit the whole screen is from the reached crystals spinning up (drives the
// background brightening back out of the dark as more crystals reach super-fast spin).
var crystalScreenBright = 0;
// Stage 4: a wide vertical shaft of light each crystal fires once it hits max spin — a bright
// camera-facing billboard (additive) with a soft core/edges, "as wide as the crystal".
var _srPos = new THREE.Vector3();
var SUNRAY_WIDTH = 3.4;     // plane width; the bright core is ~half this (≈ a crystal's width)
var SUNRAY_HEIGHT = 20.0;   // shaft length
function makeSunRay(){
  var mat = new THREE.ShaderMaterial({
    uniforms:{ uIntensity:{value:0}, uTime:{value:0} },
    vertexShader:'varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
    fragmentShader:[
      'varying vec2 vUv; uniform float uIntensity, uTime;',
      'void main(){',
      '  float xd=abs(vUv.x-0.5)*2.0;',                       // 0 centre → 1 edge
      '  float core=1.0-smoothstep(0.42,1.0,xd);',            // flat-bright core, soft falloff
      '  float spike=pow(1.0-xd,6.0);',                       // hot centre line
      '  float yd=abs(vUv.y-0.5)*2.0;',
      '  float vfade=1.0-smoothstep(0.35,1.0,yd);',           // soft ends
      '  float shimmer=0.85+0.15*sin(vUv.y*45.0-uTime*7.0);',
      '  float a=(core*0.8+spike)*vfade*shimmer*uIntensity;',
      '  vec3 col=mix(vec3(0.7,0.85,1.0), vec3(1.0,1.0,1.0), clamp(core+spike,0.0,1.0));',
      '  gl_FragColor=vec4(col, a);',
      '}'
    ].join('\n'),
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, side:THREE.DoubleSide
  });
  var m = new THREE.Mesh(new THREE.PlaneGeometry(1,1), mat);
  m.frustumCulled=false; m.visible=false; m.renderOrder=2;
  scene.add(m);
  return m;
}
function buildCrystalChain(){
  var gf = gameMode.galleryFloor; if(!gf || !gf.group.userData.beam) return null;
  var gY = gf.group.position.y;
  var bh = gf.group.userData.beam.beamHeight;
  var nodes = [];
  floors.forEach(function(f){
    if(f===gf) return;
    var ly = f.group.position.y - gY;                 // crystal height in the beam's local frame
    if(ly>0.2 && ly<=bh+0.5){
      var cs = f.group.userData.centerStar;
      var mesh = (cs && cs.children[0]) ? cs.children[0] : null;           // the octahedron crystal
      var mat = mesh ? mesh.material : null;
      nodes.push({ floor:f, localY:ly, reached:false, mesh:mesh, mat:mat, spin:0, prox:0, ownLight:0, sunray:makeSunRay() });
    }
  });
  nodes.sort(function(a,b){ return a.localY-b.localY; });   // nearest (lowest) first
  return nodes;
}
function updateCrystalChain(tipY, seqNorm, dt, beamClimb){
  if(!crystalChain) crystalChain = buildCrystalChain();
  if(!crystalChain || !crystalChain.length) return;
  if(seqNorm < 0.04){                                        // wheel stopped → disconnect & re-arm
    for(var z=0;z<crystalChain.length;z++){ var cz=crystalChain[z];
      cz.reached=false; cz.spin=0; cz.prox=0; cz.ownLight=0;
      if(cz.sunray) cz.sunray.visible=false; }
    crystalScreenBright = 0; mainPower = 0; mainFlash = 0; mainHoldT = 0;
    return;
  }
  var topIdx = crystalChain.length-1;                        // the highest crystal (reached last)
  var SPIN_MAX = 0.5;                                        // post-contact super-fast spin
  var PRE_SPIN = 0.14;                                       // pre-contact spin, grows with proximity
  var APPROACH = 9.0;                                        // how far below a crystal it starts powering up
  var ELECTRIC_BASE = 0.10;                                  // faint base electric shine on each crystal
  var PROX_GLOW = 0.7;                                       // glow gained as the beam approaches (pre-contact)
  var OWN_MAX = 1.3, OWN_BASE = 0.45, OWN_COOL = 0.05;       // crystal's own light: flash bright → cool to base
  // Product-wheel spin at full: BOTTOM crystal (nearest) spins much faster than the TOP one.
  var FLOOR_SPIN_BOTTOM = 0.40, FLOOR_SPIN_TOP = 0.08;
  var NCH = crystalChain.length;
  var nowT = performance.now()*0.001;
  var brightSum = 0, reachedCount = 0;
  for(var i=0;i<crystalChain.length;i++){
    var n=crystalChain[i];
    // ── Proximity ── 0 when the beam tip is APPROACH below the crystal, 1 at/after it. This is
    // what powers the crystal up THROUGH PROXIMITY: it glows + starts spinning before contact.
    var prox = Math.max(0, Math.min((tipY - (n.localY - APPROACH)) / APPROACH, 1));
    n.prox = prox;
    // ── Contact ── the moment the beam reaches the crystal: it emits its OWN light, instantly
    // bright (OWN_MAX), and the main crystal flares + holds.
    if(!n.reached && tipY >= n.localY){
      n.reached=true; n.ownLight = OWN_MAX; mainHoldT = MAIN_HOLD;
      if(i===topIdx) enterGameMode();                        // top crystal → start the game
    }
    if(n.reached) reachedCount++;
    // Own light cools toward a steady base after contact (instant-bright → ~1s cool-down).
    var ownTarget = n.reached ? OWN_BASE : 0;
    n.ownLight += (ownTarget - n.ownLight) * OWN_COOL;
    // Spin: eases toward a small proximity-driven pre-spin, then to full speed after contact.
    var spinTarget = n.reached ? SPIN_MAX : prox*PRE_SPIN;
    n.spin += (spinTarget - n.spin) * 0.045;
    if(n.mesh){ n.mesh.rotation.y += n.spin; n.mesh.rotation.x += n.spin*0.5; }
    // ── Crystal light ── base electric shine + proximity glow + its own emitted light, with an
    // electric flicker. Brightens blue→white-hot as it powers up. Re-applied every frame (the
    // per-floor brightness code resets idle crystals; this runs during the gallery floor, last).
    var L = ELECTRIC_BASE + prox*PROX_GLOW + n.ownLight;
    if(n.mat){
      var shimmer = 0.82 + 0.18*Math.sin(nowT*34.0 + n.localY*6.3);
      n.mat.emissive.setRGB(0.30 + L*0.45, 0.50 + L*0.42, 1.0);
      n.mat.emissiveIntensity = L * 8.0 * shimmer;
    }
    // Product panels spin up with the crystal (proximity pre-spin → fast after contact), in the
    // wheel's idle direction, bottom-faster gradient. Centre star re-countered so it stays put.
    var t = n.spin/SPIN_MAX;
    var fg = n.floor.group, fdir = (fg.userData.rotationSpeed < 0) ? -1 : 1;
    var frac = (NCH>1) ? i/(NCH-1) : 0;
    var nodeSpinMax = FLOOR_SPIN_BOTTOM + (FLOOR_SPIN_TOP - FLOOR_SPIN_BOTTOM)*frac;
    fg.rotation.y += t * nodeSpinMax * fdir;
    if(fg.userData.centerStar) fg.userData.centerStar.rotation.y = -fg.rotation.y;
    // ── Electric shine shaft ── an electric beam of light from the crystal that GROWS in size
    // and strength as the beam approaches (prox²), then flares on contact (ownLight) and settles
    // into the crystal's own steady emission. This is the "connection of energy" reaching out.
    if(n.sunray){
      var sunI = prox*prox*0.55 + n.ownLight*0.9;
      if(sunI > 0.02){
        n.sunray.visible=true;
        n.mesh.getWorldPosition(_srPos);
        n.sunray.position.copy(_srPos);
        n.sunray.rotation.set(0, Math.atan2(camera.position.x-_srPos.x, camera.position.z-_srPos.z), 0);
        var grow = 0.35 + Math.min(sunI,1.6)*0.55;          // shaft grows as it strengthens
        n.sunray.scale.set(SUNRAY_WIDTH*grow, SUNRAY_HEIGHT*grow, 1);
        n.sunray.material.uniforms.uIntensity.value = sunI;
        n.sunray.material.uniforms.uTime.value = nowT;
      } else n.sunray.visible=false;
    }
    brightSum += prox*0.35 + n.ownLight*0.5;                  // screen lights up via approach + emission
  }
  crystalScreenBright = Math.min(brightSum / crystalChain.length, 1.0);
  // ── Main-crystal power ── each new crystal makes the light JUMP to full power and HOLD there
  // for ~1s (mainHoldT), then it settles down to a new, higher baseline that ratchets with the
  // crystals mined. The 5% base eases in over the early climb so the crystal is dim until mining.
  mainHoldT = Math.max(0, mainHoldT - dt);
  var startGate = Math.min(Math.max((beamClimb||0)/0.2, 0), 1);
  var mpBase = MAIN_BASE*startGate + reachedCount*MAIN_STEP;
  if(mainHoldT > 0){ mainPower = MAIN_MAX; }                  // held at full power for the hold window
  else { mainPower += (mpBase - mainPower) * 0.10; if(mainPower < mpBase) mainPower = mpBase; }
  mainFlash = Math.max(0, mainPower - mpBase);                // power above baseline → beam surge
}

// ══════════════════════════════════════════════
// UPDATE ORBS (merged: 3-stage brightness + curve deformation + beam particles)
// ══════════════════════════════════════════════
function updateOrbs(dt){
  var orbPositions = [];
  var orbVelocities = [];
  var globalRpm = 0;

  floors.forEach(function(fl){
    if(!fl.orbs) return;
    var vel=Math.abs(fl.group.userData.velocity);
    var baseSpeed=Math.abs(fl.group.userData.rotationSpeed);
    var speedRatio=vel/Math.max(baseSpeed,0.001);
    var intensity=Math.min(speedRatio/40,1);
    var time=performance.now()*0.001;
    var ud=fl.group.userData;

    // Track RPM
    var currentAngle=fl.group.rotation.y;
    var deltaAngle=Math.abs(currentAngle-(ud.lastAngle||currentAngle));
    if(deltaAngle>Math.PI) deltaAngle=2*Math.PI-deltaAngle;
    ud.lastAngle=currentAngle;
    var instantRPM=deltaAngle*60*60/(2*Math.PI);
    ud.rpmSmooth+=(instantRPM-(ud.rpmSmooth||0))*0.1;
    var rpm=ud.rpmSmooth||0;
    var rpmNorm=Math.min(rpm/200,1);            // beam/streak/planets
    // Extended crescendo normalization — drives the brightness→black build (darkness comes on
    // fast). The whiteout/climax is now driven instead by the BEAM CLIMB (below), which reaches
    // the top crystal at BEAM_TOP_RPM — half the old rate.
    var seqNorm=Math.min(rpm/SEQ_MAXRPM,1);
    var beamClimb=Math.min(rpm/BEAM_TOP_RPM,1);   // 0 → 1 as the beam tip climbs to the top crystal
    globalRpm = rpm;

    // Mini game charge — spin the wheel up past the (now much higher) whiteout RPM + hold to commit
    // (must run BEFORE rpm is forced to 0 below, or the charge would never fill)
    updateGameCharge(seqNorm);

    // While the mini-game owns the screen, force RPM-driven effects to their off state.
    // The wheel still spins passively (rotationSpeed unchanged), orbs still orbit, but
    // nothing in stage1/2/3 fires — no lens flare, no godrays, no scene darken, no whiteout.
    // NOTE: the pre-entry `decelerating` phase is excluded — during that phase the wheel's
    // natural RPM drives the lighting so brightness fades smoothly with the slow-down.
    if(gameMode.active || gameMode.entering) {
      ud.rpmSmooth = 0;
      ud.lastAngle = currentAngle;
      rpm = 0;
      rpmNorm = 0;
      seqNorm = 0;
      globalRpm = 0;
    }

    // Three-stage crescendo (driven by the EXTENDED seqNorm): brightness ramp → the screen
    // goes black and HOLDS through the long plateau between SEQ_DARK_HI and SEQ_WHITE_LO →
    // the crystal's light whites-out the screen at very high rpm.
    var stage1 = Math.min(seqNorm / SEQ_BRIGHT, 1.0); stage1 = stage1 * stage1;
    var stage2 = Math.max(Math.min((seqNorm - SEQ_DARK_LO) / (SEQ_DARK_HI - SEQ_DARK_LO), 1.0), 0.0);
    // Whiteout/climax follows the BEAM CLIMB now: ramps over the last 15% before the top crystal,
    // peaking exactly as the beam reaches it (= game start).
    var stage3 = Math.max(Math.min((beamClimb - 0.85) / 0.15, 1.0), 0.0);

    // Center star glow. For the GALLERY main crystal the emissive is driven by mainPower (the
    // stepped, pulsing power level that ratchets up as the beam mines each crystal) plus the
    // stage3 whiteout blaze at the very top — so it starts dim and steps up. Other floors keep
    // their (idle) stage-based glow.
    var star=ud.centerStar;
    var isGal = (fl===gameMode.galleryFloor);
    if(star&&star.children[0]&&star.children[0].material){
      var sm=star.children[0].material;
      sm.emissive=sm.emissive||new THREE.Color(0x334466);
      var eR,eG,eB,eInt;
      if(isGal){
        var mp = mainPower;
        eR = 0.2 + mp*1.6 + stage3*2.5;
        eG = 0.15 + mp*2.0 + stage3*2.5;
        eB = 0.15 + mp*2.8 + stage3*2.5;
        eInt = 0.3 + mp*16.0 + stage3*30.0;
      } else {
        eR = 0.2 + stage1*0.3 + stage2*0.3 + stage3*2.5;
        eG = 0.15 + stage1*0.25 + stage2*0.5 + stage3*2.5;
        eB = 0.15 + stage1*0.2 + stage2*0.9 + stage3*2.5;
        eInt = 0.3 + stage1*2.0 + stage2*5.0 + stage3*30.0;
      }
      sm.emissive.setRGB(eR, eG, eB);
      sm.emissiveIntensity = eInt;
      var baseR = 0.6 + stage2*0.15 + stage3*0.25;
      var baseG = 0.6 + stage2*0.3 + stage3*0.1;
      var baseB = 0.7 + stage2*0.3 + stage3*0.0;
      sm.color.setRGB(baseR, baseG, baseB);
    }
    if(ud.centerLight){   // only the gallery crystal has a centre light → drive it from mainPower
      ud.centerLight.intensity = 0.2 + mainPower*13.0 + stage3*40.0;
      ud.centerLight.distance = 20 + mainPower*55 + stage3*120;
      var lcR = 0.53 + stage3*0.37;
      var lcG = 0.67 + stage3*0.18;
      var lcB = 0.93;
      ud.centerLight.color.setRGB(lcR, lcG, lcB);
    }

    // Center star spins faster in stage 3
    if(ud.centerStar){
      ud.centerStar.rotation.z += stage3 * 0.15;
      ud.centerStar.rotation.x += stage3 * 0.08;
    }

    // Background: darkens during stage 2, stays dark into stage 3
    var bgBase = 0xf0f0f5;
    var bgR2 = ((bgBase>>16)&0xff)/255, bgG2 = ((bgBase>>8)&0xff)/255, bgB2 = (bgBase&0xff)/255;
    var darkT = stage2;
    var tR2 = bgR2 * (1 - darkT*0.96);
    var tG2 = bgG2 * (1 - darkT*0.97);
    var tB2 = bgB2 * (1 - darkT*0.95);
    // Stage 3: the spinning crystals light the screen back UP out of the dark — the more crystals
    // reach super-fast spin (crystalScreenBright → 1), the brighter the backdrop glows.
    var cb = crystalScreenBright;
    tR2 += (0.78 - tR2) * cb;
    tG2 += (0.82 - tG2) * cb;
    tB2 += (1.00 - tB2) * cb;
    scene.background.setRGB(tR2, tG2, tB2);
    scene.fog.color.setRGB(tR2, tG2, tB2);

    // Whiteout overlay — only stage 3
    if(postQuad && postQuad.material.uniforms.whiteout){
      postQuad.material.uniforms.whiteout.value = stage3 * stage3;
      // Screen shake — holds off until the climb is underway (~rpm 115), then builds with the
      // climb, peaking near the top. Starts later and tops out a touch lower than before.
      postQuad.material.uniforms.shakeAmount.value = Math.max(0.0, beamClimb - 0.12) * 0.11;
      postQuad.material.uniforms.shakeTime.value = time * 60.0;
    }

    // God rays
    godrayIntensity = stage1 * 0.4 + stage2 * 1.8 + stage3 * 1.0;

    // Light rays ride the crescendo; the lens flare is bound to the MAIN crystal's light value
    // (mainPower) so it blooms with each power pulse, plus the stage3 whiteout climax.
    updateLightRays(seqNorm, time);
    if(fl===gameMode.galleryFloor) updateLensFlare(mainPower, stage3);

    // Smoothed RPM for planets
    smoothedRpmForPlanets += (rpmNorm - smoothedRpmForPlanets) * 0.02;

    // ── BEAM PARTICLE SYSTEM ──
    var B=ud.beam;
    if(B){
      // ── FOUNTAIN JET ── particles blast out of the base "nozzle" (the spawn point) like
      // water from a hose: launched UP with a spread, gravity arcs them back down, and they
      // recycle. Power (count), speed (launch velocity) and reach all grow with RPM, so the
      // jet climbs from a small base bubble at rest to a full column-height blast at max spin.
      var BASE_PARTICLES=300;     // resting jet is a small bubble at the base
      var MAX_EXTRA=13000;        // full spin → a powerful, tall stream
      var targetCount=Math.min(B.maxP, Math.floor(BASE_PARTICLES+rpmNorm*MAX_EXTRA));
      // ── Stage 1: the beam TIP climbs with the spin ── its height tracks beamClimb (rpm /
      // BEAM_TOP_RPM), so it grows from a base bubble to the full column at HALF the old rate,
      // passing each stacked crystal in turn and reaching the top crystal at BEAM_TOP_RPM.
      // Particles are capped at this tip, so the visible top == beamTipY (what the chain keys off).
      var beamTipY = Math.max(0.4, beamClimb * B.beamHeight);
      var aliveCount=0;
      for(var ci=0;ci<B.maxP;ci++){if(B.alive[ci])aliveCount++;}
      if(aliveCount<targetCount){
        // Emit faster when there's more power behind the jet (snappier blast at high RPM).
        var toSpawn=Math.min(targetCount-aliveCount, Math.floor(30+rpmNorm*140));
        for(var sp3=0;sp3<toSpawn;sp3++){
          for(var fp=0;fp<B.maxP;fp++){
            if(!B.alive[fp]){
              B.alive[fp]=1; B.section[fp]=0;
              // Tight cluster right at the nozzle
              B.pos[fp*3]   = (Math.random()-0.5)*0.08;
              B.pos[fp*3+1] = Math.random()*0.15;
              B.pos[fp*3+2] = 0;
              // Upward launch speed scales with the climb so particles reach the climbing tip.
              // ~14% of particles "fly out" sideways (escaping droplets) with a wider kick.
              var jet = 0.14 + beamClimb*2.4;
              var fly = Math.random() < 0.14;
              B.vel[fp*3]   = (Math.random()-0.5) * (fly ? (0.18+rpmNorm*0.40) : (0.04+rpmNorm*0.12));
              B.vel[fp*3+1] = jet * (0.75+Math.random()*0.5) * (fly?0.55:1.0);
              B.vel[fp*3+2] = 0;
              B.alpha[fp]=0.85; break;
            }
          }
        }
      }
      if(aliveCount>targetCount){
        var toKill=Math.min(aliveCount-targetCount, 25);
        for(var ki=0;ki<toKill;ki++){
          var startIdx=Math.floor(Math.random()*B.maxP);
          for(var kj=0;kj<B.maxP;kj++){
            var idx=(startIdx+kj)%B.maxP;
            if(B.alive[idx]){ B.alive[idx]=0;B.alpha[idx]=0; B.pos[idx*3]=0;B.pos[idx*3+1]=0;B.pos[idx*3+2]=0; break; }
          }
        }
      }
      var GRAV=0.011;                       // pulls the fountain back down into its arc
      for(var pi=0;pi<B.maxP;pi++){
        if(!B.alive[pi]) continue;
        var px=B.pos[pi*3];
        // Gravity → ballistic arc (the launch velocity was set at spawn time).
        B.vel[pi*3+1]-=GRAV;
        // Cohesion toward the central axis — pulls inward MUCH harder near the TIP so the
        // column narrows and comes to a point instead of a flat cap (adaptive thickness:
        // wide/thick at the base, tapering to a point at the top).
        var hf = B.pos[pi*3+1]/Math.max(beamTipY,1.0);   // 0 base → 1 tip
        B.vel[pi*3]-=px*(0.012 + hf*hf*0.11);
        // Turbulence — churns harder as RPM climbs, for an energetic fluid surface.
        var turb=0.004+rpmNorm*0.03;
        B.vel[pi*3]  +=(Math.random()-0.5)*turb;
        B.vel[pi*3+1]+=(Math.random()-0.5)*turb*0.6;
        // Fluid drag.
        B.vel[pi*3]  *=0.985;
        B.vel[pi*3+1]*=0.992;
        // Integrate (kept in the camera-facing X/Y plane — Z stays 0 like before).
        B.pos[pi*3]  +=B.vel[pi*3];
        B.pos[pi*3+1]+=B.vel[pi*3+1];
        B.pos[pi*3+2]=0; B.vel[pi*3+2]=0;
        // Recycle: fell back below the nozzle, or blasted past the climbing TIP — return to the
        // pool so it re-emits from the base. Capping at beamTipY makes the visible top track the
        // spin exactly (so it reaches each crystal right when the chain logic says it does).
        if(B.pos[pi*3+1]<0 || B.pos[pi*3+1]>beamTipY){
          B.alive[pi]=0; B.alpha[pi]=0;
          B.pos[pi*3]=0; B.pos[pi*3+1]=0; B.pos[pi*3+2]=0;
          B.vel[pi*3]=0; B.vel[pi*3+1]=0; B.vel[pi*3+2]=0;
          continue;
        }
        // Brightest at the dense core/base; tapers out over the top ~25% so the beam dissolves
        // to a soft point at the tip rather than a hard flat cap.
        var distFromCenter=Math.abs(B.pos[pi*3]);
        var tipFade = hf<0.75 ? 1.0 : Math.max(0.0, 1.0-(hf-0.75)/0.25);
        var heightFade=(1.0 - hf*0.30) * tipFade;
        B.alpha[pi]=Math.max(0.0, (0.95/(1+distFromCenter*distFromCenter*1.4))*heightFade);
      }
      for(var ri=0;ri<B.maxP;ri+=2){
        if(!B.alive[ri]) continue;
        for(var rj=ri+1;rj<Math.min(ri+15,B.maxP);rj++){
          if(!B.alive[rj]) continue;
          var ddx=B.pos[ri*3]-B.pos[rj*3]; var ddy=B.pos[ri*3+1]-B.pos[rj*3+1];
          var dd=ddx*ddx+ddy*ddy;
          if(dd<0.04&&dd>0.0001){
            var pushStr=0.0005/dd;
            B.vel[ri*3]+=ddx*pushStr; B.vel[ri*3+1]+=ddy*pushStr;
            B.vel[rj*3]-=ddx*pushStr; B.vel[rj*3+1]-=ddy*pushStr;
          }
        }
      }
      var BO=ud.bonds;
      if(BO){
        var BOND_FORM_DIST=0.72, BOND_BREAK_DIST=1.6, BOND_MAX_PER=5;   // denser, stringier web
        var BOND_FORM_DIST2=BOND_FORM_DIST*BOND_FORM_DIST, BOND_BREAK_DIST2=BOND_BREAK_DIST*BOND_BREAK_DIST;
        for(var bc=0;bc<B.maxP;bc++) BO.particleBondCount[bc]=0;
        for(var bi2=0;bi2<BO.data.length;bi2++){ BO.particleBondCount[BO.data[bi2].a]++; BO.particleBondCount[BO.data[bi2].b]++; }
        for(var bi3=BO.data.length-1;bi3>=0;bi3--){
          var ba=BO.data[bi3].a, bb2=BO.data[bi3].b;
          if(!B.alive[ba]||!B.alive[bb2]){BO.data.splice(bi3,1);continue;}
          var bddx=B.pos[ba*3]-B.pos[bb2*3]; var bddy=B.pos[ba*3+1]-B.pos[bb2*3+1];
          if(bddx*bddx+bddy*bddy>BOND_BREAK_DIST2){BO.data.splice(bi3,1);}
        }
        if(BO.data.length<BO.maxBonds){
          var formsPerFrame=Math.min(90, BO.maxBonds-BO.data.length);
          for(var fi2=0;fi2<formsPerFrame;fi2++){
            var pa2=Math.floor(Math.random()*B.maxP);
            if(!B.alive[pa2]||BO.particleBondCount[pa2]>=BOND_MAX_PER) continue;
            for(var pn=1;pn<20;pn++){
              var pb2=(pa2+pn)%B.maxP;
              if(!B.alive[pb2]||pb2===pa2||BO.particleBondCount[pb2]>=BOND_MAX_PER) continue;
              var fdx=B.pos[pa2*3]-B.pos[pb2*3]; var fdy=B.pos[pa2*3+1]-B.pos[pb2*3+1];
              var fd2=fdx*fdx+fdy*fdy;
              if(fd2<BOND_FORM_DIST2&&fd2>0.001){
                var exists=false;
                for(var ck=0;ck<BO.data.length;ck++){
                  if((BO.data[ck].a===pa2&&BO.data[ck].b===pb2)||(BO.data[ck].a===pb2&&BO.data[ck].b===pa2)){exists=true;break;}
                }
                if(!exists){ BO.data.push({a:pa2,b:pb2}); BO.particleBondCount[pa2]++; BO.particleBondCount[pb2]++; break; }
              }
            }
          }
        }
        for(var bi4=0;bi4<BO.data.length;bi4++){
          var sa2=BO.data[bi4].a, sb2=BO.data[bi4].b;
          var sdx=B.pos[sb2*3]-B.pos[sa2*3]; var sdy=B.pos[sb2*3+1]-B.pos[sa2*3+1];
          var sdist=Math.sqrt(sdx*sdx+sdy*sdy)||0.001;
          var centerDist2=(Math.abs(B.pos[sa2*3])+Math.abs(B.pos[sb2*3]))*0.5;
          var springMult=centerDist2<0.3 ? 0.12 : (centerDist2<0.8 ? 0.06 : 0.02);
          var springF=(sdist-0.15)*springMult;
          B.vel[sa2*3]+=sdx/sdist*springF; B.vel[sa2*3+1]+=sdy/sdist*springF;
          B.vel[sb2*3]-=sdx/sdist*springF; B.vel[sb2*3+1]-=sdy/sdist*springF;
        }
        var bIdx=0;
        for(var bi5=0;bi5<BO.data.length&&bIdx<BO.maxBonds;bi5++){
          var la=BO.data[bi5].a, lb=BO.data[bi5].b;
          var ldx=B.pos[la*3]-B.pos[lb*3]; var ldy=B.pos[la*3+1]-B.pos[lb*3+1];
          var ldist=Math.sqrt(ldx*ldx+ldy*ldy)||0.001;
          var bondAlpha=Math.max(0.1, 0.7*(1-ldist/BOND_BREAK_DIST));
          BO.positions[bIdx*6]=B.pos[la*3]; BO.positions[bIdx*6+1]=B.pos[la*3+1]; BO.positions[bIdx*6+2]=0;
          BO.positions[bIdx*6+3]=B.pos[lb*3]; BO.positions[bIdx*6+4]=B.pos[lb*3+1]; BO.positions[bIdx*6+5]=0;
          BO.alphas[bIdx*2]=bondAlpha; BO.alphas[bIdx*2+1]=bondAlpha; bIdx++;
        }
        for(var bz=bIdx*6;bz<BO.maxBonds*6;bz++) BO.positions[bz]=0;
        for(var bz2=bIdx*2;bz2<BO.maxBonds*2;bz2++) BO.alphas[bz2]=0;
        BO.geo.setDrawRange(0,bIdx*2);
        BO.geo.attributes.position.needsUpdate=true; BO.geo.attributes.alpha.needsUpdate=true;
      }
      for(var di=0;di<B.maxP;di++){B.density[di]=0;B.centerDist[di]=Math.abs(B.pos[di*3]);}
      for(var di2=0;di2<B.maxP;di2+=2){
        if(!B.alive[di2]) continue;
        for(var dj=di2+1;dj<Math.min(di2+20,B.maxP);dj++){
          if(!B.alive[dj]) continue;
          var dddx=B.pos[di2*3]-B.pos[dj*3]; var dddy=B.pos[di2*3+1]-B.pos[dj*3+1];
          if(dddx*dddx+dddy*dddy<0.09){B.density[di2]++;B.density[dj]++;}
        }
      }
      B.mat.uniforms.uRPM.value=rpmNorm;
      if(BO) BO.mat.uniforms.uRPM.value=rpmNorm;
      B.geo.attributes.position.needsUpdate=true; B.geo.attributes.alpha.needsUpdate=true;
      B.geo.attributes.density.needsUpdate=true; B.geo.attributes.centerDist.needsUpdate=true;
      // ── Stage 1-3: the gallery beam climbing past the stacked crystals (+ their ignite/spin) ──
      if(fl===gameMode.galleryFloor) updateCrystalChain(beamTipY, seqNorm, dt, beamClimb);
      B.mat.uniforms.uFlash.value = (fl===gameMode.galleryFloor) ? mainFlash : 0.0;
    }

    // Wobbly orbit tilt
    var tiltAmount=intensity*0.3;
    var wobbleSpeed=2+intensity*4;
    var targetTiltX=Math.sin(time*wobbleSpeed)*tiltAmount;
    var targetTiltZ=Math.cos(time*wobbleSpeed*0.7+1.3)*tiltAmount;
    ud.orbTiltX+=(targetTiltX-(ud.orbTiltX||0))*0.05;
    ud.orbTiltZ+=(targetTiltZ-(ud.orbTiltZ||0))*0.05;

    var spinDir=fl.group.userData.velocity>=0?1:-1;

    // Streak only kicks in at high RPM — dead zone until rpmNorm > 0.5 (stage 2)
    var streakRaw = Math.max((rpmNorm - 0.5) * 2.0, 0.0);
    var streakT = streakRaw * streakRaw;

    // Helper: compute tilted orbital position for any angle
    var tx=ud.orbTiltX||0, tz=ud.orbTiltZ||0;
    var cosX=Math.cos(tx),sinX=Math.sin(tx),cosZ=Math.cos(tz),sinZ=Math.sin(tz);
    function orbPos(ang){
      var baseR2=fl.orbs[0].mesh.userData.orbitR;
      var sR=baseR2+intensity*1.5;
      var fx=Math.sin(ang)*sR, fz=Math.cos(ang)*sR, fy=0;
      var yy=fy*cosX-fz*sinX, zz=fy*sinX+fz*cosX;
      var xx=fx*cosZ-yy*sinZ; yy=fx*sinZ+yy*cosZ;
      return {x:xx, y:yy, z:zz};
    }

    fl.orbs.forEach(function(orb){
      // Skip orbs that have been knocked loose — physics owns them now
      if(orb.mesh.userData._fallen) return;
      var prevX = orb.mesh.position.x;
      var prevY = orb.mesh.position.y;
      var prevZ = orb.mesh.position.z;

      var totalAngle=orb.angle+fl.group.rotation.y;
      var hp = orbPos(totalAngle);
      orb.mesh.position.set(hp.x, hp.y, hp.z);

      // Collect world positions for particle spawning
      var wp = new THREE.Vector3();
      orb.mesh.getWorldPosition(wp);
      orbPositions.push(wp);
      var dvx = (orb.mesh.position.x - prevX) / Math.max(dt, 0.001);
      var dvy = (orb.mesh.position.y - prevY) / Math.max(dt, 0.001);
      var dvz = (orb.mesh.position.z - prevZ) / Math.max(dt, 0.001);
      orbVelocities.push({x:dvx, y:dvy, z:dvz});

      orb.mesh.material.emissiveIntensity = 0.15 + streakT * 1.5;

      if(streakT < 0.15){
        // Normal sphere with scale-based stretching for early phase
        if(orb.isCurved){ orb.mesh.geometry = orb.sphereGeo; orb.isCurved = false; }
        orb.mesh.matrixAutoUpdate = true;
        orb.mesh.rotation.x+=orb.spinSpeed*(1+intensity*5);
        orb.mesh.rotation.y+=orb.spinSpeed*0.7*(1+intensity*5);

        if(streakT > 0.001){
          var stretchAmt = 1.0 + streakT * 12.0;
          var squishAmt = 1.0 / Math.pow(stretchAmt, 0.7);
          var tAng1 = totalAngle - spinDir * 0.01;
          var tAng2 = totalAngle + spinDir * 0.01;
          var tp1 = orbPos(tAng1); var tp2 = orbPos(tAng2);
          var tangX = tp2.x - tp1.x, tangY = tp2.y - tp1.y, tangZ = tp2.z - tp1.z;
          var tangLen = Math.sqrt(tangX*tangX + tangY*tangY + tangZ*tangZ) || 1;
          tangX /= tangLen; tangY /= tangLen; tangZ /= tangLen;
          var px2 = orb.mesh.position.x, py2 = orb.mesh.position.y, pz2 = orb.mesh.position.z;
          var radLen = Math.sqrt(px2*px2 + py2*py2 + pz2*pz2) || 1;
          var radX = px2/radLen, radY = py2/radLen, radZ = pz2/radLen;
          var binX = tangY*radZ - tangZ*radY;
          var binY = tangZ*radX - tangX*radZ;
          var binZ = tangX*radY - tangY*radX;
          var binLen = Math.sqrt(binX*binX + binY*binY + binZ*binZ) || 1;
          binX /= binLen; binY /= binLen; binZ /= binLen;
          var m = orb.mesh.matrix;
          m.set(
            radX*squishAmt, binX*squishAmt, tangX*stretchAmt, px2,
            radY*squishAmt, binY*squishAmt, tangY*stretchAmt, py2,
            radZ*squishAmt, binZ*squishAmt, tangZ*stretchAmt, pz2,
            0, 0, 0, 1
          );
          orb.mesh.matrixAutoUpdate = false;
          orb.mesh.matrixWorldNeedsUpdate = true;
        } else {
          orb.mesh.matrixAutoUpdate = true;
          orb.mesh.scale.set(1,1,1);
        }

        orb.mesh.material.opacity = 0.7;
        orb.edges.visible = streakT < 0.02;
        if(orb.edges.visible){
          orb.edges.position.copy(orb.mesh.position);
          orb.edges.rotation.copy(orb.mesh.rotation);
          orb.edges.scale.set(1,1,1);
          orb.edges.material.opacity = 0.25;
        }
      } else {
        // Swap to curved tube geometry
        if(!orb.isCurved){ orb.mesh.geometry = orb.curveGeo; orb.isCurved = true; }
        orb.mesh.matrixAutoUpdate = true;
        orb.mesh.position.set(0, 0, 0);
        orb.mesh.rotation.set(0, 0, 0);
        orb.mesh.scale.set(1, 1, 1);
        orb.mesh.material.opacity = 0.7;
        orb.edges.visible = false;

        var segs2 = orb.curveSegs;
        var rv = orb.curveRing;
        var pos2 = orb.curveGeo.attributes.position.array;
        var nrm = orb.curveGeo.attributes.normal.array;
        var orbR = orb.mesh.userData.orbRadius;
        var arcLen = streakT * Math.PI * 0.83;

        for(var si2=0;si2<segs2;si2++){
          var t2 = si2/(segs2-1);
          var arcT = (t2 - 0.5) * arcLen;
          var sAngle = totalAngle + spinDir * arcT;
          var sp4 = orbPos(sAngle);
          var sAngle2 = sAngle + spinDir * 0.01;
          var sp5 = orbPos(sAngle2);
          var tdx=sp5.x-sp4.x, tdy=sp5.y-sp4.y, tdz=sp5.z-sp4.z;
          var tLen=Math.sqrt(tdx*tdx+tdy*tdy+tdz*tdz)||0.001;
          tdx/=tLen; tdy/=tLen; tdz/=tLen;
          var rdx=sp4.x, rdy=sp4.y, rdz=sp4.z;
          var rLen=Math.sqrt(rdx*rdx+rdy*rdy+rdz*rdz)||0.001;
          rdx/=rLen; rdy/=rLen; rdz/=rLen;
          var bx=tdy*rdz-tdz*rdy, by=tdz*rdx-tdx*rdz, bz=tdx*rdy-tdy*rdx;
          var bLen=Math.sqrt(bx*bx+by*by+bz*bz)||0.001;
          bx/=bLen; by/=bLen; bz/=bLen;

          var distFromCenter2 = Math.abs(t2 - 0.5) * 2.0;
          var sphereProfile = Math.sin(t2 * Math.PI);
          var capZone = 0.15;
          var pillProfile = distFromCenter2 > (1.0 - capZone) ?
            Math.cos((distFromCenter2 - (1.0 - capZone)) / capZone * Math.PI * 0.5) : 1.0;
          var profileBlend = Math.min(streakT * 1.5, 1.0);
          var profile = sphereProfile * (1.0 - profileBlend) + pillProfile * profileBlend;
          var rampT = Math.min(Math.max((streakT - 0.15) / 0.45, 0.0), 1.0);
          var radiusScale = 0.46 + rampT * 0.54;
          var segR = orbR * Math.max(profile, 0.02) * radiusScale;
          var squashT = Math.max(streakT - 0.1, 0.0) / 0.9;
          var vertSquash = 1.0 - squashT * squashT * 0.6;

          for(var ri3=0;ri3<rv;ri3++){
            var ra = (ri3/rv)*Math.PI*2;
            var cosA=Math.cos(ra), sinA=Math.sin(ra)*vertSquash;
            var vIdx = (si2*rv+ri3)*3;
            pos2[vIdx]   = sp4.x + (rdx*cosA + bx*sinA)*segR;
            pos2[vIdx+1] = sp4.y + (rdy*cosA + by*sinA)*segR;
            pos2[vIdx+2] = sp4.z + (rdz*cosA + bz*sinA)*segR;
            nrm[vIdx]   = rdx*cosA + bx*sinA;
            nrm[vIdx+1] = rdy*cosA + by*sinA;
            nrm[vIdx+2] = rdz*cosA + bz*sinA;
          }
        }
        orb.curveGeo.attributes.position.needsUpdate = true;
        orb.curveGeo.attributes.normal.needsUpdate = true;
        orb.curveGeo.computeBoundingSphere();
      }
    });
  });

  // Update orb particles + welding sparks
  updateOrbParticles(dt, globalRpm, orbPositions, orbVelocities);
  updateWeldingSparks(dt, globalRpm, orbPositions, orbVelocities);
}

function createFloor(y, radius, vRadius, label, np, hasRings, fi, panelOpts) {
  panelOpts = panelOpts || {};
  var g = new THREE.Group(); g.position.y = y;
  var ringGroups = {top:[],bottom:[]};
  
  // Star
  var sg = new THREE.Group();
  sg.add(new THREE.Mesh(new THREE.OctahedronGeometry(0.8,1), new THREE.MeshStandardMaterial({color:0x9a9aa2, metalness:1, roughness:0.03, envMap:cubeRenderTarget.texture, envMapIntensity:1.8, flatShading:true})));
  g.add(sg); g.userData.centerStar = sg;
  
  // Rings
  if(hasRings){
    var rm = new THREE.MeshStandardMaterial({color:0x9a9aa2, metalness:1, roughness:0.03, envMap:cubeRenderTarget.texture, envMapIntensity:1.8, side:THREE.DoubleSide});
    ringMaterialsToUpdate.push(rm);
    var roy = PLANE_WIDTH/2+0.5;
    var tRG = new THREE.Group(); tRG.position.y=roy; g.add(tRG);
    var bRG = new THREE.Group(); bRG.position.y=-roy; g.add(bRG);
    var ns=32, sa=(Math.PI*2)/ns, w=0.18, d=0.12;
    // Round tube cross-section
    var pts=[];
    var tubeSegs=8;
    for(var ti=0;ti<=tubeSegs;ti++){
      var ta = (ti/tubeSegs)*Math.PI*2;
      var tx2 = radius + (d/2)*Math.cos(ta);
      var ty2 = (w/2)*Math.sin(ta);
      pts.push(new THREE.Vector2(tx2, ty2));
    }
    for(var s=0;s<ns;s++){var sG=new THREE.LatheGeometry(pts,8,s*sa,sa);tRG.add(new THREE.Mesh(sG,rm.clone()));bRG.add(new THREE.Mesh(sG.clone(),rm.clone()));}
    tRG.userData.vpx=Math.random()*Math.PI*2; tRG.userData.vpz=Math.random()*Math.PI*2;
    bRG.userData.vpx=Math.random()*Math.PI*2; bRG.userData.vpz=Math.random()*Math.PI*2;
    ringGroups.top.push(tRG); ringGroups.bottom.push(bRG);
  }
  
  // Panels
  var as = (Math.PI*2)/np;
  var panels = [];
  for(var i=0;i<np;i++){
    var angle = i*as;
    var p = createPanel(radius, vRadius, panelOpts);
    p.mesh.rotation.y = angle;
    p.mesh.userData.baseAngle = angle;
    p.mesh.userData.baseRadius = radius;
    p.mesh.userData.vRadius = vRadius;
    p.mesh.userData.pIdx = i;
    p.mesh.userData.fIdx = fi;
    p.edges.rotation.y = angle;
    p.edges.userData.baseAngle = angle;
    p.edges.userData.baseRadius = radius;
    g.add(p.mesh); g.add(p.edges);
    panels.push(p);
  }
  
  // Glass ring close to center
  var glassRing = createGlassRing(3.0, 0.25, 0.5);
  g.add(glassRing);

  g.userData = {rotationSpeed:(fi%2===0?0.0025:-0.0025),label:label,yPosition:y,velocity:0,friction:0.98,inputVel:0,centerStar:sg};
  scene.add(g);
  return {group:g, rings:ringGroups, panels:panels, hasRings:hasRings, radius:radius, vRadius:vRadius, glassRing:glassRing};
}

// ══════════════════════════════════════════════
function setFloorAlpha(fl, a) {
  var mo=0.01;
  fl.panels.forEach(function(p){
    if(p.mesh.material){p.mesh.material.opacity=Math.max(mo,a*0.7);p.mesh.material.transparent=true;}
    if(p.edges.material){p.edges.material.opacity=Math.max(mo,a*0.4);p.edges.material.transparent=true;}
  });
  if(fl.hasRings&&fl.rings){
    fl.rings.top.forEach(function(rg){rg.children.forEach(function(s){if(s.material){s.material.opacity=Math.max(mo,a);s.material.transparent=true;}});});
    fl.rings.bottom.forEach(function(rg){rg.children.forEach(function(s){if(s.material){s.material.opacity=Math.max(mo,a);s.material.transparent=true;}});});
  }
  fl.group.children.forEach(function(c){if(c.type==='Group'&&c.children.length>0){c.children.forEach(function(sp){if(sp.material&&sp.geometry&&sp.geometry.type==='OctahedronGeometry'){sp.material.opacity=Math.max(mo,a);sp.material.transparent=true;}});}});
}

// ══════════════════════════════════════════════
// INTRO
// ══════════════════════════════════════════════
function startIntro(){setTimeout(function(){introAnim.animating[0]=true;},300);}
function updateIntro(){
  floors.forEach(function(fl,fi){
    if(!introAnim.animating[fi]||introAnim.revealed[fi])return;
    introAnim.progress[fi]+=0.015;
    var fp=introAnim.progress[fi], allDone=true;
    fl.panels.forEach(function(panel,pi){
      var pd=introAnim.offsets[fi][pi];
      var pp=Math.max(0,Math.min(1,(fp-pd.delay)*0.8));
      pd.prog=pp; if(pp<1)allDone=false;
      var e=eOQ(pp);
      panel.mesh.position.y=(pd.oy-pd.dd)+pd.dd*e;
      panel.edges.position.y=panel.mesh.position.y;
      var mo=0.01;
      var oe=eOQ2(pp);
      if(panel.mesh.material){panel.mesh.material.opacity=Math.max(mo,oe*0.7);panel.mesh.material.transparent=true;}
      if(panel.edges.material){panel.edges.material.opacity=Math.max(mo,oe*0.4);panel.edges.material.transparent=true;}
    });
    if(fl.hasRings&&fl.rings){
      var rp=Math.max(0,Math.min(1,(fp-0.1)*0.7)),re=eOQ(rp);
      fl.rings.top.forEach(function(rg){rg.position.y=(rg.userData.oy-1.8)+1.8*re;rg.children.forEach(function(s){if(s.material){s.material.opacity=Math.max(0.01,eOQ2(rp));s.material.transparent=true;}});});
      fl.rings.bottom.forEach(function(rg){rg.position.y=(rg.userData.oy-1.8)+1.8*re;rg.children.forEach(function(s){if(s.material){s.material.opacity=Math.max(0.01,eOQ2(rp));s.material.transparent=true;}});});
    }
    var sp2=Math.max(0,Math.min(1,fp*0.9)),se=eOQ(sp2);
    fl.group.children.forEach(function(c){if(c.type==='Group'&&c.userData.oy!==undefined){c.position.y=(c.userData.oy-1.5)+1.5*se;c.children.forEach(function(p){if(p.material&&p.geometry&&p.geometry.type==='OctahedronGeometry'){p.material.opacity=Math.max(0.01,eOQ2(sp2));p.material.transparent=true;}});}});
    // Animate orbs rising in
    if(fl.orbs){
      fl.orbs.forEach(function(orb,oi){
        var op=Math.max(0,Math.min(1,(fp-oi*0.08)*0.7));
        if(op<1) allDone=false;
        var oe2=eOQ(op);
        var oyOff=orb.mesh.userData.oy||0;
        var dropD=1.5+oi*0.2;
        orb.mesh.position.y=(oyOff-dropD)+dropD*oe2;
        orb.edges.position.y=orb.mesh.position.y;
        orb.mesh.material.opacity=Math.max(0.01,eOQ2(op)*0.7);
        orb.mesh.material.transparent=true;
      });
    }
    if(allDone&&fp>=1.5){introAnim.revealed[fi]=true;introAnim.animating[fi]=false;}
  });
}
function checkReveal(){
  var cy=camera.position.y;
  for(var i=0;i<floors.length;i++){
    if(introAnim.revealed[i] || introAnim.animating[i]) continue;
    
    // Trigger floor if:
    // 1. Previous floor is ready (or this is floor 0)
    // 2. Camera is near or past this floor
    var prevReady = (i === 0) || introAnim.revealed[i-1] || (introAnim.progress[i-1] || 0) > 0.6;
    if(!prevReady) continue;
    
    var floorY = floors[i].group.position.y;
    var dist = Math.abs(cy - floorY);
    
    // Trigger if camera is within 2 floor spacings (generous) or has scrolled past
    if(dist < FLOOR_SPACING * 1.5 || cy < floorY) {
      introAnim.animating[i] = true;
    }
  }
}

// EASING
// ══════════════════════════════════════════════
function isChildOf(obj, parent) {
  var p = obj.parent;
  while(p) { if(p === parent) return true; p = p.parent; }
  return false;
}
function eOQ2(t){return 1-(1-t)*(1-t);}
function eOQ(t){return 1-Math.pow(1-t,4);}
function eIO(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}

// SCROLL
// ══════════════════════════════════════════════
function onScroll(){
  // Lightbox: pin the page in place so the user can't scroll the camera while the
  // expanded image is on screen.
  if((imgLightbox.active || imgLightbox.entering || imgLightbox.exiting) && imgLightbox.savedScrollY >= 0){
    if(window.pageYOffset !== imgLightbox.savedScrollY){
      window.scrollTo(0, imgLightbox.savedScrollY);
    }
    return;
  }
  var sp=window.pageYOffset/(document.body.scrollHeight-window.innerHeight);
  targetCameraY=-sp*(TOTAL_FLOORS-1)*FLOOR_SPACING;
  if(dm.active&&dm.floor){
    if(Math.abs(targetCameraY-dm.floor.group.position.y)>FLOOR_SPACING*0.5&&!dm.animating&&!dm.closing&&!switchAnim.active)exitDM();
  }
}

function onMD(e){e.preventDefault();pDown(e.clientX,e.clientY);}
function updateHoverPanel(cx, cy){
  if(!pdv.active && !pdv.entering){
    var hx=(cx/renderer.domElement.clientWidth)*2-1;
    var hy=-(cy/renderer.domElement.clientHeight)*2+1;
    raycaster.setFromCamera({x:hx,y:hy},camera);
    var found=null;
    for(var fi=0;fi<floors.length;fi++){
      var fl=floors[fi];
      if(!fl.panels) continue;
      for(var pi=0;pi<fl.panels.length;pi++){
        var pm=fl.panels[pi].mesh;
        if(!pm.visible) continue;
        var hits=raycaster.intersectObject(pm);
        if(hits.length>0){found=pm;break;}
      }
      if(found) break;
    }
    if(!found && dm.displayTemp && dm.displayTemp.plane && dm.displayTemp.plane.visible){
      var dHits=raycaster.intersectObject(dm.displayTemp.plane);
      if(dHits.length>0) found=dm.displayTemp.plane;
    }
    hoveredPanel=found;
  } else {
    hoveredPanel=null;
  }
}
function onMM(e){
  pMove(e.clientX,e.clientY);
  if(!isDragging) updateHoverPanel(e.clientX, e.clientY);
  else hoveredPanel=null;
  renderer.domElement.parentElement.style.cursor=hoveredPanel?'pointer':'';
}
function onMU(e){pUp(e.clientX,e.clientY);}
var touchScroll = { active:false, lastY:0, lastX:0, velY:0, locked:null, startX:0, startY:0, startTime:0, scrollMomentum:0 }; // locked: null,'scroll','wheel','vwheel'
function onTS(e){
  e.preventDefault();
  // Mini-game: two fingers → pinch-zoom the chase camera (spread = in, pinch = out → top-down).

  if(lbActiveDown){
    if(dm.active && dm.dmButtons.length>0){
      for(var pdDbi=0;pdDbi<dm.dmButtons.length;pdDbi++){
        var pdQvH = raycaster.intersectObjects(dm.dmButtons[pdDbi].children,true);
        if(pdQvH.length>0){ pressedGlassMesh = findGlassMeshFromHit(pdQvH[0].object); break; }
      }
    }
    if(!pressedGlassMesh){
      for(var pdLbOi=0;pdLbOi<cartOverlays.length;pdLbOi++){
        var pdLbOvH = raycaster.intersectObjects(cartOverlays[pdLbOi].group.children,true);
        if(pdLbOvH.length>0){ pressedGlassMesh = findGlassMeshFromHit(pdLbOvH[0].object); break; }
      }
    }
    if(!pressedGlassMesh && cart.glassMesh){
      var pdLbCgH = raycaster.intersectObject(cart.glassMesh);
      if(pdLbCgH.length>0) pressedGlassMesh = cart.glassMesh;
    }
  } else {
    if(navMenu.glassMesh){
      var pdGH = raycaster.intersectObject(navMenu.glassMesh);
      if(pdGH.length>0) pressedGlassMesh = navMenu.glassMesh;
    }
    if(!pressedGlassMesh && navMenu.open){
      for(var pdNbi=0;pdNbi<navMenu.buttons.length;pdNbi++){
        var pdNbH = raycaster.intersectObjects(navMenu.buttons[pdNbi].group.children,true);
        if(pdNbH.length>0){ pressedGlassMesh = findGlassMeshFromHit(pdNbH[0].object); break; }
      }
    }
    if(!pressedGlassMesh){
      for(var pdOi=0;pdOi<cartOverlays.length;pdOi++){
        var pdOvH = raycaster.intersectObjects(cartOverlays[pdOi].group.children,true);
        if(pdOvH.length>0){ pressedGlassMesh = findGlassMeshFromHit(pdOvH[0].object); break; }
      }
    }
    if(!pressedGlassMesh && cart.glassMesh){
      var pdCgH = raycaster.intersectObject(cart.glassMesh);
      if(pdCgH.length>0) pressedGlassMesh = cart.glassMesh;
    }
    if(!pressedGlassMesh && dm.active && dm.dmButtons.length>0){
      for(var pdDbi2=0;pdDbi2<dm.dmButtons.length;pdDbi2++){
        var pdQvH2 = raycaster.intersectObjects(dm.dmButtons[pdDbi2].children,true);
        if(pdQvH2.length>0){ pressedGlassMesh = findGlassMeshFromHit(pdQvH2[0].object); break; }
      }
    }
  }
  // During product detail view: allow cart, nav, and PDV scrolling (no background spinning)
  if(pdv.active || pdv.entering || pdv.exitingToDM){
    mouse.x=(cx/renderer.domElement.clientWidth)*2-1;mouse.y=-(cy/renderer.domElement.clientHeight)*2+1;
    raycaster.setFromCamera(mouse,camera);
    // Cart drag — check panel children AND glass surface
    if(cart.panelOpen && cart.panelGroup){
      var cartHits2 = raycaster.intersectObjects(cart.panelGroup.children, true);
      if(cartHits2.length === 0 && cart.glassMesh) {
        cartHits2 = raycaster.intersectObject(cart.glassMesh);
      }
      if(cartHits2.length > 0){
        var hitIsBtn2 = false;
        var chk2 = cartHits2[0].object;
        while(chk2 && chk2 !== cart.panelGroup && chk2 !== scene){
          if(chk2.userData.clickable && chk2.userData.actionId){ hitIsBtn2 = true; break; }
          chk2 = chk2.parent;
        }
        if(!hitIsBtn2){ startCartDrag(cx, cy); isDragging = true; renderer.domElement.parentElement.classList.add('dragging'); }
        return;
      }
    }
    // Start PDV scroll drag
    pdv.dragging = true; pdv.scrollVel = 0;
    previousMouseY = cy; previousTime = performance.now();
    return;
  }
  mouse.x=(cx/renderer.domElement.clientWidth)*2-1;mouse.y=-(cy/renderer.domElement.clientHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  
  // Check if clicking on cart panel area for dragging (panel children OR the glass surface)
  if(cart.panelOpen && cart.panelGroup) {
    var cartHits = raycaster.intersectObjects(cart.panelGroup.children, true);
    if(cartHits.length === 0 && cart.glassMesh) {
      cartHits = raycaster.intersectObject(cart.glassMesh);
    }
    if(cartHits.length > 0) {
      // Check if we hit a clickable button — if so, don't drag
      var hitIsButton = false;
      var checkObj = cartHits[0].object;
      while(checkObj && checkObj !== cart.panelGroup && checkObj !== scene) {
        if(checkObj.userData.clickable && checkObj.userData.actionId) { hitIsButton = true; break; }
        checkObj = checkObj.parent;
      }
      if(!hitIsButton) {
        startCartDrag(cx, cy);
        isDragging = true;
        renderer.domElement.parentElement.classList.add('dragging');
      }
      return;
    }
  }
  
  if(dm.active&&dm.vWheel){
    var vi=raycaster.intersectObjects(dm.vWheel.children,true);
    if(vi.length>0){isDragging=true;selectedFloor=null;dm.draggingVW=true;previousMouseY=cy;previousTime=performance.now();renderer.domElement.parentElement.classList.add('dragging');return;}
  }
  // If nav menu is hit, don't start floor drag
  if(navMenu.glassMesh){
    var navPD=raycaster.intersectObject(navMenu.glassMesh);
    if(navPD.length>0) return;
  }
  if(navMenu.open){
    for(var npd=0;npd<navMenu.buttons.length;npd++){
      var nbPD=raycaster.intersectObjects(navMenu.buttons[npd].group.children,true);
      if(nbPD.length>0) return;
    }
  }
  // If cart is open and we hit the glass mesh or overlay buttons, don't start floor drag
  if(cart.panelOpen && cart.glassMesh) {
    var cgHits = raycaster.intersectObject(cart.glassMesh);
    if(cgHits.length > 0) return;
  }
  if(cart.panelOpen && cartOverlays.length>0) {
    for(var ovi2=0;ovi2<cartOverlays.length;ovi2++){
      var ovH=raycaster.intersectObjects(cartOverlays[ovi2].group.children,true);
      if(ovH.length>0) return;
    }
  }
  var hits=raycaster.intersectObjects(scene.children,true);
  if(hits.length>0){
    var valid=null;
    for(var i=0;i<hits.length;i++){var o=hits[i].object;if(o.type!=='Sprite'&&o.type!=='Points'&&o.type!=='Line'&&o.type!=='LineSegments'){valid=hits[i];break;}}
    if(!valid)return;
    var obj=valid.object;
    while(obj.parent){if(obj.userData.label)break;obj=obj.parent;}
    if(obj.userData.label){
      var fd=floors.find(function(f){return f.group===obj;});
      if(fd){var fi=floors.indexOf(fd);if(!introAnim.revealed[fi]&&!introAnim.animating[fi])introAnim.animating[fi]=true;isDragging=true;selectedFloor=fd;previousMouseX=cx;previousTime=performance.now();selectedFloor.group.userData.inputVel=0;floorDragHist=[{x:cx,t:performance.now()}];renderer.domElement.parentElement.classList.add('dragging');}
    }
  }
}

function pMove(cx,cy){
  // In-game window drag — move the panel by the title-bar grab delta
  if(gameUI.drag.active && gameUI.drag.win){
    var gdx = (cx - gameUI.drag.startX) / window.innerWidth;
    var gdy = -(cy - gameUI.drag.startY) / window.innerHeight;
    gameUI.drag.win.offX = gameUI.drag.startOffX + gdx;
    gameUI.drag.win.offY = gameUI.drag.startOffY + gdy;
    return;
  }
  if(ballDrag.active && ballDrag.ball){
    // Generous tolerance — only when cursor drifts >60px from the anchor
    // do we count it as "moving" (partial drain, anchor follows). Small jitter
    // and tiny adjustments are ignored so the user can hold loosely.
    var dxM = cx - ballDrag.lastMoveX, dyM = cy - ballDrag.lastMoveY;
    if(dxM*dxM + dyM*dyM > 3600){
      ballDrag.lastMoveT = performance.now();
      ballDrag.lastMoveX = cx;
      ballDrag.lastMoveY = cy;
      // Partial drain — keep some charge so users don't lose all progress
      ballDrag.chargeLevel = Math.max(0, ballDrag.chargeLevel - 0.4);
      ballDrag.isCharging = ballDrag.chargeLevel > 0.05;
    }
    var w = screenToBallWorld(cx, cy);
    ballDrag.ball.pos.x = w.x;
    ballDrag.ball.pos.y = w.y;
    ballDrag.history.push({ x: w.x, y: w.y, t: performance.now() });
    if(ballDrag.history.length > 6) ballDrag.history.shift();
    return;
  }
  if(cartDrag.active){updateCartDrag(cx,cy);return;}
  // PDV scroll drag
  if(pdv.dragging && pdv.active){
    var dy=cy-previousMouseY;var dt2=(performance.now()-previousTime)||1;
    // Convert pixel drag to world units at PDV distance
    var fovRad=camera.fov*Math.PI/180;
    var halfH=Math.tan(fovRad/2)*4.0;
    var pxToWorld=halfH*2/window.innerHeight;
    pdv.scrollY+=dy*pxToWorld;
    pdv.scrollVel=dy*pxToWorld/(dt2/1000)*0.15;
    previousMouseY=cy;previousTime=performance.now();
    return;
  }
  if(isDragging&&dm.draggingVW){var dy=cy-previousMouseY;if(Math.abs(dy)>0.5){var directVW=dy*0.002;dm.vWheel.rotation.x+=directVW;dm.vwVel=directVW*0.5;}previousMouseY=cy;previousTime=performance.now();return;}
  if(isDragging&&selectedFloor){
    var nowT=performance.now();
    // ── Windowed swipe velocity ── measure finger speed over the last ~60ms of motion rather
    // than the noisy delta since the previous event. A single move-pair landing sub-ms apart
    // would otherwise read as a huge velocity (instant max RPM), while a sparse pair reads as
    // near-zero (barely moves) — that timing jitter is exactly the inconsistency. Averaging
    // over a fixed time window makes the same physical swipe register the same every time.
    floorDragHist.push({x:cx,t:nowT});
    while(floorDragHist.length>1 && nowT-floorDragHist[0].t>60) floorDragHist.shift();
    var f0=floorDragHist[0];
    var wdt=Math.max(nowT-f0.t, 12);   // floor the window so a fresh drag can't divide by ~0
    var wdx=cx-f0.x;
    var inputVel=wdx/wdt*0.04;
    inputVel=Math.max(-3.0,Math.min(3.0,inputVel));   // safety clamp against any residual spike
    // (The gallery/crystal wheel builds RPM by ACCUMULATING momentum in the physics loop — see
    // GALLERY_ACCEL — so no swipe-speed scaling is applied here.)
    selectedFloor.group.userData.inputVel=inputVel;
    previousMouseX=cx;previousTime=nowT;
    return;
  }
  // Not dragging — update cursor based on what's under mouse
  updateCursor(cx,cy);
}

// Walk up the parent chain to find a glass mesh (one with hoverPress uniform)
function findGlassMeshFromHit(obj){
  while(obj){
    if(obj.material && obj.material.uniforms && obj.material.uniforms.hoverPress) return obj;
    if(obj.userData && obj.userData.glassMesh && obj.userData.glassMesh.material && obj.userData.glassMesh.material.uniforms && obj.userData.glassMesh.material.uniforms.hoverPress) return obj.userData.glassMesh;
    obj = obj.parent;
  }
  return null;
}

function updateCursor(cx,cy){
  var el=renderer.domElement.parentElement;
  el.classList.remove('clickable','grabbable');
  hoveredGlassMesh = null;

  mouse.x=(cx/renderer.domElement.clientWidth)*2-1;mouse.y=-(cy/renderer.domElement.clientHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);

  // Lightbox: three buttons + the cart stay interactive. Everything else is inert.
  if(imgLightbox.active || imgLightbox.entering || imgLightbox.exiting){
    if(dm.active && dm.dmButtons.length>0){
      for(var lbCi=0; lbCi<dm.dmButtons.length; lbCi++){
        var lbCh = raycaster.intersectObjects(dm.dmButtons[lbCi].children, true);
        if(lbCh.length>0){
          hoveredGlassMesh = findGlassMeshFromHit(lbCh[0].object);
          el.classList.add('clickable');
          return;
        }
      }
    }
    // Cart overlay buttons (e.g. close-cart) when panel open
    for(var lbCoi=0;lbCoi<cartOverlays.length;lbCoi++){
      var lbCovH=raycaster.intersectObjects(cartOverlays[lbCoi].group.children,true);
      if(lbCovH.length>0){
        hoveredGlassMesh = findGlassMeshFromHit(lbCovH[0].object);
        el.classList.add('clickable');
        return;
      }
    }
    // Cart icon itself (always tappable through the lightbox)
    if(cart.glassMesh){
      var lbCgh = raycaster.intersectObject(cart.glassMesh);
      if(lbCgh.length>0){
        hoveredGlassMesh = cart.glassMesh;
        el.classList.add('clickable');
        return;
      }
    }
    // Cart panel buttons (when open)
    if(cart.panelGroup && cart.panelOpen){
      var lbCph = raycaster.intersectObjects(cart.panelGroup.children, true);
      for(var lbCph2=0;lbCph2<lbCph.length;lbCph2++){
        var lbCheck = lbCph[lbCph2].object;
        while(lbCheck && lbCheck !== cart.panelGroup){
          if(lbCheck.userData.clickable){el.classList.add('clickable');return;}
          lbCheck = lbCheck.parent;
        }
      }
    }
    return;
  }

  // Check nav menu (clickable)
  if(navMenu.glassMesh){
    var navH=raycaster.intersectObject(navMenu.glassMesh);
    if(navH.length>0){hoveredGlassMesh = navMenu.glassMesh; el.classList.add('clickable');return;}
  }
  if(navMenu.open){
    for(var nci=0;nci<navMenu.buttons.length;nci++){
      var nbcH=raycaster.intersectObjects(navMenu.buttons[nci].group.children,true);
      if(nbcH.length>0){hoveredGlassMesh = findGlassMeshFromHit(nbcH[0].object); el.classList.add('clickable');return;}
    }
  }

  // Check overlay buttons (clickable)
  for(var oi=0;oi<cartOverlays.length;oi++){
    var ovH=raycaster.intersectObjects(cartOverlays[oi].group.children,true);
    if(ovH.length>0){hoveredGlassMesh = findGlassMeshFromHit(ovH[0].object); el.classList.add('clickable');return;}
  }

  // Check cart glass mesh (clickable to open/close)
  if(cart.glassMesh){
    var cgh=raycaster.intersectObject(cart.glassMesh);
    if(cgh.length>0){hoveredGlassMesh = cart.glassMesh; el.classList.add('clickable');return;}
  }
  
  // Check cart panel buttons (clickable)
  if(cart.panelGroup&&cart.panelOpen){
    var cph=raycaster.intersectObjects(cart.panelGroup.children,true);
    if(cph.length>0){
      // Walk up to find if it's a clickable button
      for(var ci=0;ci<cph.length;ci++){
        var check=cph[ci].object;
        while(check&&check!==cart.panelGroup){
          if(check.userData.clickable){el.classList.add('clickable');return;}
          check=check.parent;
        }
      }
      // Over cart panel title bar area — grabbable for dragging
      var hitLocal=cart.panelGroup.worldToLocal(cph[0].point.clone());
      if(hitLocal.y>1.5){el.classList.add('grabbable');return;}
    }
  }
  
  // Check quick view buttons
  if(dm.active&&dm.dmButtons.length>0){
    for(var dbi=0;dbi<dm.dmButtons.length;dbi++){
      var qvh=raycaster.intersectObjects(dm.dmButtons[dbi].children,true);
      if(qvh.length>0){hoveredGlassMesh = findGlassMeshFromHit(qvh[0].object); el.classList.add('clickable');return;}
    }
  }
  
  // Check scene objects (panels = clickable, floors = grabbable for spin)
  var hits=raycaster.intersectObjects(scene.children,true);
  for(var hi=0;hi<hits.length;hi++){
    var ho=hits[hi].object;
    if(ho.type==='Sprite'||ho.type==='Points'||ho.type==='Line'||ho.type==='LineSegments')continue;
    // Drag plane = grabbable
    if(ho.userData.isDragPlane){el.classList.add('grabbable');return;}
    // Planet = clickable
    if(ho.userData.isPlanet){el.classList.add('clickable');return;}
    // Check if it's a panel (CylinderGeometry = clickable)
    if(ho.geometry&&ho.geometry.type==='CylinderGeometry'&&ho.visible){
      el.classList.add('clickable');return;
    }
    // Check if it's a star (OctahedronGeometry = clickable when in display mode)
    if(ho.geometry&&ho.geometry.type==='OctahedronGeometry'&&dm.active){
      el.classList.add('clickable');return;
    }
    // Check if it's part of a floor group (grabbable for spinning)
    var obj2=ho;
    while(obj2.parent){if(obj2.userData.label){el.classList.add('grabbable');return;}obj2=obj2.parent;}
    break;
  }
}

function pUp(cx,cy){
  pressedGlassMesh = null;
  // Release in-game window drag
  if(gameUI.drag.active){
    gameUI.drag.active = false; gameUI.drag.win = null;
    isDragging = false;
    renderer.domElement.parentElement.classList.remove('dragging');
    return;
  }
  // Release ball drag — either throw-into-scene (charged octahedron) or normal release
  if(ballDrag.active && ballDrag.ball){
    var heldBall = ballDrag.ball;
    var releaseCharge = ballDrag.chargeLevel;
    ballDrag.active = false;
    ballDrag.ball = null;
    ballDrag.chargeLevel = 0;
    ballDrag.isCharging = false;
    isDragging = false;
    renderer.domElement.parentElement.classList.remove('dragging');
    if(heldBall.type === 'octahedron' && releaseCharge > 0.2){
      throwBallIntoScene(heldBall, releaseCharge);
    } else {
      // Normal release — apply throw velocity from recent motion history
      var hist = ballDrag.history;
      if(hist.length >= 2){
        var last = hist[hist.length - 1];
        var oldest = hist[0];
        var dts = (last.t - oldest.t) / 1000;
        if(dts > 0.005){
          heldBall.vel.x = (last.x - oldest.x) / dts;
          heldBall.vel.y = (last.y - oldest.y) / dts;
        }
      }
    }
    return;
  }
  if(cartDrag.active){endCartDrag();isDragging=false;renderer.domElement.parentElement.classList.remove('dragging');return;}
  // End PDV scroll drag
  if(pdv.dragging){ pdv.dragging=false; }
  var dist=Math.sqrt(Math.pow(cx-mouseDownX,2)+Math.pow(cy-mouseDownY,2));
  var wasClick=dist<5&&(performance.now()-mouseDownTime)<300;
  if(wasClick){
    mouse.x=(cx/renderer.domElement.clientWidth)*2-1;mouse.y=-(cy/renderer.domElement.clientHeight)*2+1;
    raycaster.setFromCamera(mouse,camera);

    // ── Double-tap the bottom spinny wheel (gallery floor) to queue the mini-game start. ──
    if(gameMode.galleryFloor && !gameMode.active && !gameMode.entering && !gameMode.decelerating && !gameMode.exiting){
      var gwHits = raycaster.intersectObjects(gameMode.galleryFloor.group.children, true);
      if(gwHits.length > 0){
        var nowWT = performance.now();
        if(nowWT - (pUp._lastWheelTap || 0) < 350){
          pUp._lastWheelTap = 0;
          enterGameMode();   // kicks off the decelerate → camera-dive entry sequence
          isDragging=false; selectedFloor=null; if(dm.draggingVW) dm.draggingVW=false;
          renderer.domElement.parentElement.classList.remove('dragging');
          return;
        }
        pUp._lastWheelTap = nowWT;
      }
    }

    // In-game glass windows intercept clicks (options/inventory windows + their icons)
    if(gameMode.active && !gameMode.exiting){
      if(handleGameUIClick()){
        isDragging=false; selectedFloor=null;
        renderer.domElement.parentElement.classList.remove('dragging');
        return;
      }
    }

    // Lightbox is open: ONLY the three lightbox buttons are interactive. Everything
    // else (cart, nav, scene panels) is unreachable so clicks meant for the close X
    // can't bleed through to the cart icon (or anything else) underneath.
    if(imgLightbox.active || imgLightbox.entering || imgLightbox.exiting){
      // Alt-image carousel: arrows step the scroll, thumbs swap the main image
      if(altImgBar.active && altImgBar.group){
        if(altImgBar.arrowL && raycaster.intersectObjects(altImgBar.arrowL.children, true).length > 0){
          altImgBarPrev();
          isDragging=false; selectedFloor=null; renderer.domElement.parentElement.classList.remove('dragging');
          return;
        }
        if(altImgBar.arrowR && raycaster.intersectObjects(altImgBar.arrowR.children, true).length > 0){
          altImgBarNext();
          isDragging=false; selectedFloor=null; renderer.domElement.parentElement.classList.remove('dragging');
          return;
        }
        for(var lbTi = 0; lbTi < altImgBar.thumbs.length; lbTi++){
          if(altImgBar.thumbs[lbTi].empty) continue; // placeholder slots aren't clickable
          if(raycaster.intersectObjects(altImgBar.thumbs[lbTi].group.children, true).length > 0){
            setLightboxImageByIdx(altImgBar.thumbs[lbTi].idx);
            isDragging=false; selectedFloor=null; renderer.domElement.parentElement.classList.remove('dragging');
            return;
          }
        }
      }
      if(dm.active && dm.dmButtons.length>0){
        for(var lbDbi=0; lbDbi<dm.dmButtons.length; lbDbi++){
          var lbHits = raycaster.intersectObjects(dm.dmButtons[lbDbi].children, true);
          if(lbHits.length > 0){
            var lbActionId = dm.dmButtons[lbDbi].userData.actionId;
            if(lbActionId==='close'){
              exitImgLightbox();
            } else if(lbActionId==='add-to-cart'){
              var lbFloorCfg = PRODUCT_DATA.floors[dm.floorIdx];
              if(lbFloorCfg && lbFloorCfg.products[dm.selIdx]) addToCart(lbFloorCfg.products[dm.selIdx]);
            } else if(lbActionId==='expand'){
              var lbFloorCfg2 = PRODUCT_DATA.floors[dm.floorIdx];
              if(lbFloorCfg2 && lbFloorCfg2.products[dm.selIdx]) buyNowAndCheckout(lbFloorCfg2.products[dm.selIdx]);
            }
            isDragging=false; selectedFloor=null;
            if(dm.draggingVW) dm.draggingVW=false;
            renderer.domElement.parentElement.classList.remove('dragging');
            return;
          }
        }
      }
      // Cart overlay buttons (e.g. close-cart when panel open)
      if(cart.panelOpen && cartOverlays.length>0){
        for(var lbOvi=0;lbOvi<cartOverlays.length;lbOvi++){
          var lbOvGroup=cartOverlays[lbOvi].group;
          var lbOvHits=raycaster.intersectObjects(lbOvGroup.children,true);
          if(lbOvHits.length>0){
            if(lbOvGroup.userData.clickable&&lbOvGroup.userData.actionId){
              var lbOvAid=lbOvGroup.userData.actionId;
              if(lbOvAid==='close-cart'){cart.dragOffsetX=0.3;cart.dragOffsetY=0;toggleCartPanel();}
            }
            isDragging=false;selectedFloor=null;
            if(dm.draggingVW)dm.draggingVW=false;
            renderer.domElement.parentElement.classList.remove('dragging');
            return;
          }
        }
      }
      // Cart panel buttons (when open)
      if(cart.panelGroup && cart.panelOpen){
        var lbCpHits=raycaster.intersectObjects(cart.panelGroup.children,true);
        for(var lbCph3=0;lbCph3<lbCpHits.length;lbCph3++){
          var lbCheck3=lbCpHits[lbCph3].object;
