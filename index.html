          while(lbCheck3&&lbCheck3!==cart.panelGroup){
            if(lbCheck3.userData.clickable&&lbCheck3.userData.actionId){
              var lbCAid=lbCheck3.userData.actionId;
              if(lbCAid==='close-cart'){cart.dragOffsetX=0.3;cart.dragOffsetY=0;toggleCartPanel();}
              else if(lbCAid==='checkout'){shopifyGoToCheckout();}
              else if(lbCAid.indexOf('remove-cart-')===0){removeFromCart(parseInt(lbCAid.replace('remove-cart-','')));}
              else if(lbCAid.indexOf('inc-cart-')===0){incrementCartItem(parseInt(lbCAid.replace('inc-cart-','')));}
              else if(lbCAid.indexOf('dec-cart-')===0){decrementCartItem(parseInt(lbCAid.replace('dec-cart-','')));}
              isDragging=false;selectedFloor=null;
              if(dm.draggingVW)dm.draggingVW=false;
              renderer.domElement.parentElement.classList.remove('dragging');
              return;
            }
            lbCheck3=lbCheck3.parent;
          }
        }
      }
      // Cart icon (open/close the panel without leaving the lightbox)
      if(cart.glassMesh){
        var lbCgClick = raycaster.intersectObject(cart.glassMesh);
        if(lbCgClick.length>0){
          if(!cart.panelAnimating){
            if(cart.panelOpen){cart.dragOffsetX=0.3;cart.dragOffsetY=0;}
            toggleCartPanel();
          }
          isDragging=false;selectedFloor=null;
          if(dm.draggingVW)dm.draggingVW=false;
          renderer.domElement.parentElement.classList.remove('dragging');
          return;
        }
      }
      isDragging=false; selectedFloor=null;
      if(dm.draggingVW) dm.draggingVW=false;
      renderer.domElement.parentElement.classList.remove('dragging');
      return;
    }

    // Product detail view clicks
    if(pdv.active){
      if(handleProductDetailClick(cx, cy)){
        isDragging=false;selectedFloor=null;renderer.domElement.parentElement.classList.remove('dragging');return;
      }
    }

    // Nav menu clicks
    if(navMenu.glassMesh){
      var navHits=raycaster.intersectObject(navMenu.glassMesh);
      if(navHits.length>0&&!navMenu.open){
        toggleNavMenu();
        isDragging=false;selectedFloor=null;if(dm.draggingVW)dm.draggingVW=false;
        renderer.domElement.parentElement.classList.remove('dragging');return;
      }
    }
    if(navMenu.open&&navMenu.buttons.length>0){
      for(var nbi=0;nbi<navMenu.buttons.length;nbi++){
        var nbHits=raycaster.intersectObjects(navMenu.buttons[nbi].group.children,true);
        if(nbHits.length>0){
          var fi=navMenu.buttons[nbi].floorIdx;
          var destY=0;
          if(fi===-1){ destY=0; }
          else if(fi>=0&&fi<floors.length){ destY=floors[fi].group.position.y; }
          // Start nav scroll animation
          navScrollAnim.active=true;
          navScrollAnim.startY=camera.position.y;
          navScrollAnim.targetY=destY;
          navScrollAnim.progress=0;
          targetCameraY=destY;
          // Immediately push nav menu physics toward destination so it leads
          navMenu.physY+=(destY-camera.position.y)*0.7;
          toggleNavMenu();
          isDragging=false;selectedFloor=null;if(dm.draggingVW)dm.draggingVW=false;
          renderer.domElement.parentElement.classList.remove('dragging');return;
        }
      }
      // Click on expanded nav glass = close
      if(navMenu.glassMesh){
        var navHits2=raycaster.intersectObject(navMenu.glassMesh);
        if(navHits2.length>0){
          toggleNavMenu();
          isDragging=false;selectedFloor=null;if(dm.draggingVW)dm.draggingVW=false;
          renderer.domElement.parentElement.classList.remove('dragging');return;
        }
      }
    }
    
    // Cart overlay buttons (separate scene objects with tether)
    if(cart.panelOpen && cartOverlays.length>0) {
      for(var ovi=0;ovi<cartOverlays.length;ovi++){
        var ovGroup=cartOverlays[ovi].group;
        var ovHits=raycaster.intersectObjects(ovGroup.children,true);
        if(ovHits.length>0){
          var ovCheck=ovGroup;
          if(ovCheck.userData.clickable&&ovCheck.userData.actionId){
            var ovAid=ovCheck.userData.actionId;
            if(ovAid==='close-cart'){cart.dragOffsetX=0.3;cart.dragOffsetY=0;toggleCartPanel();}
            isDragging=false;selectedFloor=null;if(dm.draggingVW)dm.draggingVW=false;
            renderer.domElement.parentElement.classList.remove('dragging');return;
          }
        }
      }
    }
    
    // Cart panel buttons (when open)
    if(cart.panelGroup && cart.panelOpen) {
      var cartPanelHits=raycaster.intersectObjects(cart.panelGroup.children,true);
      var cartBtnFound=false;
      for(var cph=0;cph<cartPanelHits.length;cph++){
        var hitObj=cartPanelHits[cph].object;var check=hitObj;
        while(check&&check!==cart.panelGroup){
          if(check.userData.clickable&&check.userData.actionId){
            var aid=check.userData.actionId;
            if(aid==='close-cart'){cart.dragOffsetX=0.3;cart.dragOffsetY=0;toggleCartPanel();}
            else if(aid==='checkout'){shopifyGoToCheckout();}
            else if(aid.indexOf('remove-cart-')===0){removeFromCart(parseInt(aid.replace('remove-cart-','')));}
            else if(aid.indexOf('inc-cart-')===0){incrementCartItem(parseInt(aid.replace('inc-cart-','')));}
            else if(aid.indexOf('dec-cart-')===0){decrementCartItem(parseInt(aid.replace('dec-cart-','')));}
            cartBtnFound=true;break;
          }
          check=check.parent;
        }
        if(cartBtnFound)break;
      }
      if(cartBtnFound){isDragging=false;selectedFloor=null;if(dm.draggingVW)dm.draggingVW=false;renderer.domElement.parentElement.classList.remove('dragging');return;}
    }
    
    // Cart glass mesh click — open when closed, close when open
    if(cart.glassMesh) {
      var glassHits=raycaster.intersectObject(cart.glassMesh);
      if(glassHits.length>0){
        if(!cart.panelAnimating){
          // Reset drag offset so it always goes back to top-right
          if(cart.panelOpen){
            cart.dragOffsetX=0.3;
            cart.dragOffsetY=0;
          }
          toggleCartPanel();
        }
        isDragging=false;selectedFloor=null;if(dm.draggingVW)dm.draggingVW=false;
        renderer.domElement.parentElement.classList.remove('dragging');
        return;
      }
    }
    
    // Click on the product image enters the lightbox (only when DM display is fully open)
    if(dm.active && !imgLightbox.active && !imgLightbox.entering && !imgLightbox.exiting
        && displayAnim.backdrop && displayAnim.backdrop.userData.imgMesh){
      var lbHits = raycaster.intersectObject(displayAnim.backdrop.userData.imgMesh);
      if(lbHits.length > 0){
        enterImgLightbox();
        isDragging=false;selectedFloor=null;if(dm.draggingVW)dm.draggingVW=false;
        renderer.domElement.parentElement.classList.remove('dragging');
        return;
      }
    }

        // Check quick view button clicks (3 glass icons)
    if(dm.active && dm.dmButtons.length>0) {
      for(var dbi=0;dbi<dm.dmButtons.length;dbi++){
        var btnHits = raycaster.intersectObjects(dm.dmButtons[dbi].children, true);
        if(btnHits.length > 0) {
          var actionId = dm.dmButtons[dbi].userData.actionId;
          if(actionId==='add-to-cart'){
            var floorCfg = PRODUCT_DATA.floors[dm.floorIdx];
            if(floorCfg && floorCfg.products[dm.selIdx]) {
              addToCart(floorCfg.products[dm.selIdx]);
            }
          } else if(actionId==='close'){
            if(imgLightbox.active || imgLightbox.entering){
              exitImgLightbox();
            } else {
              exitDM();
            }
          } else if(actionId==='expand'){
            // Right arrow: add to cart + immediately go to checkout
            var floorCfg2 = PRODUCT_DATA.floors[dm.floorIdx];
            if(floorCfg2 && floorCfg2.products[dm.selIdx]) {
              buyNowAndCheckout(floorCfg2.products[dm.selIdx]);
            }
          }
          isDragging=false;selectedFloor=null;if(dm.draggingVW)dm.draggingVW=false;
          renderer.domElement.parentElement.classList.remove('dragging');
          return;
        }
      }
    }
    
    var hits=raycaster.intersectObjects(scene.children,true).filter(function(h){return h.object.visible;});
    
    // ── Check vertical wheel clicks first via direct raycast against wheel children ──
    if(dm.active && dm.vWheel && !dm.animating && !dm.closing && !switchAnim.active) {
      var vwHits = raycaster.intersectObjects(dm.vWheel.children, true);
      for(var vi=0; vi<vwHits.length; vi++){
        var hitObj = vwHits[vi].object;
        // Walk up to find the mesh with vwIdx
        var check = hitObj;
        while(check && check !== dm.vWheel) {
          if(check.userData.vwIdx !== undefined) {
            var ci = check.userData.vwIdx;
            if(ci !== dm.selIdx && check.visible) {
              switchPanel(ci);
              isDragging=false;selectedFloor=null;if(dm.draggingVW)dm.draggingVW=false;
              renderer.domElement.parentElement.classList.remove('dragging');
              return;
            }
          }
          check = check.parent;
        }
      }
    }
    
    // ── Check for planet clicks — launch meteor ──
    var allPlanetHitMeshes=[];
    for(var pci=0;pci<planets.length;pci++){if(planets[pci].alive&&planets[pci].hitMesh)allPlanetHitMeshes.push(planets[pci].hitMesh);}
    if(allPlanetHitMeshes.length>0){
      var planetHits=raycaster.intersectObjects(allPlanetHitMeshes);
      if(planetHits.length>0){
        var hitPlanet=planetHits[0].object;
        if(hitPlanet.userData.isPlanet){
          launchMeteor(hitPlanet.userData.planetIdx);
          isDragging=false;selectedFloor=null;if(dm.draggingVW)dm.draggingVW=false;
          renderer.domElement.parentElement.classList.remove('dragging');
          return;
        }
      }
    }
    
    // ── Standard raycast detection for floor panels and other objects ──
    if(hits.length>0){
      var tgt=null;
      for(var i=0;i<hits.length;i++){
        var co=hits[i].object,pt=co;
        
        // Skip quick view panel hits and star temps
        var skipDmBtn=false;
        for(var dbi2=0;dbi2<dm.dmButtons.length;dbi2++){if(co===dm.dmButtons[dbi2]||isChildOf(co,dm.dmButtons[dbi2])){skipDmBtn=true;break;}}
        if(!skipDmBtn){for(var sti5=0;sti5<dm.starTemps.length;sti5++){if(co===dm.starTemps[sti5]||isChildOf(co,dm.starTemps[sti5])){skipDmBtn=true;break;}}}
        if(!skipDmBtn&&dm.closingStarTemps){for(var csti3=0;csti3<dm.closingStarTemps.length;csti3++){if(co===dm.closingStarTemps[csti3]||isChildOf(co,dm.closingStarTemps[csti3])){skipDmBtn=true;break;}}}
        if(skipDmBtn) continue;
        // Skip display temp hits
        if(dm.displayTemp && (co===dm.displayTemp.plane || co===dm.displayTemp.edge)) continue;
        // Skip switch animation temp hits
        if(switchAnim.active) continue;
        // Skip vertical wheel hits (handled above)
        if(dm.vWheel && isChildOf(co, dm.vWheel)) continue;
        // Skip glass ring hits on wheels
        var skipStar=false;var ck=co;while(ck){if(ck.userData&&(ck.userData.isGlassRing||ck.userData.isButton)){skipStar=true;break;}ck=ck.parent;}
        if(skipStar) continue;
        
        // Star click
        if(co.geometry&&co.geometry.type==='OctahedronGeometry'&&dm.active){break;}
        
        // If we hit a Line or LineSegments, find sibling CylinderGeometry mesh
        if((co.type==='Line'||co.type==='LineSegments')&&co.parent){
          var siblings=co.parent.children;
          for(var si=0;si<siblings.length;si++){
            if(siblings[si].geometry&&siblings[si].geometry.type==='CylinderGeometry'){pt=siblings[si];break;}
          }
        }
        
        if(pt.geometry&&pt.geometry.type==='CylinderGeometry'&&pt.visible){tgt=pt;break;}
      }
      if(tgt){
        var fg=tgt.parent;
        if(dm.active&&fg===dm.vWheel&&!dm.animating&&!dm.closing&&!switchAnim.active){
          var ci=tgt.userData.vwIdx;
          if(ci!==undefined&&ci!==dm.selIdx)switchPanel(ci);
        }else{
          var fd=floors.find(function(f){return f.group===fg;});
          if(fd&&!dm.animating&&!dm.closing){
            var pi=-1;for(var j=0;j<fd.panels.length;j++){if(fd.panels[j].mesh===tgt){pi=j;break;}}
            if(pi>=0)enterDM(fd,pi,floors.indexOf(fd));
          }
        }
      }
    }
  }
  // Close nav menu if open and nothing else was clicked. Skip this in lightbox bar mode
  // — the bar is a product-name display, not the toggleable nav menu, so it must stay
  // open until exitImgLightbox folds it back.
  if(navMenu.open&&!navMenu.animating&&!navMenu.barMode){toggleNavMenu();}
  if(dm.draggingVW)dm.draggingVW=false;
  isDragging=false;selectedFloor=null;renderer.domElement.parentElement.classList.remove('dragging');
}

// ══════════════════════════════════════════════
// DISPLAY MODE
// ══════════════════════════════════════════════
function enterDM(floorData, panelIdx, floorIdx) {
  if(dm.active||dm.closing){
    if(dm.floorIdx===floorIdx&&dm.selIdx===panelIdx&&!dm.closing) return; // same panel, ignore
    // Start closing animation for old floor, extract it to run independently
    if(dm.active && !dm.closing) exitDMImmediate(true);
    extractClosingToPending();
  }
  dm.active=true; dm.floorIdx=floorIdx; dm.floor=floorData; dm.selIdx=panelIdx;

  // Smooth scroll camera to center on this floor's wheel
  touchScroll.scrollMomentum = 0;
  var floorY = floorData.group.position.y;
  if(Math.abs(camera.position.y - floorY) > 0.3) {
    navScrollAnim.active = true;
    navScrollAnim.startY = camera.position.y;
    navScrollAnim.targetY = floorY;
    navScrollAnim.progress = 0;
  } else {
    targetCameraY = floorY;
  }

  var isLeft = floorIdx===1||floorIdx===3;
  dm.vwSide = isLeft?'left':'right';

  // Trigger center star fly-out to vWheel center
  setDmCenterAnimTarget(floorData, 1, isLeft ? 'left' : 'right');

  // 1. Capture current world transforms of all panels
  dm.animData = [];
  floorData.panels.forEach(function(panel,idx){
    var wp=new THREE.Vector3(),wq=new THREE.Quaternion(),ws=new THREE.Vector3();
    panel.mesh.getWorldPosition(wp);panel.mesh.getWorldQuaternion(wq);panel.mesh.getWorldScale(ws);
    dm.animData.push({startPos:wp.clone(),startQuat:wq.clone(),startScale:ws.clone(),targetPos:null,targetQuat:null,targetScale:null});
  });
  
  // 2. Build the REAL vertical wheel to get accurate target transforms
  var vg = new THREE.Group();
  vg.position.set(isLeft?-3:3, floorData.group.position.y, 3.5);
  vg.rotation.y = Math.PI/2;
  vg.scale.set(0.65,0.65,0.65);
  
  var np = floorData.panels.length;
  var as = (Math.PI*2)/np;
  
  // Temporarily add dummy meshes to get world positions
  var dummies = [];
  for(var i=0;i<np;i++){
    var angle=i*as;
    var dMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,0.1));
    dMesh.position.set(0,0,0);
    dMesh.rotation.set(-Math.PI/2, 0, 0);
    dMesh.rotation.y = angle+Math.PI;
    dMesh.rotation.x = -Math.PI/2;
    vg.add(dMesh);
    dummies.push(dMesh);
  }
  scene.add(vg);
  vg.updateMatrixWorld(true);
  
  // Read world transforms
  for(var i=0;i<np;i++){
    var wp=new THREE.Vector3(),wq=new THREE.Quaternion(),ws=new THREE.Vector3();
    dummies[i].getWorldPosition(wp);dummies[i].getWorldQuaternion(wq);dummies[i].getWorldScale(ws);
    dm.animData[i].targetPos=wp.clone();
    dm.animData[i].targetQuat=wq.clone();
    dm.animData[i].targetScale=ws.clone();
  }
  
  // Remove dummies, keep vg for later
  dummies.forEach(function(d){vg.remove(d);d.geometry.dispose();});
  scene.remove(vg);
  // Store vg config for building real wheel later
  dm._vwConfig = {pos:vg.position.clone(),rotY:vg.rotation.y,scale:vg.scale.clone()};
  
  // 3. Create display plane
  createDP(floorData, floorIdx);
  dm.displayPlane.visible=false; if(dm.displayEdges)dm.displayEdges.visible=false;
  
  // Override selected panel target to display plane position
  var dp=new THREE.Vector3(),dq=new THREE.Quaternion(),ds=new THREE.Vector3();
  dm.displayPlane.getWorldPosition(dp);dm.displayPlane.getWorldQuaternion(dq);dm.displayPlane.getWorldScale(ds);
  dm.animData[panelIdx].targetPos=dp.clone();
  dm.animData[panelIdx].targetQuat=dq.clone();
  dm.animData[panelIdx].targetScale=ds.clone();
  
  // 4. Create temp meshes in scene root for animation
  dm.tempMeshes = [];
  dm.origPanelData = [];
  floorData.panels.forEach(function(panel,idx){
    // Save original state BEFORE hiding
    dm.origPanelData.push({
      panel:panel,
      pos:panel.mesh.position.clone(), rot:panel.mesh.rotation.clone(), scl:panel.mesh.scale.clone(),
      vis:true, parent:panel.mesh.parent,
      ePos:panel.edges.position.clone(), eRot:panel.edges.rotation.clone(), eScl:panel.edges.scale.clone(),
      eVis:true, eParent:panel.edges.parent
    });
    
    // Clone mesh with morph data — share material so custom shader uniforms work
    var tm = new THREE.Mesh(panel.mesh.geometry.clone(), panel.mesh.material);
    tm.userData.floorPos = panel.mesh.userData.floorPos;
    tm.userData.vertPos = panel.mesh.userData.vertPos;
    tm.userData.morphT = 0;
    tm.userData.borderIndices = panel.mesh.userData.borderIndices;
    // Create outline for temp mesh
    var tempLineGeo = new THREE.BufferGeometry();
    var tempLinePos = new Float32Array(panel.mesh.userData.borderIndices.length * 3);
    tempLineGeo.setAttribute('position', new THREE.BufferAttribute(tempLinePos, 3));
    tm.userData.lineGeo = tempLineGeo;
    syncOutline(tm);
    var te = new THREE.Line(tempLineGeo, new THREE.LineBasicMaterial({color:0x667788,transparent:true,opacity:0.35}));
    
    var ad = dm.animData[idx];
    tm.position.copy(ad.startPos);tm.quaternion.copy(ad.startQuat);tm.scale.copy(ad.startScale);tm.visible=true;
    te.position.copy(ad.startPos);te.quaternion.copy(ad.startQuat);te.scale.copy(ad.startScale);te.visible=true;
    scene.add(tm);scene.add(te);
    
    // Hide original AFTER saving state
    panel.mesh.visible=false; panel.edges.visible=false;
    
    dm.tempMeshes.push({plane:tm,edge:te});
  });
  
  // ── Glass ring → button animation setup ──
  // Detach 3 node circles from ring, grow and fly to button positions
  dm.starTemps = []; dm.starAnimData = []; dm.starOrigVis = []; dm.starIcons = [];
  var actionTypes = ['add-to-cart', 'close', 'expand'];
  if(floorData.glassRing && floorData.glassRing.userData.nodes){
    var ringGrp = floorData.glassRing;
    ringGrp.updateMatrixWorld(true);
    var ringNodes = ringGrp.userData.nodes;

    var btnX = 0;
    var floorY = floorData.group.position.y;
    var btnSpacing = 1.3;

    // Detach each node from ring, place in scene at its world position
    for(var si2 = 0; si2 < ringNodes.length; si2++){
      var node = ringNodes[si2];
      // Get world transform before detaching
      var nwp = new THREE.Vector3(), nwq = new THREE.Quaternion(), nws = new THREE.Vector3();
      node.getWorldPosition(nwp); node.getWorldQuaternion(nwq); node.getWorldScale(nws);

      // Detach from ring, add to scene
      ringGrp.remove(node);
      node.position.copy(nwp); node.quaternion.copy(nwq); node.scale.copy(nws);
      node.userData.actionId = actionTypes[si2];
      scene.add(node);

      var yOff = (1 - si2) * btnSpacing;
      var targetPos = new THREE.Vector3(btnX, floorY + yOff, 5.0);
      var tempLook = new THREE.Object3D();
      tempLook.position.copy(targetPos);
      tempLook.lookAt(camera.position.x, targetPos.y, camera.position.z);

      dm.starAnimData.push({
        startPos: nwp.clone(), startQuat: nwq.clone(), startScale: nws.clone(),
        targetPos: targetPos, targetQuat: tempLook.quaternion.clone(), targetScale: new THREE.Vector3(1,1,1)
      });
      dm.starTemps.push(node);
    }

    // Save ring visibility and start morphing it
    dm.starOrigVis = [ringGrp.visible];
    dm.ringMorphing = true;
    if(ringGrp.userData.glassMesh){
      ringGrp.userData.glassMesh.material.uniforms.morph.value = 0.0;
    }
  }

  // Save ring state
  dm.origState={rtp:[],rbp:[],rts:[],rbs:[]};
  if(floorData.rings){
    floorData.rings.top.forEach(function(r){dm.origState.rtp.push(r.position.clone());dm.origState.rts.push(r.scale.clone());});
    floorData.rings.bottom.forEach(function(r){dm.origState.rbp.push(r.position.clone());dm.origState.rbs.push(r.scale.clone());});
  }

  dm.animating=true; dm.animProg=0;
}

function createDP(floorData, floorIdx) {
  var geo=new THREE.PlaneGeometry(PLANE_WIDTH,PLANE_WIDTH,20,20);
  var pos=geo.attributes.position,vtx=new THREE.Vector3();
  for(var i=0;i<pos.count;i++){vtx.fromBufferAttribute(pos,i);var md=Math.min(Math.abs(vtx.y-PLANE_WIDTH/2),Math.abs(vtx.y+PLANE_WIDTH/2),Math.abs(vtx.x-PLANE_WIDTH/2),Math.abs(vtx.x+PLANE_WIDTH/2));if(md<0.3)vtx.z=-0.15*((0.3-md)/0.3);pos.setXYZ(i,vtx.x,vtx.y,vtx.z);}
  geo.attributes.position.needsUpdate=true;geo.computeVertexNormals();
  var isLeft=floorIdx===1||floorIdx===3;
  // Invisible position target for the selected panel
  var fp=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({visible:false}));
  fp.position.set(isLeft?3:-3,floorData.group.position.y,-1.5);fp.scale.set(1.4,1.4,1);
  dm.displayPlane=fp;dm.displayEdges=null;scene.add(fp);
}

function animateDM() {
  if(!dm.animating) return;
  dm.animProg+=0.03;
  if(dm.animProg>=1) dm.animProg=1;
  var p=eIO(dm.animProg);
  var fd=dm.floor;if(!fd)return;
  
  dm.animData.forEach(function(ad,idx){
    var t=dm.tempMeshes[idx];if(!t||!t.plane)return;
    t.plane.position.lerpVectors(ad.startPos,ad.targetPos,p);
    var spin=new THREE.Quaternion();spin.setFromAxisAngle(new THREE.Vector3(0,1,0),Math.sin(p*Math.PI)*Math.PI*0.5);
    var sq=new THREE.Quaternion();sq.slerpQuaternions(ad.startQuat,ad.targetQuat,p);
    t.plane.quaternion.copy(sq.multiply(spin));
    t.plane.scale.lerpVectors(ad.startScale,ad.targetScale,p);
    t.edge.position.copy(t.plane.position);t.edge.quaternion.copy(t.plane.quaternion);t.edge.scale.copy(t.plane.scale);
    
    // Morph geometry for non-selected panels
    if(idx!==dm.selIdx){
      morphTo(t.plane,p);
    }
  });
  
  // Animate ring → buttons (morph ring + delayed button fly-out)
  for(var sti = 0; sti < dm.starTemps.length; sti++){
    var st = dm.starTemps[sti], sad = dm.starAnimData[sti];
    // Buttons start moving at p=0.3, reach target at p=1.0
    var btnP = Math.max((p - 0.3) / 0.7, 0.0);
    st.position.lerpVectors(sad.startPos, sad.targetPos, btnP);
    st.quaternion.slerpQuaternions(sad.startQuat, sad.targetQuat, btnP);
    st.scale.lerpVectors(sad.startScale, sad.targetScale, btnP);
  }
  // Morph glass ring into 3 blobs
  if(dm.ringMorphing && fd.glassRing){
    var ringMesh = fd.glassRing.userData.glassMesh;
    if(ringMesh && ringMesh.material.uniforms.morph){
      var ringP = Math.min(p * 2.0, 1.0);
      ringMesh.material.uniforms.morph.value = ringP;
      ringMesh.material.uniforms.opacity.value = 1.0;
      if(ringP >= 1.0) fd.glassRing.visible = false;
    }
  }

  // Rings
  if(fd.rings){
    var sa=1.25,vo=0.5;
    fd.rings.top.forEach(function(rg,i){var op=dm.origState.rtp[i];if(!op)return;rg.position.y=op.y+vo*p;var os=dm.origState.rts[i];rg.scale.set(os.x+(sa-os.x)*p,1,os.x+(sa-os.x)*p);});
    fd.rings.bottom.forEach(function(rg,i){var op=dm.origState.rbp[i];if(!op)return;rg.position.y=op.y-vo*p;var os=dm.origState.rbs[i];rg.scale.set(os.x+(sa-os.x)*p,1,os.x+(sa-os.x)*p);});
  }

  if(dm.animProg>=1){
    dm.animating=false;
    // Clean up non-selected temps, keep selected one as the display
    dm.tempMeshes.forEach(function(t,idx){
      if(idx===dm.selIdx) {
        // This becomes the display — keep it visible
        dm.displayTemp = t;
      } else {
        if(t.plane)scene.remove(t.plane);if(t.edge)scene.remove(t.edge);
      }
    });
    dm.tempMeshes=[];

    // Build real vertical wheel
    buildVW();

    // Selected panel is displayed upright, not on VW — reset its image rotation
    fd.panels[dm.selIdx].mesh.material.userData.imgRotationTarget = 0.0;

    // Add icon overlays to morphed stars (now circles) and register as dmButtons
    dm.dmButtons = [];
    var actionTypes2 = ['add-to-cart', 'close', 'expand'];
    for(var sti2 = 0; sti2 < dm.starTemps.length; sti2++){
      var stg = dm.starTemps[sti2];
      var iconMesh = createStarIconOverlay(actionTypes2[sti2], 0.5);
      stg.add(iconMesh);
      dm.starIcons.push(iconMesh);
      dm.dmButtons.push(stg);
    }

    // Create label (no longer creates buttons — stars ARE the buttons)
    createQuickViewPanels();

    // Start display panel flatten + split animation
    startDisplayAnim();
  }
}

function buildVW() {
  var fd=dm.floor;
  var vg=new THREE.Group();
  var cfg=dm._vwConfig;
  vg.position.copy(cfg.pos);vg.rotation.y=cfg.rotY;vg.scale.copy(cfg.scale);
  
  var np=fd.panels.length;
  var as=(Math.PI*2)/np;
  
  for(var i=0;i<np;i++){
    var panel=fd.panels[i];
    var angle=i*as;
    
    // Remove from floor group
    fd.group.remove(panel.mesh); fd.group.remove(panel.edges);
    
    // Morph to vertical — wireframe auto-tracks since it shares geometry
    morphTo(panel.mesh,1);
    // Rotate image to stay upright on vertical wheel
    panel.mesh.material.userData.imgRotationTarget = 1.0;
    
    panel.mesh.position.set(0,0,0);
    panel.mesh.rotation.set(0,0,0);
    panel.mesh.rotation.y=angle+Math.PI;
    panel.mesh.rotation.x=-Math.PI/2;
    panel.mesh.scale.set(1,1,1);
    panel.mesh.userData.vwIdx=i;
    
    panel.edges.position.set(0,0,0);
    panel.edges.rotation.set(0,0,0);
    panel.edges.rotation.y=angle+Math.PI;
    panel.edges.rotation.x=-Math.PI/2;
    panel.edges.scale.set(1,1,1);
    panel.edges.userData.vwIdx=i;
    
    panel.mesh.visible=(i!==dm.selIdx);
    panel.edges.visible=(i!==dm.selIdx);
    
    vg.add(panel.mesh);vg.add(panel.edges);
  }
  
  dm.vWheel=vg; dm.vwVel=0.015;
  vg.visible=true; scene.add(vg);
}

// Instant teardown — skips closing animation, used when switching to a different floor's DM
function teardownDM() {
  if(!dm.active && !dm.closing) return;
  var fd = dm.floor;
  if(!fd) return;

  cleanupDisplayAnim();
  destroyQuickViewPanels();

  // Remove star icons
  for(var ri = 0; ri < dm.starIcons.length; ri++){
    var ico = dm.starIcons[ri];
    if(ico.parent) ico.parent.remove(ico);
  }

  // Re-attach star temps to ring
  if(fd.glassRing){
    var rr = fd.glassRing.userData.ringRadius || 1.8;
    var allStars = dm.starTemps.concat(dm.closingStarTemps || []);
    allStars.forEach(function(st, ci){
      st.layers.disable(1);
      st.traverse(function(c){c.layers.disable(1);});
      scene.remove(st);
      var na = ci * (Math.PI * 2 / 3);
      st.position.set(Math.sin(na) * rr, 0, Math.cos(na) * rr);
      st.rotation.set(0, na, 0);
      st.scale.set(1, 1, 1);
      fd.glassRing.add(st);
    });
    if(!fd.glassRing.userData.nodes) fd.glassRing.userData.nodes = [];
    fd.glassRing.userData.nodes = allStars.slice();
    fd.glassRing.visible = true;
    var rmesh = fd.glassRing.userData.glassMesh;
    if(rmesh && rmesh.material.uniforms.opacity) rmesh.material.uniforms.opacity.value = 1.0;
    if(rmesh && rmesh.material.uniforms.morph) rmesh.material.uniforms.morph.value = 0.0;
  }

  // Clean closing temps if mid-closing
  if(dm.closingTemps){
    dm.closingTemps.forEach(function(t){if(t.plane)scene.remove(t.plane);if(t.edge)scene.remove(t.edge);});
  }

  // Remove display temp
  if(dm.displayTemp){
    if(dm.displayTemp.plane) scene.remove(dm.displayTemp.plane);
    if(dm.displayTemp.edge) scene.remove(dm.displayTemp.edge);
  }

  // Restore panels to floor
  if(dm.origPanelData){
    dm.origPanelData.forEach(function(data){
      if(dm.vWheel){dm.vWheel.remove(data.panel.mesh);dm.vWheel.remove(data.panel.edges);}
      if(data.parent) data.parent.add(data.panel.mesh);
      if(data.eParent) data.eParent.add(data.panel.edges);
      data.panel.mesh.position.copy(data.pos);data.panel.mesh.rotation.copy(data.rot);data.panel.mesh.scale.copy(data.scl);
      data.panel.edges.position.copy(data.ePos);data.panel.edges.rotation.copy(data.eRot);data.panel.edges.scale.copy(data.eScl);
      data.panel.mesh.visible = data.vis; data.panel.edges.visible = data.eVis;
      morphTo(data.panel.mesh, 0);
      data.panel.mesh.material.userData.imgRotation.value = 0.0;
      data.panel.mesh.material.userData.imgRotationTarget = 0.0;
      data.panel.mesh.material.userData.flatten.value = 0.0;
      data.panel.mesh.material.userData.splitGap.value = 0.0;
    });
  }

  // Restore rings
  if(fd.rings && dm.origState){
    if(dm.origState.rtp) fd.rings.top.forEach(function(rg,i){var op=dm.origState.rtp[i];var os=dm.origState.rts[i];if(op)rg.position.copy(op);if(os)rg.scale.copy(os);});
    if(dm.origState.rbp) fd.rings.bottom.forEach(function(rg,i){var op=dm.origState.rbp[i];var os=dm.origState.rbs[i];if(op)rg.position.copy(op);if(os)rg.scale.copy(os);});
  }

  if(dm.displayPlane){scene.remove(dm.displayPlane);dm.displayPlane=null;}
  if(dm.displayEdges){scene.remove(dm.displayEdges);dm.displayEdges=null;}
  if(dm.vWheel){scene.remove(dm.vWheel);dm.vWheel=null;}
  if(fd&&fd.group){var pf=0.015;fd.group.userData.velocity+=((dm.floorIdx===1||dm.floorIdx===3)?-pf:pf);}

  dm.active=false;dm.floorIdx=-1;dm.floor=null;dm.selIdx=-1;
  dm.animProg=0;dm.animating=false;dm.closing=false;dm.closingProg=0;
  dm.vwVel=0.0025;dm.draggingVW=false;dm.vwSide=null;
  dm.origState={};dm.animData=[];dm.origPanelData=[];dm.displayTemp=null;
  dm.dmButtons=[];dm.starTemps=[];dm.starAnimData=[];dm.starIcons=[];
  dm.closingTemps=[];dm.closingAnimData=[];
  dm.closingStarTemps=[];dm.closingStarAnimData=[];
  dm.queuedOpen=null;
}

// Independent closing animation that runs detached from dm state
var pendingCloses = [];

function extractClosingToPending() {
  // exitDMImmediate() must have been called first (sets up dm.closing state)
  if(!dm.closing) return;
  var pc = {
    prog: dm.closingProg,
    floor: dm.floor,
    floorIdx: dm.floorIdx,
    closingTemps: dm.closingTemps,
    closingAnimData: dm.closingAnimData,
    closingStarTemps: dm.closingStarTemps,
    closingStarAnimData: dm.closingStarAnimData,
    origState: dm.origState,
    origPanelData: dm.origPanelData,
    displayPlane: dm.displayPlane,
    displayEdges: dm.displayEdges,
    vWheel: dm.vWheel,
    // Carry over display animation state for reverse playback
    dispAnim: null
  };
  if(displayAnim.origPos || displayAnim.backdrop) {
    pc.dispAnim = {
      backdrop: displayAnim.backdrop,
      origPos: displayAnim.origPos,
      origScale: displayAnim.origScale,
      origEdgePos: displayAnim.origEdgePos,
      origEdgeScale: displayAnim.origEdgeScale,
      btnOrigPositions: displayAnim.btnOrigPositions,
      phase: 'retract',
      prog: 0,
      plane: dm.displayTemp ? dm.displayTemp.plane : null,
      edge: dm.displayTemp ? dm.displayTemp.edge : null
    };
    // Determine correct starting phase
    if(displayAnim.backdrop && displayAnim.backdrop.visible) {
      pc.dispAnim.phase = 'retract';
    } else if(pc.dispAnim.plane && pc.dispAnim.plane.material.userData.splitGap.value > 0) {
      pc.dispAnim.phase = 'unsplit';
    } else {
      pc.dispAnim.phase = 'unflatten';
    }
    // Backdrop stays as child of plane — it tracks automatically during reverse animation
    // Clear from main displayAnim so it doesn't conflict
    displayAnim.backdrop = null;
    displayAnim.origPos = null;
    displayAnim.origScale = null;
    displayAnim.origEdgePos = null;
    displayAnim.origEdgeScale = null;
    displayAnim.btnOrigPositions = [];
    displayAnim.active = false;
    displayAnim.phase = 'idle';
    displayAnim.prog = 0;
    displayAnim.pendingExit = false;
  }
  pendingCloses.push(pc);

  // Clear these from dm so new enterDM doesn't conflict
  dm.closing = false; dm.closingProg = 0;
  dm.closingTemps = []; dm.closingAnimData = [];
  dm.closingStarTemps = []; dm.closingStarAnimData = [];
  dm.origState = {}; dm.origPanelData = [];
  dm.displayPlane = null; dm.displayEdges = null; dm.vWheel = null;
  dm.active = false; dm.floorIdx = -1; dm.floor = null; dm.selIdx = -1;
  dm.animProg = 0; dm.animating = false; dm.vwVel = 0.0025;
  dm.draggingVW = false; dm.vwSide = null;
  dm.animData = []; dm.displayTemp = null;
  dm.dmButtons = []; dm.starTemps = []; dm.starAnimData = []; dm.starIcons = [];
  dm.queuedOpen = null;
}

function animatePendingCloses() {
  for(var pci = pendingCloses.length - 1; pci >= 0; pci--) {
    var pc = pendingCloses[pci];
    pc.prog += 0.025;
    if(pc.prog >= 1) pc.prog = 1;
    var p = eIO(pc.prog);
    var fd = pc.floor;

    // Update targets to track floor rotation
    fd.group.updateMatrixWorld(true);
    pc.closingAnimData.forEach(function(ad, idx) {
      var panel = fd.panels[idx];
      var wp=new THREE.Vector3(),wq=new THREE.Quaternion(),ws=new THREE.Vector3();
      panel.mesh.getWorldPosition(wp);panel.mesh.getWorldQuaternion(wq);panel.mesh.getWorldScale(ws);
      ad.targetPos=wp; ad.targetQuat=wq; ad.targetScale=ws;
    });

    pc.closingAnimData.forEach(function(ad, idx) {
      var t = pc.closingTemps[idx]; if(!t||!t.plane) return;
      t.plane.position.lerpVectors(ad.startPos, ad.targetPos, p);
      t.plane.quaternion.slerpQuaternions(ad.startQuat, ad.targetQuat, p);
      t.plane.scale.lerpVectors(ad.startScale, ad.targetScale, p);
      t.edge.position.copy(t.plane.position);t.edge.quaternion.copy(t.plane.quaternion);t.edge.scale.copy(t.plane.scale);
      morphTo(t.plane, 1 - p);
    });

    // Star button closing
    if(pc.closingStarTemps && pc.closingStarTemps.length > 0) {
      if(fd.glassRing) {
        var crWP = new THREE.Vector3();
        fd.glassRing.getWorldPosition(crWP);
        var crR = fd.glassRing.userData.ringRadius || 1.8;
        for(var csi = 0; csi < pc.closingStarTemps.length; csi++) {
          var csad = pc.closingStarAnimData[csi];
          var sa2 = csi * (Math.PI * 2 / 3);
          csad.targetPos = new THREE.Vector3(crWP.x+Math.sin(sa2)*crR, crWP.y, crWP.z+Math.cos(sa2)*crR);
        }
      }
      var btnCloseP = Math.min(p / 0.5, 1.0);
      for(var csi2 = 0; csi2 < pc.closingStarTemps.length; csi2++) {
        var csad2 = pc.closingStarAnimData[csi2];
        var cst = pc.closingStarTemps[csi2];
        cst.position.lerpVectors(csad2.startPos, csad2.targetPos, btnCloseP);
        cst.quaternion.slerpQuaternions(csad2.startQuat, csad2.targetQuat, btnCloseP);
        cst.scale.lerpVectors(csad2.startScale, csad2.targetScale, btnCloseP);
        cst.visible = (btnCloseP < 1.0);
      }
    }

    // Ring reverse morph
    if(fd.glassRing) {
      fd.glassRing.visible = true;
      var ringMesh2 = fd.glassRing.userData.glassMesh;
      if(ringMesh2 && ringMesh2.material.uniforms.morph) {
        var ringP2 = Math.max((p - 0.5) / 0.5, 0.0);
        ringMesh2.material.uniforms.morph.value = 1.0 - ringP2;
        ringMesh2.material.uniforms.opacity.value = 1.0;
      }
    }

    // Ring position restore
    if(fd.rings && pc.origState) {
      var sa=1.25, vo=0.5;
      if(pc.origState.rtp) fd.rings.top.forEach(function(rg,i){var op=pc.origState.rtp[i];if(!op)return;rg.position.y=(op.y+vo)+(op.y-(op.y+vo))*p;var os=pc.origState.rts[i];rg.scale.set(sa+(os.x-sa)*p,1,sa+(os.x-sa)*p);});
      if(pc.origState.rbp) fd.rings.bottom.forEach(function(rg,i){var op=pc.origState.rbp[i];if(!op)return;rg.position.y=(op.y-vo)+(op.y-(op.y-vo))*p;var os=pc.origState.rbs[i];rg.scale.set(sa+(os.x-sa)*p,1,sa+(os.x-sa)*p);});
    }

    // Reverse display animation (retract → unsplit → unflatten) on pending close
    if(pc.dispAnim && pc.dispAnim.plane) {
      var da = pc.dispAnim;
      var daSpeed = (da.phase === 'unflatten') ? 0.21 : 0.07875;
      da.prog += daSpeed;
      if(da.prog > 1) da.prog = 1;
      var daP = eIO(da.prog);
      var daMat2 = da.plane.material;

      if(da.phase === 'retract') {
        if(da.backdrop) {
          da.backdrop.visible = true;
          var bd4 = da.backdrop.userData;
          var pW4 = PLANE_WIDTH, d4 = 0.35;
          var mS4 = PLANE_WIDTH * 0.3;
          var gH4 = mS4 * (0.45 * PLANE_WIDTH + 1.0);
          var rd4 = 1 - daP, op4 = rd4 * 0.65, wH4 = gH4 * rd4;
          bd4.topWall.position.set(0, gH4 - wH4*0.5, -d4);
          bd4.topWall.scale.set(pW4, Math.max(wH4, 0.001), 1);
          bd4.topWall.material.uniforms.opacity.value = op4;
          bd4.botWall.position.set(0, -gH4 + wH4*0.5, -d4);
          bd4.botWall.scale.set(pW4, Math.max(wH4, 0.001), 1);
          bd4.botWall.material.uniforms.opacity.value = op4;
          bd4.topLip.position.set(0, gH4, -d4*0.5);
          bd4.topLip.scale.set(pW4, d4, 1);
          bd4.topLip.material.uniforms.opacity.value = op4;
          bd4.botLip.position.set(0, -gH4, -d4*0.5);
          bd4.botLip.scale.set(pW4, d4, 1);
          bd4.botLip.material.uniforms.opacity.value = op4;
        }
        if(da.prog >= 1) {
          if(da.backdrop) da.backdrop.visible = false;
          da.phase = 'unsplit'; da.prog = 0;
        }
      } else if(da.phase === 'unsplit') {
        var mS5 = PLANE_WIDTH * 0.3;
        var rd5 = 1 - daP;
        daMat2.userData.splitGap.value = rd5 * mS5;
        if(da.origPos) {
          var fwd5 = rd5 * 5.0;
          var sc5 = 1 + rd5 * (-0.3);
          var isL5 = pc.floorIdx===1||pc.floorIdx===3;
          var cp5 = rd5 * 1.8 * (isL5 ? -1 : 1);
          da.plane.position.z = da.origPos.z + fwd5;
          da.plane.position.x = da.origPos.x + cp5;
          da.plane.scale.set(da.origScale.x * sc5, da.origScale.y * sc5, da.origScale.z);
        }
        if(da.prog >= 1) {
          daMat2.userData.splitGap.value = 0.0;
          if(da.origPos) {
            da.plane.position.copy(da.origPos);
            da.plane.scale.copy(da.origScale);
          }
          da.phase = 'unflatten'; da.prog = 0;
          if(da.backdrop) da.backdrop.visible = false;
        }
      } else if(da.phase === 'unflatten') {
        daMat2.userData.flatten.value = 1 - daP;
        if(da.prog >= 1) {
          daMat2.userData.flatten.value = 0.0;
          daMat2.userData.splitGap.value = 0.0;
          if(da.origPos) {
            da.plane.position.copy(da.origPos);
            da.plane.scale.copy(da.origScale);
          }
          // Clean up backdrop
          if(da.backdrop) {
            if(da.backdrop.parent) da.backdrop.parent.remove(da.backdrop);
            da.backdrop.traverse(function(ch){ if(ch.geometry)ch.geometry.dispose(); if(ch.material)ch.material.dispose(); });
          }
          scene.remove(da.plane);
          if(da.edge) scene.remove(da.edge);
          pc.dispAnim = null;
        }
      }
    }

    // Completion
    if(pc.prog >= 1 && !pc.dispAnim) {
      pc.closingTemps.forEach(function(t){if(t.plane)scene.remove(t.plane);if(t.edge)scene.remove(t.edge);});
      if(pc.closingStarTemps && fd.glassRing) {
        var rr = fd.glassRing.userData.ringRadius || 1.8;
        pc.closingStarTemps.forEach(function(cst2, ci) {
          cst2.layers.disable(1);
          cst2.traverse(function(c){c.layers.disable(1);});
          scene.remove(cst2);
          var na = ci * (Math.PI * 2 / 3);
          cst2.position.set(Math.sin(na)*rr, 0, Math.cos(na)*rr);
          cst2.rotation.set(0, na, 0);
          cst2.scale.set(1, 1, 1);
          fd.glassRing.add(cst2);
        });
        if(!fd.glassRing.userData.nodes) fd.glassRing.userData.nodes = [];
        fd.glassRing.userData.nodes = pc.closingStarTemps.slice();
      } else if(pc.closingStarTemps) {
        pc.closingStarTemps.forEach(function(cst2){
          cst2.layers.disable(1);
          cst2.traverse(function(c){c.layers.disable(1);});
          scene.remove(cst2);
        });
      }
      if(fd.glassRing) {
        fd.glassRing.visible = true;
        var rmesh = fd.glassRing.userData.glassMesh;
        if(rmesh && rmesh.material.uniforms.opacity) rmesh.material.uniforms.opacity.value = 1.0;
        if(rmesh && rmesh.material.uniforms.morph) rmesh.material.uniforms.morph.value = 0.0;
      }
      pc.origPanelData.forEach(function(data) {
        data.panel.mesh.visible = data.vis; data.panel.edges.visible = data.eVis;
        data.panel.mesh.position.copy(data.pos);data.panel.mesh.rotation.copy(data.rot);data.panel.mesh.scale.copy(data.scl);
        data.panel.edges.position.copy(data.ePos);data.panel.edges.rotation.copy(data.eRot);data.panel.edges.scale.copy(data.eScl);
        morphTo(data.panel.mesh, 0);
        data.panel.mesh.material.userData.imgRotation.value = 0.0;
        data.panel.mesh.material.userData.imgRotationTarget = 0.0;
        data.panel.mesh.material.userData.flatten.value = 0.0;
        data.panel.mesh.material.userData.splitGap.value = 0.0;
      });
      if(pc.displayPlane){scene.remove(pc.displayPlane);}
      if(pc.displayEdges){scene.remove(pc.displayEdges);}
      if(pc.vWheel){scene.remove(pc.vWheel);}
      if(fd&&fd.group){var pf=0.015;fd.group.userData.velocity+=((pc.floorIdx===1||pc.floorIdx===3)?-pf:pf);}
      pendingCloses.splice(pci, 1);
    }
  }
}

function exitDM() {
  if(!dm.active)return;
  // If already reversing, just make sure pendingExit is set
  if(displayAnim.active && (displayAnim.phase === 'retract' || displayAnim.phase === 'unsplit' || displayAnim.phase === 'unflatten')) {
    displayAnim.pendingExit = true;
    return;
  }
  // If display animation is open, reverse it first, then exit when done
  if(displayAnim.origPos || displayAnim.backdrop) {
    displayAnim.pendingExit = true;
    reverseDisplayAnim();
    return;
  }
  exitDMImmediate();
}

function exitDMImmediate(skipDisplayCleanup) {
  if(!dm.active)return;
  var fd=dm.floor;

  // Trigger center star fly-back to floor center
  if(fd) setDmCenterAnimTarget(fd, 0);

  // Clean up display animation (skip if caller will extract it to pending)
  if(!skipDisplayCleanup) cleanupDisplayAnim();

  destroyQuickViewPanels();

  // ── Set up button closing animation (buttons shrink back toward ring) ──
  dm.closingStarTemps = [];
  dm.closingStarAnimData = [];
  if(dm.starTemps.length > 0){
    // Remove icon overlays from button temps
    for(var ri = 0; ri < dm.starIcons.length; ri++){
      var ico = dm.starIcons[ri];
      if(ico.parent) ico.parent.remove(ico);
    }
    dm.starIcons = [];

    // Get ring world position for target
    var ringWP2 = new THREE.Vector3();
    var ringRadius2 = fd.glassRing ? (fd.glassRing.userData.ringRadius || 1.8) : 1.8;
    if(fd.glassRing){
      fd.group.updateMatrixWorld(true);
      fd.glassRing.getWorldPosition(ringWP2);
    }

    for(var sci = 0; sci < dm.starTemps.length; sci++){
      var stmp = dm.starTemps[sci];
      var swp2 = new THREE.Vector3(), swq2 = new THREE.Quaternion(), sws2 = new THREE.Vector3();
      stmp.getWorldPosition(swp2); stmp.getWorldQuaternion(swq2); stmp.getWorldScale(sws2);

      // Target: point on ring
      var spawnAngle2 = sci * (Math.PI * 2 / 3);
      var tgtPos = new THREE.Vector3(
        ringWP2.x + Math.sin(spawnAngle2) * ringRadius2,
        ringWP2.y,
        ringWP2.z + Math.cos(spawnAngle2) * ringRadius2
      );

      dm.closingStarAnimData.push({
        startPos: swp2.clone(), startQuat: swq2.clone(), startScale: sws2.clone(),
        targetPos: tgtPos, targetQuat: swq2.clone(), targetScale: new THREE.Vector3(0.3,0.3,0.3)
      });
      dm.closingStarTemps.push(stmp);
    }
    dm.starTemps = [];
    dm.starAnimData = [];
    dm.ringMorphing = false;
    // Set ring to fully morphed state (3 blobs) and make visible for reverse morph
    if(fd.glassRing){
      fd.glassRing.visible = true;
      var rmSetup = fd.glassRing.userData.glassMesh;
      if(rmSetup && rmSetup.material.uniforms.morph){
        rmSetup.material.uniforms.morph.value = 1.0;
        rmSetup.material.uniforms.opacity.value = 1.0;
      }
    }
  }

  if(dm.vWheel)dm.vWheel.visible=false;
  if(dm.displayPlane)dm.displayPlane.visible=false;
  if(dm.displayEdges)dm.displayEdges.visible=false;
  
  // Capture current world positions of panels (they're in the vertical wheel)
  var startData = [];
  fd.panels.forEach(function(panel,idx){
    var wp=new THREE.Vector3(),wq=new THREE.Quaternion(),ws=new THREE.Vector3();
    if(idx===dm.selIdx && dm.displayTemp) {
      // Selected panel — get position from the display temp mesh
      dm.displayTemp.plane.getWorldPosition(wp);
      dm.displayTemp.plane.getWorldQuaternion(wq);
      dm.displayTemp.plane.getWorldScale(ws);
    } else {
      panel.mesh.getWorldPosition(wp);panel.mesh.getWorldQuaternion(wq);panel.mesh.getWorldScale(ws);
    }
    startData.push({startPos:wp.clone(),startQuat:wq.clone(),startScale:ws.clone()});
  });
  
  // Hide and remove display temp (keep if skipDisplayCleanup — pending close will own it)
  if(dm.displayTemp && !skipDisplayCleanup) {
    if(dm.displayTemp.plane) scene.remove(dm.displayTemp.plane);
    if(dm.displayTemp.edge) scene.remove(dm.displayTemp.edge);
    dm.displayTemp = null;
  }
  
  // Give display temp its own material so uniforms don't conflict with closing temps
  if(skipDisplayCleanup && dm.displayTemp && dm.displayTemp.plane) {
    var srcMat = dm.displayTemp.plane.material;
    var dtFlatten = srcMat.userData.flatten ? srcMat.userData.flatten.value : 0;
    var dtSplitGap = srcMat.userData.splitGap ? srcMat.userData.splitGap.value : 0;
    var dtFlattenZ = srcMat.userData.flattenZ ? srcMat.userData.flattenZ.value : 0;
    // Clone material to isolate uniforms
    var isoMat = srcMat.clone();
    isoMat.userData.flatten = {value: dtFlatten};
    isoMat.userData.splitGap = {value: dtSplitGap};
    isoMat.userData.flattenZ = {value: dtFlattenZ};
    // Copy other userData
    for(var umk in srcMat.userData) {
      if(!isoMat.userData[umk]) {
        if(srcMat.userData[umk] && srcMat.userData[umk].value !== undefined) {
          isoMat.userData[umk] = {value: srcMat.userData[umk].value};
        } else {
          isoMat.userData[umk] = srcMat.userData[umk];
        }
      }
    }
    var srcOBC = srcMat.onBeforeCompile;
    isoMat.onBeforeCompile = function(shader) {
      srcOBC.call(isoMat, shader);
      // Rebind to isolated uniform objects
      for(var iuk in isoMat.userData) {
        if(isoMat.userData[iuk] && isoMat.userData[iuk].value !== undefined && shader.uniforms[iuk]) {
          shader.uniforms[iuk] = isoMat.userData[iuk];
        }
      }
    };
    isoMat.needsUpdate = true;
    dm.displayTemp.plane.material = isoMat;
  }

  // Restore panels to floor group to get target positions
  dm.origPanelData.forEach(function(data){
    if(dm.vWheel){dm.vWheel.remove(data.panel.mesh);dm.vWheel.remove(data.panel.edges);}
    if(data.parent)data.parent.add(data.panel.mesh);
    if(data.eParent)data.eParent.add(data.panel.edges);
    data.panel.mesh.position.copy(data.pos);data.panel.mesh.rotation.copy(data.rot);data.panel.mesh.scale.copy(data.scl);
    data.panel.edges.position.copy(data.ePos);data.panel.edges.rotation.copy(data.eRot);data.panel.edges.scale.copy(data.eScl);
    morphTo(data.panel.mesh,0); // back to floor radius — wireframe auto-tracks
    data.panel.mesh.material.userData.imgRotationTarget = 0.0;
  });

  // Get target world positions
  fd.group.updateMatrixWorld(true);
  var targetData = [];
  fd.panels.forEach(function(panel){
    var wp=new THREE.Vector3(),wq=new THREE.Quaternion(),ws=new THREE.Vector3();
    panel.mesh.getWorldPosition(wp);panel.mesh.getWorldQuaternion(wq);panel.mesh.getWorldScale(ws);
    targetData.push({targetPos:wp.clone(),targetQuat:wq.clone(),targetScale:ws.clone()});
    panel.mesh.visible=false;panel.edges.visible=false;
  });
  
  // Create closing temp meshes
  dm.closingTemps=[];
  dm.closingAnimData=[];
  fd.panels.forEach(function(panel,idx){
    var tm=new THREE.Mesh(panel.mesh.geometry.clone(),panel.mesh.material);
    tm.userData.floorPos=panel.mesh.userData.floorPos;
    tm.userData.vertPos=panel.mesh.userData.vertPos;
    tm.userData.borderIndices=panel.mesh.userData.borderIndices;
    var closingLineGeo=new THREE.BufferGeometry();
    var closingLinePos=new Float32Array(panel.mesh.userData.borderIndices.length*3);
    closingLineGeo.setAttribute('position',new THREE.BufferAttribute(closingLinePos,3));
    tm.userData.lineGeo=closingLineGeo;
    morphTo(tm,1); // start at vertical radius — also syncs outline
    var te=new THREE.Line(closingLineGeo, new THREE.LineBasicMaterial({color:0x667788,transparent:true,opacity:0.35}));
    
    tm.position.copy(startData[idx].startPos);tm.quaternion.copy(startData[idx].startQuat);tm.scale.copy(startData[idx].startScale);tm.visible=true;
    te.position.copy(tm.position);te.quaternion.copy(tm.quaternion);te.scale.copy(tm.scale);te.visible=true;
    scene.add(tm);scene.add(te);
    dm.closingTemps.push({plane:tm,edge:te});
    dm.closingAnimData.push({
      startPos:startData[idx].startPos, startQuat:startData[idx].startQuat, startScale:startData[idx].startScale,
      targetPos:targetData[idx].targetPos, targetQuat:targetData[idx].targetQuat, targetScale:targetData[idx].targetScale
    });
  });
  
  dm.closing=true; dm.closingProg=0;
}

function animateClosing(){
  if(!dm.closing)return;
  dm.closingProg+=0.025;
  if(dm.closingProg>=1)dm.closingProg=1;
  var p=eIO(dm.closingProg);
  var fd=dm.floor;
  
  // Update target positions every frame to track floor rotation
  fd.group.updateMatrixWorld(true);
  dm.closingAnimData.forEach(function(ad,idx){
    var panel = fd.panels[idx];
    var wp=new THREE.Vector3(),wq=new THREE.Quaternion(),ws=new THREE.Vector3();
    panel.mesh.getWorldPosition(wp);panel.mesh.getWorldQuaternion(wq);panel.mesh.getWorldScale(ws);
    ad.targetPos=wp; ad.targetQuat=wq; ad.targetScale=ws;
  });
  
  dm.closingAnimData.forEach(function(ad,idx){
    var t=dm.closingTemps[idx];if(!t||!t.plane)return;
    t.plane.position.lerpVectors(ad.startPos,ad.targetPos,p);
    t.plane.quaternion.slerpQuaternions(ad.startQuat,ad.targetQuat,p);
    t.plane.scale.lerpVectors(ad.startScale,ad.targetScale,p);
    t.edge.position.copy(t.plane.position);t.edge.quaternion.copy(t.plane.quaternion);t.edge.scale.copy(t.plane.scale);
    
    // Morph back to floor radius
    morphTo(t.plane,1-p);
  });
  
  // Animate button closing (shrink back toward ring in first half)
  if(dm.closingStarTemps && dm.closingStarTemps.length > 0){
    // Update targets to track wheel rotation
    if(fd.glassRing){
      fd.group.updateMatrixWorld(true);
      var crWP = new THREE.Vector3();
      fd.glassRing.getWorldPosition(crWP);
      var crR = fd.glassRing.userData.ringRadius || 1.8;
      for(var csi = 0; csi < dm.closingStarTemps.length; csi++){
        var csad = dm.closingStarAnimData[csi];
        var sa2 = csi * (Math.PI * 2 / 3);
        csad.targetPos = new THREE.Vector3(crWP.x+Math.sin(sa2)*crR, crWP.y, crWP.z+Math.cos(sa2)*crR);
      }
    }
    // Buttons reach ring positions at p=0.5
    var btnCloseP = Math.min(p / 0.5, 1.0);
    for(var csi2 = 0; csi2 < dm.closingStarTemps.length; csi2++){
      var csad2 = dm.closingStarAnimData[csi2];
      var cst = dm.closingStarTemps[csi2];
      cst.position.lerpVectors(csad2.startPos, csad2.targetPos, btnCloseP);
      cst.quaternion.slerpQuaternions(csad2.startQuat, csad2.targetQuat, btnCloseP);
      cst.scale.lerpVectors(csad2.startScale, csad2.targetScale, btnCloseP);
      // Hide buttons once they've merged into the ring blobs
      cst.visible = (btnCloseP < 1.0);
    }
  }
  // Reverse-morph glass ring from 3 blobs back to torus
  if(fd.glassRing){
    fd.glassRing.visible = true;
    var ringMesh2 = fd.glassRing.userData.glassMesh;
    if(ringMesh2 && ringMesh2.material.uniforms.morph){
      // Ring un-morphs during the second half (p 0.5..1.0 → morph 1..0)
      var ringP2 = Math.max((p - 0.5) / 0.5, 0.0);
      ringMesh2.material.uniforms.morph.value = 1.0 - ringP2;
      ringMesh2.material.uniforms.opacity.value = 1.0;
    }
  }

  if(fd&&fd.rings){
    var sa=1.25,vo=0.5;
    fd.rings.top.forEach(function(rg,i){var op=dm.origState.rtp[i];if(!op)return;rg.position.y=(op.y+vo)+(op.y-(op.y+vo))*p;var os=dm.origState.rts[i];rg.scale.set(sa+(os.x-sa)*p,1,sa+(os.x-sa)*p);});
    fd.rings.bottom.forEach(function(rg,i){var op=dm.origState.rbp[i];if(!op)return;rg.position.y=(op.y-vo)+(op.y-(op.y-vo))*p;var os=dm.origState.rbs[i];rg.scale.set(sa+(os.x-sa)*p,1,sa+(os.x-sa)*p);});
  }

  if(dm.closingProg>=1){
    dm.closing=false;
    // Clean panel temps
    dm.closingTemps.forEach(function(t){if(t.plane)scene.remove(t.plane);if(t.edge)scene.remove(t.edge);});
    dm.closingTemps=[];dm.closingAnimData=[];

    // Re-attach nodes back to ring and restore
    if(dm.closingStarTemps && fd.glassRing){
      var rr = fd.glassRing.userData.ringRadius || 1.8;
      dm.closingStarTemps.forEach(function(cst2, ci){
        cst2.layers.disable(1);
        cst2.traverse(function(c){c.layers.disable(1);});
        scene.remove(cst2);
        var na = ci * (Math.PI * 2 / 3);
        cst2.position.set(Math.sin(na) * rr, 0, Math.cos(na) * rr);
        cst2.rotation.set(0, na, 0);
        cst2.scale.set(1, 1, 1);
        fd.glassRing.add(cst2);
      });
      if(!fd.glassRing.userData.nodes) fd.glassRing.userData.nodes = [];
      fd.glassRing.userData.nodes = dm.closingStarTemps.slice();
      dm.closingStarTemps=[];dm.closingStarAnimData=[];
    } else if(dm.closingStarTemps){
      dm.closingStarTemps.forEach(function(cst2){
        cst2.layers.disable(1);
        cst2.traverse(function(c){c.layers.disable(1);});
        scene.remove(cst2);
      });
      dm.closingStarTemps=[];dm.closingStarAnimData=[];
    }
    if(fd.glassRing){
      fd.glassRing.visible = true;
      var rmesh = fd.glassRing.userData.glassMesh;
      if(rmesh && rmesh.material.uniforms.opacity) rmesh.material.uniforms.opacity.value = 1.0;
      if(rmesh && rmesh.material.uniforms.morph) rmesh.material.uniforms.morph.value = 0.0;
    }
    dm.starOrigVis = [];

    // Show originals and force-reset positions/scales
    dm.origPanelData.forEach(function(data){
      data.panel.mesh.visible=data.vis;data.panel.edges.visible=data.eVis;
      data.panel.mesh.position.copy(data.pos);data.panel.mesh.rotation.copy(data.rot);data.panel.mesh.scale.copy(data.scl);
      data.panel.edges.position.copy(data.ePos);data.panel.edges.rotation.copy(data.eRot);data.panel.edges.scale.copy(data.eScl);
      morphTo(data.panel.mesh, 0);
      data.panel.mesh.material.userData.imgRotation.value = 0.0;
      data.panel.mesh.material.userData.imgRotationTarget = 0.0;
      data.panel.mesh.material.userData.flatten.value = 0.0;
      data.panel.mesh.material.userData.splitGap.value = 0.0;
    });

    if(dm.displayPlane){scene.remove(dm.displayPlane);dm.displayPlane=null;}
    if(dm.displayEdges){scene.remove(dm.displayEdges);dm.displayEdges=null;}
    if(dm.vWheel){scene.remove(dm.vWheel);dm.vWheel=null;}
    if(fd&&fd.group){var pf=0.015;fd.group.userData.velocity+=((dm.floorIdx===1||dm.floorIdx===3)?-pf:pf);}

    dm.active=false;dm.floorIdx=-1;dm.floor=null;dm.selIdx=-1;
    dm.animProg=0;dm.animating=false;dm.vwVel=0.0025;dm.draggingVW=false;dm.vwSide=null;
    dm.origState={};dm.animData=[];dm.origPanelData=[];dm.displayTemp=null;
    dm.dmButtons=[];dm.starTemps=[];dm.starAnimData=[];dm.starIcons=[];

    // If a new section was queued while closing, open it now
    if(dm.queuedOpen){
      var q=dm.queuedOpen;dm.queuedOpen=null;
      enterDM(q.fd,q.pi,q.fi);
    }
  }
}

// ══════════════════════════════════════════════
// DISPLAY PANEL FLATTEN + SPLIT ANIMATION
// ══════════════════════════════════════════════
var displayAnim = {
  active: false,
  phase: 'idle', // 'flatten', 'split', 'backdrop', 'idle', 'retract', 'unsplit', 'unflatten'
  prog: 0,
  backdrop: null,
  origPos: null,
  origScale: null,
  origEdgePos: null,
  origEdgeScale: null,
  btnOrigPositions: [],
  pendingExit: false,
  queuedSwitchIdx: -1
};

// ══════════════════════════════════════════════
// IMAGE LIGHTBOX — fullscreen view of the product image, triggered by clicking
// it while in display mode. The X button moves to top-right; the other two
// buttons fly to the bottom (and become alt-image thumbnail slots in a follow-up).
// ══════════════════════════════════════════════
var imgLightbox = {
  active: false, entering: false, exiting: false, prog: 0,
  imgOrigPos: null, imgOrigScale: null,
  shadowOrigPos: null, shadowOrigScale: null,
  btnOrigPos: [], btnOrigScale: [],
  savedScrollY: -1,
  // Pinch-zoom + free-pan editing state. `tgt*` is what the user sets via touch/wheel;
  // current values lerp toward the targets. `lastInteract` powers the 5-second hold
  // before the image snaps back to its default centered/unzoomed pose.
  zoomScale: 1.0, tgtZoom: 1.0,
  panX: 0, panY: 0, tgtPanX: 0, tgtPanY: 0,
  lastInteract: 0,
  pinchStartDist: 0, pinchStartZoom: 1.0,
  pinchStartMidX: 0, pinchStartMidY: 0,
  panStartX: 0, panStartY: 0,
  panStartTouchX: 0, panStartTouchY: 0,
  twoFingerActive: false,
  touchMode: null  // 'pan' | 'barScroll' (set on touchstart by classifyLightboxTouch)
};

// Clamp pan so the image's bounding box can't pull past the screen edges. When the
// image is smaller than the screen along an axis (i.e. zoom hasn't grown it past that
// dimension yet), pan along that axis is locked to 0.
function clampLightboxPan(){
  var lbCFov = camera.fov * Math.PI / 180;
  var lbCHalfH = Math.tan(lbCFov / 2) * 3.5;
  var lbCHalfW = lbCHalfH * camera.aspect;
  var lbImgHalf = (lbCHalfH * 1.275 * imgLightbox.tgtZoom) / 2;
  var lbMaxPanX = Math.max(0, lbImgHalf - lbCHalfW);
  var lbMaxPanY = Math.max(0, lbImgHalf - lbCHalfH);
  if(imgLightbox.tgtPanX >  lbMaxPanX) imgLightbox.tgtPanX =  lbMaxPanX;
  if(imgLightbox.tgtPanX < -lbMaxPanX) imgLightbox.tgtPanX = -lbMaxPanX;
  if(imgLightbox.tgtPanY >  lbMaxPanY) imgLightbox.tgtPanY =  lbMaxPanY;
  if(imgLightbox.tgtPanY < -lbMaxPanY) imgLightbox.tgtPanY = -lbMaxPanY;
}

function enterImgLightbox(){
  if(imgLightbox.active || imgLightbox.entering) return;
  if(!dm.active || !displayAnim.backdrop || !displayAnim.backdrop.userData.imgMesh) return;
  var imgMesh = displayAnim.backdrop.userData.imgMesh;
  var shadowMesh = displayAnim.backdrop.userData.shadowMesh;
  imgLightbox.imgOrigPos = imgMesh.position.clone();
  imgLightbox.imgOrigScale = imgMesh.scale.clone();
  if(shadowMesh){
    imgLightbox.shadowOrigPos = shadowMesh.position.clone();
    imgLightbox.shadowOrigScale = shadowMesh.scale.clone();
  }
  // Snapshot the buttons' current world positions; we'll lerp from these
  // toward camera-relative lightbox anchors each frame.
  imgLightbox.btnOrigPos = dm.starTemps.map(function(b){ return b.position.clone(); });
  imgLightbox.btnOrigScale = dm.starTemps.map(function(b){ return b.scale.clone(); });
  // Enable layer 1 on the buttons and the product image so they render in the
  // post-process-free overlay pass — skipping both chromatic aberration and bgBlur.
  for(var lbI = 0; lbI < dm.starTemps.length; lbI++){
    dm.starTemps[lbI].layers.enable(1);
    dm.starTemps[lbI].traverse(function(c){c.layers.enable(1);});
  }
  imgMesh.layers.enable(1);
  imgMesh.traverse(function(c){c.layers.enable(1);});
  // Cart icon stays on layer 1 (sharp on top) so the user can still see and tap it
  // through the lightbox. The hide-during-FBO-capture path below skips it so it
  // doesn't double-render or end up inside the bgBlur.
  // Lock the page in place so the user can't scroll the camera while the lightbox is open
  imgLightbox.savedScrollY = window.pageYOffset;
  touchScroll.scrollMomentum = 0;
  // Reset zoom/pan state so each lightbox session starts at the default centered pose.
  // lastInteract is set into the future so the snap-back timer doesn't trigger before
  // the user has actually touched anything.
  imgLightbox.zoomScale = 1.0; imgLightbox.tgtZoom = 1.0;
  imgLightbox.panX = 0; imgLightbox.tgtPanX = 0;
  imgLightbox.panY = 0; imgLightbox.tgtPanY = 0;
  imgLightbox.lastInteract = performance.now() + 1e9;
  imgLightbox.twoFingerActive = false;
  imgLightbox.touchMode = null;
  // Spawn the horizontal image-carousel bar
  if(dm.floorIdx >= 0 && dm.selIdx >= 0){
    var lbFcAib = PRODUCT_DATA.floors[dm.floorIdx];
    if(lbFcAib && lbFcAib.products[dm.selIdx]) showAltImgBar(lbFcAib.products[dm.selIdx]);
  }
  // Unfold the nav menu into a glass bar showing the product name
  var lbProdName = '';
  if(dm.floorIdx >= 0 && dm.selIdx >= 0){
    var lbFc = PRODUCT_DATA.floors[dm.floorIdx];
    if(lbFc && lbFc.products[dm.selIdx]) lbProdName = (lbFc.products[dm.selIdx].name || '').toUpperCase();
  }
  enterNavBarMode(lbProdName);
  imgLightbox.entering = true;
  imgLightbox.prog = 0;
}

function exitImgLightbox(){
  if(!imgLightbox.active && !imgLightbox.entering) return;
  if(imgLightbox.entering){ imgLightbox.entering = false; }
  imgLightbox.exiting = true;
  // Snap zoom + pan back to defaults as we exit
  imgLightbox.tgtZoom = 1.0;
  imgLightbox.tgtPanX = 0;
  imgLightbox.tgtPanY = 0;
  imgLightbox.lastInteract = performance.now() + 1e9;
  imgLightbox.twoFingerActive = false;
  // Fold the nav bar back to the icon in lockstep with the lightbox shrinking
  exitNavBarMode();
}

function animateImgLightbox(dt){
  if(!imgLightbox.entering && !imgLightbox.exiting && !imgLightbox.active) return;

  if(imgLightbox.entering){
    imgLightbox.prog = Math.min(imgLightbox.prog + 0.04, 1);
    if(imgLightbox.prog >= 1){
      imgLightbox.entering = false;
      imgLightbox.active = true;
    }
  } else if(imgLightbox.exiting){
    imgLightbox.prog = Math.max(imgLightbox.prog - 0.04, 0);
  }

  // Track the lightbox open progress on the carousel bar and position it each frame
  altImgBar.prog = imgLightbox.prog;
  positionAltImgBar();

  var p = eIO(imgLightbox.prog);
  if(!displayAnim.backdrop) return;
  var imgMesh = displayAnim.backdrop.userData.imgMesh;
  var shadowMesh = displayAnim.backdrop.userData.shadowMesh;
  if(!imgMesh || !imgMesh.parent || !imgLightbox.imgOrigPos) return;

  var dist = 3.5;
  var fovRad = camera.fov * Math.PI / 180;
  var halfH = Math.tan(fovRad / 2) * dist;
  var halfW = halfH * camera.aspect;
  var camFwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  var camRight = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
  var camUp = new THREE.Vector3(0,1,0).applyQuaternion(camera.quaternion);
  // Centered, then nudged up a hair so the image sits above the alt-image carousel
  // instead of competing with it for the visual center.
  var camCenter = camera.position.clone()
    .add(camFwd.clone().multiplyScalar(dist))
    .add(camUp.clone().multiplyScalar(halfH * 0.08));

  // Drive zoom + pan toward their targets. After 5 seconds without interaction the
  // targets snap back to the default centered/unzoomed pose, and the values lerp there.
  var nowLb = performance.now();
  if(nowLb > imgLightbox.lastInteract + 5000){
    imgLightbox.tgtZoom = 1.0;
    imgLightbox.tgtPanX = 0;
    imgLightbox.tgtPanY = 0;
  }
  imgLightbox.zoomScale += (imgLightbox.tgtZoom - imgLightbox.zoomScale) * 0.15;
  imgLightbox.panX += (imgLightbox.tgtPanX - imgLightbox.panX) * 0.15;
  imgLightbox.panY += (imgLightbox.tgtPanY - imgLightbox.panY) * 0.15;

  // ── Image: lerp local position toward "centered in front of camera" + pan offset
  var plane = imgMesh.parent;
  var localCenter = plane.worldToLocal(camCenter.clone());
  imgMesh.position.lerpVectors(imgLightbox.imgOrigPos, localCenter, p);
  imgMesh.position.x += imgLightbox.panX * p;
  imgMesh.position.y += imgLightbox.panY * p;

  // Scale up so image fills ~64% of viewport height (75% of the previous 1.7×halfH target)
  var planeWorldScale = new THREE.Vector3();
  plane.getWorldScale(planeWorldScale);
  var targetWorldHeight = halfH * 1.275;
  var imgBaseSize = PLANE_WIDTH * 0.95; // matches the geometry constructor
  var targetLocalScale = targetWorldHeight / Math.max(planeWorldScale.y * imgBaseSize, 0.001);
  var origLocalScale = imgLightbox.imgOrigScale.x;
  var sFinal = origLocalScale + (targetLocalScale - origLocalScale) * p;
  // Apply user zoom — only at full p so it doesn't fight the entry animation
  sFinal *= 1 + (imgLightbox.zoomScale - 1) * p;
  imgMesh.scale.set(sFinal, sFinal, 1);

  if(shadowMesh && imgLightbox.shadowOrigPos){
    shadowMesh.position.lerpVectors(imgLightbox.shadowOrigPos, localCenter, p);
    shadowMesh.scale.set(sFinal * 1.05, sFinal * 1.05, 1);
    // Fade the silhouette shadow out — it has no business being visible behind the lightbox image
    if(shadowMesh.material.uniforms.opacity){
      shadowMesh.material.uniforms.opacity.value = 1.0 - p;
    }
  }

  // ── Buttons: lerp from snapshotted world positions to camera-relative anchors
  if(dm.starTemps && dm.starTemps.length === 3 && imgLightbox.btnOrigPos.length === 3){
    var btnDist = 3.8;
    var bHalfH = Math.tan(fovRad/2) * btnDist;
    var bHalfW = bHalfH * camera.aspect;
    var bCamCenter = camera.position.clone().add(camFwd.clone().multiplyScalar(btnDist));
    // X uses absolute margin in world units (not an NDC factor) so the corner buttons
    // stay clear of the screen edge on portrait phones — at aspect ≈ 0.55 the old
    // 0.88×bHalfW factor would push the button's circle past the visible area. The
    // margin is small (0.06) so the buttons hug their corners tightly. Y is back to an
    // NDC factor: X close at the top corner (button sits flush in the top-right), and
    // the bottom cart/expand buttons sit higher up — clear of the bar at the bottom.
    var btnRadius = 0.6;
    var btnEdgeMargin = 0.06;
    var rightX =  bHalfW - btnRadius - btnEdgeMargin;
    var leftX  = -bHalfW + btnRadius + btnEdgeMargin;
    var bottomY = -bHalfH * 0.55;
    var topY    =  bHalfH * 0.68;
    var targets = [
      // 0 = add-to-cart → bottom-left corner
      bCamCenter.clone().add(camRight.clone().multiplyScalar(leftX)).add(camUp.clone().multiplyScalar(bottomY)),
      // 1 = close (X) → top-right corner
      bCamCenter.clone().add(camRight.clone().multiplyScalar(rightX)).add(camUp.clone().multiplyScalar(topY)),
      // 2 = expand → bottom-right corner
      bCamCenter.clone().add(camRight.clone().multiplyScalar(rightX)).add(camUp.clone().multiplyScalar(bottomY))
    ];
    for(var b = 0; b < 3; b++){
      if(!dm.starTemps[b]) continue;
      dm.starTemps[b].position.lerpVectors(imgLightbox.btnOrigPos[b], targets[b], p);
      if(imgLightbox.btnOrigScale[b]){
        var sOrig = imgLightbox.btnOrigScale[b];
        var sFactor = 1.0 - p * 0.5; // 1.0 (DM) → 0.5 (lightbox)
        dm.starTemps[b].scale.set(sOrig.x * sFactor, sOrig.y * sFactor, sOrig.z * sFactor);
      }
    }
  }

  // Cleanup once the exit animation finishes
  if(imgLightbox.exiting && imgLightbox.prog <= 0){
    imgLightbox.exiting = false;
    imgLightbox.active = false;
    imgMesh.position.copy(imgLightbox.imgOrigPos);
    imgMesh.scale.copy(imgLightbox.imgOrigScale);
    if(shadowMesh && imgLightbox.shadowOrigPos){
      shadowMesh.position.copy(imgLightbox.shadowOrigPos);
      shadowMesh.scale.copy(imgLightbox.shadowOrigScale);
      if(shadowMesh.material.uniforms.opacity){
        shadowMesh.material.uniforms.opacity.value = 1.0;
      }
    }
    if(dm.starTemps){
      for(var b2 = 0; b2 < 3; b2++){
        if(!dm.starTemps[b2]) continue;
        if(imgLightbox.btnOrigPos[b2]) dm.starTemps[b2].position.copy(imgLightbox.btnOrigPos[b2]);
        if(imgLightbox.btnOrigScale[b2]) dm.starTemps[b2].scale.copy(imgLightbox.btnOrigScale[b2]);
        dm.starTemps[b2].layers.disable(1);
        dm.starTemps[b2].traverse(function(c){c.layers.disable(1);});
      }
    }
    if(imgMesh){
      imgMesh.layers.disable(1);
      imgMesh.traverse(function(c){c.layers.disable(1);});
    }
    imgLightbox.savedScrollY = -1;
    imgLightbox.imgOrigPos = null;
    imgLightbox.imgOrigScale = null;
    imgLightbox.shadowOrigPos = null;
    imgLightbox.shadowOrigScale = null;
    imgLightbox.btnOrigPos = [];
    imgLightbox.btnOrigScale = [];
    hideAltImgBar();
    disposeAltImgBar();
  }
}

// ══════════════════════════════════════════════
// ALT IMAGE BAR (horizontal carousel beneath the lightbox image)
// Modeled on the cart panel: a single glass plate with a recessed indent zone
// between two raised borders. The borders carry left/right arrow buttons; the
// indent holds horizontally-scrolling product-image thumbnails. The first three
// thumbs are fully visible and the fourth is half-cut by the right border so
// the scroll affordance is obvious.
// ══════════════════════════════════════════════
var altImgBar = {
  group: null, glassMesh: null,
  arrowL: null, arrowR: null,
  thumbsGroup: null, thumbs: [],
  active: false, prog: 0,
  scrollX: 0, tgtScrollX: 0, scrollMax: 0,
  dragging: false, dragStartTouchX: 0, dragStartScroll: 0,
  barW: 0, barH: 0, indentL: 0, indentR: 0,
  thumbSize: 0, thumbGap: 0,
  imgSrcs: [], activeImgIdx: 0
};

var altImgClipPlanes = [
  new THREE.Plane(new THREE.Vector3(-1, 0, 0), 0),
  new THREE.Plane(new THREE.Vector3( 1, 0, 0), 0)
];
var _aibV3a = new THREE.Vector3();
var _aibV3b = new THREE.Vector3();
var _aibQuat = new THREE.Quaternion();
var _aibRight = new THREE.Vector3();

function buildAltImgBarGlassMesh(width, height, indentL, indentR){
  var hw = width / 2, hh = height / 2;
  var geo = new THREE.PlaneGeometry(width, height, 60, 16);
  var pos = geo.attributes.position;
  for(var j = 0; j < pos.count; j++){
    var px = pos.array[j*3], py = pos.array[j*3+1];
    var md = Math.min(Math.abs(px - hw), Math.abs(px + hw), Math.abs(py - hh), Math.abs(py + hh));
    if(md < 0.12) pos.array[j*3+2] = -0.05 * (1 - md/0.12) * (1 - md/0.12);
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();

  var mat = new THREE.ShaderMaterial({
    uniforms: {
      tBg: {value: glassFBO ? glassFBO.texture : null},
      res: {value: new THREE.Vector2(window.innerWidth, window.innerHeight)},
      rW: {value: hw}, rH: {value: hh},
      indentL: {value: indentL}, indentR: {value: indentR},
      indentDepth: {value: 0.05},
      time: {value: 0},
      tScratch: {value: generateScratchTexture()},
      tFrost: {value: generateFrostTexture()},
      blurAmt: {value: 2.5},
      opacity: {value: 1.0}
    },
    vertexShader: [
      'uniform float indentL, indentR, indentDepth;',
      'varying vec3 vN, vV, vLP;',
      'varying vec2 vUv;',
      'void main(){',
      '  vec3 pos = position;',
      '  float lf = step(indentL, position.x);',
      '  float rf = 1.0 - step(indentR, position.x);',
      '  float indentMask = lf * rf;',
      '  pos.z -= indentMask * indentDepth;',
      '  vLP = pos; vUv = uv;',
      '  vec4 mv = modelViewMatrix * vec4(pos, 1.0);',
      '  vN = normalize(normalMatrix * normal);',
      '  vV = normalize(-mv.xyz);',
      '  gl_Position = projectionMatrix * mv;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform sampler2D tBg, tScratch, tFrost;',
      'uniform vec2 res;',
      'uniform float rW, rH, indentL, indentR, time, blurAmt, opacity;',
      'varying vec3 vN, vV, vLP;',
      'varying vec2 vUv;',
      GLARE_GLSL_FUNCS,
      'float sdRRect(vec2 p, vec2 b, float r){',
      '  vec2 d = abs(p) - b + r;',
      '  return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0) - r;',
      '}',
      'vec3 blurredSample(vec2 uv){',
      '  vec2 b = blurAmt / res;',
      '  vec3 c = texture2D(tBg, uv).rgb * 0.20;',
      '  c += texture2D(tBg, uv + vec2( b.x, 0.0)).rgb * 0.13;',
      '  c += texture2D(tBg, uv + vec2(-b.x, 0.0)).rgb * 0.13;',
      '  c += texture2D(tBg, uv + vec2(0.0,  b.y)).rgb * 0.13;',
      '  c += texture2D(tBg, uv + vec2(0.0, -b.y)).rgb * 0.13;',
      '  c += texture2D(tBg, uv + vec2( b.x,  b.y)).rgb * 0.07;',
      '  c += texture2D(tBg, uv + vec2( b.x, -b.y)).rgb * 0.07;',
      '  c += texture2D(tBg, uv + vec2(-b.x,  b.y)).rgb * 0.07;',
      '  c += texture2D(tBg, uv + vec2(-b.x, -b.y)).rgb * 0.07;',
      '  return c;',
      '}',
      'void main(){',
      '  vec3 N = normalize(vN); vec3 V = normalize(vV);',
      '  float sd = sdRRect(vLP.xy, vec2(rW, rH), 0.12);',
      '  float edge = fwidth(sd) * 1.5;',
      '  float alpha = 1.0 - smoothstep(-edge, edge, sd);',
      '  if(alpha < 0.01) discard;',
      '  float glow = smoothstep(edge*4.0, 0.0, abs(sd)) * 0.5;',
      '  vec2 suv = gl_FragCoord.xy / res;',
      '  vec2 refr = N.xy * 0.15;',
      '  refr += 0.003 * vec2(sin(time*1.5 + suv.y*8.0), cos(time*1.2 + suv.x*8.0));',
      '  float ef = 1.0 - abs(dot(V, N));',
      '  float ca = 0.23 * (0.3 + ef * 2.5);',
      '  vec2 ru = suv + refr*(1.0+ca), gu = suv + refr, bu = suv + refr*(1.0-ca);',
      '  float r = blurredSample(ru).r;',
      '  float g = blurredSample(gu).g;',
      '  float b = blurredSample(bu).b;',
      '  vec3 col = vec3(r, g, b) * 0.92;',
      '  float fresnel = pow(1.0 - max(dot(V,N), 0.0), 2.0) * 0.15;',
      '  col = mix(col, vec3(0.95, 0.96, 0.98), fresnel * 0.1);',
      '  col += vec3(0.7, 0.75, 0.9) * glow * 0.3;',
      GLASS_TINT_GLSL,
      GLARE_GLSL_CALC,
      '  col += glareResult;',
      // Indent zone: frosted light-blue tint + slight darken (matches the cart well)
      '  float vlf = step(indentL, vLP.x);',
      '  float vrf = 1.0 - step(indentR, vLP.x);',
      '  float darkMask = vlf * vrf;',
      '  col = mix(col, vec3(0.78, 0.84, 0.93), darkMask * 0.45);',
      '  col *= mix(1.0, 0.88, darkMask);',
      '  gl_FragColor = vec4(col, alpha * opacity);',
      '}'
    ].join('\n'),
    transparent: true, side: THREE.DoubleSide, depthWrite: true
  });
  var mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = 10;
  return mesh;
}

function buildAltImgArrowBtn(direction){
  var btnW = altImgBar.barH * 0.78;
  var btnH = altImgBar.barH * 0.78;
  var group = new THREE.Group();
  group.userData.actionId = direction === 'left' ? 'alt-img-prev' : 'alt-img-next';
  group.userData.clickable = true;
  group.userData.barArrow = true;

  // No glass highlight here — the arrow sits directly on the bar's own glass so the
  // border stays clean. An invisible plane behind the chevron picks up the raycast hit.
  var hitArea = new THREE.Mesh(
    new THREE.PlaneGeometry(btnW, btnH),
    new THREE.MeshBasicMaterial({transparent: true, opacity: 0, depthWrite: false, depthTest: false, side: THREE.DoubleSide})
  );
  hitArea.renderOrder = 19;
  group.add(hitArea);

  var canvas = document.createElement('canvas');
  canvas.width = 80; canvas.height = 80;
  var ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#3a4258';
  ctx.lineWidth = 7;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath();
  if(direction === 'left'){ ctx.moveTo(50, 22); ctx.lineTo(28, 40); ctx.lineTo(50, 58); }
  else { ctx.moveTo(30, 22); ctx.lineTo(52, 40); ctx.lineTo(30, 58); }
  ctx.stroke();
  var tex = new THREE.CanvasTexture(canvas); tex.needsUpdate = true;
  var icon = new THREE.Mesh(
    new THREE.PlaneGeometry(btnW * 0.7, btnH * 0.7),
    new THREE.MeshBasicMaterial({map: tex, transparent: true, side: THREE.DoubleSide, depthWrite: false, depthTest: false})
  );
  icon.renderOrder = 20; icon.position.z = 0.03;
  group.add(icon);
  return group;
}

function buildAltImgEmptySlot(){
  var size = altImgBar.thumbSize;
  var group = new THREE.Group();
  group.userData.emptySlot = true;
  // Same glass as filled thumbs but more frosted so it reads as "no image here yet"
  var bg = createPdvGlassPanel(size, size, 0.7, 0.06);
  bg.renderOrder = 12;
  bg.userData.noTint = true; // skip the dynamic icon contrast — these have no icon
  group.add(bg);
  return group;
}

function buildAltImgThumb(idx, src){
  var size = altImgBar.thumbSize;
  var group = new THREE.Group();
  group.userData.actionId = 'alt-img-thumb-' + idx;
  group.userData.clickable = true;
  group.userData.imgIdx = idx;

  var bg = createPdvGlassPanel(size, size, 0.4, 0.06);
  bg.renderOrder = 12;
  group.add(bg);

  var loader = new THREE.TextureLoader();
  var imgSrc = src;
  if(imgSrc.indexOf('http') !== 0 && imgSrc.indexOf('//') !== 0) imgSrc = 'product-images/' + imgSrc;
  loader.load(imgSrc, function(tex){
    tex.minFilter = THREE.LinearFilter; tex.magFilter = THREE.LinearFilter;
    var ar = tex.image.width / tex.image.height;
    var fw, fh;
    if(ar > 1){ fw = size * 0.82; fh = fw / ar; }
    else { fh = size * 0.82; fw = fh * ar; }
    var imgMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(fw, fh),
      new THREE.MeshBasicMaterial({map: tex, transparent: true, side: THREE.DoubleSide, depthWrite: false, depthTest: false})
    );
    imgMesh.renderOrder = 16; imgMesh.position.z = 0.04;
    imgMesh.material.clippingPlanes = altImgClipPlanes;
    imgMesh.material.clipShadows = false;
    group.add(imgMesh);
  });
  return group;
}

function applyAltImgClipping(obj){
  obj.traverse(function(child){
    if(child.material){
      child.material.clippingPlanes = altImgClipPlanes;
      child.material.clipShadows = false;
      if(child.material.isShaderMaterial){
        child.material.clipping = true;
        child.material.needsUpdate = true;
      }
    }
  });
}

function disposeAltImgBar(){
  if(!altImgBar.group) return;
  scene.remove(altImgBar.group);
  altImgBar.group.traverse(function(c){
    if(c.geometry) c.geometry.dispose();
    if(c.material){
      if(c.material.map) c.material.map.dispose();
      c.material.dispose();
    }
  });
  altImgBar.group = null;
  altImgBar.glassMesh = null;
  altImgBar.arrowL = null;
  altImgBar.arrowR = null;
  altImgBar.thumbsGroup = null;
  altImgBar.thumbs = [];
}

function buildAltImgBar(){
  disposeAltImgBar();
  if(!altImgBar.imgSrcs || altImgBar.imgSrcs.length < 2) return;

  var dist = 3.5;
  var fovRad = camera.fov * Math.PI / 180;
  var halfH = Math.tan(fovRad/2) * dist;
  var halfW = halfH * camera.aspect;
  // Bar height + arrow border width + thumb size are CONSTANT across screen sizes.
  // What changes is the indent length — wider screens get a longer indent, more thumbs
  // visible at once. Narrow phone screens make the bar flush with the screen edges.
  var barH = halfH * 0.22;
  var arrowAreaW = barH * 0.55;
  var thumbGap = barH * 0.10;
  var thumbSize = barH * 0.78;
  var indentPad = barH * 0.08;

  // Phone-portrait threshold: aspect < 0.65 → bar runs nearly edge to edge across the
  // bottom (very small inset so the rounded corners + arrow icons aren't clipped by
  // the physical screen edge / browser chrome). Wider screens get an adaptive bar
  // capped between a 5-thumb minimum and a sensible max.
  var isPhone = camera.aspect < 0.65;
  var screenEdgeMargin = 0.08; // world-unit margin from each screen edge in phone mode
  var minBarW = 5 * thumbSize + 4 * thumbGap + 2 * indentPad + 2 * arrowAreaW;
  var maxBarW = halfH * 3.0;
  var barW;
  if(isPhone){
    barW = halfW * 2 - screenEdgeMargin * 2;
  } else {
    var targetW = halfW * 1.4; // ~70% of screen width
    barW = Math.max(minBarW, Math.min(targetW, maxBarW));
  }

  var indentL = -barW/2 + arrowAreaW;
  var indentR =  barW/2 - arrowAreaW;
  altImgBar.barW = barW; altImgBar.barH = barH;
  altImgBar.indentL = indentL; altImgBar.indentR = indentR;
  altImgBar.thumbSize = thumbSize;
  altImgBar.thumbGap = thumbGap;

  var indentW = indentR - indentL;
  var contentW = indentW - 2 * indentPad;

  var group = new THREE.Group();
  altImgBar.group = group;

  var glass = buildAltImgBarGlassMesh(barW, barH, indentL, indentR);
  group.add(glass);
  altImgBar.glassMesh = glass;

  var arrowL = buildAltImgArrowBtn('left');
  arrowL.position.set(-barW/2 + arrowAreaW/2, 0, 0.02);
  group.add(arrowL);
  altImgBar.arrowL = arrowL;

  var arrowR = buildAltImgArrowBtn('right');
  arrowR.position.set( barW/2 - arrowAreaW/2, 0, 0.02);
  group.add(arrowR);
  altImgBar.arrowR = arrowR;

  var thumbsGroup = new THREE.Group();
