  thumbsGroup.position.set(0, 0, 0.05);
  group.add(thumbsGroup);
  altImgBar.thumbsGroup = thumbsGroup;

  // ALWAYS at least 5 slots in the bar regardless of image count — missing slots are
  // rendered as empty placeholder glass squares so the layout reads as a 5-thumb carousel.
  // If the product has more than 5 images, additional slots scroll into view.
  var lbN = altImgBar.imgSrcs.length;
  var slotCount = Math.max(5, lbN);
  var totalContent = slotCount * thumbSize + Math.max(0, slotCount - 1) * thumbGap;
  var firstX;
  if(totalContent <= contentW){
    firstX = -totalContent/2 + thumbSize/2;
    altImgBar.scrollMax = 0;
  } else {
    firstX = indentL + indentPad + thumbSize/2;
    altImgBar.scrollMax = totalContent - contentW;
  }
  for(var i = 0; i < slotCount; i++){
    var t;
    var isEmpty = i >= lbN;
    if(isEmpty) t = buildAltImgEmptySlot();
    else t = buildAltImgThumb(i, altImgBar.imgSrcs[i]);
    t.position.set(firstX + i * (thumbSize + thumbGap), 0, 0);
    thumbsGroup.add(t);
    altImgBar.thumbs.push({group: t, idx: i, empty: isEmpty});
  }
  applyAltImgClipping(thumbsGroup);
  altImgBar.scrollX = 0;
  altImgBar.tgtScrollX = 0;

  group.layers.enable(1);
  group.traverse(function(c){c.layers.enable(1);});
  group.visible = false;
  scene.add(group);
}

function updateAltImgClipPlanes(){
  if(!altImgBar.group) return;
  altImgBar.group.updateMatrixWorld(true);
  _aibV3a.set(altImgBar.indentL, 0, 0).applyMatrix4(altImgBar.group.matrixWorld);
  _aibV3b.set(altImgBar.indentR, 0, 0).applyMatrix4(altImgBar.group.matrixWorld);
  altImgBar.group.getWorldQuaternion(_aibQuat);
  _aibRight.set(1, 0, 0).applyQuaternion(_aibQuat);
  altImgClipPlanes[0].normal.copy(_aibRight).multiplyScalar(-1);
  altImgClipPlanes[0].constant = -altImgClipPlanes[0].normal.dot(_aibV3b);
  altImgClipPlanes[1].normal.copy(_aibRight);
  altImgClipPlanes[1].constant = -altImgClipPlanes[1].normal.dot(_aibV3a);
}

function positionAltImgBar(){
  if(!altImgBar.group) return;
  var dist = 3.5;
  var fovRad = camera.fov * Math.PI / 180;
  var halfH = Math.tan(fovRad/2) * dist;
  var camFwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  var camUp = new THREE.Vector3(0,1,0).applyQuaternion(camera.quaternion);
  // Flush with the bottom of the screen — the bar's bottom edge lands at y = -halfH,
  // so its center sits one half-height above that. In phone-portrait mode the bar is
  // already edge-to-edge horizontally (handled in buildAltImgBar), so this also makes
  // it flush with the bottom-left and bottom-right corners.
  var barCY = -halfH + altImgBar.barH / 2;
  var pos = camera.position.clone()
    .add(camFwd.clone().multiplyScalar(dist))
    .add(camUp.clone().multiplyScalar(barCY));
  altImgBar.group.position.copy(pos);
  altImgBar.group.quaternion.copy(camera.quaternion);

  // Update uniforms + opacity from prog
  if(altImgBar.glassMesh && altImgBar.glassMesh.material.uniforms){
    var u = altImgBar.glassMesh.material.uniforms;
    u.opacity.value = altImgBar.prog;
    u.time.value = performance.now() * 0.001;
    u.res.value.set(window.innerWidth * renderer.getPixelRatio(), window.innerHeight * renderer.getPixelRatio());
    if(glassFBO) u.tBg.value = glassFBO.texture;
  }

  // Lerp scroll toward target and clamp
  if(altImgBar.tgtScrollX < 0) altImgBar.tgtScrollX = 0;
  if(altImgBar.tgtScrollX > altImgBar.scrollMax) altImgBar.tgtScrollX = altImgBar.scrollMax;
  altImgBar.scrollX += (altImgBar.tgtScrollX - altImgBar.scrollX) * 0.18;
  if(altImgBar.thumbsGroup) altImgBar.thumbsGroup.position.x = -altImgBar.scrollX;

  // Indicate the active thumb by recessing it INTO the bar (negative z) and pinning
  // its glass hoverPress uniform high so it picks up the same dark blue mix the cart
  // icon shows when pressed. Empty placeholder slots can't be active.
  for(var i = 0; i < altImgBar.thumbs.length; i++){
    var ti = altImgBar.thumbs[i];
    var sel = !ti.empty && ti.idx === altImgBar.activeImgIdx;
    ti.group.position.z = sel ? -0.04 : 0;
    if(sel){
      ti.group.traverse(function(c){
        if(c.material && c.material.uniforms && c.material.uniforms.hoverPress){
          // Overrides the global hover/press lerp each frame — selected stays darker
          c.material.uniforms.hoverPress.value = 0.9;
        }
      });
    }
  }

  updateAltImgClipPlanes();
}

function showAltImgBar(product){
  var srcs = [];
  if(product.image) srcs.push(product.image);
  if(product.backImage && srcs.indexOf(product.backImage) === -1) srcs.push(product.backImage);
  if(product.images){
    for(var i = 0; i < product.images.length; i++){
      if(srcs.indexOf(product.images[i]) === -1) srcs.push(product.images[i]);
    }
  }
  altImgBar.imgSrcs = srcs;
  altImgBar.activeImgIdx = 0;
  buildAltImgBar();
  if(altImgBar.group){
    altImgBar.group.visible = true;
    altImgBar.active = true;
    altImgBar.prog = 0;
  }
}

function hideAltImgBar(){
  if(altImgBar.group) altImgBar.group.visible = false;
  altImgBar.active = false;
  altImgBar.prog = 0;
  altImgBar.dragging = false;
}

// Make sure the active thumb is inside the visible window. Only meaningful when there
// are more thumbs than fit (scrollMax > 0).
function altImgBarScrollActiveIntoView(){
  if(altImgBar.scrollMax <= 0) return;
  var ti = altImgBar.thumbs[altImgBar.activeImgIdx];
  if(!ti) return;
  var activeX = ti.group.position.x;
  var half = altImgBar.thumbSize / 2;
  var pad = altImgBar.thumbSize * 0.1;
  var leftEdge = altImgBar.tgtScrollX + altImgBar.indentL + pad;
  var rightEdge = altImgBar.tgtScrollX + altImgBar.indentR - pad;
  if(activeX - half < leftEdge){
    altImgBar.tgtScrollX = activeX - half - altImgBar.indentL - pad;
  } else if(activeX + half > rightEdge){
    altImgBar.tgtScrollX = activeX + half - altImgBar.indentR + pad;
  }
  if(altImgBar.tgtScrollX < 0) altImgBar.tgtScrollX = 0;
  if(altImgBar.tgtScrollX > altImgBar.scrollMax) altImgBar.tgtScrollX = altImgBar.scrollMax;
}

function setLightboxImageByIdx(idx){
  if(!altImgBar.imgSrcs || idx < 0 || idx >= altImgBar.imgSrcs.length) return;
  altImgBar.activeImgIdx = idx;
  var src = altImgBar.imgSrcs[idx];
  var bdImg = displayAnim.backdrop && displayAnim.backdrop.userData ? displayAnim.backdrop.userData.imgMesh : null;
  if(!bdImg) return;
  var loader = new THREE.TextureLoader();
  var imgSrc = src;
  if(imgSrc.indexOf('http') !== 0 && imgSrc.indexOf('//') !== 0) imgSrc = 'product-images/' + imgSrc;
  loader.load(imgSrc, function(tex){
    tex.minFilter = THREE.LinearFilter; tex.magFilter = THREE.LinearFilter;
    bdImg.material.uniforms.productTex.value = tex;
    bdImg.material.uniforms.productTexAspect.value = tex.image.width / tex.image.height;
    bdImg.material.needsUpdate = true;
  });
}

function altImgBarNext(){
  setLightboxImageByIdx(Math.min(altImgBar.imgSrcs.length - 1, altImgBar.activeImgIdx + 1));
  altImgBarScrollActiveIntoView();
}
function altImgBarPrev(){
  setLightboxImageByIdx(Math.max(0, altImgBar.activeImgIdx - 1));
  altImgBarScrollActiveIntoView();
}

// Given screen coords, returns which lightbox region the touch is on:
//   'barScroll' = inside the bar's indent zone (scroll the thumbs)
//   'barArrow'  = on one of the bar arrow buttons (handled via click in pUp)
//   'pan'       = anywhere else (pan the image or, if zoom==1, swipe to switch)
function classifyLightboxTouch(cx, cy){
  if(!altImgBar.active || !altImgBar.group || !altImgBar.glassMesh) return 'pan';
  mouse.x = (cx / renderer.domElement.clientWidth) * 2 - 1;
  mouse.y = -(cy / renderer.domElement.clientHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  if(altImgBar.arrowL){
    if(raycaster.intersectObjects(altImgBar.arrowL.children, true).length > 0) return 'barArrow';
  }
  if(altImgBar.arrowR){
    if(raycaster.intersectObjects(altImgBar.arrowR.children, true).length > 0) return 'barArrow';
  }
  var hits = raycaster.intersectObject(altImgBar.glassMesh);
  if(hits.length > 0){
    var lp = altImgBar.group.worldToLocal(hits[0].point.clone());
    if(lp.x > altImgBar.indentL && lp.x < altImgBar.indentR) return 'barScroll';
  }
  return 'pan';
}

function startDisplayAnim() {
  if(!dm.displayTemp || !dm.displayTemp.plane) return;
  var mat = dm.displayTemp.plane.material;
  mat.userData.flatten.value = 0.0;
  mat.userData.splitGap.value = 0.0;
  displayAnim.active = true;
  displayAnim.phase = 'flatten';
  displayAnim.prog = 0;

  // Save original positions for panel and edge
  displayAnim.origPos = dm.displayTemp.plane.position.clone();
  displayAnim.origScale = dm.displayTemp.plane.scale.clone();
  if(dm.displayTemp.edge) {
    displayAnim.origEdgePos = dm.displayTemp.edge.position.clone();
    displayAnim.origEdgeScale = dm.displayTemp.edge.scale.clone();
    dm.displayTemp.edge.visible = false; // hide outline during display anim
  }

  // Save original star button positions
  displayAnim.btnOrigPositions = [];
  for(var si = 0; si < dm.starTemps.length; si++) {
    displayAnim.btnOrigPositions.push(dm.starTemps[si].position.clone());
  }

  // Create backdrop — two wall halves sprouting from border inner edges + lips
  if(!displayAnim.backdrop) {
    var bdGroup = new THREE.Group();
    bdGroup.renderOrder = 2;

    // Stamp the canonical "fully grown backdrop" opacity (0.65) on each wall
    // so cart fly-ins always restore to the same value regardless of mid-flight
    // state — without this, rapid-fire adds capture the faded value and the
    // backdrop ghosts out completely after a few clicks.
    // Top wall half — grows downward from top border inner edge
    var topWall = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), createBackdropBlurMaterial());
    topWall.userData.restOpacity = 0.65;
    bdGroup.add(topWall);

    // Bottom wall half — grows upward from bottom border inner edge
    var botWall = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), createBackdropBlurMaterial());
    botWall.userData.restOpacity = 0.65;
    bdGroup.add(botWall);

    // Top lip — horizontal shelf from top border edge going back
    var topLip = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), createBackdropBlurMaterial());
    topLip.rotation.x = Math.PI / 2;
    topLip.userData.restOpacity = 0.65;
    bdGroup.add(topLip);

    // Bottom lip — horizontal shelf from bottom border edge going back
    var botLip = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), createBackdropBlurMaterial());
    botLip.rotation.x = -Math.PI / 2;
    botLip.userData.restOpacity = 0.65;
    bdGroup.add(botLip);

    bdGroup.userData = { topWall: topWall, botWall: botWall, topLip: topLip, botLip: botLip };
    bdGroup.visible = false;

    // Add as child of display temp so it tracks automatically in local space
    dm.displayTemp.plane.add(bdGroup);

    // Position at the panel face (flattenZ) in local space
    var fz = dm.displayTemp.plane.material.userData.flattenZ.value;
    bdGroup.position.set(0, 0, fz);

    displayAnim.backdrop = bdGroup;

    // Floating product image + silhouette shadow (sits at same Z as borders)
    var pUd = dm.displayTemp.plane.material.userData;
    var prodTex = pUd.productTex ? pUd.productTex.value : null;
    var prodAspect = pUd.productTexAspect ? pUd.productTexAspect.value : 1.0;
    if(prodTex) {
      // Shadow plane (behind image, dark silhouette)
      var shadowGeo = new THREE.PlaneGeometry(PLANE_WIDTH * 1.05, PLANE_WIDTH * 1.05);
      var shadowMat = createProductOverlayMaterial(prodTex, prodAspect, true);
      var shadowMesh = new THREE.Mesh(shadowGeo, shadowMat);
      shadowMesh.renderOrder = 50; // above backdrop walls, below the image
      // Position slightly behind the image with a subtle drop offset
      shadowMesh.position.set(0.06, -0.08, fz - 0.12);
      // Stamp canonical rest pose so cart fly-ins always restore to the same
      // values regardless of what state the image is in when a new add starts.
      shadowMesh.userData.restZ = fz - 0.12;
      shadowMesh.userData.restOpacity = 1.0;
      dm.displayTemp.plane.add(shadowMesh);

      // Product image plane (floats in front at same Z as borders)
      var imgGeo = new THREE.PlaneGeometry(PLANE_WIDTH * 0.95, PLANE_WIDTH * 0.95);
      var imgMat = createProductOverlayMaterial(prodTex, prodAspect, false);
      var imgMesh = new THREE.Mesh(imgGeo, imgMat);
      imgMesh.renderOrder = 5; // sits above backdrop walls but BELOW the lightbox UI (buttons + nav bar at renderOrder 10+)
      imgMesh.position.set(0, 0, fz + 0.005); // just in front of borders, same plane visually
      imgMesh.userData.restZ = fz + 0.005;
      imgMesh.userData.restOpacity = 1.0;
      dm.displayTemp.plane.add(imgMesh);

      bdGroup.userData.imgMesh = imgMesh;
      bdGroup.userData.shadowMesh = shadowMesh;
      // Initially invisible — fade in during backdrop phase
      imgMesh.visible = false;
      shadowMesh.visible = false;
    }
  }
}

function createProductOverlayMaterial(productTex, productTexAspect, isShadow) {
  return new THREE.ShaderMaterial({
    uniforms: {
      productTex: {value: productTex},
      productTexAspect: {value: productTexAspect},
      panelAspect: {value: 1.0},
      opacity: {value: 1.0}, // default to fully opaque
      distort: {value: 0.0}, // 0 = clean, 1 = fully distorted/glassy
      isShadow: {value: isShadow ? 1.0 : 0.0}
    },
    vertexShader: [
      'varying vec2 vUv;',
      'void main(){',
      '  vUv = uv;',
      '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform sampler2D productTex;',
      'uniform float productTexAspect, panelAspect, opacity, isShadow, distort;',
      'varying vec2 vUv;',
      'void main(){',
      '  vec2 uv = vUv;',
      '  float scale = productTexAspect / panelAspect;',
      '  if(scale > 1.0){ uv.y = (uv.y - 0.5) * scale + 0.5; }',
      '  else { uv.x = (uv.x - 0.5) / scale + 0.5; }',
      '  if(uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) discard;',
      '  // Glass distortion when fused into backdrop',
      '  if(distort > 0.001){',
      '    vec2 c = uv - 0.5;',
      '    float d = length(c);',
      '    float wave = sin(d * 30.0 - distort * 10.0) * 0.04 * distort;',
      '    uv += normalize(c + 0.0001) * wave;',
      '    uv = mix(uv, vec2(0.5), distort * 0.4);',
      '  }',
      '  vec4 t = texture2D(productTex, uv);',
      '  if(t.a < 0.5) discard;',
      '  if(isShadow > 0.5){',
      '    gl_FragColor = vec4(0.02, 0.04, 0.08, t.a * 0.55 * opacity);',
      '  } else {',
      '    gl_FragColor = vec4(t.rgb, opacity);',
      '  }',
      '}'
    ].join('\n'),
    transparent: true,
    alphaTest: !isShadow ? 0.5 : 0.0,        // discard transparent edges on the image for clean cutout
    // No depth interaction — render order decides stacking. The image sits below the
    // UI buttons + nav bar so they can always draw on top regardless of world depth.
    depthWrite: false,
    depthTest: false,
    side: THREE.DoubleSide
  });
}

function cleanupDisplayAnim() {
  // Restore original positions
  if(dm.displayTemp && dm.displayTemp.plane && displayAnim.origPos) {
    dm.displayTemp.plane.position.copy(displayAnim.origPos);
    dm.displayTemp.plane.scale.copy(displayAnim.origScale);
    if(dm.displayTemp.edge && displayAnim.origEdgePos) {
      dm.displayTemp.edge.position.copy(displayAnim.origEdgePos);
      dm.displayTemp.edge.scale.copy(displayAnim.origEdgeScale);
    }
  }
  // Restore star button positions
  if(dm.starTemps && displayAnim.btnOrigPositions.length > 0) {
    for(var ri = 0; ri < dm.starTemps.length && ri < displayAnim.btnOrigPositions.length; ri++) {
      dm.starTemps[ri].position.copy(displayAnim.btnOrigPositions[ri]);
    }
  }
  displayAnim.active = false;
  displayAnim.phase = 'idle';
  displayAnim.prog = 0;
  displayAnim.origPos = null;
  displayAnim.origScale = null;
  displayAnim.origEdgePos = null;
  displayAnim.origEdgeScale = null;
  displayAnim.btnOrigPositions = [];
  displayAnim.pendingExit = false;
  displayAnim.queuedSwitchIdx = -1;
  if(displayAnim.backdrop) {
    var bdImg = displayAnim.backdrop.userData ? displayAnim.backdrop.userData.imgMesh : null;
    var bdShadow = displayAnim.backdrop.userData ? displayAnim.backdrop.userData.shadowMesh : null;
    if(bdImg){ if(bdImg.parent) bdImg.parent.remove(bdImg); bdImg.geometry.dispose(); bdImg.material.dispose(); }
    if(bdShadow){ if(bdShadow.parent) bdShadow.parent.remove(bdShadow); bdShadow.geometry.dispose(); bdShadow.material.dispose(); }
    if(displayAnim.backdrop.parent) displayAnim.backdrop.parent.remove(displayAnim.backdrop);
    displayAnim.backdrop.traverse(function(child) {
      if(child.geometry) child.geometry.dispose();
      if(child.material) child.material.dispose();
    });
    displayAnim.backdrop = null;
  }
  // Reset uniforms on all panel materials
  if(dm.floor && dm.floor.panels) {
    dm.floor.panels.forEach(function(panel) {
      panel.mesh.material.userData.flatten.value = 0.0;
      panel.mesh.material.userData.splitGap.value = 0.0;
    });
  }
}

// Independent reverse animations (e.g. when switching panels mid-display)
var pendingReverses = [];

function forkDisplayAnimToReverse() {
  if(!dm.displayTemp || !dm.displayTemp.plane) return;
  if(!displayAnim.origPos && !displayAnim.backdrop) return;

  var srcPlane = dm.displayTemp.plane;
  var srcMat = srcPlane.material;
  var dtFlatten = srcMat.userData.flatten ? srcMat.userData.flatten.value : 0;
  var dtSplitGap = srcMat.userData.splitGap ? srcMat.userData.splitGap.value : 0;
  var dtFlattenZ = srcMat.userData.flattenZ ? srcMat.userData.flattenZ.value : 0;

  // Build isolated material clone with current uniform values
  var isoMat = srcMat.clone();
  isoMat.userData.flatten = {value: dtFlatten};
  isoMat.userData.splitGap = {value: dtSplitGap};
  isoMat.userData.flattenZ = {value: dtFlattenZ};
  for(var umk in srcMat.userData) {
    if(!isoMat.userData[umk]) {
      if(srcMat.userData[umk] && srcMat.userData[umk].value !== undefined) {
        isoMat.userData[umk] = {value: srcMat.userData[umk].value};
      } else {
        isoMat.userData[umk] = srcMat.userData[umk];
      }
    }
  }
  var srcOBC = srcMat.onBeforeCompile;
  isoMat.onBeforeCompile = function(shader) {
    srcOBC.call(isoMat, shader);
    for(var iuk in isoMat.userData) {
      if(isoMat.userData[iuk] && isoMat.userData[iuk].value !== undefined && shader.uniforms[iuk]) {
        shader.uniforms[iuk] = isoMat.userData[iuk];
      }
    }
  };
  isoMat.needsUpdate = true;

  // Clone plane mesh at current local position (parent is scene)
  var clonePlane = new THREE.Mesh(srcPlane.geometry.clone(), isoMat);
  clonePlane.userData = {};
  for(var udk in srcPlane.userData) clonePlane.userData[udk] = srcPlane.userData[udk];
  clonePlane.position.copy(srcPlane.position);
  clonePlane.quaternion.copy(srcPlane.quaternion);
  clonePlane.scale.copy(srcPlane.scale);
  scene.add(clonePlane);

  // Reparent backdrop from src plane to clone (so it tracks the reverse animation)
  if(displayAnim.backdrop) {
    if(displayAnim.backdrop.parent) displayAnim.backdrop.parent.remove(displayAnim.backdrop);
    clonePlane.add(displayAnim.backdrop);
  }
  // Reparent product image overlay + shadow to clone too
  if(displayAnim.backdrop && displayAnim.backdrop.userData){
    var bImg = displayAnim.backdrop.userData.imgMesh;
    var bShd = displayAnim.backdrop.userData.shadowMesh;
    if(bImg && bImg.parent){ bImg.parent.remove(bImg); clonePlane.add(bImg); }
    if(bShd && bShd.parent){ bShd.parent.remove(bShd); clonePlane.add(bShd); }
  }

  var startPhase = 'unflatten';
  if(displayAnim.backdrop && displayAnim.backdrop.visible) startPhase = 'retract';
  else if(dtSplitGap > 0) startPhase = 'unsplit';

  pendingReverses.push({
    plane: clonePlane,
    backdrop: displayAnim.backdrop,
    origPos: displayAnim.origPos ? displayAnim.origPos.clone() : srcPlane.position.clone(),
    origScale: displayAnim.origScale ? displayAnim.origScale.clone() : srcPlane.scale.clone(),
    floorIdx: dm.floorIdx,
    phase: startPhase,
    prog: 0
  });

  // Clear backdrop ref so cleanupDisplayAnim doesn't dispose it (clone now owns it)
  displayAnim.backdrop = null;
}

function animatePendingReverses() {
  for(var pri = pendingReverses.length - 1; pri >= 0; pri--) {
    var pr = pendingReverses[pri];
    var prSpeed = (pr.phase === 'unflatten') ? 0.21 : 0.07875;
    pr.prog += prSpeed;
    if(pr.prog > 1) pr.prog = 1;
    var prP = eIO(pr.prog);
    var prMat = pr.plane.material;

    if(pr.phase === 'retract') {
      if(pr.backdrop) {
        pr.backdrop.visible = true;
        var bdR = pr.backdrop.userData;
        var pWR = PLANE_WIDTH, dR = 0.35;
        var mSR = PLANE_WIDTH * 0.3;
        var gHR = mSR * (0.45 * PLANE_WIDTH + 1.0);
        var rdR = 1 - prP, opR = rdR * 0.65, wHR = gHR * rdR;
        bdR.topWall.position.set(0, gHR - wHR*0.5, -dR);
        bdR.topWall.scale.set(pWR, Math.max(wHR, 0.001), 1);
        bdR.topWall.material.uniforms.opacity.value = opR;
        bdR.botWall.position.set(0, -gHR + wHR*0.5, -dR);
        bdR.botWall.scale.set(pWR, Math.max(wHR, 0.001), 1);
        bdR.botWall.material.uniforms.opacity.value = opR;
        bdR.topLip.position.set(0, gHR, -dR*0.5);
        bdR.topLip.scale.set(pWR, dR, 1);
        bdR.topLip.material.uniforms.opacity.value = opR;
        bdR.botLip.position.set(0, -gHR, -dR*0.5);
        bdR.botLip.scale.set(pWR, dR, 1);
        bdR.botLip.material.uniforms.opacity.value = opR;
      }
      if(pr.prog >= 1) {
        if(pr.backdrop) pr.backdrop.visible = false;
        pr.phase = 'unsplit'; pr.prog = 0;
      }
    } else if(pr.phase === 'unsplit') {
      var mSU = PLANE_WIDTH * 0.3;
      var rdU = 1 - prP;
      prMat.userData.splitGap.value = rdU * mSU;
      if(pr.origPos) {
        var fwdU = rdU * 5.0;
        var scU = 1 + rdU * (-0.3);
        var isLU = pr.floorIdx===1||pr.floorIdx===3;
        var cpU = rdU * 1.8 * (isLU ? -1 : 1);
        pr.plane.position.z = pr.origPos.z + fwdU;
        pr.plane.position.x = pr.origPos.x + cpU;
        pr.plane.scale.set(pr.origScale.x * scU, pr.origScale.y * scU, pr.origScale.z);
      }
      if(pr.prog >= 1) {
        prMat.userData.splitGap.value = 0.0;
        if(pr.origPos) {
          pr.plane.position.copy(pr.origPos);
          pr.plane.scale.copy(pr.origScale);
        }
        pr.phase = 'unflatten'; pr.prog = 0;
        if(pr.backdrop) pr.backdrop.visible = false;
      }
    } else if(pr.phase === 'unflatten') {
      prMat.userData.flatten.value = 1 - prP;
      if(pr.prog >= 1) {
        prMat.userData.flatten.value = 0.0;
        prMat.userData.splitGap.value = 0.0;
        if(pr.backdrop) {
          var pImg = pr.backdrop.userData ? pr.backdrop.userData.imgMesh : null;
          var pShd = pr.backdrop.userData ? pr.backdrop.userData.shadowMesh : null;
          if(pImg){ if(pImg.parent) pImg.parent.remove(pImg); pImg.geometry.dispose(); pImg.material.dispose(); }
          if(pShd){ if(pShd.parent) pShd.parent.remove(pShd); pShd.geometry.dispose(); pShd.material.dispose(); }
          if(pr.backdrop.parent) pr.backdrop.parent.remove(pr.backdrop);
          pr.backdrop.traverse(function(ch){ if(ch.geometry)ch.geometry.dispose(); if(ch.material)ch.material.dispose(); });
        }
        scene.remove(pr.plane);
        if(pr.plane.geometry) pr.plane.geometry.dispose();
        if(pr.plane.material) pr.plane.material.dispose();
        pendingReverses.splice(pri, 1);
      }
    }
  }
}

function reverseDisplayAnim() {
  if(!displayAnim.active && !displayAnim.backdrop && !displayAnim.origPos) return;
  displayAnim.active = true;
  displayAnim.prog = 0;
  // Start at the appropriate reverse phase based on how far we got
  if(displayAnim.backdrop && displayAnim.backdrop.visible) {
    displayAnim.phase = 'retract'; // has backdrop, retract it first
  } else if(dm.displayTemp && dm.displayTemp.plane && dm.displayTemp.plane.material.userData.splitGap.value > 0) {
    displayAnim.phase = 'unsplit'; // has split, unsplit first
  } else {
    displayAnim.phase = 'unflatten'; // only flattened, just unflatten
  }
}

// ══════════════════════════════════════════════
// SWITCH PANEL ANIMATION
// ══════════════════════════════════════════════
var switchAnim = {
  active: false, prog: 0,
  oldIdx: -1, newIdx: -1,
  oldTemp: null, newTemp: null,
  oldStart: null, oldTarget: null,
  newStart: null, newTarget: null
};

function switchPanel(newIdx){
  var fd=dm.floor;if(!fd||switchAnim.active||dm.animating||dm.closing)return;

  // If display animation is expanded, play reverse first then switch (sequential)
  if(displayAnim.origPos || displayAnim.backdrop) {
    displayAnim.queuedSwitchIdx = newIdx;
    // Only kick off reverse if not already reversing
    var ph = displayAnim.phase;
    if(ph !== 'retract' && ph !== 'unsplit' && ph !== 'unflatten') {
      reverseDisplayAnim();
    }
    return;
  }

  performSwitchPanel(newIdx);
}

function performSwitchPanel(newIdx){
  var fd=dm.floor;if(!fd||switchAnim.active||dm.animating||dm.closing)return;

  // Reset display animation immediately (no-op if already reset)
  cleanupDisplayAnim();

  var oldIdx = dm.selIdx;
  switchAnim.oldIdx = oldIdx;
  switchAnim.newIdx = newIdx;
  
  // ── Old panel (display → vertical wheel slot) ──
  // Capture where the display temp currently is
  var owp=new THREE.Vector3(),owq=new THREE.Quaternion(),ows=new THREE.Vector3();
  dm.displayTemp.plane.getWorldPosition(owp);
  dm.displayTemp.plane.getWorldQuaternion(owq);
  dm.displayTemp.plane.getWorldScale(ows);
  switchAnim.oldStart = {pos:owp.clone(),quat:owq.clone(),scale:ows.clone()};
  
  // Target: where the old panel's slot is on the vertical wheel
  var oldPanel = fd.panels[oldIdx];
  // Temporarily make it visible to get its world position
  oldPanel.mesh.visible = true;
  dm.vWheel.updateMatrixWorld(true);
  var otp=new THREE.Vector3(),otq=new THREE.Quaternion(),ots=new THREE.Vector3();
  oldPanel.mesh.getWorldPosition(otp);
  oldPanel.mesh.getWorldQuaternion(otq);
  oldPanel.mesh.getWorldScale(ots);
  oldPanel.mesh.visible = false;
  switchAnim.oldTarget = {pos:otp.clone(),quat:otq.clone(),scale:ots.clone()};
  
  // Create temp for old panel animation (starts at floor morph, ends at vertical morph)
  var oldTempMesh = new THREE.Mesh(oldPanel.mesh.geometry.clone(), oldPanel.mesh.material);
  oldTempMesh.userData.floorPos = oldPanel.mesh.userData.floorPos;
  oldTempMesh.userData.vertPos = oldPanel.mesh.userData.vertPos;
  oldTempMesh.userData.borderIndices = oldPanel.mesh.userData.borderIndices;
  var oldLineGeo = new THREE.BufferGeometry();
  var oldLinePos = new Float32Array(oldPanel.mesh.userData.borderIndices.length*3);
  oldLineGeo.setAttribute('position', new THREE.BufferAttribute(oldLinePos,3));
  oldTempMesh.userData.lineGeo = oldLineGeo;
  morphTo(oldTempMesh, 0); // start at floor radius
  var oldTempEdge = new THREE.Line(oldLineGeo, new THREE.LineBasicMaterial({color:0x667788,transparent:true,opacity:0.35}));
  
  oldTempMesh.position.copy(owp);oldTempMesh.quaternion.copy(owq);oldTempMesh.scale.copy(ows);
  oldTempMesh.visible=true;
  oldTempEdge.position.copy(owp);oldTempEdge.quaternion.copy(owq);oldTempEdge.scale.copy(ows);
  oldTempEdge.visible=true;
  scene.add(oldTempMesh);scene.add(oldTempEdge);
  switchAnim.oldTemp = {plane:oldTempMesh, edge:oldTempEdge};
  
  // Hide the display temp
  dm.displayTemp.plane.visible = false;
  dm.displayTemp.edge.visible = false;
  
  // ── New panel (vertical wheel slot → display) ──
  var newPanel = fd.panels[newIdx];
  var nwp=new THREE.Vector3(),nwq=new THREE.Quaternion(),nws=new THREE.Vector3();
  newPanel.mesh.getWorldPosition(nwp);
  newPanel.mesh.getWorldQuaternion(nwq);
  newPanel.mesh.getWorldScale(nws);
  switchAnim.newStart = {pos:nwp.clone(),quat:nwq.clone(),scale:nws.clone()};
  
  // Target: display position
  switchAnim.newTarget = {pos:owp.clone(),quat:owq.clone(),scale:ows.clone()};
  
  // Create temp for new panel
  var newTempMesh = new THREE.Mesh(newPanel.mesh.geometry.clone(), newPanel.mesh.material);
  newTempMesh.userData.floorPos = newPanel.mesh.userData.floorPos;
  newTempMesh.userData.vertPos = newPanel.mesh.userData.vertPos;
  newTempMesh.userData.borderIndices = newPanel.mesh.userData.borderIndices;
  var newLineGeo = new THREE.BufferGeometry();
  var newLinePos = new Float32Array(newPanel.mesh.userData.borderIndices.length*3);
  newLineGeo.setAttribute('position', new THREE.BufferAttribute(newLinePos,3));
  newTempMesh.userData.lineGeo = newLineGeo;
  morphTo(newTempMesh, 1); // start at vertical radius
  var newTempEdge = new THREE.Line(newLineGeo, new THREE.LineBasicMaterial({color:0x667788,transparent:true,opacity:0.35}));
  
  newTempMesh.position.copy(nwp);newTempMesh.quaternion.copy(nwq);newTempMesh.scale.copy(nws);
  newTempMesh.visible=true;
  newTempEdge.position.copy(nwp);newTempEdge.quaternion.copy(nwq);newTempEdge.scale.copy(nws);
  newTempEdge.visible=true;
  scene.add(newTempMesh);scene.add(newTempEdge);
  switchAnim.newTemp = {plane:newTempMesh, edge:newTempEdge};
  
  // Hide new panel on vertical wheel
  newPanel.mesh.visible = false;
  newPanel.edges.visible = false;
  
  // Destroy old quick view panels
  destroyQuickViewPanels();
  
  switchAnim.active = true;
  switchAnim.prog = 0;
}

function animateSwitch(){
  if(!switchAnim.active) return;
  switchAnim.prog += 0.03;
  if(switchAnim.prog >= 1) switchAnim.prog = 1;
  var p = eIO(switchAnim.prog);
  
  var spin = new THREE.Quaternion();
  spin.setFromAxisAngle(new THREE.Vector3(0,1,0), Math.sin(p*Math.PI)*Math.PI*0.5);
  
  // Animate old panel: display → vertical wheel slot
  var ot = switchAnim.oldTemp;
  if(ot && ot.plane){
    // Update target to track rotating wheel
    var oldPanel = dm.floor.panels[switchAnim.oldIdx];
    oldPanel.mesh.visible = true;
    dm.vWheel.updateMatrixWorld(true);
    var tp=new THREE.Vector3(),tq=new THREE.Quaternion(),ts=new THREE.Vector3();
    oldPanel.mesh.getWorldPosition(tp);oldPanel.mesh.getWorldQuaternion(tq);oldPanel.mesh.getWorldScale(ts);
    oldPanel.mesh.visible = false;
    switchAnim.oldTarget.pos=tp;switchAnim.oldTarget.quat=tq;switchAnim.oldTarget.scale=ts;
    
    ot.plane.position.lerpVectors(switchAnim.oldStart.pos, switchAnim.oldTarget.pos, p);
    var sq=new THREE.Quaternion();sq.slerpQuaternions(switchAnim.oldStart.quat, switchAnim.oldTarget.quat, p);
    ot.plane.quaternion.copy(sq.multiply(spin.clone()));
    ot.plane.scale.lerpVectors(switchAnim.oldStart.scale, switchAnim.oldTarget.scale, p);
    ot.edge.position.copy(ot.plane.position);ot.edge.quaternion.copy(ot.plane.quaternion);ot.edge.scale.copy(ot.plane.scale);
    
    // Morph from floor (0) to vertical (1)
    morphTo(ot.plane, p);
  }
  
  // Animate new panel: vertical wheel slot → display
  var nt = switchAnim.newTemp;
  if(nt && nt.plane){
    nt.plane.position.lerpVectors(switchAnim.newStart.pos, switchAnim.newTarget.pos, p);
    var sq2=new THREE.Quaternion();sq2.slerpQuaternions(switchAnim.newStart.quat, switchAnim.newTarget.quat, p);
    nt.plane.quaternion.copy(sq2.multiply(spin.clone()));
    nt.plane.scale.lerpVectors(switchAnim.newStart.scale, switchAnim.newTarget.scale, p);
    nt.edge.position.copy(nt.plane.position);nt.edge.quaternion.copy(nt.plane.quaternion);nt.edge.scale.copy(nt.plane.scale);
    
    // Morph from vertical (1) to floor (0)
    morphTo(nt.plane, 1 - p);
  }
  
  if(switchAnim.prog >= 1){
    // Clean up old temp
    if(ot){if(ot.plane)scene.remove(ot.plane);if(ot.edge)scene.remove(ot.edge);}
    // Show old panel back on vertical wheel
    var oldPanel = dm.floor.panels[switchAnim.oldIdx];
    oldPanel.mesh.visible = true;
    oldPanel.edges.visible = true;
    // Old panel goes back to VW — animate rotation for vertical wheel
    oldPanel.mesh.material.userData.imgRotationTarget = 1.0;

    // Clean up old display temp
    if(dm.displayTemp){
      if(dm.displayTemp.plane)scene.remove(dm.displayTemp.plane);
      if(dm.displayTemp.edge)scene.remove(dm.displayTemp.edge);
    }

    // New temp becomes the display
    dm.displayTemp = switchAnim.newTemp;
    // New panel is displayed upright — animate image rotation back
    var newPanel = dm.floor.panels[switchAnim.newIdx];
    newPanel.mesh.material.userData.imgRotationTarget = 0.0;
    
    // Keep new panel hidden on vertical wheel
    var newPanel = dm.floor.panels[switchAnim.newIdx];
    newPanel.mesh.visible = false;
    newPanel.edges.visible = false;
    
    // Update selection
    dm.selIdx = switchAnim.newIdx;
    
    // Re-register star temps as buttons and re-add icon overlays
    dm.dmButtons = [];
    dm.starIcons = [];
    var actionTypes3 = ['add-to-cart', 'close', 'expand'];
    for(var sti6 = 0; sti6 < dm.starTemps.length; sti6++){
      var stg3 = dm.starTemps[sti6];
      var iconM = createStarIconOverlay(actionTypes3[sti6], 0.5);
      stg3.add(iconM);
      dm.starIcons.push(iconM);
      dm.dmButtons.push(stg3);
    }
    
    // Reset
    switchAnim.active = false;
    switchAnim.prog = 0;
    switchAnim.oldTemp = null;
    switchAnim.newTemp = null;

    // Start display panel flatten + split animation for new panel
    startDisplayAnim();
  }
}

// ══════════════════════════════════════════════
// FBO GLASS REFRACTION SYSTEM
// Renders scene (without cart) to a texture, then
// maps that texture onto the cart panel with UV
// distortion for a real refraction/glass effect.
// ══════════════════════════════════════════════
var glassFBO = null;

function createGlassFBO() {
  var pr = Math.min(window.devicePixelRatio, 1.5);
  glassFBO = new THREE.WebGLRenderTarget(
    Math.floor(window.innerWidth * pr * 0.5),
    Math.floor(window.innerHeight * pr * 0.5),
    { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter, format: THREE.RGBFormat }
  );
}

function resizeGlassFBO() {
  if(glassFBO) {
    var pr = Math.min(window.devicePixelRatio, 1.5);
    glassFBO.setSize(
      Math.floor(window.innerWidth * pr * 0.5),
      Math.floor(window.innerHeight * pr * 0.5)
    );
  }
}

// ══════════════════════════════════════════════
// BACKDROP BLUR FBO SYSTEM
// Captures scene behind backdrop and applies Gaussian blur
// ══════════════════════════════════════════════
var bdBlurFBO1, bdBlurFBO2, bdBlurScene, bdBlurCamera, bdBlurQuad;

function createBackdropBlur() {
  var pr = Math.min(window.devicePixelRatio, 1.5);
  var w = Math.floor(window.innerWidth * pr * 0.25);
  var h = Math.floor(window.innerHeight * pr * 0.25);
  bdBlurFBO1 = new THREE.WebGLRenderTarget(w, h, {minFilter:THREE.LinearFilter, magFilter:THREE.LinearFilter, format:THREE.RGBFormat});
  bdBlurFBO2 = new THREE.WebGLRenderTarget(w, h, {minFilter:THREE.LinearFilter, magFilter:THREE.LinearFilter, format:THREE.RGBFormat});
  bdBlurScene = new THREE.Scene();
  bdBlurCamera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  var blurMat = new THREE.ShaderMaterial({
    uniforms: {
      tInput: {value: null},
      direction: {value: new THREE.Vector2(1,0)}
    },
    vertexShader: 'varying vec2 vUV;void main(){vUV=uv;gl_Position=vec4(position,1.0);}',
    fragmentShader: [
      'uniform sampler2D tInput;',
      'uniform vec2 direction;',
      'varying vec2 vUV;',
      'void main(){',
      '  vec4 sum=vec4(0.0);',
      '  sum+=texture2D(tInput,vUV-4.0*direction)*0.0162;',
      '  sum+=texture2D(tInput,vUV-3.0*direction)*0.0540;',
      '  sum+=texture2D(tInput,vUV-2.0*direction)*0.1218;',
      '  sum+=texture2D(tInput,vUV-1.0*direction)*0.1962;',
      '  sum+=texture2D(tInput,vUV)*0.2236;',
      '  sum+=texture2D(tInput,vUV+1.0*direction)*0.1962;',
      '  sum+=texture2D(tInput,vUV+2.0*direction)*0.1218;',
      '  sum+=texture2D(tInput,vUV+3.0*direction)*0.0540;',
      '  sum+=texture2D(tInput,vUV+4.0*direction)*0.0162;',
      '  gl_FragColor=sum;',
      '}'
    ].join('\n'),
    depthWrite: false, depthTest: false
  });
  bdBlurQuad = new THREE.Mesh(new THREE.PlaneGeometry(2,2), blurMat);
  bdBlurScene.add(bdBlurQuad);
}

function resizeBackdropBlur() {
  if(bdBlurFBO1) {
    var pr = Math.min(window.devicePixelRatio, 1.5);
    var w = Math.floor(window.innerWidth * pr * 0.25);
    var h = Math.floor(window.innerHeight * pr * 0.25);
    bdBlurFBO1.setSize(w, h);
    bdBlurFBO2.setSize(w, h);
  }
}

function createBackdropBlurMaterial() {
  return new THREE.ShaderMaterial({
    uniforms: {
      tBg: {value: glassFBO ? glassFBO.texture : null},
      tBlur: {value: null}, // legacy
      tScratch: {value: (function(){
        var t = generateScratchTexture().clone();
        t.wrapS = THREE.ClampToEdgeWrapping;
        t.wrapT = THREE.ClampToEdgeWrapping;
        t.needsUpdate = true;
        return t;
      })()},
      tFrost: {value: generateFrostTexture()},
      res: {value: new THREE.Vector2(window.innerWidth, window.innerHeight)},
      opacity: {value: 0.0},
      time: {value: 0},
      tintColor: {value: new THREE.Color(0x1a3358)} // softer stained blue
    },
    vertexShader: [
      'varying vec3 vN, vV;',
      'varying vec2 vUv;',
      'void main(){',
      '  vUv = uv;',
      '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
      '  vN = normalize(normalMatrix * normal);',
      '  vV = normalize(-mv.xyz);',
      '  gl_Position = projectionMatrix * mv;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform sampler2D tBg, tScratch, tFrost;',
      'uniform vec2 res;',
      'uniform float opacity, time;',
      'uniform vec3 tintColor;',
      'varying vec3 vN, vV;',
      'varying vec2 vUv;',
      GLARE_GLSL_FUNCS,
      'void main(){',
      '  vec3 N = normalize(vN); vec3 V = normalize(vV);',
      '  vec2 suv = gl_FragCoord.xy / res;',
      '  vec2 refr = N.xy * 0.16;',
      '  refr += 0.003 * vec2(sin(time*1.5 + suv.y*8.0), cos(time*1.2 + suv.x*8.0));',
      '  float ef = 1.0 - abs(dot(V, N));',
      '  float ca = 0.22 * (0.3 + ef * 2.5);',
      '  vec2 tx = 1.0 / res;',
      '  vec2 ru = suv + refr * (1.0 + ca);',
      '  vec2 gu = suv + refr;',
      '  vec2 bu = suv + refr * (1.0 - ca);',
      '  float r = texture2D(tBg, ru).r * .6 + texture2D(tBg, ru + tx).r * .2 + texture2D(tBg, ru - tx).r * .2;',
      '  float g = texture2D(tBg, gu).g * .6 + texture2D(tBg, gu + tx).g * .2 + texture2D(tBg, gu - tx).g * .2;',
      '  float b = texture2D(tBg, bu).b * .6 + texture2D(tBg, bu + tx).b * .2 + texture2D(tBg, bu - tx).b * .2;',
      '  vec3 col = vec3(r, g, b);',
      '  // Subtle stained blue tint (lighter)',
      '  col = mix(col, tintColor, 0.32);',
      '  // Fresnel edge highlight + light sheen',
      '  float fresnel = pow(1.0 - max(dot(V, N), 0.0), 2.0) * 0.5;',
      '  col = mix(col, vec3(0.65, 0.8, 1.0), fresnel * 0.45);',
      '  col += vec3(0.85, 0.92, 1.0) * fresnel * 0.5;',
      GLASS_TINT_GLSL,
      GLARE_GLSL_CALC,
      '  col += glareResult * 1.8;',
      '  // Single scratch overlay (no tiling: vUv covers the plane exactly once)',
      '  float scratchTex = texture2D(tScratch, vUv).r;',
      '  col += vec3(0.55, 0.7, 0.95) * scratchTex * 0.22;',
      '  // Static light reflection band (subtle highlight)',
      '  float reflBand = smoothstep(0.32, 0.42, vUv.y) * (1.0 - smoothstep(0.42, 0.55, vUv.y));',
      '  col += vec3(0.85, 0.92, 1.0) * reflBand * 0.18;',
      '  gl_FragColor = vec4(col, opacity);',
      '}'
    ].join('\n'),
    transparent: true,
    side: THREE.DoubleSide,
    depthWrite: false
  });
}

function renderBackdropBlur() {
  if(!bdBlurFBO1) return;

  // Collect all visible backdrops (main + pending closes + pending reverses)
  var visibleBackdrops = [];
  if(displayAnim.backdrop && displayAnim.backdrop.visible) visibleBackdrops.push(displayAnim.backdrop);
  for(var bpi=0;bpi<pendingCloses.length;bpi++){
    var pda = pendingCloses[bpi].dispAnim;
    if(pda && pda.backdrop && pda.backdrop.visible) visibleBackdrops.push(pda.backdrop);
  }
  for(var bri2=0;bri2<pendingReverses.length;bri2++){
    var pdr = pendingReverses[bri2];
    if(pdr.backdrop && pdr.backdrop.visible) visibleBackdrops.push(pdr.backdrop);
  }
  if(visibleBackdrops.length === 0) return;

  // Hide backdrops during capture
  for(var bhi=0;bhi<visibleBackdrops.length;bhi++) visibleBackdrops[bhi].visible = false;

  // Also hide UI elements
  var cartIconVis = cart.iconGroup ? cart.iconGroup.visible : false;
  var cartPanelVis = cart.panelGroup ? cart.panelGroup.visible : false;
  if(cart.iconGroup) cart.iconGroup.visible = false;
  if(cart.panelGroup) cart.panelGroup.visible = false;
  if(navMenu.group) navMenu.group.visible = false;
  for(var nb=0;nb<navMenu.buttons.length;nb++) navMenu.buttons[nb].group.visible = false;

  // Render scene to first FBO (at quarter res = natural pre-blur)
  renderer.setRenderTarget(bdBlurFBO1);
  renderer.clear();
  renderer.render(scene, camera);

  // Two rounds of Gaussian blur for stronger effect
  var pr = Math.min(window.devicePixelRatio, 1.5);
  var w = Math.floor(window.innerWidth * pr * 0.25);
  var h = Math.floor(window.innerHeight * pr * 0.25);
  var spread = 3.0; // multiplier for wider blur kernel

  // Pass 1: Horizontal FBO1 -> FBO2
  bdBlurQuad.material.uniforms.tInput.value = bdBlurFBO1.texture;
  bdBlurQuad.material.uniforms.direction.value.set(spread/w, 0);
  renderer.setRenderTarget(bdBlurFBO2);
  renderer.clear();
  renderer.render(bdBlurScene, bdBlurCamera);

  // Pass 2: Vertical FBO2 -> FBO1
  bdBlurQuad.material.uniforms.tInput.value = bdBlurFBO2.texture;
  bdBlurQuad.material.uniforms.direction.value.set(0, spread/h);
  renderer.setRenderTarget(bdBlurFBO1);
  renderer.clear();
  renderer.render(bdBlurScene, bdBlurCamera);

  // Pass 3: Horizontal again FBO1 -> FBO2
  bdBlurQuad.material.uniforms.tInput.value = bdBlurFBO1.texture;
  bdBlurQuad.material.uniforms.direction.value.set(spread/w, 0);
  renderer.setRenderTarget(bdBlurFBO2);
  renderer.clear();
  renderer.render(bdBlurScene, bdBlurCamera);

  // Pass 4: Vertical again FBO2 -> FBO1
  bdBlurQuad.material.uniforms.tInput.value = bdBlurFBO2.texture;
  bdBlurQuad.material.uniforms.direction.value.set(0, spread/h);
  renderer.setRenderTarget(bdBlurFBO1);
  renderer.clear();
  renderer.render(bdBlurScene, bdBlurCamera);

  renderer.setRenderTarget(null);

  // Restore visibility and update blur texture on all backdrops
  if(cart.iconGroup) cart.iconGroup.visible = cartIconVis;
  if(cart.panelGroup) cart.panelGroup.visible = cartPanelVis;
  if(navMenu.group) navMenu.group.visible = true;
  for(var nb2=0;nb2<navMenu.buttons.length;nb2++){
    var nbE2=navMenu.morphT<.5?4*navMenu.morphT*navMenu.morphT*navMenu.morphT:1-Math.pow(-2*navMenu.morphT+2,3)/2;
    navMenu.buttons[nb2].group.visible=nbE2>0.6;
  }
  for(var bri=0;bri<visibleBackdrops.length;bri++){
    visibleBackdrops[bri].visible = true;
    visibleBackdrops[bri].traverse(function(child) {
      if(child.isMesh && child.material.uniforms && child.material.uniforms.tBlur) {
        child.material.uniforms.tBlur.value = bdBlurFBO1.texture;
      }
    });
  }
}

function createGlassShaderMaterial() {
  var scratchTex = generateScratchTexture();
  return new THREE.ShaderMaterial({
    uniforms: {
      tBackground: { value: null },
      resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
      refractionStrength: { value: 0.12 },
      chromaticAberration: { value: 0.23 },
      tintColor: { value: new THREE.Color(0.93, 0.94, 0.97) },
      tintStrength: { value: 0.15 },
      fresnelPower: { value: 2.0 },
      fresnelStrength: { value: 0.3 },
      time: { value: 0 },
      tScratch: { value: scratchTex },
      tFrost: { value: generateFrostTexture() },
      hoverPress: { value: 0.0 }
    },
    vertexShader: [
      'uniform float hoverPress;',
      'varying vec2 vUv;',
      'varying vec3 vNormal;',
      'varying vec3 vViewDir;',
      'void main() {',
      '  vUv = uv;',
      '  vec3 transformed = position - normal * hoverPress * 0.04;',
      '  vec4 mvPos = modelViewMatrix * vec4(transformed, 1.0);',
      '  vNormal = normalize(normalMatrix * normal);',
      '  vViewDir = normalize(-mvPos.xyz);',
      '  gl_Position = projectionMatrix * mvPos;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform sampler2D tBackground, tScratch, tFrost;',
      'uniform vec2 resolution;',
      'uniform float refractionStrength, chromaticAberration;',
      'uniform vec3 tintColor;',
      'uniform float tintStrength, fresnelPower, fresnelStrength, time, hoverPress;',
      'varying vec2 vUv;',
      'varying vec3 vNormal, vViewDir;',
      GLARE_GLSL_FUNCS,
      'void main() {',
      '  vec3 N=normalize(vNormal); vec3 V=normalize(vViewDir);',
      '  vec2 screenUV=gl_FragCoord.xy/resolution;',
      '  vec2 refractOffset=N.xy*refractionStrength;',
      '  refractOffset+=0.002*vec2(sin(time*1.5+screenUV.y*10.0),cos(time*1.2+screenUV.x*10.0));',
      '  float edgeFactor=1.0-abs(dot(V,N));',
      '  float caStrength=chromaticAberration*(0.3+edgeFactor*2.5);',
      '  vec2 texel=1.0/resolution;',
      '  vec2 rUV=screenUV+refractOffset*(1.0+caStrength);',
      '  vec2 gUV=screenUV+refractOffset;',
      '  vec2 bUV=screenUV+refractOffset*(1.0-caStrength);',
      '  float r=texture2D(tBackground,rUV).r*.4+texture2D(tBackground,rUV+texel*vec2(1,0)).r*.15+texture2D(tBackground,rUV-texel*vec2(1,0)).r*.15+texture2D(tBackground,rUV+texel*vec2(0,1)).r*.15+texture2D(tBackground,rUV-texel*vec2(0,1)).r*.15;',
      '  float g=texture2D(tBackground,gUV).g*.4+texture2D(tBackground,gUV+texel*vec2(1,0)).g*.15+texture2D(tBackground,gUV-texel*vec2(1,0)).g*.15+texture2D(tBackground,gUV+texel*vec2(0,1)).g*.15+texture2D(tBackground,gUV-texel*vec2(0,1)).g*.15;',
      '  float b=texture2D(tBackground,bUV).b*.4+texture2D(tBackground,bUV+texel*vec2(1,0)).b*.15+texture2D(tBackground,bUV-texel*vec2(1,0)).b*.15+texture2D(tBackground,bUV+texel*vec2(0,1)).b*.15+texture2D(tBackground,bUV-texel*vec2(0,1)).b*.15;',
      '  vec3 col=vec3(r,g,b);',
      '  float fresnel=pow(1.0-max(dot(V,N),0.0),fresnelPower)*fresnelStrength;',
      '  col=mix(col,tintColor,tintStrength+fresnel*0.3);',
      '  col+=vec3(0.95,0.96,0.98)*fresnel*0.5;',
      GLASS_TINT_GLSL,
      GLARE_GLSL_CALC,
      '  col+=glareResult;',
      '  col = mix(col, vec3(0.05, 0.08, 0.18), hoverPress * 0.45);',
      '  gl_FragColor=vec4(col,0.92);',
      '}'
    ].join('\n'),
    transparent: true,
    side: THREE.DoubleSide,
    depthWrite: false
  });
}

// ══════════════════════════════════════════════
// MINI-GAME JOYSTICK (portrait-only on-screen control)
// Stationary glass base at the bottom of the screen with a smaller glass stick
// that follows the player's finger. Only built/positioned/raycasted while the
// screen aspect is portrait — landscape players keep the full-screen swipe
// joystick they already had. Output writes throttle/yaw into gameMode.touch
// just like the swipe path does, so all downstream physics (drift detection,
// coast, momentum) work unchanged.
// ══════════════════════════════════════════════
var gameJoystick = {
  group: null, base: null, stick: null,
  visible: false,
  // Screen-pixel hit-test cache, refreshed each frame the joystick is shown.
  // Touchstart uses these to decide whether a tap captures the joystick or
  // falls through to the regular swipe path.
  basePxX: 0, basePxY: 0, basePxR: 0,
  // Normalized stick offset, -1..+1 along each axis (up = +Y). Drives both
  // the visual stick mesh position and the throttle/yaw values written into
  // gameMode.touch.
  stickX: 0, stickY: 0,
  // World units — radius of the base circle and how far the stick is allowed
  // to travel from center. The stick mesh is half the base; the travel limit
  // is 80% of the base radius so the stick visually stays inside the bowl.
  baseWorldR: 0.95,
  stickTravelWorld: 0.95 * 0.6
};

function createGameJoystick(){
  var g = new THREE.Group();
  // Base: larger glass circle — sits flush with the screen plane.
  var base = createGlassCircleBtn(gameJoystick.baseWorldR);
  g.add(base);
  // Stick: smaller glass circle, floats slightly in front so it reads as a
  // separate piece on top of the base.
  var stick = createGlassCircleBtn(gameJoystick.baseWorldR * 0.5);
  stick.position.z = 0.10;
  g.add(stick);
  // Mark for layer-1 rendering so it draws sharp on top of the post-process
  // chain, same as the cart icon and nav menu.
  g.layers.enable(1);
  g.traverse(function(c){ c.layers.enable(1); });
  g.visible = false;
  scene.add(g);
  gameJoystick.group = g;
  gameJoystick.base = base;
  gameJoystick.stick = stick;
}

function positionGameJoystick(){
  if(!gameJoystick.group) return;
  // Only show in portrait + when the mini-game is actively playable. During
  // entry/exit transitions we hide it so the camera animation isn't fighting
  // a stationary UI element on screen.
  var portrait = camera.aspect < 1.0;
  var shouldShow = portrait && gameMode.active && !gameMode.exiting && !gameMode.fly.active && gameMode.joystickEnabled !== false;
  if(gameJoystick.group.visible !== shouldShow) gameJoystick.group.visible = shouldShow;
  gameJoystick.visible = shouldShow;
  if(!shouldShow){
    // Reset stick visual when hidden so it doesn't pop offset on reappear.
    gameJoystick.stickX = 0; gameJoystick.stickY = 0;
    if(gameJoystick.stick) gameJoystick.stick.position.set(0, 0, 0.10);
    return;
  }
  // Place at bottom-center of the camera-relative plane, at the same depth
  // as the other UI overlays (cart icon, nav menu).
  var dist = 4.5;
  var fovRad = camera.fov * Math.PI / 180;
  var halfH = Math.tan(fovRad/2) * dist;
  // Bottom margin = baseWorldR + a bit of breathing room.
  var jsLocalY = -halfH + gameJoystick.baseWorldR + 0.45;
  var camFwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  var camUp = new THREE.Vector3(0,1,0).applyQuaternion(camera.quaternion);
  var basePos = camera.position.clone()
    .add(camFwd.clone().multiplyScalar(dist))
    .add(camUp.clone().multiplyScalar(jsLocalY));
  gameJoystick.group.position.copy(basePos);
  gameJoystick.group.quaternion.copy(camera.quaternion);
  // Apply the live stick offset (normalized -1..+1) to the stick mesh in
  // local space — Y is inverted from screen-space because up is +Y here.
  if(gameJoystick.stick){
