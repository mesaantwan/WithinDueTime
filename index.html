function initShopify() {
  if (!window.ShopifyBuy) { setTimeout(initShopify, 200); return; }

  });

  shopifyClient.checkout.create().then(function(co) {
    shopifyCheckout = co;
  });

  fetchShopifyProducts();
}

// Section config: maps product type to floor settings
var SECTION_CONFIG = {
  'Pants':       { isSmall: true },
  'Shirts':      {},
  '1 of 1s':     {},
  'Accessories': {},
  'Gallery':     { isSmall: true, isOrbFloor: true }
};

function fetchShopifyProducts() {
  if (!shopifyClient) return;
  shopifyClient.product.fetchAll(250).then(function(products) {
    if (!products || products.length === 0) return;

    // Group products by product type
    var grouped = {};
    products.forEach(function(p) {
      var type = p.productType || 'Uncategorized';
      if (!grouped[type]) grouped[type] = [];
      grouped[type].push(p);
    });

    // Build new floors from Shopify data (preserve Gallery as hardcoded)
    var newFloors = [];
    // Use a defined section order
    var sectionOrder = ['Pants', 'Shirts', '1 of 1s', 'Accessories'];
    // Add any types from Shopify that aren't in our predefined order
    Object.keys(grouped).forEach(function(type) {
      if (sectionOrder.indexOf(type) === -1) sectionOrder.push(type);
    });

    sectionOrder.forEach(function(type) {
      if (!grouped[type] || grouped[type].length === 0) return;
      var cfg = SECTION_CONFIG[type] || {};
      var floor = {
        label: type,
        products: []
      };
      if (cfg.isSmall) floor.isSmall = true;
      if (cfg.isOrbFloor) floor.isOrbFloor = true;

      grouped[type].forEach(function(sp) {
        var variants = sp.variants || [];
        var sizes = [];
        var allUnavailable = true;
        variants.forEach(function(v) {
          if (v.title && v.title !== 'Default Title') sizes.push(v.title);
          if (v.available) allUnavailable = false;
        });
        // If only Default Title variant, check its availability
        if (variants.length === 1 && variants[0].title === 'Default Title') {
          allUnavailable = !variants[0].available;
        }

        var imgUrl = '';
        if (sp.images && sp.images.length > 0) {
          imgUrl = sp.images[0].src;
        }

        var product = {
          id: sp.id,
          shopifyId: sp.id,
          name: sp.title,
          price: variants.length > 0 ? parseFloat(variants[0].price.amount || variants[0].price) : 0,
          designer: sp.vendor || 'Chrysolin',
          desc: sp.description || '',
          sizes: sizes,
          image: imgUrl,
          shopifyHandle: sp.handle,
          shopifyVariants: variants,
          images: sp.images ? sp.images.map(function(img){ return img.src; }) : []
        };
        if (allUnavailable) product.sold = true;

        floor.products.push(product);
      });

      newFloors.push(floor);
    });

    // Keep Gallery floor from hardcoded data
    var galleryFloor = null;
    for (var i = 0; i < PRODUCT_DATA.floors.length; i++) {
      if (PRODUCT_DATA.floors[i].isOrbFloor) {
        galleryFloor = PRODUCT_DATA.floors[i];
        break;
      }
    }
    if (galleryFloor) newFloors.push(galleryFloor);

    // Update PRODUCT_DATA
    PRODUCT_DATA.floors = newFloors;

    // Rebuild floors if scene is already initialized
    if (typeof rebuildFloors === 'function') rebuildFloors();
    // Load images onto panels
    if (typeof loadShopifyImages === 'function') loadShopifyImages();
  }).catch(function(err) {
    console.warn('Shopify fetch failed, using fallback data:', err);
  });
}

function addToShopifyCart(product, sizeLabel) {
  if (!shopifyClient || !shopifyCheckout || !product.shopifyVariants) return Promise.resolve(null);
  var variantId = null;
  if (product.shopifyVariants.length === 1) {
    variantId = product.shopifyVariants[0].id;
  } else if (sizeLabel) {
    for (var i = 0; i < product.shopifyVariants.length; i++) {
      if (product.shopifyVariants[i].title === sizeLabel) {
        variantId = product.shopifyVariants[i].id;
        break;
      }
    }
  }
  // Fallback: first available variant
  if (!variantId) {
    for (var k = 0; k < product.shopifyVariants.length; k++) {
      if (product.shopifyVariants[k].available) { variantId = product.shopifyVariants[k].id; break; }
    }
  }
  if (!variantId && product.shopifyVariants.length > 0) variantId = product.shopifyVariants[0].id;
  if (!variantId) { console.warn('No variant found for product:', product.name); return Promise.resolve(null); }

  return shopifyClient.checkout.addLineItems(shopifyCheckout.id, [{
    variantId: variantId,
    quantity: 1
  }]).then(function(co) {
    shopifyCheckout = co;
    return co;
  });
}

function buyNowAndCheckout(product) {
  // Update local cart state too (so count + scale reflect it)
  addToCart(product);
  shopifyGoToCheckout();

function shopifyGoToCheckout() {

function loadShopifyImages() {
  if (!floors || !floors.length) return;
  var loader = new THREE.TextureLoader();
  PRODUCT_DATA.floors.forEach(function(cfg, fi) {
    if (!floors[fi] || !floors[fi].panels) return;
    cfg.products.forEach(function(product, pi) {
      if (!product.image || pi >= floors[fi].panels.length) return;
      // Skip if image is a local file path (not a URL)
      var imgSrc = product.image;
      if (imgSrc.indexOf('http') !== 0 && imgSrc.indexOf('//') !== 0) {
        imgSrc = 'product-images/' + imgSrc;
      }
      var panel = floors[fi].panels[pi];
      loader.load(imgSrc, function(tex) {
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        tex.wrapS = THREE.ClampToEdgeWrapping;
        tex.wrapT = THREE.ClampToEdgeWrapping;
        panel.mesh.material.userData.productTex.value = tex;
        panel.mesh.material.userData.hasProductTex.value = 1.0;
        panel.mesh.material.userData.productTexAspect.value = tex.image.width / tex.image.height;
        panel.mesh.material.needsUpdate = true;
      });
      // Load back image (second image) if available
      var backImg = product.backImage || (product.images && product.images[1]);
      if (backImg) {
        var backSrc = backImg;
        if (backSrc.indexOf('http') !== 0 && backSrc.indexOf('//') !== 0) {
          backSrc = 'product-images/' + backSrc;
        }
        loader.load(backSrc, function(tex) {
          tex.minFilter = THREE.LinearFilter;
          tex.magFilter = THREE.LinearFilter;
          tex.wrapS = THREE.ClampToEdgeWrapping;
          tex.wrapT = THREE.ClampToEdgeWrapping;
          panel.mesh.material.userData.backTex.value = tex;
          panel.mesh.material.userData.hasBackTex.value = 1.0;
          panel.mesh.material.needsUpdate = true;
        });
      }
    });
  });
}

function updateCamRadius() {
  var aspect = window.innerWidth / window.innerHeight;
  if (aspect < 1.0) {
    // Portrait: keep base distance + base FOV
    CAM_ORBIT_RADIUS = CAM_ORBIT_RADIUS_BASE + (1.0 / aspect - 1.0) * 3.0;
    CAM_FOV = CAM_FOV_BASE;
  } else {
    // Landscape: 20% closer base, pull in more as it gets wider
    var landscapeBase = CAM_ORBIT_RADIUS_BASE * 0.8;
    var wideT = Math.min((aspect - 1.0) / 1.5, 1.0); // 0 at 1:1, 1 at 2.5:1
    // Move back ~50% (1.3 × 1.15) and zoom in ~19% (0.9 × 0.9 = 0.81) for desktop framing
    CAM_ORBIT_RADIUS = (landscapeBase - wideT * 3.5) * 1.495;
    CAM_FOV = CAM_FOV_BASE * 0.81;
  }
}

var _mediapipeLoading = false;
function loadMediaPipeScripts(){
  if(_mediapipeLoading) return;
  _mediapipeLoading = true;
  var s1 = document.createElement('script');
  s1.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js';
  s1.crossOrigin = 'anonymous';
  document.head.appendChild(s1);
  var s2 = document.createElement('script');
  s2.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js';
  s2.crossOrigin = 'anonymous';
  document.head.appendChild(s2);
}
function startFaceTracking(){
  if(!window.FaceDetection || !window.Camera){
    loadMediaPipeScripts();
    setTimeout(startFaceTracking,500);
    return;
  }
  var video=document.getElementById('faceVideo');
  faceTrack.fd=new FaceDetection({locateFile:function(f){return'https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/'+f;}});
  faceTrack.fd.setOptions({model:'short',minDetectionConfidence:0.5});
  faceTrack.fd.onResults(function(r){
    if(!faceTrack.enabled)return;
    if(r.detections&&r.detections.length>0){
      var det=r.detections[0];
      if(det.landmarks&&det.landmarks.length>=3){
        var mx=(det.landmarks[0].x+det.landmarks[1].x)/2;
        var my=(det.landmarks[0].y+det.landmarks[1].y)/2;
        faceTrack.rawX=-(mx*2-1);
        faceTrack.rawY=-(my*2-1);
        if(det.boundingBox){var fw=det.boundingBox.width||0.2;faceTrack.rawZ=0.18/Math.max(fw,0.05);}
      }
      var sm=1-faceTrack.smooth;
      faceTrack.x+=(faceTrack.rawX-faceTrack.x)*sm;
      faceTrack.y+=(faceTrack.rawY-faceTrack.y)*sm;
      faceTrack.z+=(faceTrack.rawZ-faceTrack.z)*sm;
      if(!faceTrack.calibrated){faceTrack.calX=faceTrack.rawX;faceTrack.calY=faceTrack.rawY;faceTrack.calZ=faceTrack.rawZ;faceTrack.calibrated=true;}
      faceTrack.active=true;
    }
  });
  navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:320,height:240}}).then(function(stream){
    video.srcObject=stream;video.onloadedmetadata=function(){video.play();};
    faceTrack.cam2=new Camera(video,{onFrame:async function(){if(faceTrack.enabled)await faceTrack.fd.send({image:video});},width:320,height:240});
    faceTrack.cam2.start();faceTrack.ready=true;
  }).catch(function(err){faceTrack.enabled=false;
    var btn=document.getElementById('face-toggle');if(btn)btn.style.opacity='0.3';});
}

// MINI GAME MODE — tiny ship lives on the gallery floor's center crystal.
// The crystal IS the planet — sphere-walking physics, camera follows in tangent frame.
// Triggered by spinning the bottom orb wheel + holding the spin.
// ══════════════════════════════════════════════
var gameMode = {
  active: false,
  entering: false,
  exiting: false,
  prog: 0,                  // 0..1 entry progress
  exitProg: 0,              // 0..1 exit progress
  // Pre-entry wheel deceleration — runs BEFORE entering, so the user sees the wheel
  // rapidly spin down to a stop before the camera dives in. ~0.4s long.
  decelerating: false,
  // Pre-entry deceleration runs as a three-stage state machine driven by RPM rather than
  // a fixed timer — so an over-the-top spin gets the same per-frame braking rate but
  // takes longer to bleed off, and the camera dive never starts while the wheel is still
  // whirling too fast to feel deliberate.
  decel: {
    stage: 'hold',                  // 'hold' → 'damp' → 'dive'
    stageFrames: 0,
    holdFrames: 20,                 // ~0.33s — short anticipation beat before braking starts
    // Extra per-frame damping ON TOP of the wheel's natural 0.98 friction (which is what
    // gives "same rate, more time" scaling — a constant per-frame factor means higher
    // starting RPM takes proportionally more frames to bleed down to the threshold).
    rampStartDamp: 0.995,           // brake engages immediately, no soft-start coast
    rampEndDamp: 0.99,              // small ongoing brake — held indefinitely after the ramp
    rampFrames: 15,                 // ~0.25s ramp from start→end damp
    diveRpmThreshold: 165,          // raw rpmSmooth — dive kicks in while wheel still feels fast
    diveDuration: 150,              // ~2.5s for the camera to arc into the chase pose
    diveProg: 0,
    diveDamp: 0.85,                 // strong damp DURING dive — quickly kills residual rotation
                                    //   so the wheel doesn't visibly drift while the camera arcs in
    maxDampFrames: 600              // safety cap (~10s) so the loop can't stall on huge RPM
  },
  // Drift particle effects — orange streaks shed from the rear inner wing while drifting,
  // ported from Orbicule's gunner drift (Orbicule.html:21283-21386).
  driftFx: {
    particles: [],
    material: null            // lazy-initialized MeshBasicMaterial
  },
  // Dug-trench gouge dug under the scraping inner wing while drifting — ONE continuous ribbon
  // mesh whose vertices track the live wing↔ground contact point and stitch into a single
  // connected, fading band (not discrete quads).
  driftTrench: {
    mesh: null, geo: null, posAttr: null, alphaAttr: null,
    points: [],               // {p, n, side, age} — sampled wing-ground contact path
    maxPoints: 200,

// MORPHABLE PANEL
// ══════════════════════════════════════════════
function applyBevel(arr, count, panelH) {
  if(panelH === undefined) panelH = PLANE_WIDTH;
  for(var j=0;j<count;j++){
    var x=arr[j*3], y=arr[j*3+1], z=arr[j*3+2];
    var dft=Math.abs(y-panelH/2), dfb=Math.abs(y+panelH/2);
    var cr=Math.sqrt(x*x+z*z);
    if(cr>0){
      if(dft<BEVEL_R){var f=(BEVEL_R-dft)/BEVEL_R;var s=(cr-BEVEL*f)/cr;x*=s;z*=s;}
      if(dfb<BEVEL_R){var f2=(BEVEL_R-dfb)/BEVEL_R;var s2=(cr-BEVEL*f2)/cr;x*=s2;z*=s2;}
    }
    arr[j*3]=x; arr[j*3+2]=z;
  }
}

function makePositions(radius, arcAngle, panelH) {
  if(panelH === undefined) panelH = PLANE_WIDTH;
  var g = new THREE.CylinderGeometry(radius,radius,panelH,SEG_X,SEG_Y,true,-arcAngle/2,arcAngle);
  var p = g.attributes.position;
  var arr = new Float32Array(p.count*3);
  for(var i=0;i<p.count*3;i++) arr[i]=p.array[i];
  applyBevel(arr, p.count, panelH);
  g.dispose();
  return arr;
}

// 1x1 white texture to force UV generation in MeshStandardMaterial
var _whiteTexForUV;
function getWhiteTex(){
  if(!_whiteTexForUV){
    var c=document.createElement('canvas');c.width=1;c.height=1;
    var ctx=c.getContext('2d');ctx.fillStyle='#ffffff';ctx.fillRect(0,0,1,1);
    _whiteTexForUV=new THREE.CanvasTexture(c);
  }
  return _whiteTexForUV;
}

function createPanel(floorR, vertR, opts) {
  opts = opts || {};
  var pH = opts.height !== undefined ? opts.height : PLANE_WIDTH;
  var pW = opts.width !== undefined ? opts.width : PLANE_WIDTH;
  var coverFitVal = opts.coverFit ? 1.0 : 0.0;
  var arcF = (pW/floorR)*1.1;
  var arcV = (pW/vertR)*1.1;

  var geo = new THREE.CylinderGeometry(floorR,floorR,pH,SEG_X,SEG_Y,true,-arcF/2,arcF);
  var pos = geo.attributes.position;
  // Apply bevel to live geo
  for(var j=0;j<pos.count;j++){
    var x=pos.array[j*3],y=pos.array[j*3+1],z=pos.array[j*3+2];
    var dft=Math.abs(y-pH/2),dfb=Math.abs(y+pH/2);
    var cr=Math.sqrt(x*x+z*z);
    if(cr>0){
      if(dft<BEVEL_R){var f=(BEVEL_R-dft)/BEVEL_R;var s=(cr-BEVEL*f)/cr;x*=s;z*=s;}
      if(dfb<BEVEL_R){var f2=(BEVEL_R-dfb)/BEVEL_R;var s2=(cr-BEVEL*f2)/cr;x*=s2;z*=s2;}
    }
    pos.array[j*3]=x;pos.array[j*3+2]=z;
  }
  pos.needsUpdate=true; geo.computeVertexNormals();

  var floorPos = new Float32Array(pos.count*3);
  for(var k=0;k<pos.count*3;k++) floorPos[k]=pos.array[k];
  var vertPos = makePositions(vertR, arcV, pH);
  
  var mat = new THREE.MeshStandardMaterial({
    color:0x8899bb, transparent:true, opacity:0.82,
    side:THREE.DoubleSide, depthWrite:true,
    roughness:0.1, metalness:0.5, emissive:0x334466, emissiveIntensity:0.2,
    emissiveMap:getWhiteTex()
  });
  // Holographic VHS / retro screen effect — rendered on the panel surface via UVs
  mat.userData.holoTime = {value:0};
  mat.userData.holoOffset = Math.random() * 100;
  mat.userData.productTex = {value:getWhiteTex()};
  mat.userData.hasProductTex = {value:0.0};
  mat.userData.productTexAspect = {value:1.0}; // image width/height ratio
  mat.userData.panelAspect = {value: (floorR * arcF) / pH};
  mat.userData.coverFit = {value: coverFitVal};
  mat.userData.panelHeight = pH;
  mat.userData.imgRotation = {value: 0.0}; // 0 = normal, 1 = 90deg for vertical wheel
  mat.userData.imgRotationTarget = 0.0;
  mat.userData.backTex = {value:getWhiteTex()};
  mat.userData.hasBackTex = {value:0.0};
  mat.userData.hoverAmount = {value:0.0};
  mat.userData.hoverTarget = 0.0;
  mat.userData.flatten = {value:0.0};
  mat.userData.flattenZ = {value: floorR}; // center Z of arc — flatten target
  mat.userData.splitGap = {value:0.0};
  mat.onBeforeCompile = function(shader){
    shader.uniforms.holoTime = mat.userData.holoTime;
    shader.uniforms.productTex = mat.userData.productTex;
    shader.uniforms.hasProductTex = mat.userData.hasProductTex;
    shader.uniforms.productTexAspect = mat.userData.productTexAspect;
    shader.uniforms.panelAspect = mat.userData.panelAspect;
    shader.uniforms.imgRotation = mat.userData.imgRotation;
    shader.uniforms.backTex = mat.userData.backTex;
    shader.uniforms.hasBackTex = mat.userData.hasBackTex;
    shader.uniforms.hoverAmount = mat.userData.hoverAmount;
    shader.uniforms.flatten = mat.userData.flatten;
    shader.uniforms.flattenZ = mat.userData.flattenZ;
    shader.uniforms.splitGap = mat.userData.splitGap;
    shader.uniforms.coverFit = mat.userData.coverFit;
    shader.fragmentShader = 'uniform float holoTime;\nuniform sampler2D productTex;\nuniform float hasProductTex;\nuniform float productTexAspect;\nuniform float panelAspect;\nuniform float imgRotation;\nuniform sampler2D backTex;\nuniform float hasBackTex;\nuniform float hoverAmount;\nuniform float flatten;\nuniform float splitGap;\nuniform float coverFit;\n' + shader.fragmentShader;
    // Vertex shader: depress toward center on hover
    shader.vertexShader = 'uniform float hoverAmount;\nuniform float flatten;\nuniform float flattenZ;\nuniform float splitGap;\n' + shader.vertexShader;
    shader.vertexShader = shader.vertexShader.replace(
      '#include <begin_vertex>',
      [
        '#include <begin_vertex>',
        'if(hoverAmount > 0.0) {',
        '  transformed -= normal * hoverAmount * 0.15;',
        '}',
        '// Flatten: remove curvature by lerping Z toward front of arc',
        'if(flatten > 0.0) {',
        '  transformed.z = mix(transformed.z, flattenZ, flatten);',
        '}',
        '// Split: push top half up, bottom half down from center',
        'if(splitGap > 0.0) {',
        '  float halfH = ' + (pH * 0.5).toFixed(3) + ';',
        '  float normY = (transformed.y + halfH) / (halfH * 2.0);', // 0 at bottom, 1 at top
        '  float splitDir = smoothstep(0.45, 0.55, normY) * 2.0 - 1.0;', // -1 bottom, +1 top, smooth blend at center
        '  transformed.y += splitDir * splitGap;',
        '}'
      ].join('\n')
    );
    shader.fragmentShader = shader.fragmentShader.replace(
      '#include <emissivemap_fragment>',
      [
        '#include <emissivemap_fragment>',
        '{',
        '  vec2 puv = vUv;',
        '',
        '  // ── Split gap: discard pixels in the center gap ──',
        '  if(splitGap > 0.0) {',
        '    float distFromCenter = abs(puv.y - 0.5);',
        '    float stripH = 0.5 - splitGap * 0.45;', // how much of the half remains as strip
        '    if(distFromCenter < 0.5 - stripH) discard;',
        '  }',
        '',
        '  // ── Edge glow: soft bloom emanating inward from panel edges ──',
        '  float edgeL = smoothstep(0.0, 0.18, puv.x);',
        '  float edgeR = smoothstep(1.0, 0.82, puv.x);',
        '  float edgeB = smoothstep(0.0, 0.22, puv.y);',
        '  float edgeT = smoothstep(1.0, 0.78, puv.y);',
        '  float edgeMask = 1.0 - edgeL * edgeR * edgeB * edgeT;',
        '  float edgePulse = 0.6 + 0.4 * sin(holoTime * 1.5 + puv.y * 3.0);',
        '  vec3 edgeCol = mix(vec3(0.3, 0.5, 0.9), vec3(0.15, 0.7, 0.85), puv.y);',
        '  totalEmissiveRadiance += edgeMask * edgePulse * edgeCol * 0.25;',
        '',
        '  // ── Primary scanlines: interlaced, varying intensity ──',
        '  float scanFreq = 140.0;',
        '  float scanY = puv.y * scanFreq + holoTime * 4.0;',
        '  float scanRaw = sin(scanY) * 0.5 + 0.5;',
        '  float scanline = pow(scanRaw, 8.0);',
        '  // Intensity modulates along Y for more organic look',
        '  float scanEnv = 0.6 + 0.4 * sin(puv.y * 6.28 + holoTime * 0.8);',
        '  scanline *= scanEnv * 0.22;',
        '',
        '  // ── Sub-scanlines: finer secondary pattern ──',
        '  float subScan = pow(sin(puv.y * 280.0 + holoTime * 2.5) * 0.5 + 0.5, 3.0) * 0.06;',
        '',
        '  // ── Horizontal line jitter: slight per-line horizontal wobble ──',
        '  float lineIdx = floor(puv.y * scanFreq);',
        '  float jitter = fract(sin(lineIdx * 91.3 + floor(holoTime * 8.0) * 17.7) * 43758.5) * 2.0 - 1.0;',
        '  float jitterAmount = 0.003 * (0.5 + 0.5 * sin(holoTime * 1.1 + puv.y * 4.0));',
        '  vec2 juv = vec2(puv.x + jitter * jitterAmount, puv.y);',
        '',
        '  // ── Rolling band: darker horizontal band that scrolls up ──',
        '  float bandSpeed = 0.055 + 0.02 * sin(holoTime * 0.3);',
        '  float bandPos = fract(holoTime * bandSpeed);',
        '  float bandDist = abs(puv.y - bandPos);',
        '  if(bandDist > 0.5) bandDist = 1.0 - bandDist;',
        '  float bandDarken = (1.0 - smoothstep(0.0, 0.05, bandDist)) * 0.18;',
        '',
        '  // ── Secondary band: thinner, faster ──',
        '  float band2Pos = fract(holoTime * 0.13 + 0.33);',
        '  float band2Dist = abs(puv.y - band2Pos);',
        '  if(band2Dist > 0.5) band2Dist = 1.0 - band2Dist;',
        '  float band2Darken = (1.0 - smoothstep(0.0, 0.02, band2Dist)) * 0.08;',
        '',
        '  // ── Film grain: temporal noise at pixel level ──',
        '  vec2 noiseUV = floor(juv * vec2(120.0, 90.0));',
        '  float nSeed = dot(noiseUV + floor(holoTime * 10.0), vec2(127.1, 311.7));',
        '  float noise = fract(sin(nSeed) * 43758.5453);',
        '  float grain = (noise - 0.5) * 0.06;',
        '',
        '  // ── Chromatic aberration: shifts per-channel with scanline influence ──',
        '  float caBase = 0.008 + scanline * 0.006;',
        '  float caWarp = caBase * (1.0 + 0.5 * sin(holoTime * 2.3 + puv.y * 8.0));',
        '',
        '  // ── Color fringing: slight RGB offset for CRT feel ──',
        '  totalEmissiveRadiance.r += caWarp * 0.5;',
        '  totalEmissiveRadiance.g += caWarp * 0.1;',
        '  totalEmissiveRadiance.b += caWarp * 0.35;',
        '',
        '  // ── Phosphor pattern: subtle RGB subpixel structure ──',
        '  float px = fract(puv.x * 60.0);',
        '  vec3 phosphor = vec3(',
        '    smoothstep(0.0, 0.33, px) * smoothstep(0.66, 0.33, px),',
        '    smoothstep(0.33, 0.66, px) * smoothstep(1.0, 0.66, px),',
        '    smoothstep(0.66, 1.0, px)',
        '  );',
        '  phosphor = mix(vec3(1.0), phosphor, 0.12);',
        '',
        '  // ── Composite base VHS on background ──',
        '  totalEmissiveRadiance += scanline * vec3(0.4, 0.6, 1.0);',
        '  totalEmissiveRadiance += subScan * vec3(0.25, 0.45, 0.75);',
        '  totalEmissiveRadiance += grain * vec3(0.4, 0.55, 0.8);',
        '  totalEmissiveRadiance -= bandDarken + band2Darken;',
        '  totalEmissiveRadiance *= phosphor;',
        '  float flicker = 0.96 + 0.04 * sin(holoTime * 14.0 + sin(holoTime * 4.3) * 6.0);',
        '  flicker *= 0.98 + 0.02 * sin(holoTime * 53.0);',
        '  totalEmissiveRadiance *= flicker;',
        '',
        '  // ── Product image overlay ──',
        '  if(hasProductTex > 0.5) {',
        '    vec2 imgUV = puv;',
        '    float rAngle = imgRotation * 1.5708;',
        '    vec2 rc = imgUV - 0.5;',
        '    float rCos = cos(rAngle), rSin = sin(rAngle);',
        '    imgUV = vec2(rc.x * rCos - rc.y * rSin, rc.x * rSin + rc.y * rCos) + 0.5;',
        '    float pA = mix(panelAspect, 1.0 / panelAspect, imgRotation);',
        '    if(coverFit > 0.5) {',
        '      // COVER: image fills panel, overflow is cropped',
        '      if(pA > productTexAspect) {',
        '        float sc = pA / productTexAspect;',
        '        imgUV.y = imgUV.y / sc - (1.0 / sc - 1.0) * 0.5;',
        '      } else {',
        '        float sc = productTexAspect / pA;',
        '        imgUV.x = imgUV.x / sc - (1.0 / sc - 1.0) * 0.5;',
        '      }',
        '    } else {',
        '      // CONTAIN: image fits inside panel, may letterbox',
        '      if(pA > productTexAspect) {',
        '        float sc = productTexAspect / pA;',
        '        imgUV.x = imgUV.x / sc - (1.0 / sc - 1.0) * 0.5;',
        '      } else {',
        '        float sc = pA / productTexAspect;',
        '        imgUV.y = imgUV.y / sc - (1.0 / sc - 1.0) * 0.5;',
        '      }',
        '    }',
        '    vec4 imgCol = vec4(0.0);',
        '    if(imgUV.x >= 0.0 && imgUV.x <= 1.0 && imgUV.y >= 0.0 && imgUV.y <= 1.0) {',
        '      imgCol = texture2D(productTex, imgUV);',
        '      if(!gl_FrontFacing && hasBackTex > 0.5) {',
        '        imgUV.x = 1.0 - imgUV.x;',
        '        imgCol = texture2D(backTex, imgUV);',
        '      }',
        '    }',
        '    totalEmissiveRadiance = mix(totalEmissiveRadiance, imgCol.rgb, imgCol.a);',
        '  }',
        '',
        '  // ── VHS overlay on top of everything (including image) ──',
        '  // Scanlines over image',
        '  totalEmissiveRadiance -= scanline * 0.12;',
        '  totalEmissiveRadiance += grain * vec3(0.15, 0.18, 0.22);',
        '  totalEmissiveRadiance -= (bandDarken + band2Darken) * 0.6;',
        '  totalEmissiveRadiance *= mix(vec3(1.0), phosphor, 0.08);',
        '  totalEmissiveRadiance *= flicker;',
        '',
        '  // ── Interlace refresh line: bright horizontal bar sweeping down ──',
        '  float refreshPos = fract(holoTime * 0.08);',
        '  float refreshDist = abs(puv.y - refreshPos);',
        '  if(refreshDist > 0.5) refreshDist = 1.0 - refreshDist;',
        '  float refreshLine = (1.0 - smoothstep(0.0, 0.015, refreshDist)) * 0.18;',
        '  totalEmissiveRadiance += refreshLine * vec3(0.7, 0.85, 1.0);',
        '',
        '  // ── Hover darkening: blend toward deep blue ──',
        '  if(hoverAmount > 0.0) {',
        '    totalEmissiveRadiance = mix(totalEmissiveRadiance, vec3(0.08, 0.12, 0.25), hoverAmount * 0.45);',
        '  }',
        '}'
      ].join('\n')
    );
    // Override diffuse color where image has opaque pixels so lighting doesn't tint image
    shader.fragmentShader = shader.fragmentShader.replace(
      '#include <color_fragment>',
      [
        '#include <color_fragment>',
        'if(hasProductTex > 0.5) {',
        '  vec2 duv = vUv;',
        '  float drAngle = imgRotation * 1.5708;',
        '  vec2 drc = duv - 0.5;',
        '  float drCos = cos(drAngle), drSin = sin(drAngle);',
        '  duv = vec2(drc.x * drCos - drc.y * drSin, drc.x * drSin + drc.y * drCos) + 0.5;',
        '  float dpA = mix(panelAspect, 1.0 / panelAspect, imgRotation);',
        '  if(coverFit > 0.5) {',
        '    if(dpA > productTexAspect) {',
        '      float dsc = dpA / productTexAspect;',
        '      duv.y = duv.y / dsc - (1.0 / dsc - 1.0) * 0.5;',
        '    } else {',
        '      float dsc = productTexAspect / dpA;',
        '      duv.x = duv.x / dsc - (1.0 / dsc - 1.0) * 0.5;',
        '    }',
        '  } else {',
        '    if(dpA > productTexAspect) {',
        '      float dsc = productTexAspect / dpA;',
        '      duv.x = duv.x / dsc - (1.0 / dsc - 1.0) * 0.5;',
        '    } else {',
        '      float dsc = dpA / productTexAspect;',
        '      duv.y = duv.y / dsc - (1.0 / dsc - 1.0) * 0.5;',
        '    }',
        '  }',
        '  float imgA = 0.0;',
        '  if(duv.x >= 0.0 && duv.x <= 1.0 && duv.y >= 0.0 && duv.y <= 1.0) {',
        '    imgA = texture2D(productTex, duv).a;',
        '    if(!gl_FrontFacing && hasBackTex > 0.5) {',
        '      duv.x = 1.0 - duv.x;',
        '      imgA = texture2D(backTex, duv).a;',
        '    }',
        '  }',
        '  diffuseColor = mix(diffuseColor, vec4(0.0, 0.0, 0.0, 1.0), imgA);',
        '}',
        'if(hoverAmount > 0.0) {',
        '  diffuseColor.rgb = mix(diffuseColor.rgb, vec3(0.05, 0.08, 0.18), hoverAmount * 0.5);',
        '}'
      ].join('\n')
    );
  };
  var mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = 1;
  mesh.userData.floorPos = floorPos;
  mesh.userData.vertPos = vertPos;
  mesh.userData.morphT = 0;
  
  // Border outline — only the 4 edges of the panel (top, bottom, left arc, right arc)
  // CylinderGeometry vertex layout: (SEG_X+1) columns x (SEG_Y+1) rows
  var cols = SEG_X + 1; // 33
  var rows = SEG_Y + 1; // 9
  
  // Collect border vertex indices
  var borderIndices = [];
  // Top edge (row 0, left to right)
  for(var c=0;c<cols;c++) borderIndices.push(c);
  // Right edge (column SEG_X, top to bottom)
  for(var r=1;r<rows;r++) borderIndices.push(r*cols + SEG_X);
  // Bottom edge (row SEG_Y, right to left)
  for(var c2=SEG_X-1;c2>=0;c2--) borderIndices.push(SEG_Y*cols + c2);
  // Left edge (column 0, bottom to top, close the loop)
  for(var r2=SEG_Y-1;r2>0;r2--) borderIndices.push(r2*cols);
  // Close loop
  borderIndices.push(0);
  
  // Build a line geometry that reads positions from the shared position buffer
  var lineGeo = new THREE.BufferGeometry();
  var linePositions = new Float32Array(borderIndices.length * 3);
  lineGeo.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
  
  // Store border indices and reference to source positions for updating
  mesh.userData.borderIndices = borderIndices;
  mesh.userData.lineGeo = lineGeo;
  
  // Initial fill
  var srcPos = geo.attributes.position.array;
  for(var bi=0;bi<borderIndices.length;bi++){
    var si = borderIndices[bi]*3;
    linePositions[bi*3]   = srcPos[si];
    linePositions[bi*3+1] = srcPos[si+1];
    linePositions[bi*3+2] = srcPos[si+2];
  }
  lineGeo.attributes.position.needsUpdate = true;
  
  var outline = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({
    color: 0x667788, transparent: true, opacity: 0.35
  }));
  
  return {mesh:mesh, edges:outline};
}

function morphTo(mesh, t) {
  var pos = mesh.geometry.attributes.position;
  var fp = mesh.userData.floorPos, vp = mesh.userData.vertPos;
  if(!fp||!vp) return;
  t = Math.max(0,Math.min(1,t));
  mesh.userData.morphT = t;
  for(var i=0;i<pos.count;i++){
    var i3=i*3;
    pos.array[i3]   = fp[i3]   + (vp[i3]  -fp[i3])  *t;
    pos.array[i3+1] = fp[i3+1] + (vp[i3+1]-fp[i3+1])*t;
    pos.array[i3+2] = fp[i3+2] + (vp[i3+2]-fp[i3+2])*t;
  }
  pos.needsUpdate = true;
  mesh.geometry.computeVertexNormals();
  
  // Sync border outline if present
  syncOutline(mesh);
}

function syncOutline(mesh) {
  var borderIndices = mesh.userData.borderIndices;
  var lineGeo = mesh.userData.lineGeo;
  if(!borderIndices || !lineGeo) return;
  var srcPos = mesh.geometry.attributes.position.array;
  var linePos = lineGeo.attributes.position.array;
  for(var bi=0;bi<borderIndices.length;bi++){
    var si = borderIndices[bi]*3;
    linePos[bi*3]   = srcPos[si];
    linePos[bi*3+1] = srcPos[si+1];
    linePos[bi*3+2] = srcPos[si+2];
  }
  lineGeo.attributes.position.needsUpdate = true;
}

// ══════════════════════════════════════════════
// PROCEDURAL GLASS TEXTURES
// ══════════════════════════════════════════════
// 1) Scratch texture — thin random lines on black
var _scratchTex = null;
function generateScratchTexture() {
  if (_scratchTex) return _scratchTex;
  var size = 512;
  var c = document.createElement('canvas');
  c.width = size; c.height = size;
  var ctx = c.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, size, size);
  ctx.lineCap = 'round';
  for (var i = 0; i < 120; i++) {
    var x = Math.random() * size, y = Math.random() * size;
    var angle = Math.random() * Math.PI;
    var len = 15 + Math.random() * 80;
    var w = 0.3 + Math.random() * 1.0;
    ctx.strokeStyle = 'rgba(255,255,255,' + (0.15 + Math.random() * 0.85) + ')';
    ctx.lineWidth = w;
    ctx.beginPath(); ctx.moveTo(x, y);
    ctx.lineTo(x + Math.cos(angle) * len, y + Math.sin(angle) * len); ctx.stroke();
    if (Math.random() > 0.6) {
      ctx.beginPath(); ctx.moveTo(x, y);
      ctx.quadraticCurveTo(x + Math.cos(angle + 0.3) * len * 0.5, y + Math.sin(angle + 0.3) * len * 0.5,
        x + Math.cos(angle + 0.2) * len * 0.7, y + Math.sin(angle + 0.2) * len * 0.7); ctx.stroke();
    }
  }
  ctx.filter = 'blur(0.5px)'; ctx.drawImage(c, 0, 0); ctx.filter = 'none';
  var tex = new THREE.CanvasTexture(c);
  tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
  tex.needsUpdate = true; _scratchTex = tex; return tex;
}

// 2) Frost/surface texture — soft Voronoi cells (NOT stained glass — no hard edges)
var _frostTex = null;
function generateFrostTexture() {
  if (_frostTex) return _frostTex;
  var size = 512;
  var c = document.createElement('canvas');
  c.width = size; c.height = size;
  var ctx = c.getContext('2d');
  var imgData = ctx.createImageData(size, size);
  var d = imgData.data;
  // 30 Voronoi seed points
  var seeds = [];
  for (var s = 0; s < 30; s++) {
    seeds.push({
      x: (Math.sin(s * 127.1 + 311.7) * 0.5 + 0.5),
      y: (Math.sin(s * 269.5 + 183.3) * 0.5 + 0.5)
    });
  }
  for (var i = 0; i < d.length; i += 4) {
    var px = (i / 4) % size, py = Math.floor((i / 4) / size);
    var u = px / size, v = py / size;
    var minDist = 1.0, minDist2 = 1.0;
    for (var s = 0; s < 30; s++) {
      var dx = u - seeds[s].x, dy = v - seeds[s].y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < minDist) { minDist2 = minDist; minDist = dist; }
      else if (dist < minDist2) { minDist2 = dist; }
    }
    // Soft cell gradient — NOT sharp edges
    var cellVal = minDist * 6.0; // distance from nearest seed
    cellVal = Math.min(cellVal, 1.0);
    // Fine grain noise
    var n1 = Math.sin(px * 0.35 + py * 0.28) * Math.cos(py * 0.41 - px * 0.19);
    var grain = n1 * 0.5 + 0.5;
    var val = Math.floor((cellVal * 0.7 + grain * 0.3) * 255);
    d[i] = val; d[i+1] = val; d[i+2] = val; d[i+3] = 255;
  }
  ctx.putImageData(imgData, 0, 0);
  // Blur to soften
  ctx.filter = 'blur(3px)'; ctx.drawImage(c, 0, 0); ctx.filter = 'none';
  var tex = new THREE.CanvasTexture(c);
  tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
  tex.needsUpdate = true; _frostTex = tex; return tex;
}

// ══════════════════════════════════════════════
// SHARED GLASS GLARE GLSL (injected into all glass shaders)
// ══════════════════════════════════════════════
// Sweeping glare light + scratch reveal + frost texture tint
// Requires: N, V, vUv, time, tScratch, tFrost uniforms

var GLARE_GLSL_FUNCS = '';  // no extra functions needed — using Blinn-Phong with wide lobe

// The glare calc — uses N, V, time, tScratch, tFrost, vUv
var GLARE_GLSL_CALC = [
  '  // === Glass Glare + Scratch + Frost System ===',
  '  // Sweeping virtual glare light (separate from scene)',
  '  float sweep = time * 0.2;',
  '  vec3 glareDir = normalize(vec3(sin(sweep) * 1.5, 0.8 + sin(sweep * 0.7) * 0.3, cos(sweep * 0.6)));',
  '  vec3 glareH = normalize(V + glareDir);',
  '  float NdH = max(dot(N, glareH), 0.0);',
  '',
  '  // Wide glare lobe (shininess 64) — actually visible on flat surfaces',
  '  float glareSpec = pow(NdH, 64.0);',
  '  // Fresnel boost at edges',
  '  float glareFresnel = pow(1.0 - max(dot(N, V), 0.0), 5.0);',
  '  float glareStrength = glareSpec * (0.4 + glareFresnel * 1.5);',
  '',
  '  // Second softer sweep from different angle',
  '  vec3 glareDir2 = normalize(vec3(cos(sweep * 0.8) * 1.2, -0.4, sin(sweep * 1.1)));',
  '  vec3 glareH2 = normalize(V + glareDir2);',
  '  float glareSpec2 = pow(max(dot(N, glareH2), 0.0), 32.0) * 0.3;',
  '',
  '  // Scratch texture — perturb normal, revealed by glare',
  '  vec2 eps = vec2(1.0/512.0, 0.0);',
  '  float sC = texture2D(tScratch, vUv).r;',
  '  float sR = texture2D(tScratch, vUv + eps.xy).r;',
  '  float sU = texture2D(tScratch, vUv + eps.yx).r;',
  '  // Perturbed normal for scratches',
  '  vec3 Nscr = normalize(N + vec3((sC - sR) * 0.4, (sC - sU) * 0.4, 0.0));',
  '  float scratchGlare = pow(max(dot(Nscr, glareH), 0.0), 24.0) * sC;',
  '',
  '  // Frost texture — soft surface variation + blue tint',
  '  float frostVal = texture2D(tFrost, vUv).r;',
  '  // Refraction distortion from frost',
  '  col += col * (frostVal - 0.5) * 0.08;',
  '  // Blue tint weighted by frost pattern',
  '  col = mix(col, vec3(0.82, 0.86, 0.95), 0.08 + frostVal * 0.06);',
  '',
  '  // Combine glare',
  '  vec3 glareResult = vec3(0.0);',
  '  glareResult += vec3(0.95, 0.97, 1.0) * glareStrength * 0.5;',
  '  glareResult += vec3(0.90, 0.94, 1.0) * glareSpec2;',
  '  glareResult += vec3(1.0, 1.0, 0.97) * scratchGlare * glareStrength * 2.0;'
].join('\n');

// Blue tint (now handled inside GLARE_GLSL_CALC with frost texture)
var GLASS_TINT_GLSL = '';

// ══════════════════════════════════════════════
// CIRCULAR GLASS BUTTON (separate piece of glass in 3D space)
// ══════════════════════════════════════════════
function createGlassCircle(radius, label, frost) {
  if(frost===undefined) frost=0.5;
  var segs=32;
  var geo=new THREE.CircleGeometry(radius, segs);
  var pos=geo.attributes.position;
  
  // Push edge vertices back for bevel
  for(var j=0;j<pos.count;j++){
    var x=pos.array[j*3], y=pos.array[j*3+1];
    var d=Math.sqrt(x*x+y*y);
    var rim=d/radius;
    if(rim>0.7){
      var bevelAmt=(rim-0.7)/0.3;
      pos.array[j*3+2]=-0.06*bevelAmt*bevelAmt;
    }
  }
  pos.needsUpdate=true;
  geo.computeVertexNormals();
  
  // Glass material
  var baseColor=new THREE.Color(0x8899bb);
  var frostColor=new THREE.Color(0xc8d0e0);
  var matColor=baseColor.clone().lerp(frostColor,frost);
  var baseEmissive=new THREE.Color(0x334466);
  var frostEmissive=new THREE.Color(0x8894aa);
  var matEmissive=baseEmissive.clone().lerp(frostEmissive,frost);

  var mat=new THREE.MeshStandardMaterial({
    color:matColor, transparent:true,
    opacity:0.82+frost*0.16,
    side:THREE.DoubleSide, depthWrite:true,
    roughness:0.1+frost*0.5,
    metalness:0.5-frost*0.3,
    emissive:matEmissive,
    emissiveIntensity:0.2+frost*0.15
  });

  var mesh=new THREE.Mesh(geo,mat);
  
  // Circular edge outline
  var edgePoints=[];
  for(var i=0;i<=64;i++){
    var a=(i/64)*Math.PI*2;
    var ex=Math.cos(a)*radius, ey=Math.sin(a)*radius;
    // Match bevel z
    var ez=-0.06; // at the rim
    edgePoints.push(ex,ey,ez);
  }
  var edgeGeo=new THREE.BufferGeometry();
  edgeGeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(edgePoints),3));
  var outline=new THREE.Line(edgeGeo,new THREE.LineBasicMaterial({color:0x667788,transparent:true,opacity:0.4}));
  
  // Label
  var textMesh=null;
  if(label){
    var canvas=document.createElement('canvas');
    var ctx=canvas.getContext('2d');
    var fontSize=64;
    ctx.font='500 '+fontSize+'px Arial';
    var tw=ctx.measureText(label).width;
    canvas.width=Math.ceil(tw+40);
    canvas.height=Math.ceil(fontSize*1.5);
    ctx.font='500 '+fontSize+'px Arial';
    ctx.fillStyle='#c0c8d8';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(label,canvas.width/2,canvas.height/2);
    var tex=new THREE.CanvasTexture(canvas);tex.needsUpdate=true;
    var textAspect=canvas.width/canvas.height;
    var textH=radius*1.2;
    var textW=textH*textAspect;
    if(textW>radius*1.8){textW=radius*1.8;textH=textW/textAspect;}
    var textGeo=new THREE.PlaneGeometry(textW,textH);
    var textMat=new THREE.MeshBasicMaterial({map:tex,transparent:true,side:THREE.DoubleSide,depthWrite:false,depthTest:false});
    textMesh=new THREE.Mesh(textGeo,textMat);
    textMesh.renderOrder=20;
    textMesh.position.z=0.02;
  }
  
  var group=new THREE.Group();
  group.add(mesh);
  group.add(outline);
  if(textMesh)group.add(textMesh);
  group.userData.glassMesh=mesh;
  group.userData.outline=outline;
  return group;
}

// ══════════════════════════════════════════════
// 3D GLASS RECT PANELS (same look as product panels but flat)
// ══════════════════════════════════════════════
function createGlassRect(width, height, label, frost) {
  // frost: 0 = clear glass (default), 1 = fully frosted (opaque white)
  if(frost===undefined||frost===null) frost=0;
  var segsX = 16, segsY = 8;
  var bevel = 0.1, bevelR = 0.2;
  
  var geo = new THREE.PlaneGeometry(width, height, segsX, segsY);
  var pos = geo.attributes.position;
  var vtx = new THREE.Vector3();
  
  // Apply bevel to edges
  for(var j=0;j<pos.count;j++){
    vtx.fromBufferAttribute(pos, j);
    var dft = Math.abs(vtx.y - height/2);
    var dfb = Math.abs(vtx.y + height/2);
    var dfr = Math.abs(vtx.x - width/2);
    var dfl = Math.abs(vtx.x + width/2);
    var minD = Math.min(dft, dfb, dfr, dfl);
    if(minD < bevelR) {
      var f = (bevelR - minD) / bevelR;
      vtx.z = -bevel * f;
    }
    pos.setXYZ(j, vtx.x, vtx.y, vtx.z);
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();
  
  // Glass material — frost shifts toward whiter, more opaque, rougher
  var baseColor = new THREE.Color(0x8899bb);
  var frostColor = new THREE.Color(0xc8d0e0);
  var matColor = baseColor.clone().lerp(frostColor, frost);
  
  var baseEmissive = new THREE.Color(0x334466);
  var frostEmissive = new THREE.Color(0x8894aa);
  var matEmissive = baseEmissive.clone().lerp(frostEmissive, frost);
  
  var mat = new THREE.MeshStandardMaterial({
    color: matColor, transparent: true,
    opacity: 0.82 + frost * 0.16,
    side: THREE.DoubleSide, depthWrite: true,
    roughness: 0.1 + frost * 0.5,
    metalness: 0.5 - frost * 0.3,
    emissive: matEmissive,
    emissiveIntensity: 0.2 + frost * 0.15
  });
  
  var mesh = new THREE.Mesh(geo, mat);
  
  // Border outline — same approach as product panels
  var cols = segsX + 1;
  var rows = segsY + 1;
  var borderIndices = [];
  for(var c=0;c<cols;c++) borderIndices.push(c);
  for(var r=1;r<rows;r++) borderIndices.push(r*cols + segsX);
  for(var c2=segsX-1;c2>=0;c2--) borderIndices.push(segsY*cols + c2);
  for(var r2=segsY-1;r2>0;r2--) borderIndices.push(r2*cols);
  borderIndices.push(0);
  
  var lineGeo = new THREE.BufferGeometry();
  var linePos = new Float32Array(borderIndices.length * 3);
  lineGeo.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
  
  var srcArr = geo.attributes.position.array;
  for(var bi=0;bi<borderIndices.length;bi++){
    var si = borderIndices[bi]*3;
    linePos[bi*3]   = srcArr[si];
    linePos[bi*3+1] = srcArr[si+1];
    linePos[bi*3+2] = srcArr[si+2];
  }
  lineGeo.attributes.position.needsUpdate = true;
  
  var outline = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({
    color: 0x667788, transparent: true, opacity: 0.35
  }));
  
  // Text label rendered onto the glass surface
  var textMesh = null;
  if(label) {
    var canvas = document.createElement('canvas');
    var ctx = canvas.getContext('2d');
    var fontSize = 64;
    ctx.font = '600 ' + fontSize + 'px Arial, sans-serif';
    var tw = ctx.measureText(label).width;
    canvas.width = Math.ceil(tw + 40);
    canvas.height = Math.ceil(fontSize * 1.5);
    
    ctx.font = '600 ' + fontSize + 'px Arial, sans-serif';
    ctx.fillStyle = '#d0d8e8';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, canvas.width/2, canvas.height/2);
    
    var tex = new THREE.CanvasTexture(canvas);
    tex.needsUpdate = true;
    
    var textAspect = canvas.width / canvas.height;
    var textH = height * 0.6;
    var textW = textH * textAspect;
    // Clamp text width to panel width
    if(textW > width * 0.9) { textW = width * 0.9; textH = textW / textAspect; }
    
    var textGeo = new THREE.PlaneGeometry(textW, textH);
    var textMat = new THREE.MeshBasicMaterial({
      map: tex, transparent: true, side: THREE.DoubleSide, depthWrite: false
    });
    textMesh = new THREE.Mesh(textGeo, textMat);
    textMesh.position.z = 0.02; // float just above the glass surface
  }
  
  // Group everything
  var group = new THREE.Group();
  group.add(mesh);
  group.add(outline);
  if(textMesh) group.add(textMesh);
  
  group.userData.glassMesh = mesh;
  group.userData.outline = outline;
  group.userData.textMesh = textMesh;
  
  return group;
}

function createGlassRing(ringRadius, tubeRadius, circleR) {
  // Glass torus ring using TorusGeometry with glass refraction shader
  var radSegs = 64, tubeSegs = 12;
  var geo = new THREE.TorusGeometry(ringRadius, tubeRadius, tubeSegs, radSegs);

  var glassMat = new THREE.ShaderMaterial({
    uniforms:{
      tBg:{value:glassFBO?glassFBO.texture:null},
      tScratch:{value:generateScratchTexture()},
      tFrost:{value:generateFrostTexture()},
      res:{value:new THREE.Vector2(window.innerWidth, window.innerHeight)},
      time:{value:0},
      opacity:{value:1.0},
      morph:{value:0.0},
      nodeAngles:{value:[1.5708,5.7596,3.6652]}
    },
    vertexShader:[
      'uniform float morph;',
      'uniform float nodeAngles[3];',
      'varying vec3 vN,vV;',
      'varying vec2 vUv;',
      'varying float vMorphFade;',
      'void main(){',
      '  vUv=uv;',
      '  float angle=uv.x*6.2831853;',
      '  float minArc=6.28;float nearA=0.0;',
      '  for(int i=0;i<3;i++){',
      '    float d=angle-nodeAngles[i];',
      '    d=mod(d+3.14159265,6.2831853)-3.14159265;',
      '    if(abs(d)<abs(minArc)){minArc=d;nearA=nodeAngles[i];}',
      '  }',
      '  float attracted=angle-minArc*morph;',
      '  float distR=abs(minArc)/1.0472;',
      '  float tShrink=1.0-morph*(0.5+0.5*distR);',
      '  tShrink=max(tShrink,0.0);',
      '  float phi=uv.y*6.2831853;',
      '  float R=3.0,r=0.25;',
      '  float nr=r*tShrink;',
      '  vec3 mp;',
      '  mp.x=(R+nr*cos(phi))*cos(attracted);',
      '  mp.y=(R+nr*cos(phi))*sin(attracted);',
      '  mp.z=nr*sin(phi);',
      '  vec3 fp=mix(position,mp,morph);',
      '  vMorphFade=1.0-morph*distR;',
      '  vec4 mv=modelViewMatrix*vec4(fp,1.0);',
      '  vN=normalize(normalMatrix*normal);',
      '  vV=normalize(-mv.xyz);',
      '  gl_Position=projectionMatrix*mv;',
      '}'
    ].join('\n'),
    fragmentShader:[
      'uniform sampler2D tBg,tScratch,tFrost;',
      'uniform vec2 res;',
      'uniform float time,opacity;',
      'varying vec3 vN,vV;',
      'varying vec2 vUv;',
      'varying float vMorphFade;',
      GLARE_GLSL_FUNCS,
      'void main(){',
      '  vec3 N=normalize(vN); vec3 V=normalize(vV);',
      '  vec2 suv=gl_FragCoord.xy/res;',
      '  vec2 refr=N.xy*0.15;',
      '  refr+=0.003*vec2(sin(time*1.5+suv.y*8.0),cos(time*1.2+suv.x*8.0));',
      '  float ef=1.0-abs(dot(V,N));',
      '  float ca=0.23*(0.3+ef*2.5);',
      '  vec2 tx=1.0/res;',
      '  vec2 ru=suv+refr*(1.0+ca),gu=suv+refr,bu=suv+refr*(1.0-ca);',
      '  float r=texture2D(tBg,ru).r*.6+texture2D(tBg,ru+tx).r*.2+texture2D(tBg,ru-tx).r*.2;',
      '  float g=texture2D(tBg,gu).g*.6+texture2D(tBg,gu+tx).g*.2+texture2D(tBg,gu-tx).g*.2;',
      '  float b=texture2D(tBg,bu).b*.6+texture2D(tBg,bu+tx).b*.2+texture2D(tBg,bu-tx).b*.2;',
      '  vec3 col=vec3(r,g,b);',
      '  float fresnel=pow(1.0-max(dot(V,N),0.0),2.0)*0.15;',
      '  col=mix(col,vec3(0.95,0.96,0.98),fresnel*0.1);',
      '  col+=vec3(0.7,0.75,0.9)*ef*0.15;',
      GLASS_TINT_GLSL,
      GLARE_GLSL_CALC,
      '  col+=glareResult;',
      '  gl_FragColor=vec4(col,opacity*clamp(vMorphFade,0.0,1.0));',
      '}'
    ].join('\n'),
    transparent:true, side:THREE.DoubleSide, depthWrite:true
  });

  var mesh = new THREE.Mesh(geo, glassMat);
  mesh.renderOrder = 5;
  // Torus is in XY plane by default, rotate to lie flat (XZ plane)
  mesh.rotation.x = Math.PI / 2;

  var group = new THREE.Group();
  group.add(mesh);
  group.userData.glassMesh = mesh;
  group.userData.isGlassRing = true;
  group.userData.ringRadius = ringRadius;

  // 3 glass circle nodes on the ring (become buttons in DM)
  var nodes = [];
  for(var ni = 0; ni < 3; ni++){
    var nodeAngle = ni * (Math.PI * 2 / 3);
    var node = createGlassCircleBtn(circleR);
    node.position.set(Math.sin(nodeAngle) * ringRadius, 0, Math.cos(nodeAngle) * ringRadius);
    node.rotation.y = nodeAngle;
    node.scale.set(0.35, 0.35, 0.35);
    group.add(node);
    nodes.push(node);
  }
  group.userData.nodes = nodes;

  return group;
}

function createGlassCircleBtn(circleR) {
  // Creates a glass circle for DM buttons (morphed from ring)
  var CR = circleR, segs = 20;
  var geo = new THREE.PlaneGeometry(CR*2.2, CR*2.2, segs, segs);
  var pos = geo.attributes.position;
  for(var i=0;i<pos.count;i++){
    var u=(pos.array[i*3]/(CR*2.2))+0.5, v=(pos.array[i*3+1]/(CR*2.2))+0.5;
    var cx2=(u-0.5)*2, cy2=(v-0.5)*2, d=Math.sqrt(cx2*cx2+cy2*cy2);
    var cd=Math.min(d,1)*CR;
    var px=0,py=0;
    if(d>0.001){px=(cx2/d)*cd;py=(cy2/d)*cd;}
    var rim=cd/CR;
    var cz=(rim>0.7)?-0.04*((rim-0.7)/0.3)*((rim-0.7)/0.3):0;
    pos.array[i*3]=px;pos.array[i*3+1]=py;pos.array[i*3+2]=cz;
  }
  pos.needsUpdate=true;geo.computeVertexNormals();

  var glassMat = new THREE.ShaderMaterial({
    uniforms:{
      tBg:{value:glassFBO?glassFBO.texture:null},
      tScratch:{value:generateScratchTexture()},
      tFrost:{value:generateFrostTexture()},
      res:{value:new THREE.Vector2(window.innerWidth,window.innerHeight)},
      cR:{value:CR}, time:{value:0},
      hoverPress:{value:0.0}
    },
    vertexShader:[
      'uniform float hoverPress;',
      'varying vec3 vN,vV,vLP;',
      'varying vec2 vUv;',
      'void main(){',
      '  vec3 transformed = position - normal * hoverPress * 0.04;',
      '  vLP=transformed;',
      '  vUv=uv;',
      '  vec4 mv=modelViewMatrix*vec4(transformed,1.0);',
      '  vN=normalize(normalMatrix*normal);',
      '  vV=normalize(-mv.xyz);',
      '  gl_Position=projectionMatrix*mv;',
      '}'
    ].join('\n'),
    fragmentShader:[
      'uniform sampler2D tBg,tScratch,tFrost;',
      'uniform vec2 res;',
      'uniform float cR,time,hoverPress;',
      'varying vec3 vN,vV,vLP;',
      'varying vec2 vUv;',
      GLARE_GLSL_FUNCS,
      'void main(){',
      '  vec3 N=normalize(vN); vec3 V=normalize(vV);',
      '  float sd=length(vLP.xy)-cR;',
      '  float edge=fwidth(sd)*1.5;',
      '  float alpha=1.0-smoothstep(-edge,edge,sd);',
      '  if(alpha<0.01)discard;',
      '  float glow=smoothstep(edge*4.0,0.0,abs(sd))*0.5;',
      '  vec2 suv=gl_FragCoord.xy/res;',
      '  vec2 refr=N.xy*0.15;',
      '  refr+=0.003*vec2(sin(time*1.5+suv.y*8.0),cos(time*1.2+suv.x*8.0));',
      '  float ef=1.0-abs(dot(V,N));',
      '  float ca=0.23*(0.3+ef*2.5);',
      '  vec2 tx=1.0/res;',
      '  vec2 ru=suv+refr*(1.0+ca),gu=suv+refr,bu=suv+refr*(1.0-ca);',
      '  float r=texture2D(tBg,ru).r*.6+texture2D(tBg,ru+tx).r*.2+texture2D(tBg,ru-tx).r*.2;',
      '  float g=texture2D(tBg,gu).g*.6+texture2D(tBg,gu+tx).g*.2+texture2D(tBg,gu-tx).g*.2;',
      '  float b=texture2D(tBg,bu).b*.6+texture2D(tBg,bu+tx).b*.2+texture2D(tBg,bu-tx).b*.2;',
      '  vec3 col=vec3(r,g,b);',
      '  float fresnel=pow(1.0-max(dot(V,N),0.0),2.0)*0.15;',
      '  col=mix(col,vec3(0.95,0.96,0.98),fresnel*0.1);',
      '  col+=vec3(0.7,0.75,0.9)*glow*0.3;',
      GLASS_TINT_GLSL,
      GLARE_GLSL_CALC,
      '  col+=glareResult;',
      '  col=mix(col,vec3(0.05,0.08,0.18),hoverPress*0.45);',
      '  gl_FragColor=vec4(col,alpha);',
      '}'
    ].join('\n'),
    transparent:true, side:THREE.DoubleSide, depthWrite:true
  });

  var mesh = new THREE.Mesh(geo, glassMat);
  mesh.renderOrder=10;

  var group = new THREE.Group();
  group.add(mesh);
  group.userData.glassMesh = mesh;
  group.userData.isButton = true;

  return group;
}

function createStarIconOverlay(iconType, circleR) {
  // Creates a canvas icon overlay for a morphed star button
  var canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  var ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#c0c8d8'; ctx.fillStyle = '#c0c8d8';
  ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  if(iconType === 'add-to-cart'){
    var s=14, cx=32, cy=34;
    ctx.beginPath();
    ctx.moveTo(cx-s*0.7,cy-s*0.1);ctx.lineTo(cx-s*0.8,cy+s*0.9);
    ctx.lineTo(cx+s*0.8,cy+s*0.9);ctx.lineTo(cx+s*0.7,cy-s*0.1);ctx.closePath();ctx.stroke();
    ctx.beginPath();ctx.arc(cx,cy-s*0.1,s*0.4,Math.PI,0);ctx.stroke();
    ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(48,10);ctx.lineTo(48,22);ctx.stroke();
    ctx.beginPath();ctx.moveTo(42,16);ctx.lineTo(54,16);ctx.stroke();
  } else if(iconType === 'close'){
    ctx.lineWidth=3.5;
    ctx.beginPath();ctx.moveTo(22,22);ctx.lineTo(42,42);ctx.stroke();
    ctx.beginPath();ctx.moveTo(42,22);ctx.lineTo(22,42);ctx.stroke();
  } else if(iconType === 'expand'){
    ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(20,32);ctx.lineTo(44,32);ctx.stroke();
    ctx.beginPath();ctx.moveTo(34,22);ctx.lineTo(44,32);ctx.lineTo(34,42);ctx.stroke();
  }

  var iconTex = new THREE.CanvasTexture(canvas); iconTex.needsUpdate = true;
  var iconMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(circleR*1.4, circleR*1.4),
    new THREE.MeshBasicMaterial({map:iconTex, transparent:true, side:THREE.DoubleSide, depthWrite:false, depthTest:false})
  );
  iconMesh.renderOrder = 20;
  iconMesh.position.z = 0.02;
  return iconMesh;
}

function createFloors() {
  PRODUCT_DATA.floors.forEach(function(cfg, idx) {
    var np = cfg.products.length;
    var y = -idx * FLOOR_SPACING;
    var r = cfg.isSmall ? SMALL_RADIUS : LARGE_RADIUS;
    var vr = r * VW_RADIUS_MULT;
    var hasRings = !cfg.isSmall;
    if(cfg.isOrbFloor){
      floors.push(createOrbFloor(y, SMALL_RADIUS, cfg.label, np, idx));
    } else {
      // Top wheel (small, non-orb — e.g. Pants): taller, narrower, image cover-fits
      var panelOpts = (cfg.isSmall) ? {
        height: PLANE_WIDTH * 1.65,
        width:  PLANE_WIDTH * 0.85,
        coverFit: true
      } : {};
      floors.push(createFloor(y, r, vr, cfg.label, np, hasRings, idx, panelOpts));
    }
  });
  
  // Setup intro
  floors.forEach(function(fl, fi) {
    var pd = [];
    fl.panels.forEach(function(panel, pi) {
      var oy = panel.mesh.position.y;
      var dd = 1.5+Math.random()*0.8;
      pd.push({oy:oy, dd:dd, delay:pi*0.06, prog:0});
      panel.mesh.position.y = oy-dd;
      panel.edges.position.y = panel.mesh.position.y;
    });
    introAnim.offsets.push(pd);
    setFloorAlpha(fl,0);
    // Intro offset for orbs
    if(fl.orbs){
      fl.orbs.forEach(function(orb,oi){
        orb.mesh.userData.oy=orb.mesh.position.y;
        orb.mesh.position.y-=1.5+Math.random()*0.8;
        orb.edges.position.y=orb.mesh.position.y;
        orb.mesh.material.opacity=0.01;
      });
    }
    if(fl.hasRings&&fl.rings){
      fl.rings.top.forEach(function(rg){rg.userData.oy=rg.position.y;rg.position.y-=1.8;});
      fl.rings.bottom.forEach(function(rg){rg.userData.oy=rg.position.y;rg.position.y-=1.8;});
    }
    fl.group.children.forEach(function(c){
      if(c.type==='Group'&&c.children.length>0){
        c.children.forEach(function(sp){
          if(sp.geometry&&sp.geometry.type==='OctahedronGeometry'){c.userData.oy=c.position.y;c.position.y-=1.5;}
        });
      }
    });
  });
}

function createOrbFloor(y, radius, label, numOrbs, fi) {
  var g = new THREE.Group(); g.position.y = y;
  
  // Center star (same as other floors)
  var sg = new THREE.Group();
  sg.add(new THREE.Mesh(new THREE.OctahedronGeometry(0.8,1), new THREE.MeshStandardMaterial({color:0x9a9aa2, metalness:1, roughness:0.03, envMap:cubeRenderTarget.texture, envMapIntensity:1.8, flatShading:true})));
  g.add(sg); g.userData.centerStar = sg;
  
  // ── PARTICLE BEAM SYSTEM ──
  // Center line runs from this floor (y=0 local) up to floor 0 (y=beamHeight local)
  // 3 sections between each floor object = (TOTAL_FLOORS-1)*3 = 12 sections
  // Particles spawn on the center line, get pushed outward, then gravity pulls them back
  
  var beamHeight=(TOTAL_FLOORS-1)*FLOOR_SPACING;
  var numSections=(TOTAL_FLOORS-1)*3; // 3 sections per floor gap
  var sectionH=beamHeight/numSections;
  var MAX_PARTICLES=15000;
  
  // Pre-allocate max particle arrays
  var bpPos=new Float32Array(MAX_PARTICLES*3);
  var bpVel=new Float32Array(MAX_PARTICLES*3); // full 3D velocity
  var bpAlpha=new Float32Array(MAX_PARTICLES);
  var bpSize=new Float32Array(MAX_PARTICLES);
  var bpAlive=new Uint8Array(MAX_PARTICLES); // 0=dead, 1=alive
  var bpSection=new Float32Array(MAX_PARTICLES); // which section spawned in
  
  // All start dead
  for(var bp=0;bp<MAX_PARTICLES;bp++){
    bpAlive[bp]=0; bpAlpha[bp]=0; bpSize[bp]=3.0;
    bpPos[bp*3]=0; bpPos[bp*3+1]=0; bpPos[bp*3+2]=0;
    bpVel[bp*3]=0; bpVel[bp*3+1]=0; bpVel[bp*3+2]=0;
  }
  
  var bpGeo=new THREE.BufferGeometry();
  bpGeo.setAttribute('position',new THREE.BufferAttribute(bpPos,3));
  bpGeo.setAttribute('alpha',new THREE.BufferAttribute(bpAlpha,1));
  bpGeo.setAttribute('size',new THREE.BufferAttribute(bpSize,1));
  
  // Density attribute
  var bpDensity=new Float32Array(MAX_PARTICLES);
  bpGeo.setAttribute('density',new THREE.BufferAttribute(bpDensity,1));
  // Distance from center X attribute
  var bpCenterDist=new Float32Array(MAX_PARTICLES);
  bpGeo.setAttribute('centerDist',new THREE.BufferAttribute(bpCenterDist,1));
  
  var bpMat=new THREE.ShaderMaterial({
    uniforms:{
      pixelRatio:{value:Math.min(window.devicePixelRatio,2.0)},
      uRPM:{value:0.0},
      uFlash:{value:0.0}
    },
    vertexShader:[
      'attribute float alpha;',
      'attribute float density;',
      'attribute float centerDist;',
      'uniform float pixelRatio;',
      'uniform float uRPM;',
      'varying float vA;',
      'varying float vDensity;',
      'varying float vCenterDist;',
      'varying float vRPM;',
      'void main(){',
      '  vA=alpha;',
      '  vDensity=density;',
      '  vCenterDist=centerDist;',
      '  vRPM=uRPM;',
      '  // Big soft blobs that heavily OVERLAP → read as one connected molten mass, not dots.',
      '  // Densest clumps swell most (metaball-ish), so the body looks gooey and interconnected.',
      '  gl_PointSize=(6.0+density*1.8+uRPM*4.0)*pixelRatio;',
      '  gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);',
      '}'
    ].join('\n'),
    fragmentShader:[
      'varying float vA;',
      'varying float vDensity;',
      'varying float vCenterDist;',
      'varying float vRPM;',
      'uniform float uFlash;',
      'void main(){',
      '  float d=length(gl_PointCoord-0.5)*2.0;',
      '  if(d>1.0)discard;',
      '  // Soft gaussian-ish falloff so overlapping blobs fuse smoothly (molten, not dotty).',
      '  float glow=pow(1.0-d,1.9);',
      '  // White-bright at center, progressively bluer at edges',
      '  vec3 white=vec3(0.95,0.96,1.0);',
      '  vec3 brightBlue=vec3(0.75,0.85,1.0);',
      '  vec3 midBlue=vec3(0.6,0.75,0.97);',
      '  vec3 edgeBlue=vec3(0.5,0.65,0.9);',
      '  // Smooth gradient based on X distance from center',
      '  float cDist=vCenterDist;',
      '  vec3 col;',
      '  if(cDist<0.1){',
      '    col=mix(white,brightBlue,cDist*10.0);', // 0-0.1: white to bright blue
      '  } else if(cDist<0.4){',
      '    col=mix(brightBlue,midBlue,(cDist-0.1)/0.3);', // 0.1-0.4: bright to mid
      '  } else {',
      '    col=mix(midBlue,edgeBlue,clamp((cDist-0.4)/0.8,0.0,1.0));', // 0.4+: mid to edge
      '  }',
      '  // RPM gently shifts toward purple',
      '  vec3 purple=vec3(0.65,0.55,0.92);',
      '  float rpmFade=clamp(vRPM/3.0,0.0,1.0);',
      '  col=mix(col,purple,rpmFade*0.3);',
      '  // Energy brightness grows with RPM; a hot white core blooms at each blob centre.',
      '  col*=0.7+vRPM*1.1;',
      '  col=mix(col,vec3(1.0),(1.0-d)*0.35*vRPM);',
      '  // ── Crystal power SURGE ── on each crystal tapped the whole beam flares white-hot.',
      '  col*=1.0+uFlash*4.0;',
      '  col=mix(col,vec3(1.0),clamp(uFlash*1.2,0.0,0.85));',
      '  float a=glow*vA*(0.85+vRPM*0.5)*(1.0+uFlash*1.2);',
      '  gl_FragColor=vec4(col,a);',
      '}'
    ].join('\n'),
    transparent:true,depthWrite:false
  });
  
  var beamPoints=new THREE.Points(bpGeo,bpMat);
  beamPoints.position.y=y; // offset to floor's world Y since it's in scene, not group
  // The particles move every frame and now climb far up the column, but the geometry's bounding
  // sphere was computed once at the base — so frustum culling would drop the whole beam the moment
  // the emission point scrolled off-screen. Disable culling so the climbing beam stays visible.
  beamPoints.frustumCulled=false;
  scene.add(beamPoints);
  
  // Section energy — tracks RPM propagation up the beam
  var sectionEnergy=new Float32Array(numSections);
  var sectionSpawnTimer=new Float32Array(numSections);
  
  var centerLight=new THREE.PointLight(0x88aaee,0.2,20);
  centerLight.position.set(0,y,0);
  scene.add(centerLight);
  
  g.userData.beam={
    points:beamPoints, geo:bpGeo, mat:bpMat,
    pos:bpPos, vel:bpVel, alpha:bpAlpha, size:bpSize, alive:bpAlive, section:bpSection,
    density:bpDensity, centerDist:bpCenterDist,
    maxP:MAX_PARTICLES, sectionEnergy:sectionEnergy, sectionSpawnTimer:sectionSpawnTimer,
    numSections:numSections, sectionH:sectionH, beamHeight:beamHeight
  };
  
  // Bond system — lines connecting nearby particles into chains
  var MAX_BONDS=6000;
  var bondData=[]; // {a:particleIdx, b:particleIdx}
  var bondPositions=new Float32Array(MAX_BONDS*2*3); // 2 vertices per bond, xyz each
  var bondAlphas=new Float32Array(MAX_BONDS*2);
  var bondGeo=new THREE.BufferGeometry();
  bondGeo.setAttribute('position',new THREE.BufferAttribute(bondPositions,3));
  bondGeo.setAttribute('alpha',new THREE.BufferAttribute(bondAlphas,1));
  var bondMat=new THREE.ShaderMaterial({
    uniforms:{uRPM:{value:0.0}},
    vertexShader:[
      'attribute float alpha;',
      'varying float vA;',
      'varying float vCenterDist;',
      'void main(){',
      '  vA=alpha;',
      '  vCenterDist=abs(position.x);', // how far this vertex is from center
      '  gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);',
      '}'
    ].join('\n'),
    fragmentShader:[
      'varying float vA;',
      'varying float vCenterDist;',
      'uniform float uRPM;',
      'void main(){',
      '  vec3 white=vec3(0.92,0.93,0.98);',
      '  vec3 brightBlue=vec3(0.75,0.85,1.0);',
      '  vec3 midBlue=vec3(0.6,0.75,0.97);',
      '  vec3 edgeBlue=vec3(0.5,0.65,0.9);',
      '  float cDist=vCenterDist;',
      '  vec3 col;',
      '  if(cDist<0.1){col=mix(white,brightBlue,cDist*10.0);}',
      '  else if(cDist<0.4){col=mix(brightBlue,midBlue,(cDist-0.1)/0.3);}',
      '  else{col=mix(midBlue,edgeBlue,clamp((cDist-0.4)/0.8,0.0,1.0));}',
      '  vec3 purple=vec3(0.65,0.55,0.92);',
      '  float rpmFade=clamp(uRPM/3.0,0.0,1.0);',
      '  col=mix(col,purple,rpmFade*0.3);',
      '  col*=0.95+uRPM*0.9;',
      '  gl_FragColor=vec4(col,vA*(0.75+uRPM*0.35));',   // brighter molten strands, visible at any spin
      '}'
    ].join('\n'),
    transparent:true,depthWrite:false
  });
  var bondLines=new THREE.LineSegments(bondGeo,bondMat);
  bondLines.position.y=y;
  bondLines.frustumCulled=false;   // same reason as beamPoints — dynamic, climbs off the base
  scene.add(bondLines);
  
  // Track how many bonds each particle has (for chain limit of 5)
  var particleBondCount=new Uint8Array(MAX_PARTICLES);
  
  g.userData.bonds={
    data:bondData, positions:bondPositions, alphas:bondAlphas,
    geo:bondGeo, lines:bondLines, mat:bondMat, maxBonds:MAX_BONDS,
    particleBondCount:particleBondCount
  };
  g.userData.centerLight=centerLight;
  g.userData.orbTiltX=0;
  g.userData.orbTiltZ=0;
  g.userData.lastAngle=0;
  g.userData.rpm=0;
  g.userData.rpmSmooth=0;
  
  // No rings on orb floor
  var ringGroups = {top:[],bottom:[]};

  // Orbs — glass spheres orbiting at the ring radius (with curved tube deformation)
  var orbs = [];
  var orbRadius = 0.35;
  var as = (Math.PI*2)/numOrbs;
  for(var i=0;i<numOrbs;i++){
    var angle = i*as;
    var orbGeo = new THREE.SphereGeometry(orbRadius, 24, 16);
    var orbMat = new THREE.MeshStandardMaterial({
      color:0x8899bb, transparent:true, opacity:0.7,
      roughness:0.05, metalness:0.6,
      emissive:0x334466, emissiveIntensity:0.15,
      envMap:cubeRenderTarget.texture, envMapIntensity:1.2,
      side:THREE.DoubleSide
    });
    var orbMesh = new THREE.Mesh(orbGeo, orbMat);
    orbMesh.position.x = Math.sin(angle)*radius;
    orbMesh.position.z = Math.cos(angle)*radius;
    orbMesh.userData.baseAngle = angle;
    orbMesh.userData.orbRadius = orbRadius;
    orbMesh.userData.orbitR = radius;
    orbMesh.userData.fIdx = fi;
    orbMesh.userData.pIdx = i;
    g.add(orbMesh);

    // Outline ring around each orb
    var edgePoints = [];
    for(var ei=0;ei<=64;ei++){
      var ea=(ei/64)*Math.PI*2;
      edgePoints.push(Math.cos(ea)*orbRadius, Math.sin(ea)*orbRadius, 0);
    }
    var edgeGeo = new THREE.BufferGeometry();
    edgeGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(edgePoints),3));
    var orbEdge = new THREE.Line(edgeGeo, new THREE.LineBasicMaterial({color:0x667788, transparent:true, opacity:0.25}));
    orbEdge.position.copy(orbMesh.position);
    g.add(orbEdge);

    // Pre-build curved tube geometry for high-speed deformation
    var CURVE_SEGS = 32;
    var CURVE_RING = 16;
    var curveVerts = new Float32Array(CURVE_SEGS * CURVE_RING * 3);
    var curveNorms = new Float32Array(CURVE_SEGS * CURVE_RING * 3);
    var curveGeo = new THREE.BufferGeometry();
    curveGeo.setAttribute('position', new THREE.BufferAttribute(curveVerts, 3));
    curveGeo.setAttribute('normal', new THREE.BufferAttribute(curveNorms, 3));
    var curveIdx = [];
    for(var ci=0;ci<CURVE_SEGS-1;ci++){
      for(var cri=0;cri<CURVE_RING;cri++){
        var ca=ci*CURVE_RING+cri, cb=ci*CURVE_RING+((cri+1)%CURVE_RING);
        var cc=(ci+1)*CURVE_RING+cri, cd=(ci+1)*CURVE_RING+((cri+1)%CURVE_RING);
        curveIdx.push(ca,cc,cb, cb,cc,cd);
      }
    }
    curveGeo.setIndex(curveIdx);

    orbs.push({mesh:orbMesh, edges:orbEdge, angle:angle, spinSpeed:0.01+Math.random()*0.01,
      sphereGeo:orbGeo, curveGeo:curveGeo, curveSegs:CURVE_SEGS, curveRing:CURVE_RING, isCurved:false});
  }
  
  // Invisible drag cylinder — wraps full wheel so swiping works anywhere over the section
  var dragCyl = new THREE.Mesh(
    new THREE.CylinderGeometry(radius+0.1, radius+0.1, PLANE_WIDTH*2.5, 32, 1, true),
    new THREE.MeshBasicMaterial({transparent:true, opacity:0, side:THREE.DoubleSide, depthWrite:false})
  );
  dragCyl.userData.isDragPlane=true;
  g.add(dragCyl);
  
  // High momentum: very low friction, high sensitivity, no braking
  g.userData.rotationSpeed=0.0025;
  g.userData.label=label;g.userData.yPosition=y;g.userData.velocity=0;
  g.userData.friction=0.9998;g.userData.inputVel=0;g.userData.centerStar=sg;
  scene.add(g);
  
  var floorObj = {group:g, rings:ringGroups, panels:[], hasRings:false, radius:radius, vRadius:radius*VW_RADIUS_MULT, orbs:orbs, isOrbFloor:true};
  return floorObj;
}

// LIGHT RAYS FROM CENTER
// ══════════════════════════════════════════════
var lightRays = [];
var NUM_RAYS = 14;
var rayGlowSprite = null;
var orbFloorY = 0; // set in init after floors are created

function createLightRays() {
  var y = orbFloorY;
  var glowCanvas = document.createElement('canvas');
  glowCanvas.width = 128; glowCanvas.height = 128;
  var gCtx = glowCanvas.getContext('2d');
  var grad = gCtx.createRadialGradient(64,64,0,64,64,64);
  grad.addColorStop(0, 'rgba(255,240,220,1)');
  grad.addColorStop(0.15, 'rgba(200,210,240,0.7)');
  grad.addColorStop(0.5, 'rgba(140,160,220,0.2)');
  grad.addColorStop(1, 'rgba(80,100,180,0)');
  gCtx.fillStyle = grad;
  gCtx.fillRect(0,0,128,128);
  var glowTex = new THREE.CanvasTexture(glowCanvas);
  var glowMat = new THREE.SpriteMaterial({
    map: glowTex, color: 0xaabbee, transparent: true, opacity: 0.4,
    blending: THREE.AdditiveBlending, depthWrite: false
  });
  rayGlowSprite = new THREE.Sprite(glowMat);
  rayGlowSprite.scale.set(3, 3, 1);
  rayGlowSprite.position.y = y;
  rayGlowSprite.raycast = function(){};
  scene.add(rayGlowSprite);

  for(var i=0;i<NUM_RAYS;i++){
    var angle = (i/NUM_RAYS)*Math.PI*2;
    var segs2 = 12;
    var rayVerts = new Float32Array((segs2+1)*2*3);
    var rayUVs = new Float32Array((segs2+1)*2*2);
    var rayIndices = [];
    var baseWidth = 0.12 + Math.random()*0.08;
    for(var s=0;s<=segs2;s++){
      var t = s/segs2;
      var w = baseWidth * (1.0 - t*t);
      var dist2 = t;
      rayVerts[(s*2)*3+0] = -w;
      rayVerts[(s*2)*3+1] = 0;
      rayVerts[(s*2)*3+2] = dist2;
      rayVerts[(s*2+1)*3+0] = w;
      rayVerts[(s*2+1)*3+1] = 0;
      rayVerts[(s*2+1)*3+2] = dist2;
      rayUVs[(s*2)*2+0] = 0; rayUVs[(s*2)*2+1] = t;
      rayUVs[(s*2+1)*2+0] = 1; rayUVs[(s*2+1)*2+1] = t;
      if(s<segs2){
        var a2=s*2, b2=s*2+1, c2=(s+1)*2, d2=(s+1)*2+1;
        rayIndices.push(a2,c2,b2, b2,c2,d2);
      }
    }
    var rayGeo = new THREE.BufferGeometry();
    rayGeo.setAttribute('position', new THREE.BufferAttribute(rayVerts, 3));
    rayGeo.setAttribute('uv', new THREE.BufferAttribute(rayUVs, 2));
    rayGeo.setIndex(rayIndices);

    var rayMat = new THREE.ShaderMaterial({
      uniforms: {
        rayLength: {value: 3.0},
        rayColor: {value: new THREE.Color(0.4, 0.5, 0.7)},
        opacity: {value: 0.2},
        time: {value: 0}
      },
      vertexShader: [
        'uniform float rayLength;',
        'varying vec2 vUV;',
        'void main(){',
        '  vUV = uv;',
        '  vec3 pos = position;',
        '  pos.z *= rayLength;',
        '  gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);',
        '}'
      ].join('\n'),
      fragmentShader: [
        'uniform vec3 rayColor;',
        'uniform float opacity;',
        'uniform float time;',
        'varying vec2 vUV;',
        'void main(){',
        '  float dist = vUV.y;',
        '  float centerX = abs(vUV.x - 0.5) * 2.0;',
        '  float lengthFade = 1.0 - dist;',
        '  lengthFade = pow(lengthFade, 1.5);',
        '  float widthFade = 1.0 - centerX;',
        '  widthFade = pow(widthFade, 0.8);',
        '  float a = lengthFade * widthFade * opacity;',
        '  a *= 0.85 + 0.15 * sin(time * 3.0 + dist * 8.0);',
        '  gl_FragColor = vec4(rayColor, a);',
        '}'
      ].join('\n'),
      transparent: true, depthWrite: false, side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending
    });

    var rayMesh = new THREE.Mesh(rayGeo, rayMat);
    rayMesh.position.y = y;
    rayMesh.rotation.y = angle;
    rayMesh.rotation.x = (Math.random()-0.5)*0.6;
    rayMesh.userData.baseAngle = angle;
    rayMesh.userData.phaseOffset = Math.random()*Math.PI*2;
    rayMesh.userData.baseWidth = baseWidth;
    rayMesh.raycast = function(){};
    scene.add(rayMesh);
    lightRays.push(rayMesh);
  }
}

// ══════════════════════════════════════════════
// LENS FLARE (adaptive to RPM)
// ══════════════════════════════════════════════
var lensFlare = null;
var lensFlareElements = []; // track elements for adaptive sizing
// THREE.Lensflare occlusion-tests at its anchor's screen position; if the anchor sits inside the
// solid crystal it reads as fully occluded → invisible. So the flare gets its OWN anchor that
// floats in front of the crystal toward the camera (clear space → not occluded), repositioned
// each frame in updateLensFlare. Offset is along the view axis so it still projects onto the crystal.
var lensFlareAnchor = null;
var _lfCrystalPos = new THREE.Vector3();

function generateFlareTexture(size, coreR, coreG, coreB, falloff) {
  var c = document.createElement('canvas'); c.width = size; c.height = size;
  var ctx = c.getContext('2d');
  var half = size / 2;
  var grad = ctx.createRadialGradient(half, half, 0, half, half, half);
  grad.addColorStop(0, 'rgba('+Math.floor(coreR*255)+','+Math.floor(coreG*255)+','+Math.floor(coreB*255)+',1)');
  grad.addColorStop(0.15, 'rgba('+Math.floor(coreR*220)+','+Math.floor(coreG*220)+','+Math.floor(coreB*230)+',0.8)');
  grad.addColorStop(0.4, 'rgba('+Math.floor(coreR*150)+','+Math.floor(coreG*160)+','+Math.floor(coreB*200)+','+falloff*0.3+')');
  grad.addColorStop(0.7, 'rgba(100,120,180,'+falloff*0.08+')');
  grad.addColorStop(1, 'rgba(60,80,140,0)');
  ctx.fillStyle = grad; ctx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(c);
}

function generateRingTexture(size) {
  var c = document.createElement('canvas'); c.width = size; c.height = size;
  var ctx = c.getContext('2d');
  var half = size / 2;
  ctx.beginPath(); ctx.arc(half, half, half*0.75, 0, Math.PI*2);
  ctx.lineWidth = half*0.08;
  ctx.strokeStyle = 'rgba(140,170,230,0.3)';
  ctx.stroke();
  ctx.beginPath(); ctx.arc(half, half, half*0.55, 0, Math.PI*2);
  ctx.lineWidth = half*0.04;
  ctx.strokeStyle = 'rgba(120,150,210,0.15)';
  ctx.stroke();
  return new THREE.CanvasTexture(c);
}

// Anamorphic horizontal streak — the cinematic blue bar through a bright light (realistic flare).
function generateStreakTexture(size) {
  var c = document.createElement('canvas'); c.width=size; c.height=size;
  var ctx = c.getContext('2d'); var half=size/2;
  var grad = ctx.createLinearGradient(0,0,size,0);
  grad.addColorStop(0.0,'rgba(130,170,255,0)');
  grad.addColorStop(0.5,'rgba(215,232,255,1)');
  grad.addColorStop(1.0,'rgba(130,170,255,0)');
  ctx.fillStyle = grad;
  for(var k=-5;k<=5;k++){                       // stacked bands → soft vertical falloff
    var a = Math.max(0, 1 - Math.abs(k)/5); ctx.globalAlpha = a*a;
    var bh = size*0.007;
    ctx.fillRect(0, half + k*bh - bh*0.5, size, bh);
  }
  ctx.globalAlpha = 1;
  return new THREE.CanvasTexture(c);
}

function createLensFlare() {
  if(!THREE.Lensflare) return;
  lensFlare = new THREE.Lensflare();
  lensFlare.raycast = function(){};

  // Procedural textures
  var mainTex = generateFlareTexture(256, 0.85, 0.9, 1.0, 1.0);
  var softTex = generateFlareTexture(128, 0.6, 0.7, 1.0, 0.6);
  var ringTex = generateRingTexture(128);
  var tinyTex = generateFlareTexture(64, 0.9, 0.85, 0.7, 0.8);

  // Anamorphic streak — wide horizontal blue bar across the core (cinematic, on the light)
  var streakTex = generateStreakTexture(256);
  var eStreak = new THREE.LensflareElement(streakTex, 700, 0, new THREE.Color(0.6, 0.75, 1.0));
  lensFlare.addElement(eStreak);
  lensFlareElements.push({el:eStreak, baseSize:700, baseColor:new THREE.Color(0.6, 0.75, 1.0)});

  // Main bright core — big, centered on light
  var e0 = new THREE.LensflareElement(mainTex, 300, 0, new THREE.Color(0.7, 0.8, 1.0));
  lensFlare.addElement(e0);
  lensFlareElements.push({el:e0, baseSize:300, baseColor:new THREE.Color(0.7, 0.8, 1.0)});

  // Secondary flares along the light→camera axis
  var e1 = new THREE.LensflareElement(softTex, 120, 0.2, new THREE.Color(0.5, 0.6, 0.9));
  lensFlare.addElement(e1);
  lensFlareElements.push({el:e1, baseSize:120, baseColor:new THREE.Color(0.5, 0.6, 0.9)});

  var e2 = new THREE.LensflareElement(ringTex, 160, 0.4, new THREE.Color(0.5, 0.6, 0.85));
  lensFlare.addElement(e2);
  lensFlareElements.push({el:e2, baseSize:160, baseColor:new THREE.Color(0.5, 0.6, 0.85)});

  var e3 = new THREE.LensflareElement(softTex, 80, 0.6, new THREE.Color(0.4, 0.5, 0.8));
  lensFlare.addElement(e3);
  lensFlareElements.push({el:e3, baseSize:80, baseColor:new THREE.Color(0.4, 0.5, 0.8)});

  var e4 = new THREE.LensflareElement(tinyTex, 50, 0.8, new THREE.Color(0.6, 0.55, 0.7));
  lensFlare.addElement(e4);
  lensFlareElements.push({el:e4, baseSize:50, baseColor:new THREE.Color(0.6, 0.55, 0.7)});

  var e5 = new THREE.LensflareElement(softTex, 100, 1.0, new THREE.Color(0.45, 0.5, 0.75));
  lensFlare.addElement(e5);
  lensFlareElements.push({el:e5, baseSize:100, baseColor:new THREE.Color(0.45, 0.5, 0.75)});

  var e6 = new THREE.LensflareElement(tinyTex, 35, 1.2, new THREE.Color(0.5, 0.45, 0.65));
  lensFlare.addElement(e6);
  lensFlareElements.push({el:e6, baseSize:35, baseColor:new THREE.Color(0.5, 0.45, 0.65)});

  // Attach to a dedicated anchor in scene space (NOT the crystal-center light, which would make
  // the flare occlude itself). updateLensFlare floats this anchor in front of the crystal.
  lensFlareAnchor = new THREE.Object3D();
  for(var i=0;i<floors.length;i++){
    if(floors[i].isOrbFloor){
      lensFlareAnchor.position.set(0, floors[i].group.position.y, 2.0);
      break;
    }
  }
  lensFlareAnchor.add(lensFlare);
  scene.add(lensFlareAnchor);
}

// Adaptive camera lens flare bound to the MAIN crystal's light. THREE.Lensflare already tracks
// the light's projected screen position (so it follows the crystal as the camera orbits and
// fades when occluded); here we drive its size/brightness/colour off the crystal's actual light
// value — subtle at the baseline, blooming big and white-hot on each power pulse, blown out at
// the whiteout climax.
function updateLensFlare(lightVal, climax) {
  if(!lensFlare || !lensFlareElements.length) return;
  lightVal = lightVal || 0; climax = climax || 0;
  // Float the anchor in front of the crystal, toward the camera, so the occlusion test lands in
  // clear space (the solid crystal no longer hides the flare). Offset along the view axis keeps it
  // projecting onto the crystal on screen.
  if(lensFlareAnchor){
    _lfCrystalPos.set(0, gameMode.galleryFloor ? gameMode.galleryFloor.group.position.y : 0, 0);
    var toCam = camera.position.clone().sub(_lfCrystalPos);
    if(toCam.lengthSq() > 1e-6) toCam.normalize(); else toCam.set(0,0,1);
    lensFlareAnchor.position.copy(_lfCrystalPos).addScaledVector(toCam, 2.2);
  }
  var intensity = lightVal * 1.7 + climax * climax * 3.8;     // stronger overall bloom
  // Flicker — fast multi-octave shimmer that gets deeper as the flare brightens, so it reads as
  // an unstable energy burst rather than a steady glow. Per-element phase so they don't pulse in lockstep.
  var nowF = performance.now() * 0.001;
  var flickBase = 0.78 + 0.22 * (Math.sin(nowF * 31.0) * 0.6 + Math.sin(nowF * 53.0 + 1.7) * 0.4);
  var scaleMult = Math.max(0, intensity) * 2.0;
  var whiteShift = Math.min(lightVal * 0.85 + climax, 1.0);   // white-hot when the crystal is bright
  for(var i=0;i<lensFlareElements.length;i++){
    var le = lensFlareElements[i];
    var flick = flickBase + 0.18 * Math.sin(nowF * 47.0 + i * 2.3);
    le.el.size = le.baseSize * scaleMult * flick;
    var r = le.baseColor.r + whiteShift * (1.0 - le.baseColor.r) * 0.85;
    var g = le.baseColor.g + whiteShift * (1.0 - le.baseColor.g) * 0.85;
    var b = le.baseColor.b + whiteShift * (1.0 - le.baseColor.b) * 0.5;
    le.el.color.setRGB(Math.max(0,Math.min(1,r)), Math.max(0,Math.min(1,g)), Math.max(0,Math.min(1,b)));
  }
}

function updateLightRays(rpmNorm, time) {
  var s1 = Math.min(rpmNorm / 0.5, 1.0); s1 = s1 * s1;
  var s2 = Math.max(Math.min((rpmNorm - 0.5) / 0.35, 1.0), 0.0);
  var s3 = Math.max((rpmNorm - 0.85) / 0.15, 0.0);
  if(rayGlowSprite){
    var glowSize = 2.0 + s1 * 3.0 + s2 * 6.0 + s3 * 20.0;
    rayGlowSprite.scale.set(glowSize, glowSize, 1);
    var gr = 0.45 + s1*0.1 + s2*0.1 + s3*0.35;
    var gg = 0.5 + s1*0.1 + s2*0.2 + s3*0.2;
    var gb = 0.7 + s2*0.2 + s3*0.1;
    rayGlowSprite.material.color.setRGB(gr, gg, gb);
    rayGlowSprite.material.opacity = 0.08 + s1 * 0.15 + s2 * 0.4 + s3 * 0.6;
  }
  var raySpinMult = 1.0 + s3 * 8.0;
  for(var i=0;i<lightRays.length;i++){
    var ray = lightRays[i];
    var phase = ray.userData.phaseOffset;
    ray.rotation.y = ray.userData.baseAngle + time*0.08*raySpinMult + Math.sin(time*0.4+phase)*0.15;
    var pulse = 0.5 + 0.5*Math.sin(time*2.0+phase);
    var baseOpacity = 0.02 + s1*0.06 + s2*0.25 + s3*1.5;
    ray.material.uniforms.opacity.value = baseOpacity * (0.7 + pulse*0.3);
    var baseLen = 1.5 + s1 * 2.0 + s2 * 5.0 + s3 * 25.0;
    ray.material.uniforms.rayLength.value = baseLen + Math.sin(time*1.5+phase)*1.0;
    var r2 = 0.35 + s1*0.1 + s2*0.15 + s3*0.4;
    var g2 = 0.45 + s1*0.1 + s2*0.2 + s3*0.25;
    var b2 = 0.65 + s1*0.05 + s2*0.25 + s3*0.05;
    ray.material.uniforms.rayColor.value.setRGB(r2, g2, b2);
    ray.material.uniforms.time.value = time;
  }
}
