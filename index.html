// ══════════════════════════════════════════════
function onMD(e){e.preventDefault();pDown(e.clientX,e.clientY);}
function onMM(e){pMove(e.clientX,e.clientY);}
function onMU(e){pUp(e.clientX,e.clientY);}
var touchScroll = { active:false, lastY:0, lastX:0, velY:0, locked:null, startX:0, startY:0, startTime:0, scrollMomentum:0 }; // locked: null,'scroll','wheel','vwheel'
function onTS(e){
  e.preventDefault();
  if(e.touches.length===1){
    var tx=e.touches[0].clientX, ty=e.touches[0].clientY;
    touchScroll.lastX=tx; touchScroll.lastY=ty;
    touchScroll.startX=tx; touchScroll.startY=ty;
    touchScroll.startTime=performance.now();
    touchScroll.velY=0; touchScroll.active=true; touchScroll.locked=null;
    touchScroll.scrollMomentum=0;
    pDown(tx,ty);
  }
}
function onTM(e){
  e.preventDefault();
  if(e.touches.length===1){
    var tx=e.touches[0].clientX, ty=e.touches[0].clientY;
    var dy=ty-touchScroll.lastY;
    var dx=tx-touchScroll.lastX;

    // First movement decides lock direction based on actual swipe angle
    if(touchScroll.locked===null && (Math.abs(dx)>6 || Math.abs(dy)>6)){
      var totalDX = Math.abs(tx - touchScroll.startX);
      var totalDY = Math.abs(ty - touchScroll.startY);
      if(totalDY > totalDX * 0.8){
        // Predominantly vertical swipe — always page scroll
        touchScroll.locked='scroll';
        // Release any wheel/vwheel drag that pDown started
        if(isDragging){
          isDragging=false; selectedFloor=null; dm.draggingVW=false;
          renderer.domElement.parentElement.classList.remove('dragging');
        }
      } else if(isDragging && dm.draggingVW){
        touchScroll.locked='vwheel';
      } else if(isDragging && selectedFloor){
        touchScroll.locked='wheel';
      } else {
        touchScroll.locked='scroll';
      }
    }

    if(touchScroll.locked==='scroll'){
      var dist=4.5; var fovRad=camera.fov*Math.PI/180;
      var halfH=Math.tan(fovRad/2)*dist;
      var scrollAmt=dy*halfH*0.004;
      targetCameraY+=scrollAmt;
      var minY=-(TOTAL_FLOORS-1)*FLOOR_SPACING;
      targetCameraY=Math.max(minY,Math.min(0,targetCameraY));
      // Track velocity for momentum
      var now=performance.now();
      var dt=(now-touchScroll.startTime)||1;
      touchScroll.velY=scrollAmt;
      touchScroll.scrollMomentum=touchScroll.scrollMomentum*0.7+scrollAmt*0.3;
      touchScroll.startTime=now;
    }

    touchScroll.lastX=tx; touchScroll.lastY=ty;
    if(touchScroll.locked!=='scroll') pMove(tx,ty);
  }
}
function onTE(e){
  if(touchScroll.active && touchScroll.locked==='scroll'){
    // Apply momentum — use smoothed velocity scaled up for continued scrolling
    touchScroll.scrollMomentum=touchScroll.scrollMomentum*4;
  }
  var wasScroll = touchScroll.locked==='scroll';
  touchScroll.active=false; touchScroll.locked=null;
  if(!wasScroll) pUp(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
  else { isDragging=false; selectedFloor=null; renderer.domElement.parentElement.classList.remove('dragging'); }
}

function pDown(cx,cy){
  mouseDownX=cx;mouseDownY=cy;mouseDownTime=performance.now();
  // During product detail view: allow cart, nav, and PDV scrolling (no background spinning)
  if(pdv.active || pdv.entering || pdv.exitingToDM){
    mouse.x=(cx/window.innerWidth)*2-1;mouse.y=-(cy/window.innerHeight)*2+1;
    raycaster.setFromCamera(mouse,camera);
    // Cart drag
    if(cart.panelOpen && cart.panelGroup){
      var cartHits2 = raycaster.intersectObjects(cart.panelGroup.children, true);
      if(cartHits2.length > 0){
        var hitIsBtn2 = false;
        var chk2 = cartHits2[0].object;
        while(chk2 && chk2 !== cart.panelGroup){
          if(chk2.userData.clickable && chk2.userData.actionId){ hitIsBtn2 = true; break; }
          chk2 = chk2.parent;
        }
        if(!hitIsBtn2){ startCartDrag(cx, cy); isDragging = true; renderer.domElement.parentElement.classList.add('dragging'); }
        return;
      }
    }
    // Start PDV scroll drag
    pdv.dragging = true; pdv.scrollVel = 0;
    previousMouseY = cy; previousTime = performance.now();
    return;
  }
  mouse.x=(cx/window.innerWidth)*2-1;mouse.y=-(cy/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  
  // Check if clicking on cart panel title bar area for dragging
  if(cart.panelOpen && cart.panelGroup) {
    var cartHits = raycaster.intersectObjects(cart.panelGroup.children, true);
    if(cartHits.length > 0) {
      var hitLocal = cart.panelGroup.worldToLocal(cartHits[0].point.clone());
      // Check if we hit a clickable button — if so, don't drag
      var hitIsButton = false;
      var checkObj = cartHits[0].object;
      while(checkObj && checkObj !== cart.panelGroup) {
        if(checkObj.userData.clickable && checkObj.userData.actionId) { hitIsButton = true; break; }
        checkObj = checkObj.parent;
      }
      if(!hitIsButton) {
        startCartDrag(cx, cy);
        isDragging = true;
        renderer.domElement.parentElement.classList.add('dragging');
      }
      return;
    }
  }
  
  if(dm.active&&dm.vWheel){
    var vi=raycaster.intersectObjects(dm.vWheel.children,true);
    if(vi.length>0){isDragging=true;selectedFloor=null;dm.draggingVW=true;previousMouseY=cy;previousTime=performance.now();renderer.domElement.parentElement.classList.add('dragging');return;}
  }
  // If nav menu is hit, don't start floor drag
  if(navMenu.glassMesh){
    var navPD=raycaster.intersectObject(navMenu.glassMesh);
    if(navPD.length>0) return;
  }
  if(navMenu.open){
    for(var npd=0;npd<navMenu.buttons.length;npd++){
      var nbPD=raycaster.intersectObjects(navMenu.buttons[npd].group.children,true);
      if(nbPD.length>0) return;
    }
  }
  // If cart is open and we hit the glass mesh or overlay buttons, don't start floor drag
  if(cart.panelOpen && cart.glassMesh) {
    var cgHits = raycaster.intersectObject(cart.glassMesh);
    if(cgHits.length > 0) return;
  }
  if(cart.panelOpen && cartOverlays.length>0) {
    for(var ovi2=0;ovi2<cartOverlays.length;ovi2++){
      var ovH=raycaster.intersectObjects(cartOverlays[ovi2].group.children,true);
      if(ovH.length>0) return;
    }
  }
  var hits=raycaster.intersectObjects(scene.children,true);
  if(hits.length>0){
    var valid=null;
    for(var i=0;i<hits.length;i++){var o=hits[i].object;if(o.type!=='Sprite'&&o.type!=='Points'&&o.type!=='Line'&&o.type!=='LineSegments'){valid=hits[i];break;}}
    if(!valid)return;
    var obj=valid.object;
    while(obj.parent){if(obj.userData.label)break;obj=obj.parent;}
    if(obj.userData.label){
      var fd=floors.find(function(f){return f.group===obj;});
      if(fd){var fi=floors.indexOf(fd);if(!introAnim.revealed[fi]&&!introAnim.animating[fi])introAnim.animating[fi]=true;isDragging=true;selectedFloor=fd;previousMouseX=cx;previousTime=performance.now();selectedFloor.group.userData.inputVel=0;renderer.domElement.parentElement.classList.add('dragging');}
    }
  }
}

function pMove(cx,cy){
  if(cartDrag.active){updateCartDrag(cx,cy);return;}
  // PDV scroll drag
  if(pdv.dragging && pdv.active){
    var dy=cy-previousMouseY;var dt2=(performance.now()-previousTime)||1;
    // Convert pixel drag to world units at PDV distance
    var fovRad=camera.fov*Math.PI/180;
    var halfH=Math.tan(fovRad/2)*4.0;
    var pxToWorld=halfH*2/window.innerHeight;
    pdv.scrollY+=dy*pxToWorld;
    pdv.scrollVel=dy*pxToWorld/(dt2/1000)*0.15;
    previousMouseY=cy;previousTime=performance.now();
    return;
  }
  if(isDragging&&dm.draggingVW){var dy=cy-previousMouseY;if(Math.abs(dy)>0.5){var directVW=dy*0.002;dm.vWheel.rotation.x+=directVW;dm.vwVel=directVW*0.5;}previousMouseY=cy;previousTime=performance.now();return;}
  if(isDragging&&selectedFloor){
    var dx=cx-previousMouseX;var dt2=(performance.now()-previousTime)||1;
    // Compute what the user's finger/mouse velocity is in rotation units
    var inputVel=dx/dt2*0.04;
    selectedFloor.group.userData.inputVel=inputVel;
    previousMouseX=cx;previousTime=performance.now();
    return;
  }
  // Not dragging — update cursor based on what's under mouse
  updateCursor(cx,cy);
}

function updateCursor(cx,cy){
  var el=renderer.domElement.parentElement;
  el.classList.remove('clickable','grabbable');
  
  mouse.x=(cx/window.innerWidth)*2-1;mouse.y=-(cy/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  
  // Check nav menu (clickable)
  if(navMenu.glassMesh){
    var navH=raycaster.intersectObject(navMenu.glassMesh);
    if(navH.length>0){el.classList.add('clickable');return;}
  }
  if(navMenu.open){
    for(var nci=0;nci<navMenu.buttons.length;nci++){
      var nbcH=raycaster.intersectObjects(navMenu.buttons[nci].group.children,true);
      if(nbcH.length>0){el.classList.add('clickable');return;}
    }
  }
  
  // Check overlay buttons (clickable)
  for(var oi=0;oi<cartOverlays.length;oi++){
    var ovH=raycaster.intersectObjects(cartOverlays[oi].group.children,true);
    if(ovH.length>0){el.classList.add('clickable');return;}
  }
  
  // Check cart glass mesh (clickable to open/close)
  if(cart.glassMesh){
    var cgh=raycaster.intersectObject(cart.glassMesh);
    if(cgh.length>0){el.classList.add('clickable');return;}
  }
  
  // Check cart panel buttons (clickable)
  if(cart.panelGroup&&cart.panelOpen){
    var cph=raycaster.intersectObjects(cart.panelGroup.children,true);
    if(cph.length>0){
      // Walk up to find if it's a clickable button
      for(var ci=0;ci<cph.length;ci++){
        var check=cph[ci].object;
        while(check&&check!==cart.panelGroup){
          if(check.userData.clickable){el.classList.add('clickable');return;}
          check=check.parent;
        }
      }
      // Over cart panel title bar area — grabbable for dragging
      var hitLocal=cart.panelGroup.worldToLocal(cph[0].point.clone());
      if(hitLocal.y>1.5){el.classList.add('grabbable');return;}
    }
  }
  
  // Check quick view buttons
  if(dm.active&&dm.dmButtons.length>0){
    for(var dbi=0;dbi<dm.dmButtons.length;dbi++){
      var qvh=raycaster.intersectObjects(dm.dmButtons[dbi].children,true);
      if(qvh.length>0){el.classList.add('clickable');return;}
    }
  }
  
  // Check scene objects (panels = clickable, floors = grabbable for spin)
  var hits=raycaster.intersectObjects(scene.children,true);
  for(var hi=0;hi<hits.length;hi++){
    var ho=hits[hi].object;
    if(ho.type==='Sprite'||ho.type==='Points'||ho.type==='Line'||ho.type==='LineSegments')continue;
    // Drag plane = grabbable
    if(ho.userData.isDragPlane){el.classList.add('grabbable');return;}
    // Planet = clickable
    if(ho.userData.isPlanet){el.classList.add('clickable');return;}
    // Check if it's a panel (CylinderGeometry = clickable)
    if(ho.geometry&&ho.geometry.type==='CylinderGeometry'&&ho.visible){
      el.classList.add('clickable');return;
    }
    // Check if it's a star (OctahedronGeometry = clickable when in display mode)
    if(ho.geometry&&ho.geometry.type==='OctahedronGeometry'&&dm.active){
      el.classList.add('clickable');return;
    }
    // Check if it's part of a floor group (grabbable for spinning)
    var obj2=ho;
    while(obj2.parent){if(obj2.userData.label){el.classList.add('grabbable');return;}obj2=obj2.parent;}
    break;
  }
}

function pUp(cx,cy){
  if(cartDrag.active){endCartDrag();isDragging=false;renderer.domElement.parentElement.classList.remove('dragging');return;}
  // End PDV scroll drag
  if(pdv.dragging){ pdv.dragging=false; }
  var dist=Math.sqrt(Math.pow(cx-mouseDownX,2)+Math.pow(cy-mouseDownY,2));
  var wasClick=dist<5&&(performance.now()-mouseDownTime)<300;
  if(wasClick){
    mouse.x=(cx/window.innerWidth)*2-1;mouse.y=-(cy/window.innerHeight)*2+1;
    raycaster.setFromCamera(mouse,camera);

    // Product detail view clicks
    if(pdv.active){
      if(handleProductDetailClick(cx, cy)){
        isDragging=false;selectedFloor=null;renderer.domElement.parentElement.classList.remove('dragging');return;
      }
    }

    // Nav menu clicks
    if(navMenu.glassMesh){
      var navHits=raycaster.intersectObject(navMenu.glassMesh);
      if(navHits.length>0&&!navMenu.open){
        toggleNavMenu();
        isDragging=false;selectedFloor=null;if(dm.draggingVW)dm.draggingVW=false;
        renderer.domElement.parentElement.classList.remove('dragging');return;
      }
    }
    if(navMenu.open&&navMenu.buttons.length>0){
      for(var nbi=0;nbi<navMenu.buttons.length;nbi++){
        var nbHits=raycaster.intersectObjects(navMenu.buttons[nbi].group.children,true);
        if(nbHits.length>0){
          var fi=navMenu.buttons[nbi].floorIdx;
          var destY=0;
          if(fi===-1){ destY=0; }
          else if(fi>=0&&fi<floors.length){ destY=floors[fi].group.position.y; }
          // Start nav scroll animation
          navScrollAnim.active=true;
          navScrollAnim.startY=camera.position.y;
          navScrollAnim.targetY=destY;
          navScrollAnim.progress=0;
          targetCameraY=destY;
          // Immediately push nav menu physics toward destination so it leads
          navMenu.physY+=(destY-camera.position.y)*0.7;
          toggleNavMenu();
          isDragging=false;selectedFloor=null;if(dm.draggingVW)dm.draggingVW=false;
          renderer.domElement.parentElement.classList.remove('dragging');return;
        }
      }
      // Click on expanded nav glass = close
      if(navMenu.glassMesh){
        var navHits2=raycaster.intersectObject(navMenu.glassMesh);
        if(navHits2.length>0){
          toggleNavMenu();
          isDragging=false;selectedFloor=null;if(dm.draggingVW)dm.draggingVW=false;
          renderer.domElement.parentElement.classList.remove('dragging');return;
        }
      }
    }
    
    // Cart overlay buttons (separate scene objects with tether)
    if(cart.panelOpen && cartOverlays.length>0) {
      for(var ovi=0;ovi<cartOverlays.length;ovi++){
        var ovGroup=cartOverlays[ovi].group;
        var ovHits=raycaster.intersectObjects(ovGroup.children,true);
        if(ovHits.length>0){
          var ovCheck=ovGroup;
          if(ovCheck.userData.clickable&&ovCheck.userData.actionId){
            var ovAid=ovCheck.userData.actionId;
            if(ovAid==='close-cart'){cart.dragOffsetX=0.3;cart.dragOffsetY=0;toggleCartPanel();}
            isDragging=false;selectedFloor=null;if(dm.draggingVW)dm.draggingVW=false;
            renderer.domElement.parentElement.classList.remove('dragging');return;
          }
        }
      }
    }
    
    // Cart panel buttons (when open)
    if(cart.panelGroup && cart.panelOpen) {
      var cartPanelHits=raycaster.intersectObjects(cart.panelGroup.children,true);
      var cartBtnFound=false;
      for(var cph=0;cph<cartPanelHits.length;cph++){
        var hitObj=cartPanelHits[cph].object;var check=hitObj;
        while(check&&check!==cart.panelGroup){
          if(check.userData.clickable&&check.userData.actionId){
            var aid=check.userData.actionId;
            if(aid==='close-cart'){cart.dragOffsetX=0.3;cart.dragOffsetY=0;toggleCartPanel();}
            else if(aid==='checkout'){shopifyGoToCheckout();}
            else if(aid.indexOf('remove-cart-')===0){removeFromCart(parseInt(aid.replace('remove-cart-','')));}
            cartBtnFound=true;break;
          }
          check=check.parent;
        }
        if(cartBtnFound)break;
      }
      if(cartBtnFound){isDragging=false;selectedFloor=null;if(dm.draggingVW)dm.draggingVW=false;renderer.domElement.parentElement.classList.remove('dragging');return;}
    }
    
    // Cart glass mesh click — open when closed, close when open
    if(cart.glassMesh) {
      var glassHits=raycaster.intersectObject(cart.glassMesh);
      if(glassHits.length>0){
        if(!cart.panelAnimating){
          // Reset drag offset so it always goes back to top-right
          if(cart.panelOpen){
            cart.dragOffsetX=0.3;
            cart.dragOffsetY=0;
          }
          toggleCartPanel();
        }
        isDragging=false;selectedFloor=null;if(dm.draggingVW)dm.draggingVW=false;
        renderer.domElement.parentElement.classList.remove('dragging');
        return;
      }
    }
    
        // Check quick view button clicks (3 glass icons)
    if(dm.active && dm.dmButtons.length>0) {
      for(var dbi=0;dbi<dm.dmButtons.length;dbi++){
        var btnHits = raycaster.intersectObjects(dm.dmButtons[dbi].children, true);
        if(btnHits.length > 0) {
          var actionId = dm.dmButtons[dbi].userData.actionId;
          if(actionId==='add-to-cart'){
            var floorCfg = PRODUCT_DATA.floors[dm.floorIdx];
            if(floorCfg && floorCfg.products[dm.selIdx]) {
              addToCart(floorCfg.products[dm.selIdx]);
            }
          } else if(actionId==='close'){
            exitDM();
          } else if(actionId==='expand'){
            enterProductDetail();
          }
          isDragging=false;selectedFloor=null;if(dm.draggingVW)dm.draggingVW=false;
          renderer.domElement.parentElement.classList.remove('dragging');
          return;
        }
      }
    }
    
    var hits=raycaster.intersectObjects(scene.children,true).filter(function(h){return h.object.visible;});
    
    // ── Check vertical wheel clicks first via direct raycast against wheel children ──
    if(dm.active && dm.vWheel && !dm.animating && !dm.closing && !switchAnim.active) {
      var vwHits = raycaster.intersectObjects(dm.vWheel.children, true);
      for(var vi=0; vi<vwHits.length; vi++){
        var hitObj = vwHits[vi].object;
        // Walk up to find the mesh with vwIdx
        var check = hitObj;
        while(check && check !== dm.vWheel) {
          if(check.userData.vwIdx !== undefined) {
            var ci = check.userData.vwIdx;
            if(ci !== dm.selIdx && check.visible) {
              switchPanel(ci);
              isDragging=false;selectedFloor=null;if(dm.draggingVW)dm.draggingVW=false;
              renderer.domElement.parentElement.classList.remove('dragging');
              return;
            }
          }
          check = check.parent;
        }
      }
    }
    
    // ── Check for planet clicks — launch meteor ──
    var allPlanetHitMeshes=[];
    for(var pci=0;pci<planets.length;pci++){if(planets[pci].alive&&planets[pci].hitMesh)allPlanetHitMeshes.push(planets[pci].hitMesh);}
    if(allPlanetHitMeshes.length>0){
      var planetHits=raycaster.intersectObjects(allPlanetHitMeshes);
      if(planetHits.length>0){
        var hitPlanet=planetHits[0].object;
        if(hitPlanet.userData.isPlanet){
          launchMeteor(hitPlanet.userData.planetIdx);
          isDragging=false;selectedFloor=null;if(dm.draggingVW)dm.draggingVW=false;
          renderer.domElement.parentElement.classList.remove('dragging');
          return;
        }
      }
    }
    
    // ── Standard raycast detection for floor panels and other objects ──
    if(hits.length>0){
      var tgt=null;
      for(var i=0;i<hits.length;i++){
        var co=hits[i].object,pt=co;
        
        // Skip quick view panel hits and star temps
        var skipDmBtn=false;
        for(var dbi2=0;dbi2<dm.dmButtons.length;dbi2++){if(co===dm.dmButtons[dbi2]||isChildOf(co,dm.dmButtons[dbi2])){skipDmBtn=true;break;}}
        if(!skipDmBtn){for(var sti5=0;sti5<dm.starTemps.length;sti5++){if(co===dm.starTemps[sti5]||isChildOf(co,dm.starTemps[sti5])){skipDmBtn=true;break;}}}
        if(!skipDmBtn&&dm.closingStarTemps){for(var csti3=0;csti3<dm.closingStarTemps.length;csti3++){if(co===dm.closingStarTemps[csti3]||isChildOf(co,dm.closingStarTemps[csti3])){skipDmBtn=true;break;}}}
        if(skipDmBtn) continue;
        // Skip display temp hits
        if(dm.displayTemp && (co===dm.displayTemp.plane || co===dm.displayTemp.edge)) continue;
        // Skip switch animation temp hits
        if(switchAnim.active) continue;
        // Skip vertical wheel hits (handled above)
        if(dm.vWheel && isChildOf(co, dm.vWheel)) continue;
        // Skip glass ring hits on wheels
        var skipStar=false;var ck=co;while(ck){if(ck.userData&&(ck.userData.isGlassRing||ck.userData.isButton)){skipStar=true;break;}ck=ck.parent;}
        if(skipStar) continue;
        
        // Star click
        if(co.geometry&&co.geometry.type==='OctahedronGeometry'&&dm.active){console.log('Section:',PRODUCT_DATA.floors[dm.floorIdx].label);break;}
        
        // If we hit a Line or LineSegments, find sibling CylinderGeometry mesh
        if((co.type==='Line'||co.type==='LineSegments')&&co.parent){
          var siblings=co.parent.children;
          for(var si=0;si<siblings.length;si++){
            if(siblings[si].geometry&&siblings[si].geometry.type==='CylinderGeometry'){pt=siblings[si];break;}
          }
        }
        
        if(pt.geometry&&pt.geometry.type==='CylinderGeometry'&&pt.visible){tgt=pt;break;}
      }
      if(tgt){
        var fg=tgt.parent;
        if(dm.active&&fg===dm.vWheel&&!dm.animating&&!dm.closing&&!switchAnim.active){
          var ci=tgt.userData.vwIdx;
          if(ci!==undefined&&ci!==dm.selIdx)switchPanel(ci);
        }else{
          var fd=floors.find(function(f){return f.group===fg;});
          if(fd&&!dm.animating&&!dm.closing){
            var pi=-1;for(var j=0;j<fd.panels.length;j++){if(fd.panels[j].mesh===tgt){pi=j;break;}}
            if(pi>=0)enterDM(fd,pi,floors.indexOf(fd));
          }
        }
      }
    }
  }
  // Close nav menu if open and nothing else was clicked
  if(navMenu.open&&!navMenu.animating){toggleNavMenu();}
  if(dm.draggingVW)dm.draggingVW=false;
  isDragging=false;selectedFloor=null;renderer.domElement.parentElement.classList.remove('dragging');
}

// ══════════════════════════════════════════════
// DISPLAY MODE
// ══════════════════════════════════════════════
function enterDM(floorData, panelIdx, floorIdx) {
  if(dm.active||dm.closing){
    // Queue open after current section finishes closing
    if(dm.floorIdx===floorIdx&&dm.selIdx===panelIdx&&!dm.closing) return; // same panel, ignore
    dm.queuedOpen={fd:floorData,pi:panelIdx,fi:floorIdx};
    if(!dm.closing) exitDM();
    return;
  }
  dm.active=true; dm.floorIdx=floorIdx; dm.floor=floorData; dm.selIdx=panelIdx;
  
  var isLeft = floorIdx===1||floorIdx===3;
  dm.vwSide = isLeft?'left':'right';
  
  // 1. Capture current world transforms of all panels
  dm.animData = [];
  floorData.panels.forEach(function(panel,idx){
    var wp=new THREE.Vector3(),wq=new THREE.Quaternion(),ws=new THREE.Vector3();
    panel.mesh.getWorldPosition(wp);panel.mesh.getWorldQuaternion(wq);panel.mesh.getWorldScale(ws);
    dm.animData.push({startPos:wp.clone(),startQuat:wq.clone(),startScale:ws.clone(),targetPos:null,targetQuat:null,targetScale:null});
  });
  
  // 2. Build the REAL vertical wheel to get accurate target transforms
  var vg = new THREE.Group();
  vg.position.set(isLeft?-3:3, floorData.group.position.y, 3.5);
  vg.rotation.y = Math.PI/2;
  vg.scale.set(0.65,0.65,0.65);
  
  var np = floorData.panels.length;
  var as = (Math.PI*2)/np;
  
  // Temporarily add dummy meshes to get world positions
  var dummies = [];
  for(var i=0;i<np;i++){
    var angle=i*as;
    var dMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,0.1));
    dMesh.position.set(0,0,0);
    dMesh.rotation.set(-Math.PI/2, 0, 0);
    dMesh.rotation.y = angle+Math.PI;
    dMesh.rotation.x = -Math.PI/2;
    vg.add(dMesh);
    dummies.push(dMesh);
  }
  scene.add(vg);
  vg.updateMatrixWorld(true);
  
  // Read world transforms
  for(var i=0;i<np;i++){
    var wp=new THREE.Vector3(),wq=new THREE.Quaternion(),ws=new THREE.Vector3();
    dummies[i].getWorldPosition(wp);dummies[i].getWorldQuaternion(wq);dummies[i].getWorldScale(ws);
    dm.animData[i].targetPos=wp.clone();
    dm.animData[i].targetQuat=wq.clone();
    dm.animData[i].targetScale=ws.clone();
  }
  
  // Remove dummies, keep vg for later
  dummies.forEach(function(d){vg.remove(d);d.geometry.dispose();});
  scene.remove(vg);
  // Store vg config for building real wheel later
  dm._vwConfig = {pos:vg.position.clone(),rotY:vg.rotation.y,scale:vg.scale.clone()};
  
  // 3. Create display plane
  createDP(floorData, floorIdx);
  dm.displayPlane.visible=false; if(dm.displayEdges)dm.displayEdges.visible=false;
  
  // Override selected panel target to display plane position
  var dp=new THREE.Vector3(),dq=new THREE.Quaternion(),ds=new THREE.Vector3();
  dm.displayPlane.getWorldPosition(dp);dm.displayPlane.getWorldQuaternion(dq);dm.displayPlane.getWorldScale(ds);
  dm.animData[panelIdx].targetPos=dp.clone();
  dm.animData[panelIdx].targetQuat=dq.clone();
  dm.animData[panelIdx].targetScale=ds.clone();
  
  // 4. Create temp meshes in scene root for animation
  dm.tempMeshes = [];
  dm.origPanelData = [];
  floorData.panels.forEach(function(panel,idx){
    // Save original state BEFORE hiding
    dm.origPanelData.push({
      panel:panel,
      pos:panel.mesh.position.clone(), rot:panel.mesh.rotation.clone(), scl:panel.mesh.scale.clone(),
      vis:true, parent:panel.mesh.parent,
      ePos:panel.edges.position.clone(), eRot:panel.edges.rotation.clone(), eScl:panel.edges.scale.clone(),
      eVis:true, eParent:panel.edges.parent
    });
    
    // Clone mesh with morph data — share material so custom shader uniforms work
    var tm = new THREE.Mesh(panel.mesh.geometry.clone(), panel.mesh.material);
    tm.userData.floorPos = panel.mesh.userData.floorPos;
    tm.userData.vertPos = panel.mesh.userData.vertPos;
    tm.userData.morphT = 0;
    tm.userData.borderIndices = panel.mesh.userData.borderIndices;
    // Create outline for temp mesh
    var tempLineGeo = new THREE.BufferGeometry();
    var tempLinePos = new Float32Array(panel.mesh.userData.borderIndices.length * 3);
    tempLineGeo.setAttribute('position', new THREE.BufferAttribute(tempLinePos, 3));
    tm.userData.lineGeo = tempLineGeo;
    syncOutline(tm);
    var te = new THREE.Line(tempLineGeo, new THREE.LineBasicMaterial({color:0x667788,transparent:true,opacity:0.35}));
    
    var ad = dm.animData[idx];
    tm.position.copy(ad.startPos);tm.quaternion.copy(ad.startQuat);tm.scale.copy(ad.startScale);tm.visible=true;
    te.position.copy(ad.startPos);te.quaternion.copy(ad.startQuat);te.scale.copy(ad.startScale);te.visible=true;
    scene.add(tm);scene.add(te);
    
    // Hide original AFTER saving state
    panel.mesh.visible=false; panel.edges.visible=false;
    
    dm.tempMeshes.push({plane:tm,edge:te});
  });
  
  // ── Glass ring → button animation setup ──
  // Detach 3 node circles from ring, grow and fly to button positions
  dm.starTemps = []; dm.starAnimData = []; dm.starOrigVis = []; dm.starIcons = [];
  var actionTypes = ['add-to-cart', 'close', 'expand'];
  if(floorData.glassRing && floorData.glassRing.userData.nodes){
    var ringGrp = floorData.glassRing;
    ringGrp.updateMatrixWorld(true);
    var ringNodes = ringGrp.userData.nodes;

    var btnX = 0;
    var floorY = floorData.group.position.y;
    var btnSpacing = 1.3;

    // Detach each node from ring, place in scene at its world position
    for(var si2 = 0; si2 < ringNodes.length; si2++){
      var node = ringNodes[si2];
      // Get world transform before detaching
      var nwp = new THREE.Vector3(), nwq = new THREE.Quaternion(), nws = new THREE.Vector3();
      node.getWorldPosition(nwp); node.getWorldQuaternion(nwq); node.getWorldScale(nws);

      // Detach from ring, add to scene
      ringGrp.remove(node);
      node.position.copy(nwp); node.quaternion.copy(nwq); node.scale.copy(nws);
      node.userData.actionId = actionTypes[si2];
      scene.add(node);

      var yOff = (1 - si2) * btnSpacing;
      var targetPos = new THREE.Vector3(btnX, floorY + yOff, 5.0);
      var tempLook = new THREE.Object3D();
      tempLook.position.copy(targetPos);
      tempLook.lookAt(camera.position.x, targetPos.y, camera.position.z);

      dm.starAnimData.push({
        startPos: nwp.clone(), startQuat: nwq.clone(), startScale: nws.clone(),
        targetPos: targetPos, targetQuat: tempLook.quaternion.clone(), targetScale: new THREE.Vector3(1,1,1)
      });
      dm.starTemps.push(node);
    }

    // Save ring visibility and start morphing it
    dm.starOrigVis = [ringGrp.visible];
    dm.ringMorphing = true;
    if(ringGrp.userData.glassMesh){
      ringGrp.userData.glassMesh.material.uniforms.morph.value = 0.0;
    }
  }

  // Save ring state
  dm.origState={rtp:[],rbp:[],rts:[],rbs:[]};
  if(floorData.rings){
    floorData.rings.top.forEach(function(r){dm.origState.rtp.push(r.position.clone());dm.origState.rts.push(r.scale.clone());});
    floorData.rings.bottom.forEach(function(r){dm.origState.rbp.push(r.position.clone());dm.origState.rbs.push(r.scale.clone());});
  }

  dm.animating=true; dm.animProg=0;
}

function createDP(floorData, floorIdx) {
  var geo=new THREE.PlaneGeometry(PLANE_WIDTH,PLANE_WIDTH,20,20);
  var pos=geo.attributes.position,vtx=new THREE.Vector3();
  for(var i=0;i<pos.count;i++){vtx.fromBufferAttribute(pos,i);var md=Math.min(Math.abs(vtx.y-PLANE_WIDTH/2),Math.abs(vtx.y+PLANE_WIDTH/2),Math.abs(vtx.x-PLANE_WIDTH/2),Math.abs(vtx.x+PLANE_WIDTH/2));if(md<0.3)vtx.z=-0.15*((0.3-md)/0.3);pos.setXYZ(i,vtx.x,vtx.y,vtx.z);}
  geo.attributes.position.needsUpdate=true;geo.computeVertexNormals();
  var isLeft=floorIdx===1||floorIdx===3;
  // Invisible position target for the selected panel
  var fp=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({visible:false}));
  fp.position.set(isLeft?3:-3,floorData.group.position.y,-1.5);fp.scale.set(1.4,1.4,1);
  dm.displayPlane=fp;dm.displayEdges=null;scene.add(fp);
}

function animateDM() {
  if(!dm.animating) return;
  dm.animProg+=0.03;
  if(dm.animProg>=1) dm.animProg=1;
  var p=eIO(dm.animProg);
  var fd=dm.floor;if(!fd)return;
  
  dm.animData.forEach(function(ad,idx){
    var t=dm.tempMeshes[idx];if(!t||!t.plane)return;
    t.plane.position.lerpVectors(ad.startPos,ad.targetPos,p);
    var spin=new THREE.Quaternion();spin.setFromAxisAngle(new THREE.Vector3(0,1,0),Math.sin(p*Math.PI)*Math.PI*0.5);
    var sq=new THREE.Quaternion();sq.slerpQuaternions(ad.startQuat,ad.targetQuat,p);
    t.plane.quaternion.copy(sq.multiply(spin));
    t.plane.scale.lerpVectors(ad.startScale,ad.targetScale,p);
    t.edge.position.copy(t.plane.position);t.edge.quaternion.copy(t.plane.quaternion);t.edge.scale.copy(t.plane.scale);
    
    // Morph geometry for non-selected panels
    if(idx!==dm.selIdx){
      morphTo(t.plane,p);
    }
  });
  
  // Animate ring → buttons (morph ring + delayed button fly-out)
  for(var sti = 0; sti < dm.starTemps.length; sti++){
    var st = dm.starTemps[sti], sad = dm.starAnimData[sti];
    // Buttons start moving at p=0.3, reach target at p=1.0
    var btnP = Math.max((p - 0.3) / 0.7, 0.0);
    st.position.lerpVectors(sad.startPos, sad.targetPos, btnP);
    st.quaternion.slerpQuaternions(sad.startQuat, sad.targetQuat, btnP);
    st.scale.lerpVectors(sad.startScale, sad.targetScale, btnP);
  }
  // Morph glass ring into 3 blobs
  if(dm.ringMorphing && fd.glassRing){
    var ringMesh = fd.glassRing.userData.glassMesh;
    if(ringMesh && ringMesh.material.uniforms.morph){
      var ringP = Math.min(p * 2.0, 1.0);
      ringMesh.material.uniforms.morph.value = ringP;
      ringMesh.material.uniforms.opacity.value = 1.0;
      if(ringP >= 1.0) fd.glassRing.visible = false;
    }
  }

  // Rings
  if(fd.rings){
    var sa=1.25,vo=0.5;
    fd.rings.top.forEach(function(rg,i){var op=dm.origState.rtp[i];if(!op)return;rg.position.y=op.y+vo*p;var os=dm.origState.rts[i];rg.scale.set(os.x+(sa-os.x)*p,1,os.x+(sa-os.x)*p);});
    fd.rings.bottom.forEach(function(rg,i){var op=dm.origState.rbp[i];if(!op)return;rg.position.y=op.y-vo*p;var os=dm.origState.rbs[i];rg.scale.set(os.x+(sa-os.x)*p,1,os.x+(sa-os.x)*p);});
  }

  if(dm.animProg>=1){
    dm.animating=false;
    // Clean up non-selected temps, keep selected one as the display
    dm.tempMeshes.forEach(function(t,idx){
      if(idx===dm.selIdx) {
        // This becomes the display — keep it visible
        dm.displayTemp = t;
      } else {
        if(t.plane)scene.remove(t.plane);if(t.edge)scene.remove(t.edge);
      }
    });
    dm.tempMeshes=[];

    // Build real vertical wheel
    buildVW();

    // Selected panel is displayed upright, not on VW — reset its image rotation
    fd.panels[dm.selIdx].mesh.material.userData.imgRotationTarget = 0.0;

    // Add icon overlays to morphed stars (now circles) and register as dmButtons
    dm.dmButtons = [];
    var actionTypes2 = ['add-to-cart', 'close', 'expand'];
    for(var sti2 = 0; sti2 < dm.starTemps.length; sti2++){
      var stg = dm.starTemps[sti2];
      var iconMesh = createStarIconOverlay(actionTypes2[sti2], 0.5);
      stg.add(iconMesh);
      dm.starIcons.push(iconMesh);
      dm.dmButtons.push(stg);
    }

    // Create label (no longer creates buttons — stars ARE the buttons)
    createQuickViewPanels();
  }
}

function buildVW() {
  var fd=dm.floor;
  var vg=new THREE.Group();
  var cfg=dm._vwConfig;
  vg.position.copy(cfg.pos);vg.rotation.y=cfg.rotY;vg.scale.copy(cfg.scale);
  
  var np=fd.panels.length;
  var as=(Math.PI*2)/np;
  
  for(var i=0;i<np;i++){
    var panel=fd.panels[i];
    var angle=i*as;
    
    // Remove from floor group
    fd.group.remove(panel.mesh); fd.group.remove(panel.edges);
    
    // Morph to vertical — wireframe auto-tracks since it shares geometry
    morphTo(panel.mesh,1);
    // Rotate image to stay upright on vertical wheel
    panel.mesh.material.userData.imgRotationTarget = 1.0;
    
    panel.mesh.position.set(0,0,0);
    panel.mesh.rotation.set(0,0,0);
    panel.mesh.rotation.y=angle+Math.PI;
    panel.mesh.rotation.x=-Math.PI/2;
    panel.mesh.scale.set(1,1,1);
    panel.mesh.userData.vwIdx=i;
    
    panel.edges.position.set(0,0,0);
    panel.edges.rotation.set(0,0,0);
    panel.edges.rotation.y=angle+Math.PI;
    panel.edges.rotation.x=-Math.PI/2;
    panel.edges.scale.set(1,1,1);
    panel.edges.userData.vwIdx=i;
    
    panel.mesh.visible=(i!==dm.selIdx);
    panel.edges.visible=(i!==dm.selIdx);
    
    vg.add(panel.mesh);vg.add(panel.edges);
  }
  
  dm.vWheel=vg; dm.vwVel=0.015;
  vg.visible=true; scene.add(vg);
}

function exitDM() {
  if(!dm.active)return;
  var fd=dm.floor;
  
  destroyQuickViewPanels();

  // ── Set up button closing animation (buttons shrink back toward ring) ──
  dm.closingStarTemps = [];
  dm.closingStarAnimData = [];
  if(dm.starTemps.length > 0){
    // Remove icon overlays from button temps
    for(var ri = 0; ri < dm.starIcons.length; ri++){
      var ico = dm.starIcons[ri];
      if(ico.parent) ico.parent.remove(ico);
    }
    dm.starIcons = [];

    // Get ring world position for target
    var ringWP2 = new THREE.Vector3();
    var ringRadius2 = fd.glassRing ? (fd.glassRing.userData.ringRadius || 1.8) : 1.8;
    if(fd.glassRing){
      fd.group.updateMatrixWorld(true);
      fd.glassRing.getWorldPosition(ringWP2);
    }

    for(var sci = 0; sci < dm.starTemps.length; sci++){
      var stmp = dm.starTemps[sci];
      var swp2 = new THREE.Vector3(), swq2 = new THREE.Quaternion(), sws2 = new THREE.Vector3();
      stmp.getWorldPosition(swp2); stmp.getWorldQuaternion(swq2); stmp.getWorldScale(sws2);

      // Target: point on ring
      var spawnAngle2 = sci * (Math.PI * 2 / 3);
      var tgtPos = new THREE.Vector3(
        ringWP2.x + Math.sin(spawnAngle2) * ringRadius2,
        ringWP2.y,
        ringWP2.z + Math.cos(spawnAngle2) * ringRadius2
      );

      dm.closingStarAnimData.push({
        startPos: swp2.clone(), startQuat: swq2.clone(), startScale: sws2.clone(),
        targetPos: tgtPos, targetQuat: swq2.clone(), targetScale: new THREE.Vector3(0.3,0.3,0.3)
      });
      dm.closingStarTemps.push(stmp);
    }
    dm.starTemps = [];
    dm.starAnimData = [];
    dm.ringMorphing = false;
    // Set ring to fully morphed state (3 blobs) and make visible for reverse morph
    if(fd.glassRing){
      fd.glassRing.visible = true;
      var rmSetup = fd.glassRing.userData.glassMesh;
      if(rmSetup && rmSetup.material.uniforms.morph){
        rmSetup.material.uniforms.morph.value = 1.0;
        rmSetup.material.uniforms.opacity.value = 1.0;
      }
    }
  }

  if(dm.vWheel)dm.vWheel.visible=false;
  if(dm.displayPlane)dm.displayPlane.visible=false;
  if(dm.displayEdges)dm.displayEdges.visible=false;
  
  // Capture current world positions of panels (they're in the vertical wheel)
  var startData = [];
  fd.panels.forEach(function(panel,idx){
    var wp=new THREE.Vector3(),wq=new THREE.Quaternion(),ws=new THREE.Vector3();
    if(idx===dm.selIdx && dm.displayTemp) {
      // Selected panel — get position from the display temp mesh
      dm.displayTemp.plane.getWorldPosition(wp);
      dm.displayTemp.plane.getWorldQuaternion(wq);
      dm.displayTemp.plane.getWorldScale(ws);
    } else {
      panel.mesh.getWorldPosition(wp);panel.mesh.getWorldQuaternion(wq);panel.mesh.getWorldScale(ws);
    }
    startData.push({startPos:wp.clone(),startQuat:wq.clone(),startScale:ws.clone()});
  });
  
  // Hide and remove display temp
  if(dm.displayTemp) {
    if(dm.displayTemp.plane) scene.remove(dm.displayTemp.plane);
    if(dm.displayTemp.edge) scene.remove(dm.displayTemp.edge);
    dm.displayTemp = null;
  }
  
  // Restore panels to floor group to get target positions
  dm.origPanelData.forEach(function(data){
    if(dm.vWheel){dm.vWheel.remove(data.panel.mesh);dm.vWheel.remove(data.panel.edges);}
    if(data.parent)data.parent.add(data.panel.mesh);
    if(data.eParent)data.eParent.add(data.panel.edges);
    data.panel.mesh.position.copy(data.pos);data.panel.mesh.rotation.copy(data.rot);data.panel.mesh.scale.copy(data.scl);
    data.panel.edges.position.copy(data.ePos);data.panel.edges.rotation.copy(data.eRot);data.panel.edges.scale.copy(data.eScl);
    morphTo(data.panel.mesh,0); // back to floor radius — wireframe auto-tracks
    data.panel.mesh.material.userData.imgRotationTarget = 0.0;
  });

  // Get target world positions
  fd.group.updateMatrixWorld(true);
  var targetData = [];
  fd.panels.forEach(function(panel){
    var wp=new THREE.Vector3(),wq=new THREE.Quaternion(),ws=new THREE.Vector3();
    panel.mesh.getWorldPosition(wp);panel.mesh.getWorldQuaternion(wq);panel.mesh.getWorldScale(ws);
    targetData.push({targetPos:wp.clone(),targetQuat:wq.clone(),targetScale:ws.clone()});
    panel.mesh.visible=false;panel.edges.visible=false;
  });
  
  // Create closing temp meshes
  dm.closingTemps=[];
  dm.closingAnimData=[];
  fd.panels.forEach(function(panel,idx){
    var tm=new THREE.Mesh(panel.mesh.geometry.clone(),panel.mesh.material);
    tm.userData.floorPos=panel.mesh.userData.floorPos;
    tm.userData.vertPos=panel.mesh.userData.vertPos;
    tm.userData.borderIndices=panel.mesh.userData.borderIndices;
    var closingLineGeo=new THREE.BufferGeometry();
    var closingLinePos=new Float32Array(panel.mesh.userData.borderIndices.length*3);
    closingLineGeo.setAttribute('position',new THREE.BufferAttribute(closingLinePos,3));
    tm.userData.lineGeo=closingLineGeo;
    morphTo(tm,1); // start at vertical radius — also syncs outline
    var te=new THREE.Line(closingLineGeo, new THREE.LineBasicMaterial({color:0x667788,transparent:true,opacity:0.35}));
    
    tm.position.copy(startData[idx].startPos);tm.quaternion.copy(startData[idx].startQuat);tm.scale.copy(startData[idx].startScale);tm.visible=true;
    te.position.copy(tm.position);te.quaternion.copy(tm.quaternion);te.scale.copy(tm.scale);te.visible=true;
    scene.add(tm);scene.add(te);
    dm.closingTemps.push({plane:tm,edge:te});
    dm.closingAnimData.push({
      startPos:startData[idx].startPos, startQuat:startData[idx].startQuat, startScale:startData[idx].startScale,
      targetPos:targetData[idx].targetPos, targetQuat:targetData[idx].targetQuat, targetScale:targetData[idx].targetScale
    });
  });
  
  dm.closing=true; dm.closingProg=0;
}

function animateClosing(){
  if(!dm.closing)return;
  dm.closingProg+=0.025;
  if(dm.closingProg>=1)dm.closingProg=1;
  var p=eIO(dm.closingProg);
  var fd=dm.floor;
  
  // Update target positions every frame to track floor rotation
  fd.group.updateMatrixWorld(true);
  dm.closingAnimData.forEach(function(ad,idx){
    var panel = fd.panels[idx];
    var wp=new THREE.Vector3(),wq=new THREE.Quaternion(),ws=new THREE.Vector3();
    panel.mesh.getWorldPosition(wp);panel.mesh.getWorldQuaternion(wq);panel.mesh.getWorldScale(ws);
    ad.targetPos=wp; ad.targetQuat=wq; ad.targetScale=ws;
  });
  
  dm.closingAnimData.forEach(function(ad,idx){
    var t=dm.closingTemps[idx];if(!t||!t.plane)return;
    t.plane.position.lerpVectors(ad.startPos,ad.targetPos,p);
    t.plane.quaternion.slerpQuaternions(ad.startQuat,ad.targetQuat,p);
    t.plane.scale.lerpVectors(ad.startScale,ad.targetScale,p);
    t.edge.position.copy(t.plane.position);t.edge.quaternion.copy(t.plane.quaternion);t.edge.scale.copy(t.plane.scale);
    
    // Morph back to floor radius
    morphTo(t.plane,1-p);
  });
  
  // Animate button closing (shrink back toward ring in first half)
  if(dm.closingStarTemps && dm.closingStarTemps.length > 0){
    // Update targets to track wheel rotation
    if(fd.glassRing){
      fd.group.updateMatrixWorld(true);
      var crWP = new THREE.Vector3();
      fd.glassRing.getWorldPosition(crWP);
      var crR = fd.glassRing.userData.ringRadius || 1.8;
      for(var csi = 0; csi < dm.closingStarTemps.length; csi++){
        var csad = dm.closingStarAnimData[csi];
        var sa2 = csi * (Math.PI * 2 / 3);
        csad.targetPos = new THREE.Vector3(crWP.x+Math.sin(sa2)*crR, crWP.y, crWP.z+Math.cos(sa2)*crR);
      }
    }
    // Buttons reach ring positions at p=0.5
    var btnCloseP = Math.min(p / 0.5, 1.0);
    for(var csi2 = 0; csi2 < dm.closingStarTemps.length; csi2++){
      var csad2 = dm.closingStarAnimData[csi2];
      var cst = dm.closingStarTemps[csi2];
      cst.position.lerpVectors(csad2.startPos, csad2.targetPos, btnCloseP);
      cst.quaternion.slerpQuaternions(csad2.startQuat, csad2.targetQuat, btnCloseP);
      cst.scale.lerpVectors(csad2.startScale, csad2.targetScale, btnCloseP);
      // Hide buttons once they've merged into the ring blobs
      cst.visible = (btnCloseP < 1.0);
    }
  }
  // Reverse-morph glass ring from 3 blobs back to torus
  if(fd.glassRing){
    fd.glassRing.visible = true;
    var ringMesh2 = fd.glassRing.userData.glassMesh;
    if(ringMesh2 && ringMesh2.material.uniforms.morph){
      // Ring un-morphs during the second half (p 0.5..1.0 → morph 1..0)
      var ringP2 = Math.max((p - 0.5) / 0.5, 0.0);
      ringMesh2.material.uniforms.morph.value = 1.0 - ringP2;
      ringMesh2.material.uniforms.opacity.value = 1.0;
    }
  }

  if(fd&&fd.rings){
    var sa=1.25,vo=0.5;
    fd.rings.top.forEach(function(rg,i){var op=dm.origState.rtp[i];if(!op)return;rg.position.y=(op.y+vo)+(op.y-(op.y+vo))*p;var os=dm.origState.rts[i];rg.scale.set(sa+(os.x-sa)*p,1,sa+(os.x-sa)*p);});
    fd.rings.bottom.forEach(function(rg,i){var op=dm.origState.rbp[i];if(!op)return;rg.position.y=(op.y-vo)+(op.y-(op.y-vo))*p;var os=dm.origState.rbs[i];rg.scale.set(sa+(os.x-sa)*p,1,sa+(os.x-sa)*p);});
  }

  if(dm.closingProg>=1){
    dm.closing=false;
    // Clean panel temps
    dm.closingTemps.forEach(function(t){if(t.plane)scene.remove(t.plane);if(t.edge)scene.remove(t.edge);});
    dm.closingTemps=[];dm.closingAnimData=[];

    // Re-attach nodes back to ring and restore
    if(dm.closingStarTemps && fd.glassRing){
      var rr = fd.glassRing.userData.ringRadius || 1.8;
      dm.closingStarTemps.forEach(function(cst2, ci){
        scene.remove(cst2);
        var na = ci * (Math.PI * 2 / 3);
        cst2.position.set(Math.sin(na) * rr, 0, Math.cos(na) * rr);
        cst2.rotation.set(0, na, 0);
        cst2.scale.set(1, 1, 1);
        fd.glassRing.add(cst2);
      });
      if(!fd.glassRing.userData.nodes) fd.glassRing.userData.nodes = [];
      fd.glassRing.userData.nodes = dm.closingStarTemps.slice();
      dm.closingStarTemps=[];dm.closingStarAnimData=[];
    } else if(dm.closingStarTemps){
      dm.closingStarTemps.forEach(function(cst2){scene.remove(cst2);});
      dm.closingStarTemps=[];dm.closingStarAnimData=[];
    }
    if(fd.glassRing){
      fd.glassRing.visible = true;
      var rmesh = fd.glassRing.userData.glassMesh;
      if(rmesh && rmesh.material.uniforms.opacity) rmesh.material.uniforms.opacity.value = 1.0;
      if(rmesh && rmesh.material.uniforms.morph) rmesh.material.uniforms.morph.value = 0.0;
    }
    dm.starOrigVis = [];

    // Show originals and force-reset positions/scales
    dm.origPanelData.forEach(function(data){
      data.panel.mesh.visible=data.vis;data.panel.edges.visible=data.eVis;
      data.panel.mesh.position.copy(data.pos);data.panel.mesh.rotation.copy(data.rot);data.panel.mesh.scale.copy(data.scl);
      data.panel.edges.position.copy(data.ePos);data.panel.edges.rotation.copy(data.eRot);data.panel.edges.scale.copy(data.eScl);
      morphTo(data.panel.mesh, 0);
      data.panel.mesh.material.userData.imgRotation.value = 0.0;
      data.panel.mesh.material.userData.imgRotationTarget = 0.0;
    });

    if(dm.displayPlane){scene.remove(dm.displayPlane);dm.displayPlane=null;}
    if(dm.displayEdges){scene.remove(dm.displayEdges);dm.displayEdges=null;}
    if(dm.vWheel){scene.remove(dm.vWheel);dm.vWheel=null;}
    if(fd&&fd.group){var pf=0.015;fd.group.userData.velocity+=((dm.floorIdx===1||dm.floorIdx===3)?-pf:pf);}

    dm.active=false;dm.floorIdx=-1;dm.floor=null;dm.selIdx=-1;
    dm.animProg=0;dm.animating=false;dm.vwVel=0.0025;dm.draggingVW=false;dm.vwSide=null;
    dm.origState={};dm.animData=[];dm.origPanelData=[];dm.displayTemp=null;
    dm.dmButtons=[];dm.starTemps=[];dm.starAnimData=[];dm.starIcons=[];

    // If a new section was queued while closing, open it now
    if(dm.queuedOpen){
      var q=dm.queuedOpen;dm.queuedOpen=null;
      enterDM(q.fd,q.pi,q.fi);
    }
  }
}

// SWITCH PANEL ANIMATION

var switchAnim = {
  active: false, prog: 0,
  oldIdx: -1, newIdx: -1,
  oldTemp: null, newTemp: null,
  oldStart: null, oldTarget: null,
  newStart: null, newTarget: null
};

function switchPanel(newIdx){
  var fd=dm.floor;if(!fd||switchAnim.active||dm.animating||dm.closing)return;
  
  var oldIdx = dm.selIdx;
  switchAnim.oldIdx = oldIdx;
  switchAnim.newIdx = newIdx;
  
  // ── Old panel (display → vertical wheel slot) ──
  // Capture where the display temp currently is
  var owp=new THREE.Vector3(),owq=new THREE.Quaternion(),ows=new THREE.Vector3();
  dm.displayTemp.plane.getWorldPosition(owp);
  dm.displayTemp.plane.getWorldQuaternion(owq);
  dm.displayTemp.plane.getWorldScale(ows);
  switchAnim.oldStart = {pos:owp.clone(),quat:owq.clone(),scale:ows.clone()};
  
  // Target: where the old panel's slot is on the vertical wheel
  var oldPanel = fd.panels[oldIdx];
  // Temporarily make it visible to get its world position
  oldPanel.mesh.visible = true;
  dm.vWheel.updateMatrixWorld(true);
  var otp=new THREE.Vector3(),otq=new THREE.Quaternion(),ots=new THREE.Vector3();
  oldPanel.mesh.getWorldPosition(otp);
  oldPanel.mesh.getWorldQuaternion(otq);
  oldPanel.mesh.getWorldScale(ots);
  oldPanel.mesh.visible = false;
  switchAnim.oldTarget = {pos:otp.clone(),quat:otq.clone(),scale:ots.clone()};
  
  // Create temp for old panel animation (starts at floor morph, ends at vertical morph)
  var oldTempMesh = new THREE.Mesh(oldPanel.mesh.geometry.clone(), oldPanel.mesh.material);
  oldTempMesh.userData.floorPos = oldPanel.mesh.userData.floorPos;
  oldTempMesh.userData.vertPos = oldPanel.mesh.userData.vertPos;
  oldTempMesh.userData.borderIndices = oldPanel.mesh.userData.borderIndices;
  var oldLineGeo = new THREE.BufferGeometry();
  var oldLinePos = new Float32Array(oldPanel.mesh.userData.borderIndices.length*3);
  oldLineGeo.setAttribute('position', new THREE.BufferAttribute(oldLinePos,3));
  oldTempMesh.userData.lineGeo = oldLineGeo;
  morphTo(oldTempMesh, 0); // start at floor radius
  var oldTempEdge = new THREE.Line(oldLineGeo, new THREE.LineBasicMaterial({color:0x667788,transparent:true,opacity:0.35}));
  
  oldTempMesh.position.copy(owp);oldTempMesh.quaternion.copy(owq);oldTempMesh.scale.copy(ows);
  oldTempMesh.visible=true;
  oldTempEdge.position.copy(owp);oldTempEdge.quaternion.copy(owq);oldTempEdge.scale.copy(ows);
  oldTempEdge.visible=true;
  scene.add(oldTempMesh);scene.add(oldTempEdge);
  switchAnim.oldTemp = {plane:oldTempMesh, edge:oldTempEdge};
  
  // Hide the display temp
  dm.displayTemp.plane.visible = false;
  dm.displayTemp.edge.visible = false;
  
  // ── New panel (vertical wheel slot → display) ──
  var newPanel = fd.panels[newIdx];
  var nwp=new THREE.Vector3(),nwq=new THREE.Quaternion(),nws=new THREE.Vector3();
  newPanel.mesh.getWorldPosition(nwp);
  newPanel.mesh.getWorldQuaternion(nwq);
  newPanel.mesh.getWorldScale(nws);
  switchAnim.newStart = {pos:nwp.clone(),quat:nwq.clone(),scale:nws.clone()};
  
  // Target: display position
  switchAnim.newTarget = {pos:owp.clone(),quat:owq.clone(),scale:ows.clone()};
  
  // Create temp for new panel
  var newTempMesh = new THREE.Mesh(newPanel.mesh.geometry.clone(), newPanel.mesh.material);
  newTempMesh.userData.floorPos = newPanel.mesh.userData.floorPos;
  newTempMesh.userData.vertPos = newPanel.mesh.userData.vertPos;
  newTempMesh.userData.borderIndices = newPanel.mesh.userData.borderIndices;
  var newLineGeo = new THREE.BufferGeometry();
  var newLinePos = new Float32Array(newPanel.mesh.userData.borderIndices.length*3);
  newLineGeo.setAttribute('position', new THREE.BufferAttribute(newLinePos,3));
  newTempMesh.userData.lineGeo = newLineGeo;
  morphTo(newTempMesh, 1); // start at vertical radius
  var newTempEdge = new THREE.Line(newLineGeo, new THREE.LineBasicMaterial({color:0x667788,transparent:true,opacity:0.35}));
  
  newTempMesh.position.copy(nwp);newTempMesh.quaternion.copy(nwq);newTempMesh.scale.copy(nws);
  newTempMesh.visible=true;
  newTempEdge.position.copy(nwp);newTempEdge.quaternion.copy(nwq);newTempEdge.scale.copy(nws);
  newTempEdge.visible=true;
  scene.add(newTempMesh);scene.add(newTempEdge);
  switchAnim.newTemp = {plane:newTempMesh, edge:newTempEdge};
  
  // Hide new panel on vertical wheel
  newPanel.mesh.visible = false;
  newPanel.edges.visible = false;
  
  // Destroy old quick view panels
  destroyQuickViewPanels();
  
  switchAnim.active = true;
  switchAnim.prog = 0;
}

function animateSwitch(){
  if(!switchAnim.active) return;
  switchAnim.prog += 0.03;
  if(switchAnim.prog >= 1) switchAnim.prog = 1;
  var p = eIO(switchAnim.prog);
  
  var spin = new THREE.Quaternion();
  spin.setFromAxisAngle(new THREE.Vector3(0,1,0), Math.sin(p*Math.PI)*Math.PI*0.5);
  
  // Animate old panel: display → vertical wheel slot
  var ot = switchAnim.oldTemp;
  if(ot && ot.plane){
    // Update target to track rotating wheel
    var oldPanel = dm.floor.panels[switchAnim.oldIdx];
    oldPanel.mesh.visible = true;
    dm.vWheel.updateMatrixWorld(true);
    var tp=new THREE.Vector3(),tq=new THREE.Quaternion(),ts=new THREE.Vector3();
    oldPanel.mesh.getWorldPosition(tp);oldPanel.mesh.getWorldQuaternion(tq);oldPanel.mesh.getWorldScale(ts);
    oldPanel.mesh.visible = false;
    switchAnim.oldTarget.pos=tp;switchAnim.oldTarget.quat=tq;switchAnim.oldTarget.scale=ts;
    
    ot.plane.position.lerpVectors(switchAnim.oldStart.pos, switchAnim.oldTarget.pos, p);
    var sq=new THREE.Quaternion();sq.slerpQuaternions(switchAnim.oldStart.quat, switchAnim.oldTarget.quat, p);
    ot.plane.quaternion.copy(sq.multiply(spin.clone()));
    ot.plane.scale.lerpVectors(switchAnim.oldStart.scale, switchAnim.oldTarget.scale, p);
    ot.edge.position.copy(ot.plane.position);ot.edge.quaternion.copy(ot.plane.quaternion);ot.edge.scale.copy(ot.plane.scale);
    
    // Morph from floor (0) to vertical (1)
    morphTo(ot.plane, p);
  }
  
  // Animate new panel: vertical wheel slot → display
  var nt = switchAnim.newTemp;
  if(nt && nt.plane){
    nt.plane.position.lerpVectors(switchAnim.newStart.pos, switchAnim.newTarget.pos, p);
    var sq2=new THREE.Quaternion();sq2.slerpQuaternions(switchAnim.newStart.quat, switchAnim.newTarget.quat, p);
    nt.plane.quaternion.copy(sq2.multiply(spin.clone()));
    nt.plane.scale.lerpVectors(switchAnim.newStart.scale, switchAnim.newTarget.scale, p);
    nt.edge.position.copy(nt.plane.position);nt.edge.quaternion.copy(nt.plane.quaternion);nt.edge.scale.copy(nt.plane.scale);
    
    // Morph from vertical (1) to floor (0)
    morphTo(nt.plane, 1 - p);
  }
  
  if(switchAnim.prog >= 1){
    // Clean up old temp
    if(ot){if(ot.plane)scene.remove(ot.plane);if(ot.edge)scene.remove(ot.edge);}
    // Show old panel back on vertical wheel
    var oldPanel = dm.floor.panels[switchAnim.oldIdx];
    oldPanel.mesh.visible = true;
    oldPanel.edges.visible = true;
    // Old panel goes back to VW — animate rotation for vertical wheel
    oldPanel.mesh.material.userData.imgRotationTarget = 1.0;

    // Clean up old display temp
    if(dm.displayTemp){
      if(dm.displayTemp.plane)scene.remove(dm.displayTemp.plane);
      if(dm.displayTemp.edge)scene.remove(dm.displayTemp.edge);
    }

    // New temp becomes the display
    dm.displayTemp = switchAnim.newTemp;
    // New panel is displayed upright — animate image rotation back
    var newPanel = dm.floor.panels[switchAnim.newIdx];
    newPanel.mesh.material.userData.imgRotationTarget = 0.0;
    
    // Keep new panel hidden on vertical wheel
    var newPanel = dm.floor.panels[switchAnim.newIdx];
    newPanel.mesh.visible = false;
    newPanel.edges.visible = false;
    
    // Update selection
    dm.selIdx = switchAnim.newIdx;
    
    // Re-register star temps as buttons and re-add icon overlays
    dm.dmButtons = [];
    dm.starIcons = [];
    var actionTypes3 = ['add-to-cart', 'close', 'expand'];
    for(var sti6 = 0; sti6 < dm.starTemps.length; sti6++){
      var stg3 = dm.starTemps[sti6];
      var iconM = createStarIconOverlay(actionTypes3[sti6], 0.5);
      stg3.add(iconM);
      dm.starIcons.push(iconM);
      dm.dmButtons.push(stg3);
    }
    
    // Reset
    switchAnim.active = false;
    switchAnim.prog = 0;
    switchAnim.oldTemp = null;
    switchAnim.newTemp = null;
  }
}

// FBO GLASS REFRACTION SYSTEM
// Renders scene (without cart) to a texture, then
// maps that texture onto the cart panel with UV
// distortion for a real refraction/glass effect.
// ══════════════════════════════════════════════
var glassFBO = null;

function createGlassFBO() {
  var pr = Math.min(window.devicePixelRatio, 1.5);
  glassFBO = new THREE.WebGLRenderTarget(
    Math.floor(window.innerWidth * pr * 0.5),
    Math.floor(window.innerHeight * pr * 0.5),
    { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter, format: THREE.RGBFormat }
  );
}

function resizeGlassFBO() {
  if(glassFBO) {
    var pr = Math.min(window.devicePixelRatio, 1.5);
    glassFBO.setSize(
      Math.floor(window.innerWidth * pr * 0.5),
      Math.floor(window.innerHeight * pr * 0.5)
    );
  }
}

function createGlassShaderMaterial() {
  var scratchTex = generateScratchTexture();
  return new THREE.ShaderMaterial({
    uniforms: {
      tBackground: { value: null },
      resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
      refractionStrength: { value: 0.12 },
      chromaticAberration: { value: 0.23 },
      tintColor: { value: new THREE.Color(0.93, 0.94, 0.97) },
      tintStrength: { value: 0.15 },
      fresnelPower: { value: 2.0 },
      fresnelStrength: { value: 0.3 },
      time: { value: 0 },
      tScratch: { value: scratchTex },
      tFrost: { value: generateFrostTexture() }
    },
    vertexShader: [
      'varying vec2 vUv;',
      'varying vec3 vNormal;',
      'varying vec3 vViewDir;',
      'void main() {',
      '  vUv = uv;',
      '  vec4 mvPos = modelViewMatrix * vec4(position, 1.0);',
      '  vNormal = normalize(normalMatrix * normal);',
      '  vViewDir = normalize(-mvPos.xyz);',
      '  gl_Position = projectionMatrix * mvPos;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform sampler2D tBackground, tScratch, tFrost;',
      'uniform vec2 resolution;',
      'uniform float refractionStrength, chromaticAberration;',
      'uniform vec3 tintColor;',
      'uniform float tintStrength, fresnelPower, fresnelStrength, time;',
      'varying vec2 vUv;',
      'varying vec3 vNormal, vViewDir;',
      GLARE_GLSL_FUNCS,
      'void main() {',
      '  vec3 N=normalize(vNormal); vec3 V=normalize(vViewDir);',
      '  vec2 screenUV=gl_FragCoord.xy/resolution;',
      '  vec2 refractOffset=N.xy*refractionStrength;',
      '  refractOffset+=0.002*vec2(sin(time*1.5+screenUV.y*10.0),cos(time*1.2+screenUV.x*10.0));',
      '  float edgeFactor=1.0-abs(dot(V,N));',
      '  float caStrength=chromaticAberration*(0.3+edgeFactor*2.5);',
      '  vec2 texel=1.0/resolution;',
      '  vec2 rUV=screenUV+refractOffset*(1.0+caStrength);',
      '  vec2 gUV=screenUV+refractOffset;',
      '  vec2 bUV=screenUV+refractOffset*(1.0-caStrength);',
      '  float r=texture2D(tBackground,rUV).r*.4+texture2D(tBackground,rUV+texel*vec2(1,0)).r*.15+texture2D(tBackground,rUV-texel*vec2(1,0)).r*.15+texture2D(tBackground,rUV+texel*vec2(0,1)).r*.15+texture2D(tBackground,rUV-texel*vec2(0,1)).r*.15;',
      '  float g=texture2D(tBackground,gUV).g*.4+texture2D(tBackground,gUV+texel*vec2(1,0)).g*.15+texture2D(tBackground,gUV-texel*vec2(1,0)).g*.15+texture2D(tBackground,gUV+texel*vec2(0,1)).g*.15+texture2D(tBackground,gUV-texel*vec2(0,1)).g*.15;',
      '  float b=texture2D(tBackground,bUV).b*.4+texture2D(tBackground,bUV+texel*vec2(1,0)).b*.15+texture2D(tBackground,bUV-texel*vec2(1,0)).b*.15+texture2D(tBackground,bUV+texel*vec2(0,1)).b*.15+texture2D(tBackground,bUV-texel*vec2(0,1)).b*.15;',
      '  vec3 col=vec3(r,g,b);',
      '  float fresnel=pow(1.0-max(dot(V,N),0.0),fresnelPower)*fresnelStrength;',
      '  col=mix(col,tintColor,tintStrength+fresnel*0.3);',
      '  col+=vec3(0.95,0.96,0.98)*fresnel*0.5;',
      GLASS_TINT_GLSL,
      GLARE_GLSL_CALC,
      '  col+=glareResult;',
      '  gl_FragColor=vec4(col,0.92);',
      '}'
    ].join('\n'),
    transparent: true,
    side: THREE.DoubleSide,
    depthWrite: false
  });
}

// NAVIGATION MENU (glass button, top-left)

var navMenu = {
  group: null, glassMesh: null, labelMesh: null,
  open: false, morphT: 0, targetT: 0, animating: false,
  buttons: [], // {group, floorIdx, label}
  physX: 0, physY: 0, initialized: false
};

var NAV_CR = 0.25, NAV_RW = 2.2, NAV_RH = 0.55, NAV_SX = 30, NAV_SY = 20;
var navScrollAnim = { active: false, startY: 0, targetY: 0, progress: 0 };

function createNavMenu() {
  navMenu.group = new THREE.Group();
  var cols=NAV_SX+1, rows=NAV_SY+1;
  var geo = new THREE.PlaneGeometry(NAV_RW, NAV_RH, NAV_SX, NAV_SY);
  var pos = geo.attributes.position;
  var circP = new Float32Array(pos.count*3);
  var rectP = new Float32Array(pos.count*3);
  for(var row=0;row<rows;row++){
    for(var col=0;col<cols;col++){
      var idx=row*cols+col, u=col/NAV_SX, v=row/NAV_SY;
      var cx2=(u-0.5)*NAV_RW, cy2=(v-0.5)*NAV_RH;
      // Circle state
      var a=Math.atan2(cy2,cx2), d=Math.sqrt(cx2*cx2+cy2*cy2);
      var cd=Math.min(d,NAV_CR); var cpx=Math.cos(a)*cd, cpy=Math.sin(a)*cd;
      var rim=cd/NAV_CR; var cz=(rim>.7)?-0.04*((rim-.7)/.3)*((rim-.7)/.3):0;
      circP[idx*3]=cpx;circP[idx*3+1]=cpy;circP[idx*3+2]=cz;
      // Rect state
      var hw=NAV_RW/2,hh=NAV_RH/2,cr=0.08;
      var rx=cx2,ry=cy2;
      var de=Math.min(Math.abs(rx)-hw+cr,Math.abs(ry)-hh+cr);
      var rz=(de>-0.01&&de<cr)?-0.03*(1-Math.max(de,0)/cr):((Math.abs(rx)>hw-cr&&Math.abs(ry)>hh-cr)?-0.03:0);
      rectP[idx*3]=rx;rectP[idx*3+1]=ry;rectP[idx*3+2]=rz;
    }
  }
  for(var k=0;k<pos.count*3;k++) pos.array[k]=circP[k];
  pos.needsUpdate=true; geo.computeVertexNormals();

  var navScratchTex = generateScratchTexture();
  var glassMat = new THREE.ShaderMaterial({
    uniforms:{
      tBg:{value:null}, res:{value:new THREE.Vector2(window.innerWidth,window.innerHeight)},
      morphT:{value:0}, cR:{value:NAV_CR}, rW:{value:NAV_RW}, rH:{value:NAV_RH}, time:{value:0},
      tScratch:{value:navScratchTex},
      tFrost:{value:generateFrostTexture()}
    },
    vertexShader:[
      'varying vec3 vN,vV,vLP;',
      'varying vec2 vUv;',
      'void main(){',
      '  vLP=position;',
      '  vUv=uv;',
      '  vec4 mv=modelViewMatrix*vec4(position,1.0);',
      '  vN=normalize(normalMatrix*normal);',
      '  vV=normalize(-mv.xyz);',
      '  gl_Position=projectionMatrix*mv;',
      '}'
    ].join('\n'),
    fragmentShader:[
      'uniform sampler2D tBg,tScratch,tFrost;',
      'uniform vec2 res;',
      'uniform float morphT,cR,rW,rH,time;',
      'varying vec3 vN,vV,vLP;',
      'varying vec2 vUv;',
      GLARE_GLSL_FUNCS,
      'float sdCircle(vec2 p,float r){return length(p)-r;}',
      'float sdRRect(vec2 p,vec2 b,float r){vec2 d2=abs(p)-b+r;return length(max(d2,0.0))+min(max(d2.x,d2.y),0.0)-r;}',
      'void main(){',
      '  vec3 N=normalize(vN); vec3 V=normalize(vV);',
      '  float sd=mix(sdCircle(vLP.xy,cR),sdRRect(vLP.xy,vec2(rW,rH)*0.5,0.06),morphT);',
      '  float edge=fwidth(sd)*1.5;',
      '  float alpha=1.0-smoothstep(-edge,edge,sd);',
      '  if(alpha<0.01)discard;',
      '  float glow=smoothstep(edge*4.0,0.0,abs(sd))*0.5;',
      '  vec2 suv=gl_FragCoord.xy/res;',
      '  vec2 refr=N.xy*0.15;',
      '  refr+=0.003*vec2(sin(time*1.5+suv.y*8.0),cos(time*1.2+suv.x*8.0));',
      '  float ef=1.0-abs(dot(V,N));',
      '  float ca=0.23*(0.3+ef*2.5);',
      '  vec2 tx=1.0/res;',
      '  vec2 ru=suv+refr*(1.0+ca),gu=suv+refr,bu=suv+refr*(1.0-ca);',
      '  float r=texture2D(tBg,ru).r*.6+texture2D(tBg,ru+tx).r*.2+texture2D(tBg,ru-tx).r*.2;',
      '  float g=texture2D(tBg,gu).g*.6+texture2D(tBg,gu+tx).g*.2+texture2D(tBg,gu-tx).g*.2;',
      '  float b=texture2D(tBg,bu).b*.6+texture2D(tBg,bu+tx).b*.2+texture2D(tBg,bu-tx).b*.2;',
      '  vec3 col=vec3(r,g,b);',
      '  float fresnel=pow(1.0-max(dot(V,N),0.0),2.0)*0.15;',
      '  col=mix(col,vec3(0.95,0.96,0.98),fresnel*0.1);',
      '  col+=vec3(0.7,0.75,0.9)*glow*0.3;',
      GLASS_TINT_GLSL,
      GLARE_GLSL_CALC,
      '  col+=glareResult;',
      '  gl_FragColor=vec4(col,alpha);',
      '}'
    ].join('\n'),
    transparent:true, side:THREE.DoubleSide, depthWrite:true
  });
  navMenu.glassMesh = new THREE.Mesh(geo, glassMat);
  navMenu.glassMesh.renderOrder=10;
  navMenu.glassMesh.userData.circP=circP;
  navMenu.glassMesh.userData.rectP=rectP;
  navMenu.group.add(navMenu.glassMesh);

  // Hamburger icon (3 lines)
  var iconCanvas=document.createElement('canvas');iconCanvas.width=64;iconCanvas.height=64;
  var ictx=iconCanvas.getContext('2d');
  ictx.strokeStyle='#c0c8d8';ictx.lineWidth=4;ictx.lineCap='round';
  ictx.beginPath();ictx.moveTo(18,22);ictx.lineTo(46,22);ictx.stroke();
  ictx.beginPath();ictx.moveTo(18,32);ictx.lineTo(46,32);ictx.stroke();
  ictx.beginPath();ictx.moveTo(18,42);ictx.lineTo(46,42);ictx.stroke();
  var iconTex=new THREE.CanvasTexture(iconCanvas);iconTex.needsUpdate=true;
  navMenu.labelMesh=new THREE.Mesh(
    new THREE.PlaneGeometry(0.3,0.3),
    new THREE.MeshBasicMaterial({map:iconTex,transparent:true,side:THREE.DoubleSide,depthWrite:false,depthTest:false})
  );
  navMenu.labelMesh.renderOrder=20;
  navMenu.labelMesh.position.z=0.02;
  navMenu.group.add(navMenu.labelMesh);

  navMenu.group.layers.enable(1);
  navMenu.group.traverse(function(c){c.layers.enable(1);});
  scene.add(navMenu.group);
}

function morphNavMenu(t){
  var pos=navMenu.glassMesh.geometry.attributes.position;
  var cp=navMenu.glassMesh.userData.circP, rp=navMenu.glassMesh.userData.rectP;
  for(var i=0;i<pos.count;i++){
    var i3=i*3;
    pos.array[i3]=cp[i3]+(rp[i3]-cp[i3])*t;
    pos.array[i3+1]=cp[i3+1]+(rp[i3+1]-cp[i3+1])*t;
    pos.array[i3+2]=cp[i3+2]+(rp[i3+2]-cp[i3+2])*t;
  }
  pos.needsUpdate=true;
  navMenu.glassMesh.geometry.computeVertexNormals();
  navMenu.glassMesh.material.uniforms.morphT.value=t;
}

function toggleNavMenu(){
  if(navMenu.animating) return;
  navMenu.animating=true;
  navMenu.targetT=navMenu.open?0:1;
  if(!navMenu.open) buildNavButtons();
}

function buildNavButtons(){
  // Remove old buttons
  for(var i=0;i<navMenu.buttons.length;i++){
    scene.remove(navMenu.buttons[i].group);
  }
  navMenu.buttons=[];
  var labels=['HOME','PANTS','SHIRTS','1 OF 1S','ACCESSORIES'];
  var floorMap=[-1,0,1,2,3]; // -1 = home/top
  for(var bi=0;bi<labels.length;bi++){
    var bw=0.38, bh=0.2;
    var bCanvas=document.createElement('canvas');bCanvas.width=128;bCanvas.height=48;
    var bCtx=bCanvas.getContext('2d');
    bCtx.font='500 22px Arial';bCtx.fillStyle='#b0b8c8';
    bCtx.textAlign='center';bCtx.textBaseline='middle';
    bCtx.fillText(labels[bi],64,24);
    var bTex=new THREE.CanvasTexture(bCanvas);bTex.needsUpdate=true;
    var bMesh=new THREE.Mesh(
      new THREE.PlaneGeometry(bw,bh),
      new THREE.MeshBasicMaterial({map:bTex,transparent:true,side:THREE.DoubleSide,depthWrite:false,depthTest:false})
    );
    bMesh.renderOrder=20;
    var bGroup=new THREE.Group();
    bGroup.add(bMesh);
    bGroup.userData.actionId='nav-'+bi;
    bGroup.userData.clickable=true;
    bGroup.userData.floorIdx=floorMap[bi];
    bGroup.layers.enable(1);
    bGroup.traverse(function(c){c.layers.enable(1);});
    bGroup.visible=false;
    scene.add(bGroup);
    navMenu.buttons.push({group:bGroup,localX:-0.85+bi*0.44,localY:0,floorIdx:floorMap[bi]});
  }
}

function positionNavMenu(){
  if(!navMenu.group) return;
  var time=performance.now()*0.001;

  // Morph animation
  var sp=0.03;
  if(navMenu.morphT<navMenu.targetT) navMenu.morphT=Math.min(navMenu.morphT+sp,navMenu.targetT);
  else if(navMenu.morphT>navMenu.targetT) navMenu.morphT=Math.max(navMenu.morphT-sp,navMenu.targetT);
  var e=navMenu.morphT<.5?4*navMenu.morphT*navMenu.morphT*navMenu.morphT:1-Math.pow(-2*navMenu.morphT+2,3)/2;
  morphNavMenu(e);

  if(navMenu.animating && Math.abs(navMenu.morphT-navMenu.targetT)<0.001){
    navMenu.animating=false;
    navMenu.open=navMenu.targetT>0.5;
    if(!navMenu.open){
      for(var i=0;i<navMenu.buttons.length;i++) navMenu.buttons[i].group.visible=false;
    }
  }

  // Hide/show hamburger icon
  if(navMenu.labelMesh) navMenu.labelMesh.visible=e<0.3;

  // Show nav buttons when expanded
  for(var bi=0;bi<navMenu.buttons.length;bi++){
    navMenu.buttons[bi].group.visible=e>0.6;
  }

  // Screen position — top-left
  var dist=4.5;var fovRad=camera.fov*Math.PI/180;
  var halfH=Math.tan(fovRad/2)*dist;var halfW=halfH*camera.aspect;
  var iconX=-halfW+0.30, iconY=halfH-0.30;
  // Shift right as it opens to accommodate the wider rect
  var openX=iconX+0.7*e;
  var targetWorldX=camera.position.x+openX;
  var targetWorldY=camera.position.y+iconY;

  if(!navMenu.initialized){
    navMenu.physX=targetWorldX;navMenu.physY=targetWorldY;navMenu.initialized=true;
  }
  // Nav menu tether — faster when nav scroll is animating so menu leads the camera
  var navTetherSpeed=navScrollAnim.active?0.5:0.45;
  navMenu.physX+=(targetWorldX-navMenu.physX)*navTetherSpeed;
  navMenu.physY+=(targetWorldY-navMenu.physY)*navTetherSpeed;

  var offset=new THREE.Vector3(navMenu.physX-camera.position.x,navMenu.physY-camera.position.y,-dist);
  offset.applyQuaternion(camera.quaternion);
  navMenu.group.position.copy(camera.position).add(offset);
  navMenu.group.quaternion.copy(camera.quaternion);

  // Position nav buttons along the expanded bar
  for(var bi2=0;bi2<navMenu.buttons.length;bi2++){
    var nb=navMenu.buttons[bi2];
    var bOffset=new THREE.Vector3(navMenu.physX-camera.position.x+nb.localX,navMenu.physY-camera.position.y+nb.localY,-dist+0.02);
    bOffset.applyQuaternion(camera.quaternion);
    nb.group.position.copy(camera.position).add(bOffset);
    nb.group.quaternion.copy(camera.quaternion);
  }

  navMenu.glassMesh.material.uniforms.time.value=time;
  navMenu.glassMesh.material.uniforms.res.value.set(window.innerWidth,window.innerHeight);
}
