function enterProductDetail(){
  if(pdv.active||pdv.entering) return;
  var floorCfg = PRODUCT_DATA.floors[dm.floorIdx];
  if(!floorCfg) return;
  var product = floorCfg.products[dm.selIdx];
  if(!product) return;
  pdv.product = product;
  pdv.floorIdx = dm.floorIdx;
  pdv.selIdx = dm.selIdx;
  pdv.entering = true;
  pdv.prog = 0;
  pdv.spinBoost = 0;
  pdv.whiteout = 0;
  pdv.selectedSize = product.sizes && product.sizes.length > 0 ? (product.sizes.indexOf('M')>=0?'M':product.sizes[0]) : '';
}

function animateProductDetailEnter(){
  if(!pdv.entering) return;
  pdv.prog += 0.018;
  if(pdv.prog >= 1) pdv.prog = 1;
  var p = pdv.prog;

  // Phase 1 (0→0.4): Spin wheel fast, start whiteout
  if(p < 0.4){
    var sp = p / 0.4;
    pdv.spinBoost = sp * sp * 2.5; // accelerating spin
    pdv.whiteout = sp * sp * 0.3;
  }
  // Phase 2 (0.4→0.7): Full whiteout
  else if(p < 0.7){
    var wp = (p - 0.4) / 0.3;
    pdv.spinBoost = 2.5 * (1 - wp * 0.5);
    pdv.whiteout = 0.3 + wp * 0.7;
  }
  // Phase 3 (0.7→1.0): Build scene behind white, fade in
  else {
    var fp = (p - 0.7) / 0.3;
    pdv.spinBoost = 0;
    pdv.whiteout = 1.0 - fp;
    if(!pdv.group) buildProductDetailScene();
    if(pdv.group) pdv.group.visible = true;
  }

  // Apply spin boost to current floor
  if(dm.floor && dm.floor.group && pdv.spinBoost > 0){
    dm.floor.group.rotation.y += pdv.spinBoost * 0.15;
  }

  // Apply whiteout + background blur
  if(postQuad && postQuad.material.uniforms.whiteout){
    postQuad.material.uniforms.whiteout.value = pdv.whiteout;
  }
  // Ramp bgBlur in during phase 3 (as whiteout fades, blur appears)
  if(postQuad && postQuad.material.uniforms.bgBlur){
    var blur = p < 0.7 ? 0.0 : (p - 0.7) / 0.3;
    postQuad.material.uniforms.bgBlur.value = blur;
  }

  if(p >= 1){
    pdv.entering = false;
    pdv.active = true;
    // Hide DM UI overlays but keep floors/scene visible behind
    if(dm.vWheel) dm.vWheel.visible = false;
    if(dm.displayTemp){
      if(dm.displayTemp.plane) dm.displayTemp.plane.visible = false;
      if(dm.displayTemp.edge) dm.displayTemp.edge.visible = false;
    }
    dm.starTemps.forEach(function(st){ st.visible = false; });
    dm.dmButtons.forEach(function(b){ b.visible = false; });
    if(postQuad && postQuad.material.uniforms.whiteout){
      postQuad.material.uniforms.whiteout.value = 0;
    }
    if(postQuad && postQuad.material.uniforms.bgBlur){
      postQuad.material.uniforms.bgBlur.value = 1.0;
    }
  }
}

function exitProductDetail(){
  if(!pdv.active || pdv.exitingToDM) return;
  pdv.exitingToDM = true;
  pdv.prog = 0;
}

function animateProductDetailExit(){
  if(!pdv.exitingToDM) return;
  pdv.prog += 0.02;
  if(pdv.prog >= 1) pdv.prog = 1;
  var p = pdv.prog;

  // Phase 1 (0→0.4): Fade to white
  if(p < 0.4){
    pdv.whiteout = (p / 0.4);
  }
  // Phase 2 (0.4→0.6): Destroy detail, show DM behind white
  else if(p < 0.6){
    if(pdv.group){
      destroyProductDetailScene();
    }
    // Restore DM UI overlays
    if(dm.vWheel) dm.vWheel.visible = true;
    if(dm.displayTemp){
      if(dm.displayTemp.plane) dm.displayTemp.plane.visible = true;
      if(dm.displayTemp.edge) dm.displayTemp.edge.visible = true;
    }
    dm.starTemps.forEach(function(st){ st.visible = true; });
    dm.dmButtons.forEach(function(b){ b.visible = true; });
    pdv.whiteout = 1.0;
  }
  // Phase 3 (0.6→1.0): Fade from white back to DM
  else {
    var fp = (p - 0.6) / 0.4;
    pdv.whiteout = 1.0 - fp;
  }

  if(postQuad && postQuad.material.uniforms.whiteout){
    postQuad.material.uniforms.whiteout.value = pdv.whiteout;
  }
  // Ramp bgBlur down: fade out during phase 1, off by phase 2
  if(postQuad && postQuad.material.uniforms.bgBlur){
    var blur = p < 0.4 ? 1.0 - (p / 0.4) : 0.0;
    postQuad.material.uniforms.bgBlur.value = blur;
  }

  if(p >= 1){
    pdv.exitingToDM = false;
    pdv.active = false;
    pdv.whiteout = 0;
    if(postQuad && postQuad.material.uniforms.whiteout){
      postQuad.material.uniforms.whiteout.value = 0;
    }
    if(postQuad && postQuad.material.uniforms.bgBlur){
      postQuad.material.uniforms.bgBlur.value = 0;
    }
  }
}

function destroyProductDetailScene(){
  if(pdv.group){
    pdv.group.traverse(function(child){
      if(child.geometry) child.geometry.dispose();
      if(child.material){
        if(child.material.map) child.material.map.dispose();
        child.material.dispose();
      }
    });
    scene.remove(pdv.group);
    pdv.group = null;
    pdv.scrollGroup = null;
    pdv.scrollY = 0; pdv.scrollVel = 0;
    pdv.contentH = 0; pdv.viewH = 0;
    pdv.dragging = false;
    pdv.mainImgMesh = null; pdv.mainImgPanel = null;
    pdv.allImgSrcs = null; pdv.thumbMeshes = null;
    pdv.loadMainImage = null;
  }
}

// Creates a glass panel with the same refraction shader as the DM buttons
function createPdvGlassPanel(w, h, frost, cornerR){
  if(frost === undefined) frost = 0.35;
  if(cornerR === undefined) cornerR = 0.08;
  var hw = w / 2, hh = h / 2;
  var geo = new THREE.PlaneGeometry(w, h, 16, 16);
  var pos = geo.attributes.position;
  // Add bevel to edges
  for(var j = 0; j < pos.count; j++){
    var px = pos.array[j*3], py = pos.array[j*3+1];
    var md = Math.min(Math.abs(px-hw),Math.abs(px+hw),Math.abs(py-hh),Math.abs(py+hh));
    if(md < 0.15) pos.array[j*3+2] = -0.04*(1-md/0.15)*(1-md/0.15);
  }
  pos.needsUpdate = true; geo.computeVertexNormals();

  var mat = new THREE.ShaderMaterial({
    uniforms:{
      tBg:{value:glassFBO?glassFBO.texture:null},
      res:{value:new THREE.Vector2(window.innerWidth,window.innerHeight)},
      rW:{value:hw},rH:{value:hh},time:{value:0},
      frost:{value:frost},
      tScratch:{value:generateScratchTexture()},
      tFrost:{value:generateFrostTexture()}
    },
    vertexShader:[
      'varying vec3 vN,vV,vLP;',
      'varying vec2 vUv;',
      'void main(){',
      '  vLP=position;',
      '  vUv=uv;',
      '  vec4 mv=modelViewMatrix*vec4(position,1.0);',
      '  vN=normalize(normalMatrix*normal);',
      '  vV=normalize(-mv.xyz);',
      '  gl_Position=projectionMatrix*mv;',
      '}'
    ].join('\n'),
    fragmentShader:[
      'uniform sampler2D tBg,tScratch,tFrost;',
      'uniform vec2 res;',
      'uniform float rW,rH,time,frost;',
      'varying vec3 vN,vV,vLP;',
      'varying vec2 vUv;',
      GLARE_GLSL_FUNCS,
      'float sdRRect(vec2 p,vec2 b,float r){vec2 d2=abs(p)-b+r;return length(max(d2,0.0))+min(max(d2.x,d2.y),0.0)-r;}',
      'void main(){',
      '  vec3 N=normalize(vN); vec3 V=normalize(vV);',
      '  float sd=sdRRect(vLP.xy,vec2(rW,rH),' + cornerR.toFixed(3) + ');',
      '  float edge=fwidth(sd)*1.5;',
      '  float alpha=1.0-smoothstep(-edge,edge,sd);',
      '  if(alpha<0.01)discard;',
      '  float glow=smoothstep(edge*4.0,0.0,abs(sd))*0.5;',
      '  vec2 suv=gl_FragCoord.xy/res;',
      '  vec2 refr=N.xy*0.15;',
      '  refr+=0.003*vec2(sin(time*1.5+suv.y*8.0),cos(time*1.2+suv.x*8.0));',
      '  float ef=1.0-abs(dot(V,N));',
      '  float ca=0.23*(0.3+ef*2.5);',
      '  vec2 tx=1.0/res;',
      '  vec2 ru=suv+refr*(1.0+ca),gu=suv+refr,bu=suv+refr*(1.0-ca);',
      '  float r=texture2D(tBg,ru).r*.6+texture2D(tBg,ru+tx).r*.2+texture2D(tBg,ru-tx).r*.2;',
      '  float g=texture2D(tBg,gu).g*.6+texture2D(tBg,gu+tx).g*.2+texture2D(tBg,gu-tx).g*.2;',
      '  float b=texture2D(tBg,bu).b*.6+texture2D(tBg,bu+tx).b*.2+texture2D(tBg,bu-tx).b*.2;',
      '  vec3 col=vec3(r,g,b);',
      '  float fresnel=pow(1.0-max(dot(V,N),0.0),2.0)*0.15;',
      '  col=mix(col,vec3(0.95,0.96,0.98),fresnel*0.1);',
      '  col+=vec3(0.7,0.75,0.9)*glow*0.3;',
      // Center frost: strongest at center, fades to clear glass at edges following rect contour
      '  float borderW=min(rW,rH)*0.7;',
      '  float frostMask=1.0-smoothstep(-borderW,0.0,sd);',
      '  col=mix(col,vec3(0.92,0.93,0.96),frost*frostMask);',
      GLASS_TINT_GLSL,
      GLARE_GLSL_CALC,
      '  col+=glareResult;',
      '  gl_FragColor=vec4(col,alpha);',
      '}'
    ].join('\n'),
    transparent:true, side:THREE.DoubleSide, depthWrite:true
  });
  var mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = 10;
  mesh.userData.glassMesh = mesh;
  mesh.userData.isGlassPanel = true;
  return mesh;
}

// Helper: canvas text mesh
function pdvTextMesh(text, opts){
  var cw = opts.cw || 512, ch = opts.ch || 64;
  var font = opts.font || '500 28px Arial';
  var color = opts.color || '#3a4258';
  var align = opts.align || 'left';
  var c = document.createElement('canvas'); c.width = cw; c.height = ch;
  var ctx = c.getContext('2d');
  ctx.font = font; ctx.fillStyle = color; ctx.textAlign = align; ctx.textBaseline = 'middle';
  var tx = align === 'center' ? cw/2 : align === 'right' ? cw - 20 : 20;
  if(opts.wrap){
    var words = text.split(' '), line = '', lines = [], maxW = cw - 40;
    for(var i = 0; i < words.length; i++){
      var test = line + (line ? ' ' : '') + words[i];
      if(ctx.measureText(test).width > maxW && line){ lines.push(line); line = words[i]; }
      else { line = test; }
    }
    if(line) lines.push(line);
    var lineH = opts.lineH || 28;
    for(var j = 0; j < lines.length && j < (opts.maxLines||6); j++){
      ctx.fillText(lines[j], tx, 20 + j * lineH);
    }
  } else {
    ctx.fillText(text, tx, ch / 2);
  }
  var tex = new THREE.CanvasTexture(c); tex.needsUpdate = true;
  var pw = opts.w || 1, ph = opts.h || 0.25;
  var mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(pw, ph),
    new THREE.MeshBasicMaterial({map: tex, transparent: true, side: THREE.DoubleSide, depthWrite: false, depthTest: false})
  );
  mesh.renderOrder = 20;
  return mesh;
}

function buildProductDetailScene(){
  if(pdv.group) destroyProductDetailScene();
  var product = pdv.product;
  if(!product) return;

  pdv.group = new THREE.Group();

  // ── Responsive layout ──
  var dist = 4.0;
  var fovRad = camera.fov * Math.PI / 180;
  var halfH = Math.tan(fovRad / 2) * dist;
  var halfW = halfH * camera.aspect;
  var W = halfW * 2, H = halfH * 2;
  var portrait = camera.aspect < 1.0;
  var pad = portrait ? W * 0.05 : H * 0.06;
  var gap = portrait ? H * 0.02 : H * 0.04;
  // Reserve space at top for cart + menu icons (they sit at halfH-0.30 in dist=4.5 space)
  var topReserve = H * 0.06;
  var colW = portrait ? (W - pad * 2) : 0; // full width in portrait
  var colCX = 0; // centered in portrait
  var fontScale = portrait ? Math.max(camera.aspect, 0.5) : 1.0;

  // Create scroll container — all scrollable content goes here
  pdv.scrollGroup = new THREE.Group();
  pdv.group.add(pdv.scrollGroup);
  pdv.scrollY = 0; pdv.scrollVel = 0;
  var viewTop = halfH - topReserve;
  pdv.viewH = viewTop + halfH - pad; // visible height from topReserve to bottom pad

  if(portrait){
    // ══ PORTRAIT: single column, scrollable ══
    var hasSizes = (product.sizes && product.sizes.length > 0);
    var fs = function(base){ return Math.max(Math.round(base * fontScale), 12); };

    // Fixed sizes (not squished to fit viewport — may overflow for scroll)
    var titleH = H * 0.07;
    var imgH = H * 0.75; // tall image — forces scroll
    var descH = H * 0.18;
    var sizeRowH = H * 0.08;
    var acH = H * 0.08;

    var curY = viewTop;

    // ── Title bar (back button carved from left side) ──
    curY -= titleH / 2;
    var backW = titleH;
    var titleGap = gap * 0.5;
    var titleBarW = colW - backW - titleGap;
    var titleOrigLeft = colCX - colW / 2;
    var titleBarX = titleOrigLeft + backW + titleGap + titleBarW / 2;
    var titlePanel = createPdvGlassPanel(titleBarW, titleH, 0.4, 0.08);
    titlePanel.position.set(titleBarX, curY, 0);
    pdv.scrollGroup.add(titlePanel);

    // Back button — flush at original left edge
    var backX = titleOrigLeft + backW / 2;
    var backBtn = createPdvGlassPanel(backW, titleH, 0.35, 0.06);
    backBtn.position.set(backX, curY, 0);
    backBtn.userData.actionId = 'pdv-back';
    backBtn.userData.clickable = true;
    pdv.scrollGroup.add(backBtn);
    var bkLabel = pdvTextMesh('\u2190', {
      cw: 64, ch: 64, font: '400 ' + fs(32) + 'px Arial', color: '#4a5268', align: 'center',
      w: backW * 0.6, h: titleH * 0.6
    });
    bkLabel.position.set(backX, curY, 0.03);
    pdv.scrollGroup.add(bkLabel);

    var nameMesh = pdvTextMesh(product.name.toUpperCase(), {
      cw: 600, ch: 50, font: '700 ' + fs(38) + 'px Arial', color: '#2a3248', align: 'left',
      w: titleBarW * 0.55, h: titleH * 0.7
    });
    nameMesh.position.set(titleBarX - titleBarW * 0.15, curY, 0.03);
    pdv.scrollGroup.add(nameMesh);

    var priceStr = product.price ? '$' + product.price : '';
    var desStr = product.designer || '';
    var subText = priceStr + (priceStr && desStr ? '  \u00B7  ' : '') + desStr;
    var subMesh = pdvTextMesh(subText, {
      cw: 400, ch: 36, font: '400 ' + fs(24) + 'px Arial', color: '#5a6278', align: 'right',
      w: titleBarW * 0.35, h: titleH * 0.5
    });
    subMesh.position.set(titleBarX + titleBarW * 0.25, curY, 0.03);
    pdv.scrollGroup.add(subMesh);
    curY -= titleH / 2 + gap;

    // ── Product image (tall) ──
    curY -= imgH / 2;
    var imgPanel = createPdvGlassPanel(colW, imgH, 0.15, 0.1);
    imgPanel.position.set(colCX, curY, 0);
    pdv.scrollGroup.add(imgPanel);

    // Collect all available images (front, back, Shopify extras)
    var allImgs = [];
    if(product.image) allImgs.push(product.image);
    if(product.backImage) allImgs.push(product.backImage);
    if(product.images && product.images.length > 0){
      for(var ii = 0; ii < product.images.length; ii++){
        if(allImgs.indexOf(product.images[ii]) === -1) allImgs.push(product.images[ii]);
      }
    }

    // Load and display main product image
    pdv.mainImgMesh = null;
    pdv.mainImgPanel = {cx: colCX, cy: curY, pw: colW, ph: imgH};
    pdv.allImgSrcs = allImgs;
    pdv.thumbMeshes = [];

    pdv.loadMainImage = function(src){
      if(pdv.mainImgMesh){ pdv.scrollGroup.remove(pdv.mainImgMesh); pdv.mainImgMesh = null; }
      var imgSrc = src;
      if(imgSrc.indexOf('http') !== 0 && imgSrc.indexOf('//') !== 0) imgSrc = 'product-images/' + imgSrc;
      var loader = new THREE.TextureLoader();
      var mp = pdv.mainImgPanel;
      loader.load(imgSrc, function(tex){
        tex.minFilter = THREE.LinearFilter; tex.magFilter = THREE.LinearFilter;
        var imgAspect = tex.image.width / tex.image.height;
        var fitW, fitH;

function updateProductDetailPosition(){
  if(!pdv.group || !pdv.active) return;
  // Keep detail view locked in front of camera
  var dist = 4.0;
  var offset = new THREE.Vector3(0, 0, -dist);
  offset.applyQuaternion(camera.quaternion);
  pdv.group.position.copy(camera.position).add(offset);
  pdv.group.quaternion.copy(camera.quaternion);

  // Scroll momentum + friction
  if(!pdv.dragging && Math.abs(pdv.scrollVel) > 0.001){
    pdv.scrollY += pdv.scrollVel;
    pdv.scrollVel *= 0.92;
  } else if(!pdv.dragging){
    pdv.scrollVel = 0;
  }
  // Clamp scroll: scrollY=0 is top, positive scrolls down (content moves up)
  var maxScroll = Math.max(pdv.contentH - pdv.viewH, 0);
  if(pdv.scrollY > 0){ pdv.scrollY *= 0.8; pdv.scrollVel = 0; } // rubber band top
  if(pdv.scrollY < -maxScroll){ pdv.scrollY += (-maxScroll - pdv.scrollY) * 0.2; pdv.scrollVel = 0; } // rubber band bottom

  // Apply scroll offset to scroll group (local Y axis)
  if(pdv.scrollGroup){
    pdv.scrollGroup.position.set(0, -pdv.scrollY, 0);
  }

  // Update time uniforms on glass panels
  var tNow = performance.now() * 0.001;
  pdv.group.traverse(function(child){
    if(child.userData.isGlassPanel && child.material && child.material.uniforms && child.material.uniforms.time){
      child.material.uniforms.time.value = tNow;
    }
  });
}

function handleProductDetailClick(cx, cy){
  if(!pdv.active || !pdv.group) return false;
  mouse.x = (cx / window.innerWidth) * 2 - 1;
  mouse.y = -(cy / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  var hits = raycaster.intersectObjects(pdv.group.children, true);
  for(var i = 0; i < hits.length; i++){
    var obj = hits[i].object;
    while(obj && obj !== pdv.group){
      if(obj.userData.clickable && obj.userData.actionId){
        var aid = obj.userData.actionId;
        if(aid === 'pdv-back'){
          exitProductDetail();
          return true;
        } else if(aid === 'pdv-add-to-cart'){
          addToCart(pdv.product);
          return true;
        } else if(aid.indexOf('pdv-size-') === 0){
          pdv.selectedSize = aid.replace('pdv-size-', '');
          var savedScroll = pdv.scrollY;
          buildProductDetailScene();
          pdv.scrollY = savedScroll;
          return true;
        } else if(aid.indexOf('pdv-thumb-') === 0){
          var thumbIdx = parseInt(aid.replace('pdv-thumb-', ''));
          if(pdv.allImgSrcs && pdv.allImgSrcs[thumbIdx]){
            pdv.loadMainImage(pdv.allImgSrcs[thumbIdx]);
            // Update thumb highlights
            if(pdv.thumbMeshes){
              pdv.thumbMeshes.forEach(function(tm, tmi){
                if(tm.material && tm.material.uniforms && tm.material.uniforms.opacity){
                  tm.material.uniforms.opacity.value = (tmi === thumbIdx) ? 0.55 : 0.25;
                }
              });
            }
          }
          return true;
        }
        return true;
      }
      obj = obj.parent;
    }
  }
  return false;
}

function addToCart(product, sizeLabel) {
  var cartId = product.id + (sizeLabel ? '-' + sizeLabel : '');
  var existing = null;
  for(var i=0;i<cart.items.length;i++){if(cart.items[i].cartId===cartId){existing=cart.items[i];break;}}
  if(existing){existing.qty++;}else{cart.items.push({cartId:cartId,id:product.id,name:product.name,price:product.price,size:sizeLabel||'',qty:1});}
  updateCartIcon();
  if(cart.panelOpen) rebuildCartPanel();
  // Also add to Shopify cart
  if(product.shopifyVariants) addToShopifyCart(product, sizeLabel);
}

function removeFromCart(idx) {
  cart.items.splice(idx,1);
  updateCartIcon();
  if(cart.panelOpen) rebuildCartPanel();
}

function getCartTotal() {var t=0;for(var i=0;i<cart.items.length;i++)t+=cart.items[i].price*cart.items[i].qty;return t;}
function getCartCount() {var c=0;for(var i=0;i<cart.items.length;i++)c+=cart.items[i].qty;return c;}

function renderGlassFBO() {
  if(!glassFBO||!cart.glassMesh) return;
  cart.iconGroup.visible=false;
  if(cart.panelGroup)cart.panelGroup.visible=false;
  if(navMenu.group)navMenu.group.visible=false;
  for(var _nb=0;_nb<navMenu.buttons.length;_nb++) navMenu.buttons[_nb].group.visible=false;
  // Hide overlay glass buttons during FBO capture
  for(var oi=0;oi<cartOverlays.length;oi++) cartOverlays[oi].group.visible=false;
  intersectionGlow.glowMeshes.forEach(function(gm){gm.visible=false;});
  var pdvFboVis=pdv.group?pdv.group.visible:false;
  if(pdv.group) pdv.group.visible=false;
  for(var dbi3=0;dbi3<dm.dmButtons.length;dbi3++) dm.dmButtons[dbi3].visible=false;
  // Hide floor glass rings and button temps during FBO capture
  for(var fsi=0;fsi<floors.length;fsi++){if(floors[fsi].glassRing){floors[fsi].glassRing.userData._fboVis=floors[fsi].glassRing.visible;floors[fsi].glassRing.visible=false;}}
  for(var sti3=0;sti3<dm.starTemps.length;sti3++) dm.starTemps[sti3].visible=false;
  if(dm.closingStarTemps){for(var csti=0;csti<dm.closingStarTemps.length;csti++) dm.closingStarTemps[csti].visible=false;}
  renderer.setRenderTarget(glassFBO);
  renderer.clear();
  renderer.render(scene,camera);
  renderer.setRenderTarget(null);
  if(pdv.group) pdv.group.visible=pdvFboVis;
  for(var dbi4=0;dbi4<dm.dmButtons.length;dbi4++) dm.dmButtons[dbi4].visible=true;
  // Restore floor glass rings
  for(var fsi3=0;fsi3<floors.length;fsi3++){if(floors[fsi3].glassRing){var fring=floors[fsi3].glassRing;fring.visible=fring.userData._fboVis!==undefined?fring.userData._fboVis:true;}}
  for(var sti4=0;sti4<dm.starTemps.length;sti4++) dm.starTemps[sti4].visible=true;
  if(dm.closingStarTemps){for(var csti2=0;csti2<dm.closingStarTemps.length;csti2++) dm.closingStarTemps[csti2].visible=true;}
  cart.iconGroup.visible=true;
  if(cart.panelGroup){
    var raw=cartMorphT;
    var e2=raw<.5?4*raw*raw*raw:1-Math.pow(-2*raw+2,3)/2;
    cart.panelGroup.visible=e2>0.6;
  }
  // Restore overlay visibility and update their FBO texture
  for(var oi2=0;oi2<cartOverlays.length;oi2++){
    var ovG=cartOverlays[oi2].group;
    ovG.visible=true;
    // Update glass shader texture if it has one

// ── Cart System (morphable glass circle to rectangle) ──
var CART_CR = 0.25, CART_RW = 2.8, CART_RH = 4.5, CART_THICK = 0.06;
var CART_SX = 40, CART_SY = 40, CART_PERIM = 80;
var cartMorphT = 0, cartTargetT = 0;

function createCartIcon() {
  cart.iconGroup = new THREE.Group();
  var cols=CART_SX+1, rows=CART_SY+1;
  var geo = new THREE.PlaneGeometry(CART_RW, CART_RH, CART_SX, CART_SY);
  var pos = geo.attributes.position;
  var circP = new Float32Array(pos.count*3);
  var rectP = new Float32Array(pos.count*3);
  for(var row=0;row<rows;row++){
    for(var col=0;col<cols;col++){
      var idx=row*cols+col, u=col/CART_SX, v=row/CART_SY;
      var rx=(u-.5)*CART_RW, ry=(v-.5)*CART_RH;
      var dE=Math.min(u,1-u,v,1-v);
      var rz=(dE<.08)?-CART_THICK*(1-dE/.08)*(1-dE/.08):0;
      rectP[idx*3]=rx;rectP[idx*3+1]=ry;rectP[idx*3+2]=rz;
      var cx2=(u-.5)*2,cy2=(v-.5)*2,d=Math.sqrt(cx2*cx2+cy2*cy2);
      var px=0,py=0;
      if(d>.001){var cl=Math.min(d,1);px=(cx2/d)*cl*CART_CR;py=(cy2/d)*cl*CART_CR;}
      var rim=1-Math.min(d,1);
      var cz=(rim<.15)?-CART_THICK*(1-rim/.15)*(1-rim/.15):0;
      circP[idx*3]=px;circP[idx*3+1]=py;circP[idx*3+2]=cz;
    }
  }
  for(var k=0;k<pos.count*3;k++) pos.array[k]=circP[k];
  pos.needsUpdate=true; geo.computeVertexNormals();

  // Glass shader - ALWAYS active, SDF handles circle/rect masking
  var cartScratchTex = generateScratchTexture();
  var glassMat = new THREE.ShaderMaterial({
    uniforms:{
      tBg:{value:null}, res:{value:new THREE.Vector2(window.innerWidth,window.innerHeight)},
      morphT:{value:0}, cR:{value:CART_CR}, rW:{value:CART_RW}, rH:{value:CART_RH}, time:{value:0},
      tScratch:{value:cartScratchTex},
      tFrost:{value:generateFrostTexture()}
    },
    vertexShader: [
      'varying vec3 vN,vV,vLP;',
      'varying vec2 vUv;',
      'void main(){',
      '  vLP=position;',
      '  vUv=uv;',
      '  vec4 mv=modelViewMatrix*vec4(position,1.0);',
      '  vN=normalize(normalMatrix*normal);',
      '  vV=normalize(-mv.xyz);',
      '  gl_Position=projectionMatrix*mv;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform sampler2D tBg,tScratch,tFrost;',
      'uniform vec2 res;',
      'uniform float morphT,cR,rW,rH,time;',
      'varying vec3 vN,vV,vLP;',
      'varying vec2 vUv;',
      GLARE_GLSL_FUNCS,
      'float sdCircle(vec2 p,float r){return length(p)-r;}',
      'float sdRRect(vec2 p,vec2 b,float r){vec2 d2=abs(p)-b+r;return length(max(d2,0.0))+min(max(d2.x,d2.y),0.0)-r;}',
      'void main(){',
      '  vec3 N=normalize(vN); vec3 V=normalize(vV);',
      '  float sd=mix(sdCircle(vLP.xy,cR),sdRRect(vLP.xy,vec2(rW,rH)*0.5,0.12),morphT);',
      '  float edge=fwidth(sd)*1.5;',
      '  float alpha=1.0-smoothstep(-edge,edge,sd);',
      '  if(alpha<0.01)discard;',
      '  float glow=smoothstep(edge*4.0,0.0,abs(sd))*0.5;',
      '  vec2 suv=gl_FragCoord.xy/res;',
      '  vec2 refr=N.xy*0.15;',
      '  refr+=0.003*vec2(sin(time*1.5+suv.y*8.0),cos(time*1.2+suv.x*8.0));',
      '  float ef=1.0-abs(dot(V,N));',
      '  float ca=0.23*(0.3+ef*2.5);',
      '  vec2 tx=1.0/res;',
      '  vec2 ru=suv+refr*(1.0+ca),gu=suv+refr,bu=suv+refr*(1.0-ca);',
      '  float r=texture2D(tBg,ru).r*.6+texture2D(tBg,ru+tx).r*.2+texture2D(tBg,ru-tx).r*.2;',
      '  float g=texture2D(tBg,gu).g*.6+texture2D(tBg,gu+tx).g*.2+texture2D(tBg,gu-tx).g*.2;',
      '  float b=texture2D(tBg,bu).b*.6+texture2D(tBg,bu+tx).b*.2+texture2D(tBg,bu-tx).b*.2;',
      '  vec3 col=vec3(r,g,b);',
      '  float fresnel=pow(1.0-max(dot(V,N),0.0),2.0)*0.15;',
      '  col=mix(col,vec3(0.95,0.96,0.98),fresnel*0.1);',
      '  col+=vec3(0.7,0.75,0.9)*glow*0.3;',
      GLASS_TINT_GLSL,
      GLARE_GLSL_CALC,
      '  col+=glareResult;',
      '  gl_FragColor=vec4(col,alpha);',
      '}'
    ].join('\n'),
    transparent:true, side:THREE.DoubleSide, depthWrite:true
  });

  cart.glassMesh = new THREE.Mesh(geo, glassMat);
  cart.glassMesh.renderOrder = 10; // render after scene objects so depthWrite occludes them
  cart.glassMesh.userData.circP = circP;
  cart.glassMesh.userData.rectP = rectP;
  cart.iconGroup.add(cart.glassMesh);

  // Bag icon overlay
  var ic=document.createElement('canvas');ic.width=96;ic.height=96;
  var ix=ic.getContext('2d');ix.strokeStyle='#4a5268';ix.lineWidth=3;ix.lineCap='round';ix.lineJoin='round';
  ix.beginPath();ix.moveTo(30,38);ix.lineTo(27,75);ix.lineTo(69,75);ix.lineTo(66,38);ix.closePath();ix.stroke();
  ix.beginPath();ix.arc(48,38,13,Math.PI,0);ix.stroke();
  var itx=new THREE.CanvasTexture(ic);itx.needsUpdate=true;
  cart.iconOverlay=new THREE.Mesh(new THREE.PlaneGeometry(0.22,0.22),new THREE.MeshBasicMaterial({map:itx,transparent:true,side:THREE.DoubleSide,depthWrite:false,depthTest:false}));
  cart.iconOverlay.renderOrder=20;
  cart.iconOverlay.position.z=0.03;
  cart.iconGroup.add(cart.iconOverlay);

  cart.countMesh=null;
  cart.iconGroup.layers.enable(1);
  cart.iconGroup.traverse(function(c){c.layers.enable(1);});
  scene.add(cart.iconGroup);
}

function morphCartShape(eased) {
  var pos=cart.glassMesh.geometry.attributes.position;
  var cp=cart.glassMesh.userData.circP, rp=cart.glassMesh.userData.rectP;
  for(var i=0;i<pos.count;i++){var i3=i*3;
    pos.array[i3]=cp[i3]+(rp[i3]-cp[i3])*eased;
    pos.array[i3+1]=cp[i3+1]+(rp[i3+1]-cp[i3+1])*eased;
    pos.array[i3+2]=cp[i3+2]+(rp[i3+2]-cp[i3+2])*eased;
  }
  pos.needsUpdate=true;
  cart.glassMesh.geometry.computeVertexNormals();
  cart.glassMesh.material.uniforms.morphT.value=eased;
}

function updateCartIcon() {
  var count=getCartCount();
  if(cart.countMesh){cart.iconGroup.remove(cart.countMesh);cart.countMesh.geometry.dispose();cart.countMesh.material.dispose();cart.countMesh=null;}
  if(count>0&&!cart.panelOpen){
    var c=document.createElement('canvas');c.width=48;c.height=48;
    var x=c.getContext('2d');x.fillStyle='rgba(100,126,234,0.9)';x.beginPath();x.arc(24,24,20,0,Math.PI*2);x.fill();
    x.fillStyle='#fff';x.font='bold 22px Arial';x.textAlign='center';x.textBaseline='middle';x.fillText(''+count,24,24);
    var tx=new THREE.CanvasTexture(c);tx.needsUpdate=true;
    cart.countMesh=new THREE.Mesh(new THREE.PlaneGeometry(0.18,0.18),new THREE.MeshBasicMaterial({map:tx,transparent:true,side:THREE.DoubleSide,depthWrite:false,depthTest:false}));
    cart.countMesh.renderOrder=20;
    cart.countMesh.position.set(0.14,0.14,0.04);cart.iconGroup.add(cart.countMesh);
  }
}

// Cart icon physics state
var cartPhysics = { x: 0, y: 0, initialized: false };
// Cart overlay buttons — separate 3D objects with their own delayed tether
var cartOverlays = []; // {mesh, localOffset, physX, physY, physZ}

function positionCartIcon() {
  if(!cart.iconGroup) return;
  var time=performance.now()*0.001;
  
  // Morph animation
  var sp=0.025;
  if(cartMorphT<cartTargetT) cartMorphT=Math.min(cartMorphT+sp,cartTargetT);
  else if(cartMorphT>cartTargetT) cartMorphT=Math.max(cartMorphT-sp,cartTargetT);
  var e=cartMorphT<.5?4*cartMorphT*cartMorphT*cartMorphT:1-Math.pow(-2*cartMorphT+2,3)/2;
  
  morphCartShape(e);
  
  // Check if animation just finished
  if(cart.panelAnimating && Math.abs(cartMorphT-cartTargetT)<0.001){
    cart.panelAnimating=false;
    cart.panelOpen=cart.panelTargetState;
    if(!cart.panelOpen){
      if(cart.panelGroup){scene.remove(cart.panelGroup);cart.panelGroup=null;}
      // Remove overlay buttons
      for(var oi=0;oi<cartOverlays.length;oi++){
        scene.remove(cartOverlays[oi].group);
      }
      cartOverlays=[];
      if(cart.iconOverlay)cart.iconOverlay.visible=true;
      if(cart.countMesh)cart.countMesh.visible=true;
      updateCartIcon();
    }
  }
  
  // Position: lerp from top-right corner to center-ish
  var dist=4.5;var fovRad=camera.fov*Math.PI/180;
  var halfH=Math.tan(fovRad/2)*dist;var halfW=halfH*camera.aspect;
  var iconX=halfW-0.30, iconY=halfH-0.30;
  var baseX=cart.dragOffsetX||0, baseY=cart.dragOffsetY||0;
  var panelX=baseX*halfW*2, panelY=baseY*halfH*2;
  var finalX=iconX+(panelX-iconX)*e;
  var finalY=iconY+(panelY-iconY)*e;
  // Clamp expanded panel within viewport bounds
  if(e>0.01){
    var pw=CART_RW*0.5*e, ph=CART_RH*0.5*e;
    var margin=0.15;
    if(finalX+pw>halfW-margin) finalX=halfW-margin-pw;
    if(finalX-pw<-halfW+margin) finalX=-halfW+margin+pw;
    if(finalY+ph>halfH-margin) finalY=halfH-margin-ph;
    if(finalY-ph<-halfH+margin) finalY=-halfH+margin+ph;
  }
  
  // Target world positions
  var targetWorldX = camera.position.x + finalX;
  var targetWorldY = camera.position.y + finalY;
  
  if(!cartPhysics.initialized) {
    cartPhysics.x = targetWorldX;
    cartPhysics.y = targetWorldY;
    cartPhysics.initialized = true;
  }
  
  // Tether on both axes — tight follow with slight float
  cartPhysics.x += (targetWorldX - cartPhysics.x) * 0.45;
  cartPhysics.y += (targetWorldY - cartPhysics.y) * 0.45;
  
  var physicsOffsetX = cartPhysics.x - camera.position.x;
  var physicsOffsetY = cartPhysics.y - camera.position.y;
  var offset=new THREE.Vector3(physicsOffsetX, physicsOffsetY, -dist);
  offset.applyQuaternion(camera.quaternion);
  cart.iconGroup.position.copy(camera.position).add(offset);
  cart.iconGroup.quaternion.copy(camera.quaternion);
  
  // Position panel content to match cart
  if(cart.panelGroup){
    cart.panelGroup.position.copy(cart.iconGroup.position);
    cart.panelGroup.quaternion.copy(cart.iconGroup.quaternion);
    cart.panelGroup.visible=e>0.6;
  }
  
  // Position overlay buttons with their own weaker tether (more delay)
  for(var bi=0;bi<cartOverlays.length;bi++){
    var ov=cartOverlays[bi];
    // Target = cart panel world position + local offset
    var targetX=cart.iconGroup.position.x+ov.localOffset.x;
    var targetY=cart.iconGroup.position.y+ov.localOffset.y;
    var targetZ=cart.iconGroup.position.z+ov.localOffset.z;
    // Weaker tether than the cart itself — more lag
    ov.physX+=(targetX-ov.physX)*0.05;
    ov.physY+=(targetY-ov.physY)*0.05;
    ov.physZ+=(targetZ-ov.physZ)*0.08;
    ov.group.position.set(ov.physX,ov.physY,ov.physZ);
    ov.group.quaternion.copy(cart.iconGroup.quaternion);
    ov.group.visible=e>0.6;
  }
  
  // Update shader
  cart.glassMesh.material.uniforms.time.value=time;
  cart.glassMesh.material.uniforms.res.value.set(window.innerWidth,window.innerHeight);
}

function toggleCartPanel() {
  if(cart.panelAnimating) return;
  cart.panelTargetState=!cart.panelOpen;
  cart.panelAnimating=true;
  cartTargetT=cart.panelTargetState?1:0;
  if(!cart.panelOpen){
    rebuildCartPanel();
    if(cart.iconOverlay)cart.iconOverlay.visible=false;
    if(cart.countMesh)cart.countMesh.visible=false;
  }
}

// GLASS HIGHLIGHT — white overlay with blur for segmenting/highlighting UI regions
// Sits on top of glass surface, under frost. Reusable.
// ══════════════════════════════════════════════
function createGlassHighlight(w, h, opts) {
  opts = opts || {};
  var opacity = opts.opacity !== undefined ? opts.opacity : 0.18;
  var cornerR = opts.cornerRadius !== undefined ? opts.cornerRadius : 0.06;
  var blurAmt = opts.blur !== undefined ? opts.blur : 0.012;
  var frostAmt = opts.frost !== undefined ? opts.frost : 0.6;
  var geo = new THREE.PlaneGeometry(w, h);
  var mat = new THREE.ShaderMaterial({
    uniforms: {
      tBg: { value: glassFBO ? glassFBO.texture : null },
      res: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
      halfW: { value: w * 0.5 },
      halfH: { value: h * 0.5 },
      cR: { value: cornerR },
      alpha: { value: opacity },
      blurSize: { value: blurAmt },
      frost: { value: frostAmt }
    },
    vertexShader: [
      'varying vec2 vLP;',
      'void main(){',
      '  vLP = position.xy;',
      '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform sampler2D tBg;',
      'uniform vec2 res;',
      'uniform float halfW, halfH, cR, alpha, blurSize, frost;',
      'varying vec2 vLP;',
      'float sdRRect(vec2 p, vec2 b, float r){',
      '  vec2 d = abs(p) - b + r;',
      '  return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0) - r;',
      '}',
      'void main(){',
      '  float sd = sdRRect(vLP, vec2(halfW, halfH), cR);',
      '  float edge = fwidth(sd) * 1.5;',
      '  float mask = 1.0 - smoothstep(-edge, edge, sd);',
      '  if(mask < 0.01) discard;',
      '  // Blurred background sample (25-tap box blur)',
      '  vec2 suv = gl_FragCoord.xy / res;',
      '  vec3 bg = vec3(0.0);',
      '  for(int x = -2; x <= 2; x++){',
      '    for(int y = -2; y <= 2; y++){',
      '      bg += texture2D(tBg, suv + vec2(float(x), float(y)) * blurSize).rgb;',
      '    }',
      '  }',
      '  bg /= 25.0;',
      '  // Mix blurred bg toward white (frost controls intensity)',
      '  vec3 col = mix(bg, vec3(1.0), frost);',
      '  gl_FragColor = vec4(col, mask * alpha);',
      '}'
    ].join('\n'),
    transparent: true,
    side: THREE.DoubleSide,
    depthWrite: false,
    depthTest: false
  });
  var mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = 15; // between glass (10) and text (20)
  mesh.userData.isHighlight = true;
  mesh.userData.highlightMat = mat;
  return mesh;
}

// Track drag state separately from floor wheel dragging
var cartDrag = {
  active: false,
  startMouseX: 0,
  startMouseY: 0,
  startOffsetX: 0,
  startOffsetY: 0
};

function startCartDrag(cx, cy) {
  cartDrag.active = true;
  cartDrag.startMouseX = cx;
  cartDrag.startMouseY = cy;
  cartDrag.startOffsetX = cart.dragOffsetX || 0;
  cartDrag.startOffsetY = cart.dragOffsetY || 0;
}

function updateCartDrag(cx, cy) {
  if(!cartDrag.active) return;
  // Convert pixel delta to normalized screen coords
  var dx = (cx - cartDrag.startMouseX) / window.innerWidth;
  var dy = -(cy - cartDrag.startMouseY) / window.innerHeight;
  cart.dragOffsetX = cartDrag.startOffsetX + dx;
  cart.dragOffsetY = cartDrag.startOffsetY + dy;
}

function endCartDrag() {
  cartDrag.active = false;
}

// ══════════════════════════════════════════════
// INTERSECTION GLOW (hologram slice effect)
// Objects passing through the cart panel get a 
// glowing outline at the intersection boundary.
// Uses a clipping plane + a glow render pass.
// ══════════════════════════════════════════════
var intersectionGlow = {
  plane: null,       // THREE.Plane
  glowMeshes: [],    // meshes with glow shader
  enabled: true
};

function setupIntersectionGlow() {
  renderer.localClippingEnabled = true;
  intersectionGlow.plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
}

function updateIntersectionPlane() {
  if(!cart.panelGroup || !intersectionGlow.plane) return;
  
  // Get the cart panel's world-space normal and position
  var panelWorldPos = new THREE.Vector3();
  var panelWorldDir = new THREE.Vector3(0, 0, 1); // panel faces +Z in local
  
  cart.panelGroup.getWorldPosition(panelWorldPos);
  panelWorldDir.applyQuaternion(cart.panelGroup.quaternion);
  
  // Set clipping plane
  intersectionGlow.plane.setFromNormalAndCoplanarPoint(panelWorldDir, panelWorldPos);
}

function createGlowMaterial() {
  // Shader that glows bright at the clip plane boundary
  return new THREE.ShaderMaterial({
    uniforms: {
      glowColor: { value: new THREE.Color(0x667eea) },
      clipPlane: { value: new THREE.Vector4(0, 0, 1, 0) },
      glowWidth: { value: 0.15 },
      glowIntensity: { value: 1.5 },
      time: { value: 0 }
    },
    vertexShader: [
      'varying vec3 vWorldPos;',
      'void main() {',
      '  vec4 worldPos = modelMatrix * vec4(position, 1.0);',
      '  vWorldPos = worldPos.xyz;',
      '  gl_Position = projectionMatrix * viewMatrix * worldPos;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform vec3 glowColor;',
      'uniform vec4 clipPlane;',
      'uniform float glowWidth;',
      'uniform float glowIntensity;',
      'uniform float time;',
      'varying vec3 vWorldPos;',
      'void main() {',
      '  float dist = abs(dot(clipPlane.xyz, vWorldPos) + clipPlane.w);',
      '  float glow = exp(-dist / glowWidth) * glowIntensity;',
      '  // Pulsing effect',
      '  glow *= 0.8 + 0.2 * sin(time * 3.0);',
      '  if(glow < 0.01) discard;',
      '  gl_FragColor = vec4(glowColor, glow);',
      '}'
    ].join('\n'),
    transparent: true,
    side: THREE.DoubleSide,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });
}

// STARFIELD + SHOOTING STARS
// ══════════════════════════════════════════════
var starField = null;
var shootingStars = [];

function createStarField() {
  var count = 800;
  var positions = new Float32Array(count * 3);
  var sizes = new Float32Array(count);
  var phases = new Float32Array(count);
  var speeds = new Float32Array(count);
  var brightness = new Float32Array(count);
  var spikeLen = new Float32Array(count); // how pronounced the 4-point spikes are

  for(var i = 0; i < count; i++) {
    var theta = Math.random() * Math.PI * 2;
    var phi = Math.acos(2 * Math.random() - 1);
    var r = 25 + Math.random() * 60;
    positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta) - 30;
    positions[i*3+2] = -r * Math.cos(phi) - 5;

    // Wide variation: mostly small dim stars, a few bright large ones
    var roll = Math.random();
    if(roll < 0.6) {
      sizes[i] = 0.8 + Math.random() * 1.5; // small
      brightness[i] = 0.15 + Math.random() * 0.35; // dim
      spikeLen[i] = 0.1 + Math.random() * 0.3; // subtle spikes
    } else if(roll < 0.9) {
      sizes[i] = 2.0 + Math.random() * 2.5; // medium
      brightness[i] = 0.4 + Math.random() * 0.4;
      spikeLen[i] = 0.3 + Math.random() * 0.4;
    } else {
      sizes[i] = 4.0 + Math.random() * 4.0; // bright standout stars
      brightness[i] = 0.7 + Math.random() * 0.3;
      spikeLen[i] = 0.5 + Math.random() * 0.5;
    }
    phases[i] = Math.random() * Math.PI * 2;
    // Vary twinkle speed — dim stars twinkle faster, bright ones shimmer slowly
    speeds[i] = 0.3 + Math.random() * 2.5;
  }

  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
  geo.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));
  geo.setAttribute('aSpeed', new THREE.BufferAttribute(speeds, 1));
  geo.setAttribute('aBright', new THREE.BufferAttribute(brightness, 1));
  geo.setAttribute('aSpike', new THREE.BufferAttribute(spikeLen, 1));

  var mat = new THREE.ShaderMaterial({
    uniforms: {
      time: {value: 0}
    },
    vertexShader: [
      'attribute float aSize;',
      'attribute float aPhase;',
      'attribute float aSpeed;',
      'attribute float aBright;',
      'attribute float aSpike;',
      'varying float vAlpha;',
      'varying float vBright;',
      'varying float vSpike;',
      'uniform float time;',
      'void main() {',
      // Multi-layered twinkle: slow shimmer + fast flicker
      '  float t1 = sin(time * aSpeed + aPhase) * 0.5 + 0.5;',
      '  float t2 = sin(time * aSpeed * 3.7 + aPhase * 2.3) * 0.5 + 0.5;',
      '  float twinkle = t1 * 0.7 + t2 * 0.3;',
      '  twinkle = pow(twinkle, 2.5);', // sharp peaks — stars blink on then fade
      '  vAlpha = aBright * (0.1 + twinkle * 0.9);',
      '  vBright = aBright;',
      '  vSpike = aSpike;',
      '  vec4 mvPos = modelViewMatrix * vec4(position, 1.0);',
      // Bright stars get a twinkle size pulse
      '  float sizePulse = 1.0 + aBright * twinkle * 0.4;',
      '  gl_PointSize = aSize * sizePulse * (300.0 / -mvPos.z);',
      '  gl_PointSize = clamp(gl_PointSize, 0.5, 48.0);',
      '  gl_Position = projectionMatrix * mvPos;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'varying float vAlpha;',
      'varying float vBright;',
      'varying float vSpike;',
      'void main() {',
      '  vec2 uv = gl_PointCoord - 0.5;',
      '  float d = length(uv) * 2.0;',
      '  if(d > 1.0) discard;',
      // Tiny hot core
      '  float core = exp(-d * d * 60.0);',
      // Very long 4-pointed diffraction spikes
      '  float ax = abs(uv.x);',
      '  float ay = abs(uv.y);',
      '  float spikeX = exp(-ay * 80.0) * exp(-ax * 0.4);',
      '  float spikeY = exp(-ax * 80.0) * exp(-ay * 0.4);',
      '  float spikes = (spikeX + spikeY) * vSpike;',
      // Soft bloom halo around core
      '  float halo = exp(-d * d * 4.0) * 0.12;',
      // Combine — allow overbrightening for bloom/glow feel
      '  float shape = core * 1.5 + spikes * 1.0 + halo;',
      // Color: hot white core, spikes tinted slightly blue, halo warm
      '  vec3 hotCore = vec3(1.0, 1.0, 1.0);',
      '  vec3 spikeCol = vec3(0.8, 0.85, 1.0);',
      '  vec3 haloCol = vec3(0.9, 0.88, 0.82);',
      '  float coreW = core * 1.5 / max(shape, 0.001);',
      '  float spikeW = spikes * 1.0 / max(shape, 0.001);',
      '  float haloW = halo / max(shape, 0.001);',
      '  vec3 col = hotCore * coreW + spikeCol * spikeW + haloCol * haloW;',
      // Boost brightness so it reads as emitting light, not flat white
      '  col *= 1.0 + shape * vBright * 2.0;',
      '  shape = clamp(shape, 0.0, 1.0);',
      '  gl_FragColor = vec4(col, shape * vAlpha);',
      '}'
    ].join('\n'),
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });

  starField = new THREE.Points(geo, mat);
  scene.add(starField);
}

      orbitSpeed:(0.0004+Math.random()*0.0006)*(Math.random()>0.5?1:-1),
      orbitY:cfg.y, cfg:cfg
    };
    // Set initial position from orbit
    planetMesh.position.x=Math.cos(planetObj.orbitAngle)*planetObj.orbitRadius;
    planetMesh.position.z=Math.sin(planetObj.orbitAngle)*planetObj.orbitRadius;
    
    // Invisible hit detection sphere at 2x radius for easier clicking
    var hitGeo=new THREE.SphereGeometry(cfg.r*2,8,6);
    var hitMat=new THREE.MeshBasicMaterial({visible:false});
    var hitMesh=new THREE.Mesh(hitGeo,hitMat);
    hitMesh.position.copy(planetMesh.position);
    hitMesh.userData.isPlanet=true;
    hitMesh.userData.planetIdx=i;
    hitMesh.userData.radius=cfg.r;
    hitMesh.userData.color=cfg.col;
    scene.add(hitMesh);
    planetObj.hitMesh=hitMesh;
    
    if(cfg.ring){
      var ringGeo=new THREE.RingGeometry(cfg.r*1.4,cfg.r*2.0,64);
      var ringMat=new THREE.MeshStandardMaterial({
        color:cfg.ringCol||0x9098b0, roughness:0.5, metalness:0.2,
        emissive:cfg.ringCol||0x9098b0, emissiveIntensity:0.05,
        side:THREE.DoubleSide, transparent:true, opacity:0.4, fog:true
      });
      var ringMesh=new THREE.Mesh(ringGeo,ringMat);
      ringMesh.position.copy(planetMesh.position);
      ringMesh.rotation.x=Math.PI*0.4+Math.random()*0.3;
      ringMesh.rotation.y=Math.random()*0.5;
      scene.add(ringMesh);
      planetObj.ring=ringMesh;
    }
    planets.push(planetObj);
  }
}

function launchMeteor(planetIdx){
  var planet=planets[planetIdx];
  if(!planet||!planet.alive)return;
  
  // Meteor starts from camera position
  var startPos=camera.position.clone();
  startPos.x+=(Math.random()-0.5)*2;
  startPos.y+=(Math.random()-0.5)*2;
  
  var targetPos=planet.mesh.position.clone();
  var dir=targetPos.clone().sub(startPos).normalize();
  var speed=40+Math.random()*20;
  
  // Glowing meteor mesh
  var meteorGeo=new THREE.SphereGeometry(0.15+planet.radius*0.02,8,8);
  var meteorMat=new THREE.MeshBasicMaterial({color:0xff6633,transparent:true,opacity:1});
  var meteorMesh=new THREE.Mesh(meteorGeo,meteorMat);
  meteorMesh.position.copy(startPos);
  scene.add(meteorMesh);
  
  // Trail particles
  var trailCount=20;
  var trailGeo=new THREE.BufferGeometry();
  var trailPositions=new Float32Array(trailCount*3);
  var trailAlphas=new Float32Array(trailCount);
  for(var i=0;i<trailCount;i++){
    trailPositions[i*3]=startPos.x;trailPositions[i*3+1]=startPos.y;trailPositions[i*3+2]=startPos.z;
    trailAlphas[i]=0;
  }
  trailGeo.setAttribute('position',new THREE.BufferAttribute(trailPositions,3));
  trailGeo.setAttribute('alpha',new THREE.BufferAttribute(trailAlphas,1));
  var trailMat=new THREE.ShaderMaterial({
    uniforms:{color:{value:new THREE.Color(0xff8844)}},
    vertexShader:'attribute float alpha;varying float vA;void main(){vA=alpha;gl_PointSize=3.0;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
    fragmentShader:'uniform vec3 color;varying float vA;void main(){float d=length(gl_PointCoord-0.5)*2.0;if(d>1.0)discard;gl_FragColor=vec4(color,vA*(1.0-d));}',
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
  });
  var trail=new THREE.Points(trailGeo,trailMat);
  scene.add(trail);
  
  meteors.push({
    mesh:meteorMesh,trail:trail,trailPositions:trailPositions,trailAlphas:trailAlphas,trailGeo:trailGeo,
    velocity:dir.multiplyScalar(speed),
    target:planet,targetIdx:planetIdx,
    trailHead:0,trailCount:trailCount
  });
}

function explodePlanet(planet){
  var pos=planet.mesh.position.clone();
  var r=planet.radius;
  var col=planet.mesh.userData.color||0xb0b8c8;
  
  // Create explosion particles
  var count=Math.min(Math.floor(r*30),300);
  var pGeo=new THREE.BufferGeometry();
  var pPositions=new Float32Array(count*3);
  var pVelocities=new Float32Array(count*3);
  var pSizes=new Float32Array(count);
  var pColors=new Float32Array(count*3);
  
  var baseCol=new THREE.Color(col);
  var hotCol=new THREE.Color(0xff6633);
  
  for(var i=0;i<count;i++){
    pPositions[i*3]=pos.x+(Math.random()-0.5)*r*0.5;
    pPositions[i*3+1]=pos.y+(Math.random()-0.5)*r*0.5;
    pPositions[i*3+2]=pos.z+(Math.random()-0.5)*r*0.5;
    var spd=r*0.5+Math.random()*r*2;
    var dx=(Math.random()-0.5),dy=(Math.random()-0.5),dz=(Math.random()-0.5);
    var dl=Math.sqrt(dx*dx+dy*dy+dz*dz)||1;
    pVelocities[i*3]=dx/dl*spd;pVelocities[i*3+1]=dy/dl*spd;pVelocities[i*3+2]=dz/dl*spd;
    pSizes[i]=r*0.1+Math.random()*r*0.3;
    var mix=Math.random();
    var c=baseCol.clone().lerp(hotCol,mix*0.6);
    pColors[i*3]=c.r;pColors[i*3+1]=c.g;pColors[i*3+2]=c.b;
  }
  
  pGeo.setAttribute('position',new THREE.BufferAttribute(pPositions,3));
  pGeo.setAttribute('aSize',new THREE.BufferAttribute(pSizes,1));
  pGeo.setAttribute('aColor',new THREE.BufferAttribute(pColors,3));
  
  var pMat=new THREE.ShaderMaterial({
    uniforms:{opacity:{value:1}},
    vertexShader:'attribute float aSize;attribute vec3 aColor;varying vec3 vCol;varying float vAlpha;uniform float opacity;void main(){vCol=aColor;vAlpha=opacity;vec4 mv=modelViewMatrix*vec4(position,1.0);gl_PointSize=aSize*(200.0/-mv.z);gl_Position=projectionMatrix*mv;}',
    fragmentShader:'varying vec3 vCol;varying float vAlpha;void main(){float d=length(gl_PointCoord-0.5)*2.0;if(d>1.0)discard;float g=1.0-d*d;gl_FragColor=vec4(vCol,g*vAlpha);}',
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
  });
  
  var particles=new THREE.Points(pGeo,pMat);
  scene.add(particles);
  
  explosions.push({
    particles:particles,positions:pPositions,velocities:pVelocities,count:count,
    age:0,maxAge:3+r*0.3,mat:pMat
  });
  
  // Remove planet
  scene.remove(planet.mesh);
  planet.mesh.geometry.dispose();planet.mesh.material.dispose();
  if(planet.hitMesh){scene.remove(planet.hitMesh);planet.hitMesh.geometry.dispose();planet.hitMesh.material.dispose();}
  if(planet.ring){scene.remove(planet.ring);planet.ring.geometry.dispose();planet.ring.material.dispose();}
  planet.alive=false;
  
  // Respawn a new planet off-screen after a delay
  setTimeout(function(){
    respawnPlanet(planet);
  }, 2000+Math.random()*3000);
}

function respawnPlanet(oldPlanet){
  var cfg=oldPlanet.cfg;
  var r=Math.min(cfg.r*(0.6+Math.random()*0.8), 5); // cap at 5
  var segs=r>10?48:r>3?32:16;
  var cols=[0xb8c0d8,0xc8b8a8,0xa8b0c8,0xd0c8c0,0xb0b8d0,0xc0c8d8,0xb0c0b8,0xc8b8b0];
  var col=cols[Math.floor(Math.random()*cols.length)];
  var planetGeo=new THREE.SphereGeometry(r,segs,Math.floor(segs/2));
  var planetMat=new THREE.MeshStandardMaterial({
    color:col, roughness:0.7, metalness:0.1,
    emissive:col, emissiveIntensity:0.08, fog:true
  });
  var planetMesh=new THREE.Mesh(planetGeo,planetMat);
  var newY=cfg.y+(Math.random()-0.5)*20;
  // Spawn behind camera so it orbits into view naturally
  var camAngle=Math.atan2(camera.position.z, camera.position.x);
  var startAngle=camAngle+Math.PI+((Math.random()-0.5)*1.0); // behind camera ±0.5 rad
  var orbitR=oldPlanet.orbitRadius; // keep the same orbit band
  planetMesh.position.set(Math.cos(startAngle)*orbitR, newY, Math.sin(startAngle)*orbitR);
  planetMesh.rotation.set(Math.random()*0.5,Math.random()*Math.PI*2,Math.random()*0.3);
  planetMesh.userData.isPlanet=true;
  planetMesh.userData.radius=r;
  planetMesh.userData.color=col;
  scene.add(planetMesh);
  
  // Hit detection sphere at 2x radius
  var hitGeo=new THREE.SphereGeometry(r*2,8,6);
  var hitMat=new THREE.MeshBasicMaterial({visible:false});
  var hitMesh=new THREE.Mesh(hitGeo,hitMat);
  hitMesh.position.copy(planetMesh.position);
  hitMesh.userData.isPlanet=true;
  hitMesh.userData.radius=r;
  hitMesh.userData.color=col;
  scene.add(hitMesh);
  
  var hasRing=Math.random()>0.7;
  var ringMesh2=null;
  if(hasRing){
    var ringGeo2=new THREE.RingGeometry(r*1.4,r*2.0,64);
    var ringMat2=new THREE.MeshStandardMaterial({
      color:0x9098b0,roughness:0.5,metalness:0.2,emissive:0x9098b0,emissiveIntensity:0.05,
      side:THREE.DoubleSide,transparent:true,opacity:0.4,fog:true
    });
    ringMesh2=new THREE.Mesh(ringGeo2,ringMat2);
    ringMesh2.position.copy(planetMesh.position);
    ringMesh2.rotation.x=Math.PI*0.4+Math.random()*0.3;
    scene.add(ringMesh2);
  }
  
  var idx=planets.indexOf(oldPlanet);
  hitMesh.userData.planetIdx=idx;
  planets[idx]={
    mesh:planetMesh, rotSpeed:0.0003+Math.random()*0.0005, alive:true, radius:r,
    orbitRadius:orbitR, orbitAngle:startAngle,
    orbitSpeed:(0.0004+Math.random()*0.0006)*(Math.random()>0.5?1:-1),
    orbitY:newY, ring:ringMesh2, hitMesh:hitMesh, cfg:cfg
  };
}

function updatePlanets(){
  // Orbital motion — speed linked to orb RPM
  var rpmSpeedMult = 1.0 + smoothedRpmForPlanets * 20.0;
  for(var i=0;i<planets.length;i++){
    var p=planets[i];
    if(!p.alive) continue;
    p.mesh.rotation.y+=p.rotSpeed*rpmSpeedMult;
    // Orbit around center column (x=0,z=0)
    p.orbitAngle+=p.orbitSpeed*rpmSpeedMult;
    var ox=Math.cos(p.orbitAngle)*p.orbitRadius;
    var oz=Math.sin(p.orbitAngle)*p.orbitRadius;
    p.mesh.position.x=ox;
    p.mesh.position.z=oz;
    if(p.hitMesh){p.hitMesh.position.x=ox;p.hitMesh.position.y=p.mesh.position.y;p.hitMesh.position.z=oz;}
    if(p.ring){
      p.ring.position.x=ox;
      p.ring.position.z=oz;
    }
  }
  
  // Update meteors
  var dt=1/60;
  for(var mi=meteors.length-1;mi>=0;mi--){
    var m=meteors[mi];
    m.mesh.position.x+=m.velocity.x*dt;
    m.mesh.position.y+=m.velocity.y*dt;
    m.mesh.position.z+=m.velocity.z*dt;
    
    // Update trail
    m.trailHead=(m.trailHead+1)%m.trailCount;
    m.trailPositions[m.trailHead*3]=m.mesh.position.x;
    m.trailPositions[m.trailHead*3+1]=m.mesh.position.y;
    m.trailPositions[m.trailHead*3+2]=m.mesh.position.z;
    for(var ti=0;ti<m.trailCount;ti++){
      var age=((m.trailHead-ti+m.trailCount)%m.trailCount)/m.trailCount;
      m.trailAlphas[ti]=age*0.8;
    }
    m.trailGeo.attributes.position.needsUpdate=true;
    m.trailGeo.attributes.alpha.needsUpdate=true;
    
    // Check if hit planet
    if(m.target.alive){
      var dist=m.mesh.position.distanceTo(m.target.mesh.position);
      if(dist<m.target.radius*1.1){
        explodePlanet(m.target);
        scene.remove(m.mesh);scene.remove(m.trail);
        m.mesh.geometry.dispose();m.mesh.material.dispose();
        m.trail.geometry.dispose();m.trail.material.dispose();
        meteors.splice(mi,1);
        continue;
      }
    }
    
    // Remove if traveled too far
    if(m.mesh.position.distanceTo(camera.position)>250){
      scene.remove(m.mesh);scene.remove(m.trail);
      m.mesh.geometry.dispose();m.mesh.material.dispose();
      m.trail.geometry.dispose();m.trail.material.dispose();
      meteors.splice(mi,1);
    }
  }
  
  // Update explosions
  for(var ei=explosions.length-1;ei>=0;ei--){
    var exp=explosions[ei];
    exp.age+=dt;
    var lifeT=exp.age/exp.maxAge;
    
    // Move particles outward and slow them
    for(var pi=0;pi<exp.count;pi++){
      exp.positions[pi*3]+=exp.velocities[pi*3]*dt;
      exp.positions[pi*3+1]+=exp.velocities[pi*3+1]*dt;
      exp.positions[pi*3+2]+=exp.velocities[pi*3+2]*dt;
      exp.velocities[pi*3]*=0.98;
      exp.velocities[pi*3+1]*=0.98;
      exp.velocities[pi*3+2]*=0.98;
    }
    exp.particles.geometry.attributes.position.needsUpdate=true;
    exp.mat.uniforms.opacity.value=1-lifeT;
    
    if(exp.age>=exp.maxAge){
      scene.remove(exp.particles);
      exp.particles.geometry.dispose();exp.particles.material.dispose();
      explosions.splice(ei,1);
    }
  }
}

function updateStarField(time) {
  if(starField && starField.material.uniforms) {
    starField.material.uniforms.time.value = time;
  }
}

// ── Shooting Stars ──
function spawnShootingStar() {
  // Random start position in the sky area
  var startX = (Math.random() - 0.5) * 40;
  var startY = camera.position.y + (Math.random() - 0.3) * 15;
  var startZ = -15 - Math.random() * 30;
  
  // Direction: mostly horizontal with slight downward angle
  var dirX = (Math.random() > 0.5 ? 1 : -1) * (2 + Math.random() * 4);
  var dirY = -(0.5 + Math.random() * 2);
  var dirZ = (Math.random() - 0.5) * 2;
  
  var length = 2 + Math.random() * 3;
  var speed = 15 + Math.random() * 20;
  
  var geo = new THREE.BufferGeometry();
  var positions = new Float32Array(6); // 2 vertices
  var alphas = new Float32Array(2);
  alphas[0] = 1.0; alphas[1] = 0.0; // head bright, tail fades
  
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));
  
  var mat = new THREE.ShaderMaterial({
    uniforms: {
      color: {value: new THREE.Color(0.85, 0.88, 1.0)}
    },
    vertexShader: [
      'attribute float alpha;',
      'varying float vAlpha;',
      'void main() {',
      '  vAlpha = alpha;',
      '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform vec3 color;',
      'varying float vAlpha;',
      'void main() {',
      '  gl_FragColor = vec4(color, vAlpha * 0.8);',
      '}'
    ].join('\n'),
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  
  var line = new THREE.Line(geo, mat);
  scene.add(line);
  
  shootingStars.push({
    mesh: line,
    pos: new THREE.Vector3(startX, startY, startZ),
    dir: new THREE.Vector3(dirX, dirY, dirZ).normalize(),
    speed: speed,
    length: length,
    life: 0,
    maxLife: 0.8 + Math.random() * 0.5
  });
}

function updateShootingStars(dt) {
  for(var i = shootingStars.length - 1; i >= 0; i--) {
    var s = shootingStars[i];
    s.life += dt;
    
    // Move
    s.pos.x += s.dir.x * s.speed * dt;
    s.pos.y += s.dir.y * s.speed * dt;
    s.pos.z += s.dir.z * s.speed * dt;
    
    // Update line positions (head and tail)
    var positions = s.mesh.geometry.attributes.position.array;
    positions[0] = s.pos.x;
    positions[1] = s.pos.y;
    positions[2] = s.pos.z;
    positions[3] = s.pos.x - s.dir.x * s.length;
    positions[4] = s.pos.y - s.dir.y * s.length;
    positions[5] = s.pos.z - s.dir.z * s.length;
    s.mesh.geometry.attributes.position.needsUpdate = true;
    
    // Fade out near end of life
    var fadeT = s.life / s.maxLife;
    var fade = fadeT < 0.2 ? fadeT / 0.2 : (fadeT > 0.7 ? 1.0 - (fadeT - 0.7) / 0.3 : 1.0);
    s.mesh.material.uniforms.color.value.setRGB(0.85 * fade, 0.88 * fade, fade);
    
    // Remove when dead
    if(s.life >= s.maxLife) {
      scene.remove(s.mesh);
      s.mesh.geometry.dispose();
      s.mesh.material.dispose();
      shootingStars.splice(i, 1);
    }
  }
}

    var mx = mc.getContext('2d');

    mx.fillStyle = 'rgba(160,170,210,0.2)';
    mx.fillRect(0, 0, mc.width, mc.height);
    matcapTex = new THREE.CanvasTexture(mc);
    matcapTex.needsUpdate = true;
    // Update existing materials that reference the matcap
    scene.traverse(function(obj) {
      if(obj.material && obj.material.type === 'MeshMatcapMaterial') {
        obj.material.matcap = matcapTex;
        obj.material.needsUpdate = true;
      }
    });
  };
  matcapTex = new THREE.Texture(matcapImg);
  createFloors();
  loadProductImages();
  createCartIcon();
  createNavMenu();
  setupIntersectionGlow();
  createGlassFBO();
  createStarField();
  createPlanets();
  // Set orb floor Y for light rays positioning
  for(var ofi=0;ofi<floors.length;ofi++){ if(floors[ofi].isOrbFloor){ orbFloorY=floors[ofi].group.position.y; break; } }
  createLightRays();
  createOrbParticles();
  createWeldingSparks();
  createLensFlare();
  createPostProcessing();
  createGodRays();
  window.addEventListener('resize',onResize);window.addEventListener('scroll',onScroll);
  window.addEventListener('mousemove',function(e){
    camMouseX=(e.clientX/window.innerWidth)*2-1;
    camMouseY=(e.clientY/window.innerHeight)*2-1;
  });
  renderer.domElement.addEventListener('mousedown',onMD);renderer.domElement.addEventListener('mousemove',onMM);
  renderer.domElement.addEventListener('mouseup',onMU);renderer.domElement.addEventListener('mouseleave',onMU);
  renderer.domElement.addEventListener('touchstart',onTS,{passive:false});renderer.domElement.addEventListener('touchmove',onTM,{passive:false});renderer.domElement.addEventListener('touchend',onTE);
  renderer.domElement.addEventListener('wheel',function(e){
    if(pdv.active && pdv.scrollGroup){
      e.preventDefault();
      var fovRad=camera.fov*Math.PI/180;
      var halfH=Math.tan(fovRad/2)*4.0;
      var pxToWorld=halfH*2/window.innerHeight;
      pdv.scrollY -= e.deltaY * pxToWorld * 0.5;
    }
  },{passive:false});
  startIntro();animate();
}

// ══════════════════════════════════════════════
// MAIN LOOP
// ══════════════════════════════════════════════
function animate(){
  requestAnimationFrame(animate);
  var time = performance.now() * 0.001;
  var dt = Math.min(1/30, time - (window._lastTime || time));
  window._lastTime = time;

  
  updateIntro();checkReveal();
  // Exit DM when user scrolls/swipes away (works for both native scroll and touch)
  if(dm.active&&dm.floor&&!dm.animating&&!dm.closing&&!switchAnim.active){
    if(Math.abs(targetCameraY-dm.floor.group.position.y)>FLOOR_SPACING*0.5)exitDM();
  }
  if(dm.animating)animateDM();
  if(dm.closing)animateClosing();
  if(switchAnim.active)animateSwitch();
  if(pdv.entering)animateProductDetailEnter();
  if(pdv.exitingToDM)animateProductDetailExit();
  if(pdv.active)updateProductDetailPosition();
  
  // Stars
  updateStarField(time);
  updateShootingStars(dt);
  updatePlanets();
  // Spawn shooting star randomly (~every 4-8 seconds)
  if(Math.random() < dt * 0.2) spawnShootingStar();
  
  cubeCamera.position.set(0,camera.position.y,0);
  if(!window._ccFrame)window._ccFrame=0;window._ccFrame++;
  if(window._ccFrame%3===0){
    floors.forEach(function(f){if(f.hasRings){f.rings.top.forEach(function(r){r.visible=false;});f.rings.bottom.forEach(function(r){r.visible=false;});}});
    cubeCamera.update(renderer,scene);
    floors.forEach(function(f){if(f.hasRings){f.rings.top.forEach(function(r){r.visible=true;});f.rings.bottom.forEach(function(r){r.visible=true;});}});
  }
  
  // Apply touch scroll momentum with friction
  if(Math.abs(touchScroll.scrollMomentum) > 0.0001){
    targetCameraY+=touchScroll.scrollMomentum;
    touchScroll.scrollMomentum*=0.88; // friction
    var minY=-(TOTAL_FLOORS-1)*FLOOR_SPACING;
    targetCameraY=Math.max(minY,Math.min(0,targetCameraY));
  }

  var nY=null,nD=Infinity;
  floors.forEach(function(f){var d=Math.abs(targetCameraY-f.group.position.y);if(d<nD){nD=d;nY=f.group.position.y;}});
  if(nD<0.8&&nY!==null)targetCameraY+=(nY-targetCameraY)*0.12;
  camera.position.y+=(targetCameraY-camera.position.y)*0.45;
  
  // Nav scroll animation — overrides camera Y with smooth ease-out
  if(navScrollAnim.active){
    navScrollAnim.progress+=0.025;
    if(navScrollAnim.progress>=1){navScrollAnim.progress=1;navScrollAnim.active=false;}
    // Ease-out cubic — fast start, slow finish
    var t=navScrollAnim.progress;
    var ease=1-Math.pow(1-t,3);
    camera.position.y=navScrollAnim.startY+(navScrollAnim.targetY-navScrollAnim.startY)*ease;
    targetCameraY=camera.position.y; // sync so regular lerp doesn't fight it
  }
  
  // ── Camera: face tracking or mouse ──
  if(faceTrack.active && faceTrack.enabled){
    var dx=(faceTrack.x-faceTrack.calX)*faceTrack.sensitivity;
    var dy=(faceTrack.y-faceTrack.calY)*faceTrack.sensitivity*0.6;
    var zDist=CAM_ORBIT_RADIUS;
    
    camTiltX+=(dx-camTiltX)*0.38;
    camTiltY+=(dy-camTiltY)*0.38;
    
    camera.position.x=camTiltX*0.8;
    camera.position.y+=camTiltY*0.8-camera.userData.lastFaceY; // add face offset relative to last
    camera.userData.lastFaceY=camTiltY*0.8;
    camera.position.z=zDist;
    
    camera.fov=103;
    
    // Off-axis frustum — matches box test exactly
    var near=camera.near;
    var fov2=camera.fov*Math.PI/180;
    var top2=near*Math.tan(fov2/2),right2=top2*camera.aspect;
    var shiftX=-camera.position.x*near/zDist;
    var shiftY=-camTiltY*0.8*near/zDist;
    camera.projectionMatrix.makePerspective(-right2+shiftX,right2+shiftX,top2+shiftY,-top2+shiftY,near,camera.far);
    camera.projectionMatrixInverse.copy(camera.projectionMatrix).invert();
  } else {
    // Mouse mode — reset FOV and position
    camera.fov=75;
    camera.userData.lastFaceY=0;
    camTiltX+=(camMouseX-camTiltX)*0.04;
    camTiltY+=(camMouseY-camTiltY)*0.04;
    var tiltAngleY=camTiltX*CAM_TILT_STRENGTH;
    camera.position.x=Math.sin(tiltAngleY)*CAM_ORBIT_RADIUS;
    camera.position.z=Math.cos(tiltAngleY)*CAM_ORBIT_RADIUS;
    camera.updateProjectionMatrix();
  }
  
  if(faceTrack.active && faceTrack.enabled){
    // Face mode: camera looks straight forward, no rotation
    // The off-axis frustum creates the parallax, not camera rotation
    camera.rotation.set(0, 0, 0);
    camera.lookAt(camera.position.x, camera.position.y, 0);
  } else {
    camera.lookAt(0,camera.position.y,0);
  }
  
  floors.forEach(function(fl){
    var ud=fl.group.userData;
    var vel=ud.velocity;
    var passive=ud.rotationSpeed;

    if(isDragging&&selectedFloor===fl){
      // HELD STATE — blend velocity toward user input
      var inputVel=ud.inputVel||0;
      var absVel=Math.abs(vel);
      var absInput=Math.abs(inputVel);

      if(absInput>=absVel){
        // User is pushing faster — match quickly
        vel+=(inputVel-vel)*0.3;
      } else {
        // User is slower or holding still — gradually decelerate toward input
        vel+=(inputVel-vel)*0.05;
      }
      ud.velocity=vel;
      // No passive spin while held — wheel is under user control
      fl.group.rotation.y+=vel;
    } else {
      // FREE STATE — passive spin applied directly, friction decays user velocity
      vel*=ud.friction;
      if(Math.abs(vel)<0.00005)vel=0;
      ud.velocity=vel;
      fl.group.rotation.y+=passive+vel;
    }

    // Sync center star
    if(ud.centerStar){ud.centerStar.rotation.y=-fl.group.rotation.y;ud.centerStar.rotation.x+=vel*0.5;}

    // Sync rings
    var cs=Math.abs(vel),is=Math.abs(passive);
    if(fl.hasRings){
      var bir=-fl.group.rotation.y*2;
      if(cs>is*15){var ex=cs-is*15,vi=Math.min(ex/(is*80),1),vi=vi*vi*vi,mv=0.02,tm=performance.now()*0.2;
        fl.rings.top.forEach(function(r){r.rotation.x=Math.sin(tm+r.userData.vpx)*vi*mv;r.rotation.y=bir;r.rotation.z=Math.sin(tm+r.userData.vpz)*vi*mv;});
        fl.rings.bottom.forEach(function(r){r.rotation.x=Math.sin(tm+r.userData.vpx)*vi*mv;r.rotation.y=bir;r.rotation.z=Math.sin(tm+r.userData.vpz)*vi*mv;});
      }else{fl.rings.top.forEach(function(r){r.rotation.x=0;r.rotation.y=bir;r.rotation.z=0;});fl.rings.bottom.forEach(function(r){r.rotation.x=0;r.rotation.y=bir;r.rotation.z=0;});}
    }
    // Panel expansion based on velocity — needs higher speed to kick in
    if(fl.panels&&!(dm.active&&dm.floor===fl)){
      var sf=cs/is,re=sf>4?(sf-4)*0.03:0;
      fl.panels.forEach(function(panel){var br=panel.mesh.userData.baseRadius,er=br+re;panel.mesh.scale.x=er/br;panel.mesh.scale.z=er/br;panel.edges.scale.x=er/br;panel.edges.scale.z=er/br;});
    }
    // Update holographic shader time on all panels
    if(fl.panels){fl.panels.forEach(function(panel, pi){
      if(panel.mesh.material.userData.holoTime)panel.mesh.material.userData.holoTime.value=time+(panel.mesh.material.userData.holoOffset||0);
      // Animate image rotation toward target
      var ud=panel.mesh.material.userData;
      if(ud.imgRotation && ud.imgRotationTarget !== undefined){
        var diff = ud.imgRotationTarget - ud.imgRotation.value;
        if(Math.abs(diff) > 0.005) ud.imgRotation.value += diff * 0.18;
        else ud.imgRotation.value = ud.imgRotationTarget;
      }
      // Gentle bobbing — each panel delayed by 0.5s * index
      if(!(dm.active && dm.floor === fl)){
        var prevBob = panel.mesh.userData.curBob || 0;
        var bobDelay = pi * 0.5;
        var bob = Math.sin((time + bobDelay) * 1.2) * 0.03;
        panel.mesh.position.y += bob - prevBob;
        panel.edges.position.y = panel.mesh.position.y;
        panel.mesh.userData.curBob = bob;
      } else if(panel.mesh.userData.curBob){
        panel.mesh.position.y -= panel.mesh.userData.curBob;
        panel.edges.position.y = panel.mesh.position.y;
        panel.mesh.userData.curBob = 0;
      }
    });}
  });
  
  if(dm.active&&dm.vWheel&&!dm.closing&&!dm.animating){
    if(Math.abs(dm.vwVel)>0.0025)dm.vwVel*=0.995;else dm.vwVel=0.0025;
    dm.vWheel.rotation.x+=dm.vwVel;
    var fd=dm.floor;
    if(fd&&fd.group.userData.centerStar){fd.group.userData.centerStar.rotation.y=-dm.vWheel.rotation.x;fd.group.userData.centerStar.rotation.x+=dm.vwVel*0.5;}
  }
  
  // Update quick view panels to face camera
  if(dm.active && !dm.animating && !dm.closing) updateQuickViewPanels();
  
  // Update cart
  positionCartIcon();
  positionCartPanel();
  positionNavMenu();
  updateOrbs(dt);
  updateGlowMeshes();
  
  // Render background to FBO for glass refraction
  renderGlassFBO();

  // God rays occlusion + blur pass
  renderGodRays();

  // Hide UI before post-processing capture (rendered on top later, stays sharp)
  var cartIconVis=cart.iconGroup?cart.iconGroup.visible:false;
  var cartPanelVis=cart.panelGroup?cart.panelGroup.visible:false;
  if(cart.iconGroup) cart.iconGroup.visible=false;
  if(cart.panelGroup) cart.panelGroup.visible=false;
  if(navMenu.group) navMenu.group.visible=false;
  for(var _nb3=0;_nb3<navMenu.buttons.length;_nb3++) navMenu.buttons[_nb3].group.visible=false;
  for(var _oi=0;_oi<cartOverlays.length;_oi++) cartOverlays[_oi].group.visible=false;
  var pdvVis=pdv.group?pdv.group.visible:false;
  if(pdv.group) pdv.group.visible=false;
  
  // Render scene (without cart) to post-processing FBO
  renderer.setRenderTarget(postFBO);
  renderer.clear();
  renderer.render(scene,camera);
  renderer.setRenderTarget(null);
  
  // Restore UI visibility
  if(cart.iconGroup) cart.iconGroup.visible=cartIconVis;
  if(cart.panelGroup) cart.panelGroup.visible=cartPanelVis;
  if(navMenu.group) navMenu.group.visible=true;
  if(pdv.group) pdv.group.visible=pdvVis;
  for(var _nb4=0;_nb4<navMenu.buttons.length;_nb4++){
    var nbE=navMenu.morphT<.5?4*navMenu.morphT*navMenu.morphT*navMenu.morphT:1-Math.pow(-2*navMenu.morphT+2,3)/2;
    navMenu.buttons[_nb4].group.visible=nbE>0.6;
  }
  for(var _oi2=0;_oi2<cartOverlays.length;_oi2++) cartOverlays[_oi2].group.visible=true;
  
  // Render fullscreen quad with chromatic aberration + vignette + god rays
  postQuad.material.uniforms.tScene.value=postFBO.texture;
  postQuad.material.uniforms.tGodRays.value=godrayBlurFBO?godrayBlurFBO.texture:null;
  postQuad.material.uniforms.godrayStr.value=godrayIntensity;
  postQuad.material.uniforms.resolution.value.set(window.innerWidth,window.innerHeight);
  renderer.render(postScene,postCamera);
  
  // Render cart UI on top — directly to screen, bypasses post-processing
  renderer.autoClear=false;
  renderer.clearDepth();
  var savedBg=scene.background;var savedFog=scene.fog;
  scene.background=null;scene.fog=null;
  camera.layers.set(1);
  renderer.render(scene,camera);
  scene.background=savedBg;scene.fog=savedFog;
  camera.layers.enableAll();
  renderer.autoClear=true;
}

// ── Post-processing (chromatic aberration + vignette + god rays + whiteout + shake) ──
var postFBO,postScene,postCamera,postQuad;
function createPostProcessing(){
  var pr=Math.min(window.devicePixelRatio,1.5);
  postFBO=new THREE.WebGLRenderTarget(Math.floor(window.innerWidth*pr),Math.floor(window.innerHeight*pr),{minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter,format:THREE.RGBFormat});
  postScene=new THREE.Scene();
  postCamera=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  var postMat=new THREE.ShaderMaterial({
    uniforms:{
      tScene:{value:null},
      tGodRays:{value:null},
      godrayStr:{value:0.0},
      resolution:{value:new THREE.Vector2(window.innerWidth,window.innerHeight)},
      caStrength:{value:0.011},
      vignetteRadius:{value:0.65},
      vignetteSmooth:{value:0.5},
      whiteout:{value:0.0},
      bgBlur:{value:0.0},
      shakeAmount:{value:0.0},
      shakeTime:{value:0.0}
    },
    vertexShader:'varying vec2 vUV;void main(){vUV=uv;gl_Position=vec4(position,1.0);}',
    fragmentShader:[
      'uniform sampler2D tScene;',
      'uniform sampler2D tGodRays;',
      'uniform float godrayStr;',
      'uniform vec2 resolution;',
      'uniform float caStrength,vignetteRadius,vignetteSmooth,whiteout,bgBlur;',
      'uniform float shakeAmount,shakeTime;',
      'varying vec2 vUV;',
      'float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}',
      'void main(){',
      '  vec2 uv=vUV;',
      '  vec2 center=vec2(0.5);',
      '  vec2 delta=uv-center;',
      '  float dist=length(delta);',
      '  float edgeMask=smoothstep(0.15, 0.6, dist);',
      '  float shakeStr=shakeAmount*edgeMask*edgeMask;',
      '  vec2 shakeOff=vec2(0.0);',
      '  if(shakeStr>0.001){',
      '    float t=shakeTime;',
      '    shakeOff.x=shakeStr*(sin(t*73.1+uv.y*15.0)*0.5+sin(t*127.3+uv.x*23.0)*0.3+sin(t*31.7)*0.2);',
      '    shakeOff.y=shakeStr*(cos(t*89.3+uv.x*17.0)*0.5+cos(t*153.7+uv.y*19.0)*0.3+cos(t*47.1)*0.2);',
      '  }',
      '  vec2 sUV=uv+shakeOff;',
      '  float edgeFactor=smoothstep(0.1,0.7,dist);',
      '  float ca=caStrength*edgeFactor;',
      '  vec2 dir=normalize(delta+0.0001);',
      '  vec3 col;',
      '  if(bgBlur>0.01){',
      '    vec2 px=1.0/resolution;',
      '    float rad=bgBlur*12.0;',
      '    vec3 sum=vec3(0.0);float tw=0.0;',
      '    for(float ox=-3.0;ox<=3.0;ox+=1.0){',
      '      for(float oy=-3.0;oy<=3.0;oy+=1.0){',
      '        vec2 off=vec2(ox,oy)*px*rad;',
      '        float w=1.0-length(vec2(ox,oy))/4.24;',
      '        sum+=texture2D(tScene,sUV+off).rgb*w;tw+=w;',
      '      }',
      '    }',
      '    col=sum/tw;',
      '    col=mix(col,vec3(0.15,0.15,0.2),bgBlur*0.4);',
      '    float n=hash(sUV*resolution+fract(shakeTime*0.1)*100.0);',
      '    col+=vec3((n-0.5)*0.08*bgBlur);',
      '  } else {',
      '    float r=texture2D(tScene,sUV+dir*ca).r;',
      '    float g=texture2D(tScene,sUV).g;',
      '    float b=texture2D(tScene,sUV-dir*ca).b;',
      '    col=vec3(r,g,b);',
      '  }',
      '  float vig=1.0-smoothstep(vignetteRadius,vignetteRadius+vignetteSmooth,dist);',
      '  col*=mix(0.8,1.0,vig);',
      '  vec3 gr=texture2D(tGodRays,sUV).rgb;',
      '  col+=gr*godrayStr;',
      '  float wDist=length(uv-vec2(0.5));',
      '  float wBloom=1.0-smoothstep(0.0, 0.8-whiteout*0.6, wDist);',
      '  col=mix(col, vec3(1.0), whiteout*wBloom);',
      '  col=mix(col, vec3(1.0), whiteout*whiteout*0.7);',
      '  gl_FragColor=vec4(col,1.0);',
      '}'
    ].join('\n'),
    depthWrite:false,depthTest:false
  });
  postQuad=new THREE.Mesh(new THREE.PlaneGeometry(2,2),postMat);
  postScene.add(postQuad);
}
function resizePostFBO(){
  if(postFBO){
    var pr=Math.min(window.devicePixelRatio,1.5);
    postFBO.setSize(Math.floor(window.innerWidth*pr),Math.floor(window.innerHeight*pr));
  }
}

function onResize(){camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);resizeGlassFBO();resizePostFBO();resizeGodRays();updateCamRadius();}

window.scrollTo(0,0);

init();onScroll();initShopify();
</script>
